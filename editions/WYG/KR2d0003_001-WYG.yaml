body:
  text: 建康實録卷一唐許嵩撰吳太祖上太祖大皇帝姓孫氏諱權字仲謀吳郡富春人也其先岀自周武王母弟衛康叔之後武公子惠孫曽耳為衛上卿因以孫為氏春秋時孫武為吳王闔閭將因家于吳帝乃孫武之後也祖鍾父堅案祥瑞志鍾家于富春早失父幼與母居性至孝遭歳荒儉以種𤓰自業忽有三少年詣鍾乞𤓰鍾厚待之三人曰此山下善可葬當出天子君望山下百步許顧見我等去即可葬處也鍾去三四十步便返顧見三人並成白鶴飛去鍾記之後死葬其地地在縣城東塜上常冇光怪雲氣五色上屬於天及堅母孕堅夢膓出繞吳閭門以告隣母母曰此夢安知非吉祥也堅生容貌竒異仕漢為破虜將軍長沙太守靈帝末董卓作亂堅乃自長沙舉兵討卓破卓軍於陽夏長驅入洛修祭漢陵廟屯軍城南甄官井上見五色氣使人入井得漢傳國璽文曰受命于天既夀永昌方圓四寸上紐交五龍龍一角缺案後漢記云初黄門張讓等作亂刼天子出奔左右分散掌璽者投於井中其缺者是漢元后為王莽逼奪擲璽於地而損之也後征劉表於荆州為江夏太守黄祖伏兵殺之於峴山兄子賁扶堅喪還葬曲阿收其衆歸袁術於淮南案英雄記與此說不同云堅以漢初平四年正月七日討劉表為表將吕公引兵縁山向堅堅尋山討公公兵士下石中堅應時死别傳云堅攻荆州刺史劉表使江夏太守黄祖拒於楚鄧間祖使將士伏射殺堅於峴山中二録差爾堅字文臺少為縣吏年十七與父鍾並載經錢塘匏里遇海賊胡玉刼賈人財物方於岸上分之堅望之而啟父曰彼可取因登岸遂指揮處分似部領狀賊見大驚將有軍衆遂散走堅追斬一級收財物而還堅生四子䇿權翊匡案志林孫堅生五子筞權翊匡吳氏所生少子朗庶生也一名仁筞時年十七父亡後往見廣陵人張紘諮世務事言雪先君之恥於黄祖辭切意正涕泣横流紘心竒之助成其事䇿因委以母及諸弟徑往夀春見袁術垂涕而言亡父昔従長沙入討董卓輿明使君同盟結好於南陽不幸遇難勲業不終䇿感惟先人舊恩欲自憑結願明使君察其深誠術甚異之以其父衆千人配焉表䇿為折􅓘校尉使破廬江太守陸康時漢獻帝興平元年也明年冬術以䇿為殄冦將軍初袁術表䇿舅吳景為丹陽太守及術據夀春而揚州刺史劉繇走渡江遂逐景奔歴陽䇿因諮術征繇領兵千餘騎數十匹賓客樂従者數百人興平二年十二月發自夀陽比至歴陽衆已五六千集於横江大破劉繇牛渚營追敗繇于曲阿轉鬬千里郡縣歸伏遂東破嚴白虎於㑹稽白虎走義士許昭昭匿之程普請討昭䇿曰冇義于舊君有誠于故友此丈夫之志也遂捨昭引軍屠東冶白虎降殺之改置官吏鎮于㑹稽破太史慈于涇口復住之以舅吳景復領丹陽太守南討豫章廬陵定之時袁術將僣大號于江北筞乃使張紘為書絶之自領㑹稽太守以張昭張紘等為心腹謀主遂調時節貢賦於漢曹操乃表筞為討逆將軍封吳侯筞雖外見受官内懐三分之計及袁術敗死其部曲將術家屬歸廬江太守劉勲筞既定江東遂引兵與周瑜西渡襲皖城大破劉勲於廬江取袁術乗輿百工器物而歸以李術為廬江太中守皖初荆州刺史劉表使黄祖子射来救劉勲筞轉破射于西塞之水而追殺其將劉虎韓晞於沙羡縣還定豫章走華歆以従兄賁領豫章太守留賁弟輔將兵住南昌䇿謂賁曰僮芝自署廬江太守兄今據豫章是扼其咽喉而守其門户也但當伺其形便因令國議仗兵而進一舉可定矣案江表傳後孫賁聞僮芝病即如筞計引周瑜上巴丘外為形勢遂與其弟輔進廬陵而據之時曹操既扼袁紹而不能禁因與筞為好以弟女配筞小弟匡復為子章取筞従兄賁女為夫人建安五年四月廣陵太守陳登治射陽隂遣閒使以印綬與嚴白虎餘黨於㑹稽圖取筞筞宻知之討登至丹陽聞曹操與袁紹相拒於官渡將欲謀渡江迎獻帝初吳郡太守許貢見筞英傑乃表筞勇葢天下驍雄似項羽請朝廷徵入不然必為後患筞微知使人遮得其表而召貢責之令武士絞殺及北兵屯江上因出獵馬駿去従騎逺為貢客許昭伏刺之傷面時瑯琊道士于吉有道術往来吳中言事多驗諸將委筞拜吉三分之二筞惡之既至丹徒責其水旱事誅吉自後每獨坐常見吉在左右及許昭所傷治瘡方差筞性剛取鏡照面見所傷瘡乃怒曰大丈夫將建功業而令面如此遂擲鏡大叫瘡裂而死時年二十六案搜神記既殺于吉每照鏡見吉在其中顧而不見如是再三因擲鏡大叫瘡裂湏臾而死也以後事付弟權託長史張昭張紘輔佐之臨終顧謂權曰舉江東之衆決機於兩陣之閒與天下争衡卿不如我舉賢任能各盡其心以保江東我不如卿言終而卒權臨喪未及息張昭謂權曰夫為人後者貴能負荷先軌克昌堂構以成勲業方今天下鼎沸豺狼滿道此寧哭時猶開門揖盜未為仁也乃改權服扶上馬使出巡行軍伍案江表記堅為下邳丞生權廣額大口目冇精光堅異之以必有大貴隨兄筞征伐每立竒謀筞顧權謂衆曰此真諸君將軍也是時吳始有㑹稽吳郡丹陽豫章廬陵等郡深嶮之地猶未盡従而天下英豪布在州郡賓客之士以安危去就為意未有君臣之固權既統事以周瑜程普吕範等為爪牙將軍魯肅諸葛瑾步騭陸遜為腹心賓客招延英俊而分部諸將鎮撫山越討不從命使太史慈鎮海昏韓當周泰吕䝉為劇縣長建安六年春策所置廬江太守李術聞䇿死遂不從命乃與權書曰有徳見歸無徳見叛不應還權怒自征之梟首屠其城徙其部曲三萬人從東渡江八年以弟翊代吳景領丹陽太守九年大㑹僚屬以事誅沈友友字子正吳人也弱冠好學博聞明贍善文詞多有口辯時人以友筆妙舌妙刀妙三妙過人權至吳徵禮之共論王霸大畧當世之務友性忠謇立朝正色為衆所毁權亦以終不為己用故殺之十年春往椒丘使都尉賀齊討上饒分置建平縣是嵗丹陽都督媯覽郡丞戴員等與邊洪謀殺太守孫翊翊妻徐宻與翊親近孫髙傅嬰等謀覽員伏刃殺之盡誅其黨以覽員首祭翊墓十一年建昌都尉太史慈卒慈字子義東萊黄人少好學仕郡奏曹史㑹郡與州有隟曲直以先聞者善時州章已去郡守甚恐求可使者慈年二十一選行懐郡章晨夜取道到洛陽詣公車門見州吏紿而取章因得毁之説吏與俱亡出城潜還通郡章慈由是知名既而避州隟之遼東北海相孔融聞名義之饋其家訊老母及黄巾賊圍孔融母急召慈還令救融慈單行徑至都昌伺隟入見融言老母感遇之意請以求外援無損府君之兵以却賊因而開城詭習馬射伺賊之懈便突圍出求救於劉備以解都昌之圍而還啓其母母曰我喜汝有以報孔北海也後揚州刺史劉繇渡江慈隨之曲阿㑹孫䇿討繇慈單騎出候卒遇䇿於神亭䇿從韓當宋謙黄葢等一十三騎慈便前獨鬭正與䇿對䇿刺慈馬而攬得慈項上手㦸慈亦得䇿兠鍪㑹兩家兵來乃解與繇俱奔豫章道自蕪湖亡入山中稱丹陽太守立屯府於涇縣尋為䇿所破執之捉其手曰寧識神亭時也若卿爾時得我何如慈曰未可量也䇿大笑曰天下之事當與卿共之拜門下都督從還吳遷折衝中郎將深委任之每與計議聞劉繇死於豫章士衆萬餘人未有所附筞謂慈曰劉牧往責吾為袁氏攻廬江其意頗猥理恕不足何者先君手下兵數千人盡在公路孤志在立事不得不屈意在公路求索故兵再往纔得千餘人乃令孤攻廬江爾時事勢不得不為行但其後不遵臣節自棄作邪僣事諫之不従丈夫義交苟有大故不得不離孤初交公路及絶之本末如此今劉公喪亡恨不及其生與論辯之且兒子在豫章不知華子魚待遇何如其部曲復依隨之否卿則州人昔又従事誠能往視兒子并致孤意於部曲部曲樂来者便與俱来不樂者且安慰之并觀子魚所牧御方規視廬江鄱陽之民親附之否卿手下兵所將多少自由意慈對曰慈有不赦之罪將軍量同桓文待遇過望古人報生以死其於盡節没而後己今此使行不宜多兵數十人自足往還左右聞筞使慈皆宻諫慈難測遣之非計筞曰諸君語皆非也孤料詳矣太史子義雖勇烈非縦横人也其心有士謨義重然諾一意許知己死生不相負諸君勿憂之自出餞於閶門把腕别曰何時當還答曰不過六十日如期歸告於䇿曰子魚非籌畧之才但自守而已今廬陵鄱陽皆不受子魚之命海昏上獠約有六千餘家結聚作宗伍惟輸租布於郡爾發召一民不可得䇿撫掌大笑遂有并兼之心乃拜慈為建昌都尉治於海昏焉督諸將以拒劉表従子磐慈身長七尺七寸美鬚髯猨臂善射弦不虚發嘗従䇿討麻保賊於屯裏縁樓上行罵以手持樓棼慈引弓射之矢貫手著棼圍外萬人莫不稱善曹操聞其名遺書以篋封之慈發省無所道但貯當歸及權統事以慈能制劉磐専委南方之事卒時年四十二十二年太夫人吳氏薨合葬髙陵夫人吳郡錢塘人早失父母與弟景居孫堅聞其才貌求而娉之夫人初孕䇿夢月入懐既而生䇿及權在孕又夢日入懐以告堅堅曰日月隂陽之精極貴之象吾子孫其興乎後堅薨夫人家于舒撫育孤幼嚴於母訓及䇿統衆夫人助治軍國至多補益案吳書堅漢初平四年薨興平元年䇿見袁術計堅亡時䇿年十六也䇿功曹魏滕有罪將欲殺之時左右憂恐計無所出夫人乃倚大井召䇿曰汝新造江南其事未集方當優賢禮士捨過録功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此井䇿大驚遽釋滕罪夫人智畧事多如此存日甚得衆心臨薨引見張昭張紘等屬以後事秋鄱陽有山賊彭虎等聚黨數萬使將軍董襲討之襲身長八尺武力絶人聲發若雷賊帥望旗散走十三年春征黄祖於江夏屠其城邑生獲祖梟首於軍門虜其男女數萬口而歸分歙置始新新定黎陽休陽以六縣為新都郡秋曹操征劉表於荆州時表已死子琮舉荆州降時劉備自袁紹南連劉表在荆州操既平荆土因追破備備走當陽操乃多修舡舫遺書於權曰今治水軍八十萬衆方與將軍㑹獵於吳權得書召示羣臣張昭等議皆勸權迎之魯肅竊諫不可時命周瑜使鄱陽行途未逺請追瑜任以軍事權召瑜瑜還意與肅同權廷論未能決因起入周瑜趨後宻說權曰今拒操破之必矣若破操天下可鼎峙而立荆州上流當吳有也權許之乃宻使魯肅上往觀釁肅至遇備已敗遂便止傳權意見備於當陽長坂切陳成敗事勢將合謀以拒操權始自吳遷於京口而鎮之案地志吳大帝親自吳遷朱方築京城南面西面各開一門即今潤州城也因京峴立名號為京鎮在建業之北因為京口或云漢時已有京口未詳按史記秦始皇三十七年東渡江使赭衣三千鑿朱方京峴山東南隴因名丹徒今潤州見有徒兒浦即始皇將徒人過此浦因名焉備乃使諸葛亮詣權權乃使周瑜程普將兵二萬隨亮與備南拒操權自將中軍一萬繼之瑜以黄葢為先鋒取䝉衝鬭艦數十艘實以薪草灌以魚膏裹以幃幕上建旌旗龍幡前遣書報曹操紿其欲降時東南風急因取草艦最著前繫走舸於後中江舉帆俱前操軍士皆延頸觀望去北軍二里餘同時火發火烈風猛舡往如箭悉燒北舡延及岸上營落飛埃張天瑜率輕銳雷皷同進大破曹操軍於赤壁江口操走僅獲免北歸留曹仁守江陵瑜與程普等追破仁軍於南郡瑜為流矢中其右脇瘡甚臥仁乃勒兵逼瑜乃自起輿行軍陣閒仁聞收軍退走權以瑜領南郡鎮江陵十四年權居京口劉備詣京口見權求荆州周瑜聞之宻上書諫留備處於吳莫遣還時彭城太守吕範進說權曰劉備雖窮迫見歸得雨非池中物請及今困留之權不納遥表漢以備為荆州牧使治公安自餞備於江上觀望久之謂備曰孤與公掃清逋穢迎帝定都事寧之日願與公乗舟遊滄海耳備對曰此亦備之志也按劉備傳備既辭謂左右曰孫車騎精爽周贍其難為下吾不得再見之矣遂日夜兼行上公安也時曹操聞權以荆州資劉備大懼方作書不覺筆墜於地也十五年分豫章置鄱陽郡分長沙置漢昌郡以魯肅為太守治於陸口以南中郎將步隲為交州刺史騭到殺劉表所置蒼梧太守吳臣以徇諸郡表士燮交阯太守兼左將軍南土賓服自此始也是歳偏將軍南郡太守都亭侯周瑜卒瑜字公瑾廬江舒城人少有姿貌與孫䇿同年䇿父堅初起義兵討董卓徙家于舒瑜見䇿善相友待推道南大宅舍之䇿升堂拜母有無與同及䇿領父衆將東渡至歴陽瑜従父尚為丹陽太守瑜往省之䇿馳書報瑜瑜將鄉里數人候䇿䇿大喜遂共定江東諸郡累遷至江夏太守従征克皖城因得喬公二女皆國色䇿納大者瑜納小者江表傳䇿嘗從容戲瑜曰喬公二女雖流離得吾二人為婿亦足歡矣及權統事太夫人勅權以兄事瑜拜中䕶軍時權位在將軍諸賓客為禮尚簡惟瑜獨盡敬而執臣節性度恢廓權甚委之與張昭等共掌衆務大小關之及鎮江陵聞益州劉璋為張魯侵冦乃自詣京說權進取蜀得蜀使魯肅固守其地北與馬超結援瑜與將軍還據襄陽以䠞曹操北方可圖權許之瑜歸江陵治行道病卒於巴丘時年三十六權素服舉哀流涕而言曰公瑜有王佐之才今忽短命孤何賴焉及喪還自至蕪湖迎之喪事費度一為供給著令曰故將軍周瑜賓客皆不得問瑜有二男一女女配太子登男循尚公主拜駙馬都尉瑜少精意於音樂雖三爵之後其有闕誤必知之知之必顧時人謠曰曲有誤周郎顧瑜常有恩信著於吳中人皆呼為周郎也案江表傳程普頗以年長數凌侮瑜瑜持節容丅之普後自敬服乃告人曰與周公瑾交若飲醇醪不覺自醉其謙讓服人如此初曹操聞瑜年少有美才謂可遊說動之乃宻下揚州遣九江蔣幹往見之幹有客儀以才辯見稱獨歩江淮間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺涉江湖為曹氏作說客耶幹曰吾與足下州里中間别隔遥聞芳烈故来叙問并觀雅規而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞絃賞音足知曲也因延入設酒食畢遣之出就别館後三日瑜請幹與周觀營中行視倉庫軍資器仗訖還宴飲示之侍者服飾珍玩之物因謂幹曰凡丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計従禍福共之假使蘇張更生酈叟復存吾猶撫其背而折其辭豈足下幼生所能移乎幹但笑終無所言幹還稱瑜雅量髙致非言辭所間魏人多之瑜威聲既著劉備曹操互疑譛之瑜籌畧萬人英也觀其器度廣大恐不久為人臣曹操亦有書與權云赤壁值軍疾疫燒舡自退横使周郎虚獲此名權終委信無别十六年權始自京口徙治秣陵十七年城楚金陵邑地號石頭改秣陵為建業是歳初作濡湏塢於江西以拒曹操時操以步兵號四十萬列營出濡湏口權以七萬當之使甘寧夜突入操營斬數級而還操軍大駭軍中鼔噪權聞笑曰以復驚老子十八年權自與操相持於濡須使將軍常雕等以兵五千乗油舡夜入中洲權使將軍嚴圭朱桓等率水軍擊破之梟其將諸葛虎并首虜三千人而還權數挑戰操堅守不出權乃乗輕舟入濡須操軍士以為挑戰欲擊之操不許曰此孫權欲觀吾兵部伍也勅左右嚴伏不得妄動權行五六里迴作鼔吹而歸操見權舟舡器械整肅嗟曰生子當如孫權劉景升兒子若㹠犬耳案魏書孫權乗大舡来觀曹公軍曹公使弓弩亂發箭著其舡舡偏重將覆乃迴舡復以一面受箭箭匀舡平乃回此說不同權乃為書與操曰春水方生公宜速去又别紙曰足下不死孤不得安乃引還操恐江濱郡縣為權所掠徵令内移人轉相驚自廬江九江蘄春廣陵户十餘萬皆東渡江江西遂虚合肥以南唯有皖城十九年夏五月權又征皖城取之獲太守朱光魏軍盡退克寧江表而揚州所統丹陽吳興新都東陽臨海建安豫章鄱陽臨川安城廬陵南郡等一十四郡合一百四十八縣是歳劉備入蜀定益州使關忠義鎮襄陽二十年權使諸葛瑾往詣備求荆州備不與權征之置南三郡守使吕䝉討定其民蜀將關忠義盡逐出之權大怒自上鎮陸口使漢昌太守魯肅南討時曹操又入漢中備懼操逼遂遣使與吳求和乃分荆州長沙江夏桂陽四郡屬吳冬折衝將軍升城督甘寧卒寧字興霸臨江人也少為吏輕財重士嘗聚健兒年少好持弓弩帶鈴民聞鈴聲即知寧来也出入陸則連騎水則輕舟與人相遇待之甚厚乃與交歡不爾即放而奪之自劉表敗歸吳周瑜薦之以驍果従權常曰孟徳有張遼孤有興霸可以敵也二十一年權自陸口引兵還合淝營於津北魏遣將軍張遼拒之久不戰權乃徹軍過津南自留千人殿後與軍將舉酒樂飲前部渡將欲盡遼知之宻使人斷橋以輕騎来襲權䇿馬至津橋橋南已拆丈餘給事谷利在後令權持鞍緩控利加鞭助馬勢遂得超渡魏人追逼之利與别部司馬凌統以死苦戰身被數瘡賀齊等迴軍津南列陣以待之權既免至大軍垂泣嚙指出血以為終身之戒封谷利等為都亭侯張遼素不識權權去後因得吳降人問云向者紫髯將軍長上短下者是何人答曰孫將軍遼惋愕乆之舉軍歎恨二十二年春權令都尉徐祥詣曹操詐降將謀息兵操信之使修好結婚是歳偏將軍都亭侯凌統卒統字公績吳郡餘杭人也年十五以父功舉為别部司馬攝領父兵嘗有宴㑹部下將陳勤性剛勇飲酒使氣凌轢一座統面折之勤怒及其父母統流涕不答罷出勤於道又凶悖辱統統不能忍引刀斫勤數日乃死時人多之每隨權征伐従陸口還合肥率左右苦戰免權淮北之難而還悲痛親近者皆没無返者權引袂拭面曰公績亡者已矣但使卿在何患無人因留之常使出入臥内統為人性好接物親賢愛士輕財重義有國士風年二十九卒權聞之驚起哀不自勝使張承作誄致祭有二子烈封皆幼弱權收養於宫中年八九歳令葛先授書十日一教乗馬射呼為吾家虎子二十三年權如吳親乗馬射虎於庱亭虎傷馬長史張紘執轡諫曰足下繼父兄之業不宜輕脫逞英雄於猛獸萬一不虞則大事去矣權乃止秋横江將軍益陽侯魯肅卒肅字子敬臨淮東城人生而失父家富於財常散以賑窮乏結豪士得鄉邑之心時廬江周瑜為居巢長聞之往求資糧肅時有米二囷各三千斛直指一囷與瑜瑜益竒之乃結僑札之交袁術聞而徵之肅見其無綱紀乃就周瑜於居巢相與携老弱渡江住曲阿見孫䇿英傑遂定議共事之策死權統事周瑜乃薦肅才宜佐時權引肅合榻對飲因宻議曰今日漢室傾危四方雲擾孤承父兄遺業宜有桓文之功君既惠顧何以佐之肅對曰昔漢髙帝區區欲尊事義帝而不獲者以項羽為害今之曹操猶昔之項羽將軍何由得為桓文乎肅竊料之漢室不可復興曹操不可卒除為將軍計惟鼎足江東以觀天下之釁竟長江所極據而有之此自無嫌也權甚重之及曹操破荆州軍勢盛羣臣議多勸迎之惟肅與周瑜不聴立計破曹定荆州後周瑜向江陵道疾篤上表以肅自代進奮武將軍封邑兵仗器械部伍盡瑜之舊屬焉改授横江將軍在荆州甚得物情衆至萬餘肅為人方直嚴毅寡於玩飾内外節儉治身整齊在軍手不釋卷善屬文思畧𢎞逺卒時年四十六權舉哀素服蜀諸葛亮聞之亦發哀三日二十四年秋權表漢天子自率陸遜吕䝉等西征關忠義至大桑浦拜吕範為建武將軍領丹陽太守封宛陵侯使鎮建業謂之曰前従卿言無今日之勞也今當取之卿好為我居守也八月劉備稱漢中王冬十一月大破關忠義定荆州釋魏將于禁囚歸之關侯退守當陽麥陵城請降權召太史吳範問之範曰彼有走氣言降詐耳宻使潘璋等徑路邀之令朱然納降覘者還曰闗忠義己遁去範曰雖去不免權曰何時得之答曰明日日中權立表下漏待之及日中不至範曰尚未正中頃之有風動帷範拊手曰關侯至矣湏㬰外稱萬歳傳言得關侯是日潘璋部將馬忠擒關侯及子平於章鄉還誅之案虞翻傳關忠義既敗帝令翻筮之得節之臨翻曰不出三日當斷其頭果如其言帝謂翻曰卿不及伏義可與東方朔為比也按蜀志關忠義河東解人也與張飛共事劉備為禦侮者也漢天子以權為荆州牧領車騎大將軍封南昌侯權遣梁禹入貢於漢以觀曹操是歳南昌太守孱陵侯吕䝉卒䝉字子明汝南富陂人也少小江南依姊夫鄧當年十五六每隨當征討其母不許答曰貧賤雖可居脫誤有功當得富貴且不探虎窟安得虎子母聴之後因袁雄見孫䇿䇿竒之使居左右及權統事張昭薦之従征黄祖立功拜横野中郎將與周瑜追曹仁仁圍甘寧於夷陵急䝉說瑜進解寧圍先遣三百人柴斷險道賊走可得其馬及破仁仁夜遁走遇柴道皆捨馬步走䝉蹙之獲馬數百疋拜偏將軍鎮上屯時蜀將龐肅舉軍来附周瑜表分其兵與䝉䝉上書勸權来歸者宜益不宜奪權従之時上屯戍將徐碩宋芝等二人皆死子弟小弱權以其衆並付䝉䝉因陳其功勞不可棄廢宜立其子乃擇師傅訓其子弟天下義之後代魯肅領漢昌太守屯陸口權因上陸口與議令北取徐州以廣疆場䝉曰此計未當縦得徐州亦不能守不如西取關侯以據長江權従之竟破關侯定南郡進封孱陵侯遇疾權使舁入宫内自醫之每為不食又不能頻見恐其起動常穿壁伺之見少可則喜笑如不能則悲不自勝治䕶萬方募國内有愈䝉者賜千金䝉為人不懐宿怨如有讎隟毁嫌者皆擢用之性不好書權常使人勸令學問以自益年四十卒於宫中權哭之慟置守冡三十家助田五十頃子霸襲爵初權與陸遜論周瑜魯肅及䝉曰公瑾雄烈膽畧兼人遂破孟徳開拓荆州邈焉難繼君今繼之公瑾昔要子敬来東致逹於孤孤與宴語便及大畧帝王之䇿此一快也後孟徳因獲劉琮之勢張言率數十萬衆水陸俱下孤普請諸將咨問所宜無適先對至子布文表俱言宜遣使修檄迎之子敬則駁言不可勸孤急呼公瑾付任以衆逆而擊之此二快也且其决計䇿意出張蘇逺矣後雖勸我借𤣥徳地是其一短不足以損二長也周公不求備於一人故孤忘其短而貴其長常以比方鄧禹又子明少時不辭劇易果敢有膽而已及長學問開益籌畧竒正可以次於公瑾但言議英發不及耳圖取闗侯勝於子敬子敬答吾云帝王之起皆有驅除關侯不足忌此内不能辦外為大言耳孤亦恕之不苟責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其法亦美矣二十五年春正月魏王曹操薨太子丕即位改漢建安為延康元年秋魏將梅敷使南陽長史張儉送欵以南陽隂鄼筑陽山都中廬五縣五千家歸附權納之明年冬十月曹丕代漢稱魏號黄初元年而權江東猶稱建安二十六年其年始置丹陽郡自宛陵里於建業二十七年夏四月劉備稱帝號於蜀即黄初二年也時權在公安聞之自公安下都鄂改鄂為武昌召問知星者將定三分之計五月甘露降於建業秋八月城武昌下令諸將出入従兵仗以自防冬十一月魏使邢貞至冊命權九錫為吳王貞入國門猶乗車軍師張昭怒其無禮責之曰君謂江東無寸刃可為法耶何輕慢之甚貞遽下車拜謝羣臣見冊命至議以為宜稱漢上將軍九州伯不應受魏封權曰九州伯於古未聞昔沛公亦受項羽封為漢王此葢時宜爾復何損也遂遣中大夫趙咨使魏魏文帝問曰吳王何等主對曰聰明仁智雄畧之主問其狀咨曰納魯肅於凡品是其聰也㧞吕䝉於行陣是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據三州虎視天下是其雄也屈身陛下是其畧也又問吳王頗知學乎答曰吳王浮江萬艘帶甲百萬任賢使能志在經畧脫有餘暇博覽史籍而採竒異不効書生尋章摘句而已又曰吳可征乎咨曰大國有征伐之兵小國有禦侮之固又曰吳難魏乎咨曰帶甲百萬江漢為池何難之有又曰吳如大夫者幾人咨曰聰明特逹者八九十人如臣之輩撥羣驅隊不可勝數文帝善其對厚禮之咨還說權曰臣觀北方終不能守盟朝廷承漢四百之餘應東南之運宜改年號正服色以應天順人權納之拜騎都尉是年劉備怨殺關忠義大舉兵自来伐至巫山誘武陵五溪蠻夷反權使大將軍陸遜拒之南郡太守諸葛瑾時駐公安使人送牋論是非以解於備或有讒瑾别遣親人與備相聞陸遜知之表明瑾無此宜散其意權書報遜曰子瑜與孤従事積年恩如骨肉深相明究其為人也非道不行𤣥徳昔遣孔明至孤語子瑜卿與亮同産且弟隨兄於義為順何以不留子瑜答孤云孔明與人委質定分義無二心弟之不留猶臣之不往也其言足貫神明今豈有此乎孤前得妄語文疏即封示子瑜并手筆與之得其報論天下君臣大節一定之分孤與子瑜可謂神交非外言可間也知卿意至輒封来表以示子瑜使知孤意二十八年春正月蜀軍前後連五十餘營分據險地進升馬鞍山陸遜督諸將隨輕重應接四面攻圍閏正月大破蜀軍於五屯斬將搴旗追奔逐北盡敗諸營投降者萬餘盡得其糧食器物備走遜部將孫植斬上兠道截其徑路要備備踰山險僅得免入於白帝城二月權以破蜀事使報魏魏遣侍中辛毗尚書桓階来盟誓并徵任子權辭不受秋九月魏命曹休張遼等諸軍大出數道来逼權令吕範諸葛瑾等縁江守備拜陸遜為輔國大將軍郢州牧封江陵侯假黄鉞渡江拒魏以將軍朱桓為濡湏督封新城亭侯魏宻遣大司馬曹仁步騎數萬向濡湏欲襲取桓乃偽揚聲東攻羡溪桓分兵將赴羡溪既發卒得仁進軍拒濡湏七十里桓遣追還羡溪兵未到而仁奄至城下桓時兵吏在者五千人因勅偃旗臥鼔外示虚弱以誘之仁使子泰来攻自將萬人留為後拒桓分步兵當仁身自拒破泰泰燒營走斬數千級仁退諸軍乗勝破曹休張遼等魏引退鎮西將軍陸遜等率諸將進表勸權即王位冬十一月權就吳王位於武昌大赦改年號為黄武元年初置丞相以陽羡侯孫劭領之立子登為王太子十一月蜀使致書於權引躬自責求修舊好十二月遣大中大夫鄭泉聘劉備於白帝始報通好焉泉至蜀蜀主問曰吳王何以不答朕書將無以朕正名不宜乎泉曰曹操父子凌轢漢室終奪其位陛下託以宗室有維城之重不荷戈執殳為海内率先而因是自名未合天下之義是以寡君未復書爾備甚慙泉字文淵陳郡人博學有姿望而性嗜酒每閒居曰願得美酒滿五百斛舡以四時甘脆置兩頭反覆没飲之憊即住而啖餚饌酒有斗升減隨而益之不亦快乎臨卒謂同類曰必葬我於陶家側庶百歳後化成土見取為酒壺是歳改夷陵為西陵詔揚州置牧以丹陽太守吕範為揚州牧以東征將軍髙瑞領丹陽太守復自建業徙治蕪湖時揚州所統一十四郡一百四十八縣而丹陽領一十九縣二年春正月城江夏武昌宫改四分用乾象厯自以土行代漢建寅為歳首三月魏軍盡退彊界寧息夏四月丞相孫劭大將軍陸遜率羣臣上表稱天命符瑞勸王即帝位王再讓未許謂羣臣曰漢家堙替不能存救亦何心競焉案江表記權謂將相曰往年寡人以𤣥徳方向西鄙故先命陸遜選衆以待之聞北部分兵欲以助寡人寡人内嫌其狀若不受其拜是相折辱而趣其速發便當與西俱至二處受敵於國為劇故自抑就其封王低屈之趣諸君未盡故相解耳蜀主劉備薨於白帝王使立信都尉馮熈弔於蜀五月甘露降曲阿冬十一月蜀使鄧芝以馬二百疋錦千端来聘自是之後聘使来往為常各致方物奬其厚意三年秋九月魏軍來冦曹丕自出廣陵臨大江兵十餘萬旌旗數百里王使諸將謀以拒守安東將軍徐盛設計築圍作薄落圍上設假樓江中浮船多張旗幟於山險而又縛草為人衣以甲胄自武昌至於京口烽烟相望諸將以為無益王然之魏文帝臨江不敢渡乆之歎曰天固隔我吴魏彼有人焉便退吴將孫劭先屯於江北聞魏軍退遣將髙夀率敢死士五百人夜於徑路要之魏帝驚敗遁走夀春獲輜車羽葢而歸冬十月晦日有蝕之四年夏五月丞相孫劭薨諡曰肅劭字長緒北海人身長八尺初為北海相孔融功曹融謂廊廟之才漢末隨劉繇過江歸國累拜車騎長史為吳首相封陽羡侯初劭之薨也羣臣衆望舉婁侯張昭為丞相王曰寡人豈為子布所惜但丞相事煩而此公性剛所言不從怨咎將興非所益也六月以太常顧雍為丞相封醴陵侯以尚書陳化為太常化字元耀汝南人少博覽衆書氣幹剛毅長七尺九寸雅有威容初拜郎中使魏魏文帝因酒酣謔化曰吳魏峙立誰將平一海内化曰易稱帝出乎震加聞先哲知命舊說黄旗紫葢運在東南帝曰昔文王以西伯王天下豈復在東乎化曰周之初基太伯在東所以文王興於西帝笑無以難心竒其詞厚禮送還王以奉命光國遷犍為太守尋追入遷尚書頃之拜太常兼尚書立朝正色勅子弟廢田桑絶治産業仰官廪禄不與百姓爭利妻早亡以古事為鑒不復娶王聞而貴之以其年壯勅宗正以宗室女妻之固辭不受年七十上疏乞骸骨爰居章安卒於家子熾嗣雍字元凱吳人也少従蔡伯喈學琴慕其為人因改名雍初以州郡表薦累遷至尚書封陽遂鄉侯拜侯還家而家人不知雍為人不飲酒寡言語朝廷憚之自為丞相其所選用各隨能所任心無適莫訪人閒及政職所宜宻以言聞見納則歸於主上不用終不泄言以此見重秋七月皖口言木連理又地連震五年大將軍陸遜奏所在少穀令諸將廣農畝王許之稱善孤自率子弟親受田車八牛為四耦與衆等均其勞也夏五月魏文帝崩秋七月蒼梧鳳皇見是月置東安郡治富春冬十一月陸遜以便宜奏施徳緩刑寛賦息調王答善之乃令有司寫利害科條使中郎褚逢齎就遜令與諸葛瑾同損益之衛將軍交阯太守龍編侯士燮卒燮字威彦蒼梧廣信人也少好學漢察孝亷補尚書郎以公事免尋舉茂才除丞令累遷交阯太守漢末交州刺史朱符為夷賊所殺州郡擾亂燮乃表弟司徒掾壹領合浦太守次弟徐聞令鮪領九真太守鮪弟武領南海太守兄弟並在列郡雄據一州偏在萬里威尊無上出入鳴鐘磬備鼔吹車騎滿道夾轂焚香者常有數十人妻妾乗輜軿子弟従兵騎當時貴重震服百蠻燮體氣寛和謙虚下士中國人物避難多往依之每公事稍闋躭習書傳注解左氏春秋尚書古今大義時天下亂四方隔絶而燮不廢貢賦及王使步騭定南土率兄弟奉承節度每使貢雜香細葛明珠大貝琉璃玳瑁翡翠犀象珍竒異果無歳不至在郡四十餘年年九十卒王以交阯懸逺乃分合浦已北為廣州拜吕岱為刺史交阯以南為交州拜戴良為刺史以陳時代燮為交趾太守良與時至合浦而燮子徽自署為交趾太守發宗兵拒良不許入王勅吕岱與良等討平之誅徽傳首武昌六年春正月韓璫子琮以衆叛歸魏七年罷東安郡夏五月鄱陽太守周魴以詐誘魏將曹休獻休事七條宻表於王八月王自幸皖口使大將軍陸遜督中軍全琮朱桓為左右三邊俱進大破魏軍於夾石亭俘數萬計盡收其騾馬輜重曹休僅免冬十月王下令軍中諸將有三罪然後議之以將軍翟舟有過亡入魏故也是歳改合浦為珠官郡大司馬南昌侯吕範薨範字子衡汝南細陽人少為縣吏有容儀姿貌而家貧縣有富人劉氏女有美色範求之母不許女曰豈有如吕子衡長乆貧耶遂與為婚後避亂住夀春將客百餘人過江東孫䇿異之遣往江都迎太妃還䇿待以親戚共陞堂飲於太妃前求退任為都督整齊其衆因進言於䇿曰捨本土而託將軍者非為妻子欲與將軍共濟世務猶同舟涉海事不成則俱受其敗乃授偏將軍内外委任焉王統事申重之嘗與嚴畯論衡方於吳漢進領彭城太守與周瑜同破曹操於赤壁以功進平南將軍屯大桑尋入於建業黄武元年遷揚州牧七年拜大司馬改封南昌侯印綬始下而薨王素服舉哀黄龍元年將下都建業自過範墓祭以太牢執酒呼曰子衡隨我言及流涕左右皆垂淚範性耿介有威儀好奢靡然勤公奉法王深委之案江表傳權嘗謂嚴畯曰吕子衡忠篤亮直性雖好奢然以憂公為先不足為損避袁術自歸於兄已作大將别領部曲故憂兄事乞降為都督辦䕶修整吾軍加之勤恪與吳漢相類故方之皆有趣非孤私也建康實録卷一
