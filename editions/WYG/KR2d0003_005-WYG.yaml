body:
  text: 建康實録卷五唐許嵩撰晉中宗西晉孝武太康元年平吳乃廢建業復為秣陵分丹楊南郡為宣城郡還理於秣陵在今縣東南六里渡長樂橋古丹楊郡是也以周浚為揚州刺史所統十九郡七十四縣太康三年分秦淮水北為建鄴水南為秣陵縣仍在秦邑地而建鄴縣在故都城宣陽門内今縣城東二里古御街東太安二年夏五月義陽蠻張昌舉兵號漢稱神鳳元年使將軍石冰冦揚州諸郡盡沒冰因修建鄴宫居之案曹憲揚州記晉惠永寧二年有石浮來建鄴自入秦淮夏架湖登岸二百餘歩百姓咸曰石來石來至明年石冰果入揚州遂據此地冬十二月征東將軍劉凖使右將軍廣陵相陳敏渡江攻破石冰於建鄴永興二年十二月陳敏又據建鄴自號揚州刺史假顧榮為丹楊尹以甘卓周玘為將軍敏諷寮佐進已為楚公加九錫之禮時東海王祭酒華譚聞之與榮書陳是非言敏凡才無遠畧昔齊之王蠋布衣爾猶不屈於燕况足下名重位彰受恩於國而黨奸邪自相置署榮得書大慙與甘卓等謀曰江東事若濟當共成之然鄉觀形勢如何敏既常才政令反覆子弟驕矜其敗必矣吾等受其官禄事敗之日使江西諸軍函首送洛陽題曰顧榮甘卓之首豈惟一身辱及萬世卓等然之遂與榮謀遣使宻報征東將軍劉凖令率兵臨江敏令弟昶將兵拒之使甘卓屯横江榮玘因卓兵殺陳昶斷橋盡收船於淮水南敏自出軍臨大航岸榮以羽扇麾之敏衆潰㪚敏單馬北走玘等追斬於江表陳敏字令通廬江人少有幹能補尚書倉部令史趙王倫簒逆義兵乏食以敏為廣陵度支令漕運江淮以濟中州屬張昌亂使石冰趍壽春都督劉凖與敏謀破冰等以功拜廣陵相時在惠帝西遷四方交争敏遂有據江東之心懐帝永嘉元年東海王越秉政秋七月以瑯琊王睿為安東將軍都督揚州江南諸軍事用王導計渡江鎮建鄴討陳敏餘黨廓清江表因吳舊都城修而居之太初宫為府舍按太初宫夲吳之宫晉平吳後石冰作亂焚燒蕩盡陳敏平石冰據揚州因太初故基創造府舍中宗初渡江因居此地也置丹楊内史官以顧榮為軍司馬賀循為參佐王敦王導周顗刁協戴若思為腹心股肱接賔客禮名賢存問風俗永嘉五年夏六月劉曜冦洛陽京師淪陷懷帝䝉塵於平陽司空荀蕃移書天下推瑯琊王為盟主六年春二月壬子瑯琊王馳檄四方徴兵以討石勒師次壽陽勒退河北夏四月丙寅征南將軍荆州刺史山簡卒簡字季倫河内懐人司徒濤之第五子自侍中吏部尚書出鎮襄陽卒時年六十一贈儀同三司歸葬建康𤣥武湖南覆舟之陽子遐嗣案遐字彦林累拜餘姚令時江左豪族多挾藏户口以為私附遐繩之以法到縣八旬出户口萬餘後至太守秋七月嵗星熒惑太白聚牛斗十二月㪚騎常侍顧榮卒榮字彦先吳人世為南土著姓祖雍吳丞相父穆宜都太守榮機神朗悟弱冠仕吳累遷黄門侍郎吳平與陸機兄弟同入洛陽時人號為三俊拜郎中歴廷尉正恒縱酒酣暢謂友人張翰曰唯酒可以忘憂但無如作病何及趙王倫簒位以榮為子䖍大將軍府長史榮初與同寮飲酒見執炙人貎狀不凡榮因割炙反噉之人問其故榮曰豈有終日執之而不知其味及倫敗將誅榮前執炙者為督率衆救榮得免齊王冏以為大司馬主簿榮懼禍及終日昏醉不綜府事轉中書侍郎在職不復飲酒人或問曰何前醉而後醒榮懼復飲酒與鄉里楊彦明書曰吾為齊王主簿常慮禍及見刀與繩毎欲自殺但人不知耳後徴拜常侍以世亂辭不受遂還吳屬陳敏據揚州假榮右將軍丹楊内史時敏使甘卓出鎮堅甲利器盡委之榮因說卓以圖敏明年周玘甘卓與榮及紀瞻等潜謀破敏及瑯琊王睿初鎮江東以榮為軍司馬加㪚騎常侍凡所謀畫皆以諮焉多有匡諌王皆納之進薦賢良言賀循等沉潜青雲之士而陸士光金玉之資甘季思紀瞻幹决殊絶王皆辟用之卒官王哭之慟欲表贈依齊王功臣格吳郡内史殷祐上牋論功贈侍中開府儀同三司榮好琴書及卒家人置琴於靈座吳郡張翰徃哭之既而上牀鼓琴數曲歎曰顧生復能賞此否又慟哭不弔䘮主而去子毗嗣初陳􅀈問方士戴洋曰人言江南當有貴人顧彦先周宣珮當是否洋曰顧不及臘周不見來年八月榮果至其月十七日卒十九日臘宣珮明年七月晦日亡是嵗太子洗馬衛玠卒玠字叔寳河東安邑人祖瓘司空録尚書事父恒尚書郎玠幼而爽異長好𤣥理毎一言論皆以造㣲瑯琊王澄有高名嘗聞玠言輙歎息絶倒以天下大亂遂扶老母將家南行至豫章大將軍王敦長史謝鯤先相雅貴相見欣然言論永日敦謂鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表㣲言之緒絶而復續不意永嘉之末復聞正始之音何平叔若在當復絶倒玠常言人有不及可以情恕非意相干可以理遣故終身不見喜怒之容以王敦非純臣而不久留求向建鄴京師人士聞其姿容觀者如堵玠先有勞疾從此遂甚卒時年二十七葬新亭東今在縣南十里時人謂看殺衞玠案地志咸和中王導為揚州刺史下令曰衞洗馬明日當改葬此君風流名士海内所瞻可具祭奠以敦舊好改葬即此地也未悉夲葬何處七年夏四月愍帝即位改元建興元年五月使加瑯琊王睿左丞相大都督中外諸軍事詔改建鄴為建康改鄴郡為臨漳秋七月南郡太守周玘卒於蕪湖玘字宣珮征西將軍處長子性剛毅沉斷有父風而文學不及閉門潔已不妄交逰士友咸望風而敬憚焉州辟為從事虛已備禮方乃應命除議郎太安初妖賊張昌丘沉反於江夏惠帝使監軍華宏討之不剋玘宻結南平内史王矩及江東人士同起義兵破昌沉既畢玘不言功㪚衆還家及陳敏據揚州與顧榮甘卓等謀擒敏瑯琊王初鎮江左以玘為倉曹屬吳興人錢璯謀反玘率合鄉里義衆與郭逸討之傳璯首于建鄴玘三定江南開復王畧王嘉其勲累拜建威將軍吳興太守以玘頻興義兵勲誠並茂乃以陽羡及長城之西鄉丹陽之永世别為義興郡以彰其功然玘宗族疆盛人情所歸帝疑憚之于時北來人士左右王業而玘自以為不得調内懷怨望復為刁協輕之乃與東萊王恢陰謀誅諸執政推玘及戴淵與諸南士共奉王以經緯世事事泄王秘之召玘為鎮東司馬復改南郡太守既行至蕪湖又進爵為公玘忽知其謀泄遂憂憤發背而卒時年五十六將死謂子勰曰殺我者諸傖汝能復之乃吾子五年春正月瑯琊王出師露次躬擐甲胄移檄天下徴兵時有玉册見於臨安白玉麒麟神璽出於江寧其文曰長燾萬年日有重暈皆以為中興之象案圖經江寧縣名元帝初過江永嘉中置之在今縣城南七十里南臨浦水其水源出宣州當塗縣下溪村西流入江名江寧縣也二月平東將軍宋哲至宣愍帝宻詔令王攝萬機脩復陵廟將雪大耻王聞􅉖帝被幽王素服出次舉哀慟哭三月西陽王羕及羣僚等勸進王辭不受羕等固請王流涕曰孤罪人也不能雪天下之耻因欷歔不止令私奴命駕將返國羣臣不敢逼㑹稽内史紀瞻與長史王導俱入見王立陳利害瞻進曰今帝失御宗社虚廢神器去晉于今二年陛下特天所授光闡七廟以隆中興今欲守匹夫之謙而逆天時違人事失地利三者一去雖復傾注於將來豈得救祖宗之危急哉臣等區區之誠不可失也王不許使殿中將軍韓績徹去御座瞻叱績曰帝座上應星辰敢動者斬王為之改容羣臣因請依魏晉故事為晉王許之三月辛卯瑯琊王即晉王位承制大赦改元建武元年初備百官立宗廟社稷拜諸叅軍百餘人為奉車都尉駙馬都尉等掾屬時人呼為百六掾案圖經晉初置宗廟在古都城宣陽城外郭璞卜遷之左宗廟右社稷去今縣東二里𤣥風觀即太社西偏對太社右街東即太廟地太廟事已具孝武卷中社立三壇帝社太社各一稷一一本云洛陽社二壇稷一壇今亦合其制宜者也夏四月丙辰立世子紹為晉王太子進百官行賞以王子宣城公裒為瑯琊王以王導都督中外諸軍事其餘進班各有差六月丙寅司空并州刺史廣武侯劉琨幽州刺史左賢王渤海公叚匹磾等一百八十人遣長史温嶠來上表勸王即尊位王優令答之以二公共濟艱難同契一致撫寧戎夏動静以聞冬十一月進司空劉琨為太尉初置史官立太學以干寶王隱領國史是嵗揚州大旱晉陵内史張闓奏立曲阿新豐塘溉田八百餘頃建武二年春三月癸丑愍帝崩問至晉王服斬縗居廬丙辰王侯百寮上尊號勸進是日晉王即皇帝位于建康案帝自永嘉元年領江左至建武二年積十一年即帝位居舊府舍至明年亦不改作而成帝業始繕苑城也帝諱睿字景文宣帝曽孫瑯琊武王伷之孫恭王覲之子初魏明帝青龍三年冬十一月張掖郡丹陽川谷坌溢有石流出立於川中有馬行列而犧牛在後麒麟居東鳳凰處南白虎處西八卦分布成文占者或云牛繼馬後及宣王秉政深以牛氏為慮因征遼東還遂為二榼同一口貯酒酖殺大將軍牛金後恭王妃夏侯氏與小吏牛欽私通因産帝咸寧二年生於洛陽有神光滿室所藉藁如始刈及長白毫生於日角之左龍顔隆凖目有精光顧盼煒如也年十五嗣位瑯琊王三十二始鎮建鄴四十二即帝位戊辰大赦改元太興元年文武増位二等庚午立紹為皇太子夏四月丁丑朔日有蝕之戊寅初禁招魂葬案晉書東海王越死於鄴屍為石勒所焚妃裴氏過江乞招魂葬帝雖許之治書御史袁􅅛與博士傅純議招魂葬是謂埋神不可從也帝然之遂禁斷五月幽州刺史段匹磾執太尉劉琨囚之初王敦見琨勸進表至天祚大晉必將有主主晉祚者非大王而誰敦大怒投表於地曰讀左傳三十年一朝為劉琨用却因内憚焉及聞拘繋宻使叚匹磾殺琨又懼衆反已遂稱有詔收捉琨聞敦有使至謂其子曰處仲使來而不告我是殺我也死生有命但恨讎耻不雪無以下見二親耳因涕泣悲不能自勝癸丑匹磾縊殺琨并子姪四人時年四十八琨字越石魏昌人漢中山靖王勝之後少負志氣有縱横才善交勝已而頗浮誇與祖逖為友聞逖被用乃與親故書曰吾枕戈待旦志梟逆賊常恐祖生先吾著鞭累遷位并州刺史􅉖帝即位拜司空封廣武侯都督冀幽并三州軍事尋為石勒所破窮蹙歸匹磾遇害初琨在晉陽時嘗為賊騎所圍數重窘廹無計乃乘月登樓清嘯賊聞之者皆悽然長歎中夜因奏胡笳賊又流涕有懐土之感向曉並棄圍而去及帝將中興於江東中朝士大夫多過江歸帝朝廷望之怨琨不至王處仲曰江東地狹不容琨氣六月旱帝親雩詔改丹陽内史為丹陽尹以薛兼為之案刺史尹内史太守止是史官晉百官志云王臨州則郡有内史州無王則唯太守尹者正也漢置河南尹晉江左置丹陽尹盖天子所居則郡以尹為主者也是月置招諫鼓立誹謗之木秋七月劉聰死子粲嗣位尋為其臣靳凖所㓕凖自號漢王八月皇太子釋奠於太學冬十月劉曜僣號於赤壁十一月日夜出高三丈中有赤青珥新作聽訟觀十一月劉聰故將王騰馬忠等誅靳凖送傳國璽於劉曜癸巳詔録吳名賢具條列聞奏是嵗武昌太守王諒牛生兩頭八足兩尾共一腹二年春正月使冠軍將軍梁堪守太常馬龜等修復山陵迎梓宫於平陽不克而還五月壬戌詔去非急之務非軍事所湏皆省之夏六月丙子罷御府及諸郡丞置博士員五人秋七月乙丑開府儀同三司賀循卒循字彦先㑹稽山陰人其先慶普漢世傳禮學族高祖純後漢侍中避安帝父諱為賀氏父卲吳中書令循有操尚童齕不羣言行進止必以禮讓善屬文舉秀才後遷武康令陸機表薦累遷南中郎長史不就歸與鄉里合義討逆及陳敏據江外矯詔以循為丹陽内史循辭以脚疾與顧榮等平敏拜吳國内史帝鎮江左守職尋轉軍司因與循言及時政事遂問循曰孫晧嘗燒鋸截一賀頭是誰耶循未及言帝悟曰賀邵也循流涕曰先父遭遇無道臣誠痛深無以上答帝甚愧之三日不出及帝承制以為軍諮祭酒循稱疾不起帝使輿疾至親臨諮以政道循羸疾不堪拜跪乃就加朝服賜第一區車馬牀帳衣褥等物一無所受時江東草創循多陳利害言而必從進為侍中以討華軼功封都鄉侯固讓不受建武初拜中書令加㪚騎常侍宗廟始建舊儀多闕循議定七廟帝踐位遷太子太傅循自以枕疾廢頓臣節不修累表固讓命皇太子親徃拜焉後疾篤表乞骸骨詔改授左光禄大夫開府儀同三司帝親臨軒遣使持節加印綬循已不能言指左右推去章服駕幸執手流涕太子親臨三焉徃還皆拜儒者為榮卒時年六十帝哭之慟贈司空諡曰穆將歸葬於吳皇太子追送近郊望舡流涕子隰嗣案晉書循少玩篇籍善屬文博覽衆書尤精禮傳雅有知人之鑒譽楊方於卑陋卒成名於世甲戌以尚書戴若思為征西將軍都督司兖豫并冀雍六州諸軍事司州刺史鎮河淝丹陽尹劉隗為鎮北將軍都督青徐幽平四州諸軍事青州刺史鎮淮陰八月肅慎貢楛矢石砮九月鎮西將軍豫州刺史祖逖卒逖字士雅范陽遒人世吏二千石為北州舊姓逖少孤兄弟六人性最豁蕩不修儀檢年十五六猶未知書兄該納等憂之然輕財好俠慷慨有節操毎至田舍輙稱兄意㪚穀帛以賙貧乏鄉族重之後乃專學博渉書記年二十四舉秀才不行與劉琨俱為司州主簿情好綢繆共被同寢中夜聞鷄鳴蹴琨覺曰此非惡聲也因起舞二人並有英氣毎語世事或中宵起坐相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原累遷太子舍人洛京䘮亂遂避地淮泗元帝鎮江左徴為軍諮祭酒將家居丹徒之京口西朝傾覆常懐振復之志賓客從者皆傑勇之士元帝方拓定江南未遑北伐逖進說帝北收遺黎雪國大耻帝許之以逖為豫州刺史不給鎧仗令自招募仍將本從部曲百餘家渡江中流撃檝而誓曰祖逖不清中原而復濟者有如大江辭色壯烈衆皆慨歎因進屯淮陰鑄兵器練士卒轉鬪而前太破石季龍蓬陂塢主陳川川還襄國季龍使川將桃豹守川故城住西臺逖遣將軍韓潜等進鎮東臺與賊同一大城相守四旬以布囊盛土使千餘人運上臺如米以示賊賊飢久益懼石勒遣將劉夜堂以驢千頭運糧以饋逖使撃破之獲夜堂豹宵遁走因進鎮雍丘畧定河外巡撫征戍時趙固上官已李矩郭黙等皆受逖節度於是黄河以南盡為晉土其河上先有堡固及任子在賊中者皆聽兩屬如有㣲功賞不踰日躬自勸督農桑尅已施下收葬枯骨為之祭醊百姓感悅嘗置酒大㑹耆老中坐流涕曰吾等老矣更得父母死將何恨乃歌舞詠思其得人心如此詔進逖鎮西將軍石勒不敢窺兵河南使成臯縣修逖母墓因與逖書求通使交市收利十倍公私豐贍士馬日彊方欲推鋒越河掃清冀朔㑹朝廷遣戴若思為都督逖不平且已剪荆棘收河南地而若思雍容一旦來統之意甚怏怏又聞王敦與劉隗等構隙慮有内難大功不遂感激發病乃置妻子於汝南大木山下進繕虎牢使從子汝南太守濟率汝陽太守張敞新蔡内史周閎築壘未成而逖病甚時有妖星見于豫州之分歴陽陳訓謂人曰今年西北大將軍當死逖亦見星曰此為我矣方平河北而天欲殺我此乃不祐國也年五十六卒於雍丘百姓如䘮考妣皆為之立祠案晉書王敦久懐亂逆畏逖不敢發至是始得肆其奸雄焉冬十一月戊寅石勒僣稱趙王於襄國是嵗作南郊在宫城南北五里郭璞卜立之案圖經在今縣城東南十八里長樂橋東籬門外三里今縣南有郊壇村即吳南郊地三年春二月辛未雨大冰三月燕王慕容廆奉送玉璽三紐夏六月吳郡米廡無故自壊米廡貨糴之屋無故自壊此五穀踊貴之象秋七月詔瑯琊國人隨在此者近有千户以立為懐德縣統丹陽郡永復為湯沐邑案中宗初瑯琊國人置懐德縣在宫城南七里今建初寺前路東後移於宫城西北三里耆園寺西帝又創已北為瑯琊郡而懐德屬之後改名費縣其宫城南舊處咸和中移建康縣自苑城出居之案南徐州記費縣西北八里有迎檐湖昔中宗南遷衣冠席巻過江客去相迎負檐於此湖側至今名迎檐湖世亦呼為迎檐洲在縣城西石城後五里餘初隨帝過江有王離妻者洛陽人將洛陽舊火南渡自言受道於祖母王氏傳此火并有遺書二十七巻臨終使行此火勿令斷絶火色甚赤異於餘火有靈驗四方病者將此火煑藥及灸諸病皆愈轉相妖惑官司禁不能止及季氏死而火亦絶時人號其所居為聖火巷在今縣東南三里禪衆寺直南出小街或云齊時復有聖火事具齊巻内八月追尊所生夏侯氏為皇太妃太妃諱光姬沛國譙人祖威兖州刺史父莊淮南太守妃生自華宗㓜而明惠初帝嗣立稱王太妃永嘉元年薨於江左案晉書妃后傳初有䜟云銅馬入海建鄴期太妃小字銅銀而元帝果中興於江左矣庚申追尊敬王后虞氏為敬皇后辛酉遷神主于太廟敬皇后諱孟母濟陽外黄人父豫后無子永嘉六年薨時年三十五至是追尊案外戚傳云元敬父虞豫少有美稱州郡禮辟不就早卒明帝立追贈㪚騎常侍驃騎大將軍開府儀同三司子𦙍嗣敬后弟也遷歩兵校尉辛未皇太子釋奠于太學冬十二月丁未嚴設煑鹽之法造私鹽者以半與之又募入米京師米一斛與鹽四石是嵗創北湖築長堤以壅北山之水東自覆舟山西西至宣武城六里餘後苑牛生一足三尾生而死足少不勝也四年春二月鮮卑段末波奉送皇帝信璽庚戌告太廟受之癸亥日鬪三月置周易儀禮公羊博士是嵗振武將軍梁州刺史尋陽侯周訪卒陷訪字士逹汝南安成人漢末避地江南晉平吳移家尋陽祖纂吳威遠將軍父敏左中郎將訪少沉毅謙讓果於斷割賙窮賑乏家無餘財為縣功曹時陶侃為㪚吏訪薦侃為主簿相與結交以女妻侃子瞻鄉人有盗訪牛於冡間殺者訪得之遣盗宻埋其肉不使人知之及帝渡江命訪叅鎮東軍事累遷振武將軍與陶侃征杜弢弢時作桔橰打官軍舡艦訪於舡上作長岐棖以拒之桔橰不能為害又遣其將張彦陷豫章訪追彦斬之將戰訪為流矢所中折前兩齒形色不變及暮訪與賊隔水時賊彊兵衆訪知力不可敵乃宻遣人如樵採者而出於是結陣鳴鼓而來大呼曰左軍至士卒皆稱萬嵗至夜令軍中多布火而食賊謂官軍益至未曉而退訪謂諸將曰賊雖引退然終知我無救軍當還掩我宜促渡水而北既渡斷橋訖而賊果至不能濟時杜弢將杜曽又聚衆破陶侃於沔城帝令訪救之訪率衆至范陽曽等銳氣甚盛訪曰昔人有言先人有奪人之心軍之善謀也使將軍李恒督左甄許朝督右甄訪自領中軍張旗幟曽果畏訪先攻左右甄訪自於陣後射雉以安衆心令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓及戰自旦至申兩甄皆敗訪聞鼓音選精甲八百人自行酒飲之勅不得妄動聞鼓音乃進賊未至三十歩訪親鳴鼓將士皆騰躍奔赴大敗杜曽殺千餘人訪夜追之衆請待明日訪曰曽驍勇能戰向之敗也彼勞我逸是以剋之宜及其衰乘之可滅也鼓行而進遂走漢沔訪部將蘇温追擒杜曽等於武昌送王敦斬之初王敦懼杜曽之難謂訪曰擒曽當相論為荆州刺史及曽平後從事中郎將郭舒說敦曰荆州用武之國若以假人將有尾重之患公宜自領以訪為梁州可矣訪大怒敦乃手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈䜿可以寶椀悅乎陰欲圖之敦患之而憚其彊不敢有異訪威風既著遠近悅服勇智過人為中興名將性謙虚未嘗論功或問訪曰人有小善鮮不自稱卿功勲如此無一言何也訪曰朝廷威靈將士用命訪何功之有士以此重之時王敦有不臣之心訪嘗切齒敦懐逆謀終慮訪未敢為非卒時年六十一帝哭之慟立碑於本郡二子撫光案周訪傳訪少時遇善相者廬江陳訓謂訪與陶侃曰二君皆位至方嶽功名畧同但陶得上夀周當下夀優劣更由年耳訪旅泊宫亭湖廟廟本靈驗入者皆死及訪憇寢畧無神異明早即厠見一老父訪執之乃化為雄鴨也五年春正月大赦改元永昌元年戊辰大將軍荆州牧王敦舉兵反於武昌謂長史謝鯤曰劉隗奸邪將覆社稷吾欲除君側之惡安時濟民鯤曰隗誠始禍然城狐社䑕也言未及卒敦怒曰君至庸才豈達天理發檄四方以誅劉隗刁協為名遣龍驤將軍沈充都督吳興等諸軍事己巳敦上疏曰昔太甲初雖不能遵明湯典幸納伊尹之訓漢武雄畧亦惑江充䜛佞邪說至蕪湖又上表罪狀刁協等帝大怒下詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍也朕將親御六軍以誅大逆二月内外戒嚴徴諸征鎮入衞京師詔公卿以下廷議丞相王導率昆弟子姪三十餘人詣闕待罪帝召入見導前謝曰逆臣賊子何代無之豈意今者近出臣族帝跣而下執手曰方託百里之命卿何言耶乃詔大義滅親以導為前鋒大都督勅丹陽諸郡皆加軍號以太子右率周莚行冠軍將軍統兵三千討沈充使鎮北將軍劉隗軍于金城右將軍周札守石頭甲午帝被甲徇六軍於郊外詔平南將軍陶侃領江州安南將軍甘卓領荆州各率所統以躡敦後四月敦先鋒攻石頭軍周札開城納賊王導郭逸周顗刁協劉隗等三道出戰六軍敗績皇太子欲親率將士自决戰升車將出中庶子温嶠固諫抽劍斷鞅乃止尚書令刁協劉隗並出奔協至江乘為其下所殺隗入於石頭隗字大連彭城人楚元王交之後解褐從元帝為從事中郎累遷丞相司直委以刑憲時世子文學王籍之居叔母䘮而婚隗奏之帝下令曰詩稱殺禮而多婚以㑹男女之無夫家正今日之謂也可一解禁止自今已後宜為其防隗為法官多所彈奏不辟豪彊建興中丞相府斬督運令史淳于伯而血逆流隗因奏淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復流下四尺五寸百姓諠譁觀者滿路咸為寃枉之徴請見免相府從事及王導等官帝自責過而謝隗晉國既建拜御史中丞帝即位拜鎮北將軍都督青徐諸軍事鎮泗口初隗以王敦威權太盛終不可制勸帝出腹心以鎮方隅故以譙王承為湘州續用隗及戴若思為都督敦甚惡之與隗書曰頃承聖上顧盼足下今大賊未滅中原鼎沸欲與足下及周生之徒戮力王室共静海内若其泰也則帝祚於是乎隆若其否也則天下永無望矣隗答書曰魚相忘於江湖人相忘於道術竭股肱之力効之以忠貞吾之志也敦得書甚怒及敦作逆舉兵以討隗為名詔徴隗還京師百官迎之於道隗岸幘大言意氣自若及入見帝與刁協奏請誅王氏帝不從有懼色及率兵攻石頭不㧞告辭帝令避難雪涕與别至淮陰為劉遐所襲奔于偽趙庚午帝釋戎服使侍中王彬阮孚宣詔於敦曰公若不忘本朝於是息兵則天下尚可共安也如其不然朕當歸瑯琊以避賢路辛未大赦使太常荀崧就拜敦丞相大將軍都督中外諸軍録尚書事進封武昌郡公邑萬户加羽葆鼓吹詔百寮見敦於石城宻問戴淵曰前日之戰其有餘力乎若思答曰豈敢有餘但力不足耳又問曰吾此舉動天下以為何如若思曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言又謂周顗曰伯仁卿何負我顗曰公戎車犯順下官不能其事使王師奔䘮以此負公敦憚其辭正不知所答既出帝召顗於廣室謂曰近日大事二宫無恙諸人平安大將軍故副所望邪顗曰二宫自如明詔於臣等故未可知時䕶軍長史郝蝦等勸顗避敦顗曰吾備位大臣朝廷奔䘮寧可草中求活耶初司空王導率子弟詣闕下請罪值顗將入導呼顗曰伯仁以百口累卿顗直入不顧既見帝言導忠誠帝納其言與飲酒既醉而出導猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴取金印如斗大繋肘既出又上表明導言甚切至導不知救已而甚銜之及敦得志三問導周伯仁戴若思可為公輔導三不答時叅軍吕猗說敦曰周顗戴淵皆有高名瞻視不恒若不早除恐為後患敦乃同收害之路經太廟顗大言曰天地先帝之靈賊臣王敦傾覆社稷枉殺忠良陵虐天地神祇有靈當速殺敦語未終收人以㦸傷其口血流至踵顔色不變容止自若觀者為之流涕時年五十四與戴淵同殺於石頭城東塘頽石上百姓寃之至今紀其石賊平追贈左光禄大夫顗字伯仁汝南安城人安東將軍浚之子少有重名神彩秀徹司徒掾賁嵩見而歎曰汝潁固多竒士靖我邦族必其人矣及帝鎮江東中興初遷吏部尚書以醉酒為有司所奏白衣領職太興初拜太子少傅尋轉尚書左僕射領吏部如故時庾亮謂曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西子初顗以雅望獲海内盛名後頗以酒失為僕射畧無醒日時人號為三日僕射庾亮曰周侯末年可謂鳳德之衰也案中興書王敦素憚顗毎見顗輙靣熱雖冬月仍交扇不休死後王導校料中書故事見顗表救己殷勤乃執表垂泣悲不自勝告諸子曰吾雖不殺伯仁伯仁因我而死幽㝠之中負此良友戴淵字若思廣陵人少遊俠不拘操行遇陸機赴洛淵以其徒掠之機見淵坐胡牀指撝便宜知非常人遂上舫屋上遥謂曰卿才噐如此何不學問取禄位乃與羣小行刼耶淵乃感悟棄刀流涕就機機賞異焉入洛薦之及帝中興累遷尚書左僕射出為幽冀豫兖并雍六州諸軍事鎮壽春王敦舉兵徴入築壘於大桁北既而石頭不守遇害時年五十二賊平追贈右光禄大夫六月旱敦將還屯武昌不朝而去多收時望殺之敦在武昌鈴下儀仗生華如蓮華狀五日而萎落是月襄陽太守周慮承敦㫖害侍中荆州牧甘卓於襄陽卓字季思丹陽人秦丞相茂之後少忠正舉秀才累遷離狐令見天下大亂棄官東歸陳敏據揚州深相結託為子景娶卓女及周玘顧榮唱義邀卓共討敏定江南帝初鎮建鄴以為揚威將軍征周馥杜弢屢有戰功封南鄉侯湘州刺史尋改安南將軍梁州刺史鎮襄陽善於撫綏孤㓜估稅悉除市無二價州境所有魚池先恒責稅卓至不收其利皆給貧人西土稱為惠政及王敦舉兵告卓卓偽許之而心不同及敦將升舟卓使叅軍孫䨇詣武昌諫止敦敦聞䨇言大驚曰甘侯前與吾言云何更有異正當慮吾危朝廷邪吾今唯除奸兇耳卿還言之事濟當以甘侯作公䨇還報卓卓不能决㑹湘州刺史譙王氶遣主簿鄧騫來說卓言王敦以私憾稱兵象魏此實忠臣義士匡濟之時時不可失卓笑曰桓文之事豈吾所能至於盡力國難乃其心也時敦以卓不至慮其在後為變遣叅軍樂道融苦要卓俱下道融至背敦説因說卓襲之卓遂决曰吾本意也因馳檄遠近陳敦肆逆遣司馬孫䨇奉表詣臺使叅軍羅英至廣州與陶侃尅期令譙王氶堅守長沙京師大喜詔書遷卓鎮南大將軍侍中都督荆梁二州諸軍事荆州牧敦聞大懼遣卓兄子卬求和謝卓曰君此是臣節不相責也吾家計急不得不爾想便旋軍襄陽當結姻好及王師敗績敦求臺騶虞幡以駐卓卓聞周顗戴若思遇害流涕謂卬曰吾之所憂正為今日毎得朝廷人書以羯賊為先不意禍起蕭墻且使聖上元吉太子無恙吾適據武昌敦勢逼必刼天子以絶四海望不如還軍更思後圖於是自豬口命旋軍襄陽都尉秦康說曰今分兵取敦不難但斷彭澤上下不得相赴自然離㪚可一戰而擒也卓不從樂道融亦日夜勸卓討敦卓徑還襄陽意氣騷擾失常自照鏡不見頭視庭樹而頭在樹上心甚惡之家中金櫃忽嗚聲似槌鏡清遠而悲巫云金櫃將離是以悲鳴主簿何無忌及家人皆勸令自警卓轉更狠愎㪚兵大佃而不為備故周慮等附敦意詐云湖中多魚勸卓遣左右捕魚乃襲害卓傳首于敦四子蕃等被殺秋八月瑯琊太守孫黙叛奔石勒冬十月沈充䧟吳國新昌太守梁顧起兵反應充京師大霧黒風蔽天日月無光十一月乙酉罷司徒并丞相閏月己丑帝崩于内殿大寧元年春二月葬平陵陵在今縣北九里鷄籠山陽不起墳案帝年四十二即位立五年年四十七崩諡元皇帝廟號中宗案晉書荀崧傳初帝崩羣臣議廟號王敦遣使謂曰豺狼當路梓宫未反祖宗之號宜别思詳僕射荀崧議以為禮祖有功宗有德元皇帝天縱聖智光啟中興德澤侔於太戊恩惠邁於漢宣臣敢依前典上號中宗既而與敦書曰承以長蛇未剪别詳祖宗先帝應天受命以隆中興中興之主寧可隨世數而遷毁敢率丹直詢之朝野上號中宗卜日有期不及重請專輙之􅄽所不敢辭敦深銜之帝㓜有令問屬惠皇之際王室多故惟退讓不顯灼然之迹故時人未之識唯侍中稽紹異之謂人曰瑯琊王毛骨非人臣之相元康二年從討成都王頴蕩陰之敗也叔父東安王繇為頴所殺帝懼禍及將欲出奔其夜月明禁衞嚴警帝無由得出甚窘廹有頃雲霧晦𡨕雷雨暴至徼者皆弛因得潜出頴又令關禁貴人既至河陽為津吏所止從者宋典以策鞭馬笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛陽迎太妃俱歸東國東海王越輔政加帝平東將軍鎮下邳尋遷安東大將軍都督揚州諸軍事越西迎大駕留帝居守用王導計懐帝永嘉元年始渡江鎮建鄴初惠帝太安之際童謡云五馬浮渡江一馬化為龍及是帝與西陽王汝南王南頓王彭城王等獲濟而帝竟登大位帝性簡儉冲素容納直言虚已待物頗以酒廢事王導一言帝命酌引觴覆之於地遂絶有司嘗奏太極殿廣室施綘帳帝令冬施青布夏施青練等帳寵幸鄭夫人衣無文綵從母弟王廙為母立屋過制流涕止之然晉室遘紛皇輿播越天命未改人心叶賛元戎屢動不出江畿經畧區區僅全吳楚昔秦望氣者云五百年後金陵有天子氣及孫權稱號自謂當之考其厯數猶為未及元帝之渡江也乃五百二十六年真人之應在於此矣太康初平吳王濬實先至建鄴而吳降欵遠歸璽於瑯琊武帝咸寧元年八月丁酉大風折太社樹中有青氣屬天占者云東莞有帝王之祥由是徙封東莞王伷為瑯琊王伷即元帝祖明帝元年生天意人事中興符也始西晉亂武帝子孫無孑遺社樹折之應常風之罰也青氣東莞之祥也建康實録卷五
