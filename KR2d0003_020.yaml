body:
  text: 建康實録卷二十唐許嵩撰陳高宗孝宣皇帝高宗孝宣皇帝諱頊字紹世世祖母弟始興昭烈王第二子梁中大通二年七月辛酉生於鄉里産夕有赤光滿室帝少寬大多智略及長美容儀身長八尺埀手過膝有勇力善騎射高祖平侯景梁元帝使徴高祖子姪入侍帝赴江陵纍官至直閣將軍中書侍郎忽酒醉假寐於室馬軍主李總見是大龍乃驚走人密竒之江陵陷帝隨例遷於關右高祖即位永定初遙襲封為始興郡王文帝嗣位遙改安成王天嘉三年自周還纍至侍中廢帝立進驃騎大將軍録尚書尋轉太傅揚州牧光大二年十一月甲寅慈訓太后黜廢帝為臨海王而召帝入三年正月甲午改元太建元年即位於太極前殿大赦進文武位一等復太后尊號曰太皇太后退文皇太后沈氏為文皇后后字妙姬吳興武康人建成侯法深之女永定元年策為臨川王妃世祖即位為皇后廢帝即位尊為皇太后及安成秉政后憂悶計無所出乃賂宧者蔣裕令誘建安人張安國使據郡反因此以圖安成尋而事覺遂誅安國等及帝立乃黜后為文皇后案陳書后妃傳陳亡入隋大業初自長安東歸江南頃之卒乙未謁太廟立妃栁氏為皇后以嫡子叔寶為皇太子封諸子為郡王丁酉使御史出四方觀行風俗以沈欽為左僕射王勱為右僕射辛丑祀南郊七月辛卯太子納妃沈氏王公已下賜帛有差十月廣州刺史歐陽紇據南海反詔章昭達討平之紇字奉聖長沙臨湘人父頠梁左衛將軍紇隨蘭欽南征東獠擒陳文徹獲輜重及獻銅鼓纍代無此器高祖即位進散騎常侍封陽山公紇有幹略天嘉四年除黃門侍郎遷安逺將軍襲封陽山郡公都督交廣越定明新高合羅愛建宜黃利雙石等十九州軍事廣州刺史在州十餘年威名著於西越帝以紇久在南方意頗疑之大建元年詔徴還朝廷紇懼未敢動左右乃勸令反遂舉兵攻衡州衡州刺史錢道戢告變帝遣章昭達討擒紇送京師年三十三家口籍沒案陳書江揔紇之故人收其子詢撫養之及長善草𨽻書博學著藝宣百卷皇朝位銀青光祿大夫也大建二年春三月丙申太皇太后崩於紫極殿袝葬萬安陵諡曰宣太后太后字要兒本姓鈕氏幼為章氏所養因姓章氏母蘇氏嘗遇道士以龜遺之光彩五色曰三年有徴及期生后産夕紫光照室因失龜所在后少聰慧美容儀手爪長五寸色並紅白每有期功之事則一爪先折后善書計能誦詩及楚詞高祖永定元年立為皇后及高祖崩后與中書舍人蔡景歷定策祕不發喪乃詔世祖入纂皇業世祖即位尊為太后居慈訓宫光大元年下令黜廢帝命宣帝嗣業至是崩年六十五四月乙巳太白晝見五月齊人來弔大建三年辛卯正月癸丑以著作徐陵為尚書僕射辛酉祀南郊二月辛巳祀明堂丁酉耕藉田三月大赦五月丹丹天竺盤盤等國貢方物八月辛丑太子釋奠於太學十二月壬辰章昭達薨昭達字伯通吳興武康人性倜儻輕財尚氣少時嘗遇相者謂達曰卿容貌大善須小虧損當冨貴耳後因醉墜馬鬚角小傷相者曰未也及侯景亂昭達募鄉人援臺城為流矢所中眇其一目相者曰卿相善矣侯景平後與文帝結君臣之分及王僧辨誅後杜龕反遣杜泰攻長城世祖命昭達總知城內兵事以拒杜龕龕等退走追討平之纍戰功拜交州刺史隨侯安都拒王琳於沌口為前鋒破琳册勳為都督巴郢武源四州諸軍事封欣樂縣侯給鼓吹一部天嘉四年陳寶應與周迪等冦臨川詔昭達為都督討平之進位前將軍開府儀同三司初世祖曽夢昭達升於台鉉及旦以夢告之至是侍宴世祖顧昭達曰卿憶夢否何以償之昭達謝之曰當效犬馬以盡臣節大建初討歐陽紇於嶺南以功拜司空一年率師征蕭巋巋與周軍大蓄船艦於青泥中昭達分遣偏將錢道戢程文秀乘輕舟襲之焚其舟楫周兵又於峽下南岸築壘名曰安蜀城兼令於江上引大索編葦為橋以度軍糧昭達命軍士為長㦸施於樓船上仰割其索索斷糧絶因縱兵攻其城降之薨時年五十四大建四年八月辛未周遣使來聘丁丑景雲見九月庚子朔日有蝕之詔徐度杜稜程靈洗等配食武帝廟庭章昭達配食文帝廟庭十一月己亥夜地大震十二月衛尉卿許亨卒亨字亨道高陽新城人晉徴君許詢字𤣥度六代孫祖勇惠齊冗從僕射父懋梁始平天門二郡太守太子庶子散騎常侍以學聞撰毛詩風雅比興義十五卷亨少傳家業有節行博通羣書多識前代舊事解褐梁安東王行軍參軍兼太常博士遷太尉從事中郎晉安王承制授給事黃門侍郎高祖即位拜大中大夫領大著作修梁史初高祖誅王僧辨父子數人同瘞一穴至是無敢言者亨以故吏抗表請葬僧辨世祖許之乃與徐陵張種孔奐等以家財營葬具凡七柩自石頭城改窆於方山東南亨卒時年六十四所撰齊史五十卷文集六卷子善心入隋位至尚書度支郎有應對才遷禮部侍郎有集二十卷後為宇文化及所害五年春二月夜有白氣如虹自北斗貫紫微宫三月丙戌西衡州獻馬生角詔吳明徹為征討大都督北伐統軍十萬發自白下四月大破齊師於淮南九月壬辰晦夜明乙巳吳明徹尅夀陽斬王琳傳首京師梟於朱雀航琳太原人少無學業而彊記內敏事多記識軍中萬人盡記名姓纍官梁元帝司空梁敬帝太平二年見高祖方盛梁祚漸衰懼梁社稷將亡遂與諸將謀迎梁元帝孫永嘉王莊於北齊歸立為主號天啓元年正月設壇於南浦之南備法駕即帝位幸江夏新宫臨定武前殿以琳為都督中外軍事天嘉二年世祖遣侯安都討大破之琳與蕭莊俱奔齊齊以莊為揚州刺史與王琳鎮夀春至是吳明徹破之是嵗諸軍略地所在皆尅捷淮南諸郡悉平之原案梁書自侯景亂江右淮北州郡皆沒北齊及江陵陷失高祖輔政而徐嗣徽任約等招引北齊軍變江南高祖即位王琳復起上流而敗西據夀陽以歸於齊高宗即位五年大舉始收淮南之地六年正月壬戌大赦江右淮北諸州甲申周人來聘二月壬辰耕藉田四月庚子彗星見八月尚書右僕射周𢎞正卒𢎞正字思行汝南安成人晉僕射顗九代孫祖顒父寶𢎞正幼聰惠年十五為國子生季春入學孟冬應舉解褐梁晉安王主簿纍國子博士初梁武帝於域西立士林館延𢎞正居之以講授聽者傾朝嘗啓梁主决定周易疑義凡五十條性博物善占大同未知天下將亂謂弟𢎞讓曰國家厄運數年當有義兵起吾與汝何處逃刑及梁納侯景之降𢎞正曰亂階此矣梁元帝平侯景徴𢎞正為黃門侍郎纍遷散騎常侍與王褒論利害諫元帝下都建康荆峽人士皆云周王皆是東人恣求東下恐非良計𢎞正面折曰若東人勸東下謂非良計即西人欲西豈成良策元帝大笑竟不還都及魏平江陵𢎞正遁歸建康高祖踐阼拜太子詹事天嘉元年遷侍中國子祭酒使長安迎安成王三年還授金紫光祿大夫進右僕射𢎞正善𤣥言明釋典雖名僧碩德皆請質疑滯卒時年六十所著易疏十六卷論語疏十卷莊子疏八卷老子疏五卷孝經疏兩卷文集二十卷子墳官至吏部郎原案陳書云𢎞讓亦博學天嘉初以白衣領太常卿金紫光祿大夫猶子確位南平府長史行揚州事代稱良吏也七年春正月乙亥衛將軍樊毅尅潼州城辛巳祠南北郊三月詔豫二兖譙徐合霍南司定等九州及所部在北諸郡置雲旗義士往與大軍及諸鎮守備防禦四月庚寅豫州刺史陳桃根獻青牛詔還百姓乙未桃根又獻織成羅文錦被表各二詔於雲龍門外焚之六月丙戌詔北征將士死王事者尅日舉哀乙酉改作雲龍神虎二門原案宫殿簿雲龍是二宫墻東面門晉本名東華門東出東掖門梁改之西對第三重墻萬春門神虎門是第二重宫墻西面門晉本名中華門西出西華門本晉西掖門宋改名西華門東入對第三重宫墻千秋門秋閏九月壬辰吳明徹大破齊軍於吕梁是月甘露三降樂遊苑丁未幸樂遊採甘露宴羣臣詔於苑內覆舟山上立甘露亭十一月甲子南康郡獻瑞鍾一口是嵗殷不害自周還優詔拜為司農卿尋遷光祿大夫不害字長卿陳郡長平人祖汪父高明不害性至孝少知名家世儉約居甚貧窶年十七事梁纍遷平北府咨議參軍侯景亂臺城陷文武奔散惟不害與徐摛侍梁簡文於永福省及簡文幽縶請不害同處侯景許之不害供侍益謹簡文夜夢吞一塊土意惡之以告不害不害曰昔晉文出奔野人遺塊卒返其國簡文曰若神道有知尚冀言之不忘及元帝即位拜廷尉卿尋又江陵陷因失母所在時當寒雪凍死者填滿溝壑不害涕泣號呼尋見死人在溝者則身自捧視舉體凍僵水漿不入口者七日始得母尸慿尸而哭行路為之悲哀及殯後與王褒庾信等同入長安布衣蔬食至此年方得還纍進給事中原案陳書後禎明三年隋滅陳又西入隋卒於道弟不疑不占不齊不佞八年春正月庚辰西南紫雲見拜吳明徹為司空録左僕射王克為右僕射九月立皇子叔彪為淮南王叔齊叔文皆為郡王九年丁酉春正月後周滅北齊齊主高緯方禪位於其太子恆改元承光周師平鄴緯與恆赴長安齊五帝二十八年二月壬子輿駕耕藉田七月庚辰大風雨震萬安陵華表癸卯震瓦棺寺重門一女子死十月吳明徹大破周將梁士彥於吕梁修東宫成十二月移太子居新宫原案輿地志其地本晉東海王第後築為永安宫穆章何皇后居之宋文帝元嘉十五年始築為東宫齊宋為火災焚盡梁天監五年更修築於故齊地盛加結構侯景亂又燒盡陳初置太子於永福省至此居新宫十年春正月己巳以中領軍廬陵王伯仁為平北將軍是月散騎常侍太子右衛率韋載卒載字德基京兆杜陵人祖睿父正載少聰惠好學年十三沛國劉顯問漢書中十事隨問隨答略無凝滯自歷職位常樂退靜有田十餘頃在江乘縣之白山遂辭疾去官築室居焉屏絶人事吉凶慶弔無所往來不入西籬門或十年年五十八卒於家夏六月大雨震大皇寺剎莊嚴寺露盤重陽閣東樓千秋門內槐樹鴻臚寺府門是月司空吳明徹薨明徹字通照秦郡人父樹梁右軍將軍明徹幼孤性至孝年十四感墳塋未修家貧未辦乃勤力耕種遇大旱苖稼焦枯明徹哀憤每至田中號哭仰天告訴居數日有自田回者云苖已更生明徹疑之及往果如所言至秋大穫足充葬用有尹生善占墓謂其兄曰君家葬日必有乘白馬逐鹿者來經墓所是最小孝子大貴之徴也至時果有應明徹樹之小子也起家梁東宫直後及侯景亂天下飢明徹有粟麥三千餘斛鄉里飢乃白諸兄曰當今草竊人不圖生既有粟麥可與鄉里人共之於是計口平分同為豐儉羣盜聞而避之高祖鎮京口深相要結降階執手明徹妙解天文孤虛遁甲高祖竒之以梁承聖三年請為戎昭將軍高祖踐阼拜散騎常侍兖州刺史宣帝大建五年加侍中都督征討諸軍事北伐賜女樂一部封南郡公總戎十萬發自京師所向皆尅捷八月進逼夀陽王琳拒守明徹乘夜攻之中宵而潰琳等退據相國城及金城明徹遏肥水以灌之城中苦溼多腹疾手足皆腫死者十有六七齊遣大將皮景和率兵數十萬來援去夀春三十里頓軍諸將皆曰計將安出明徹曰兵貴在速而彼結營不進吾知其不敢戰也於是躬擐甲胄四面疾攻城中震恐一鼓而尅生擒王琳斬之傳首京師宣帝優詔褒崇加車騎大將軍豫州刺史就夀春授册明徹於城南設壇士卒二十萬陳其旗鼓戈甲登壇拜受成禮而退士卒無不踴躍六年率諸將渡淮北七年閏九月大破齊軍於吕梁八年進位司空九年詔明徹北侵軍至吕梁周將梁士彥拒戰頻破之會明徹苦背疾拔軍至清口衆軍皆潰明徹窮蹙就執以憂遘疾卒於長安九月乙巳立方明壇於婁湖臨壇誓衆乙卯分遣大使以盟誓頒下四方上下相警以備周人十一年乙亥春正月龍見於南兖州永寧樓側池中七月辛卯初用大貨六銖錢丁卯於大壯觀閲武十一月戊午周將梁士彥圍我夀陽尅之又尅霍州是月以始興王叔陵為征討大都督率水步衆軍以拒周師十二月乙丑南北兖晉三州及盱眙山陽陽平馬頭秦郡歷陽沛北譙南梁等九郡民並自拔以歸建康周又進尅譙北徐二州乘勝而前自是淮南之地復盡歸於周矣十二年庚子六月大風吹壞臯門中闥是月黃門侍郎顧野王卒野王字希馮吳郡吳人也祖子喬父烜野王幼以儒術知名年七嵗誦五經略知大㫖九嵗能屬文十二隨父之建安乃撰建安地記二篇及長遍觀經史精記默識天文地理蓍龜占候二篆竒字無所不通起家梁太學博士中領軍府記室陳有天下遷黃門侍郎光祿卿年六十二卒野王少篤學在物無過辭失色觀其容貌似不能言及其勵精力行皆人莫及又善丹青曽於東府六齊畫古賢命王褒書讃世人稱為二絶又撰玉篇二十卷輿地志三十卷符瑞圖十卷顧氏譜十卷分野樞要一百卷通史要略一百卷國史紀傳二百卷續洞冥記一卷𤣥象表一卷文集二十卷並行於世秋八月乙未周鄖州總管司馬消難以所統九州八鎮之地來降詔消難為大都督充九州八鎮諸軍事遷司空給鼓吹女樂一部率衆江北授之大軍北伐是月遣南豫州刺史任忠率衆趨歷陽陳惠紀趨南兖州庚午散騎侍郎淳于陵尅臨江郡癸酉魯廣達尅郭默城甲戌大雨霖丙子淳于陵尅祐州城九月周臨江太守劉顯光率衆來降是月天東南有聲如風水相激三夜乃止丁亥周將王延貴率衆來援歷陽任忠擊破之擒延貴以送建康己酉周廣陵義軍主曹藥率衆來降十三年辛丑以晉王伯恭為尚書左僕射袁憲為右僕射二月乙亥親耕藉田四月乙巳分衡州始興郡為東衡州以本衡州為西衡州七月徴君馬樞卒樞字要理扶風郿人寓居京口祖靈慶樞少好學六嵗能誦孝經論語及長博極經史尤善佛經及周易老子義梁邵陵王綸為南徐州刺史引為學士命講維摩老子周易同日三部一齊發題論者縱橫樞隨問剖判應接如流論者拱默而退綸甚竒之及征侯景留書二萬餘卷與之常閒居喟然歎曰吾聞貴爵位者以巢由為桎梏愛山林者以伊吕為管庫束名實則芻芥柱下之言玩清虛則糠粃席上之論稽之篤論亦各從其所好乃隱於茅山則終焉之志陳天嘉元年世祖徴為度支尚書辭不應命每王公大人有饋餉辭不獲免者十分受一屬世亂所居盜賊不入依托者數百家皆得全樞目精洞黃能視暗中物常有白燕一雙巢其庭樹馴狎欄廡年八十六卒撰道覺論行於世九月癸亥夜大風從西北來發屋拔樹大雨雹十二月辛巳彗星見西南是嵗周靜帝文衍遜位於隋文帝楊堅改元開皇元年周三代五帝二十五年十四年春正月己酉帝不豫甲寅崩于宣福殿二月癸已葬顯寧陵帝年四十即位在位十四年年五十三諡曰孝宣帝廟號高宗有子四十二人遺詔庶事務從儉約金銀之飾不以入壙明器皆令用瓦初帝在田本有恢𢎞之度及居尊位實允天人之望于時國步初弭創痍未復淮南之地並入於齊帝志復舊境返侵地而彊弱懸絶適足為禽及周滅齊乘勝而舉略地又至江際自此懷懼既而力修城隍為扞禦之備獲銘曰二百年後當有癡人修吾破城者時莫測所從云後主長城公叔寶後主諱叔寶字元秀小字黃奴宣帝嫡長子梁承聖二年十一月戊寅生於江陵天嘉三年立為安成王世子大建元年正月甲午立為皇太子十四年正月甲寅宣帝崩乙卯始興王叔陵構逆叔陵字子嵩髙宗第二子承聖中生於江陵天嘉三年封康樂侯少有機辨徇聲名彊梁無所摧屈大建元年封始興王出使江郢晉三州軍事始年十六政自己出寮佐莫敢預焉弟叔堅爭寵招致賔客每朝會鹵簿不肯為先後必分道而趨高宗不之知叔堅後主同侍寢疾便隂有異志乃命典藥吏曰銼藥刀甚鈍可礪之及高宗崩倉卒之際速命左右取劍左右不寤乃取朝服木劍以進叔陵怒叔堅在側聞之知有變伺之翌日少殮叔陵取銼藥刀趨進斫後主中項後主悶絶於地太后與後主乳母樂安君吳媪以身蔽之叔堅自拖叔陵并奪其刀將欲殺之後主不能處分叔陵多力自奮得脫突出雲龍門入東府召左右斷青溪橋道放東城囚以為戰士遣人往新林追所部兵馬仍自被甲著白布帽登城西門以召百姓太后使太子舍人司馬申以後主命召蕭摩訶討之叔陵又遣記室韋諒送鼓吹與摩訶仍謂曰事捷必以公為台鼎摩訶不報當日執將軍戴洫談騏驎二人送臺斬之叔陵自知不濟乃入內沉其妃張氏及寵妾七人於井中部麾下度小航將趨新林蕭摩呵追擒於白楊路斬首送臺流尸於江中丁巳後主即皇帝位於太極前殿大赦如宣帝故事以丹陽尹長沙王叔堅為驃騎大將軍尊皇后為太后居柏香殿太后諱敬淑姓栁河東解人父偃尚梁武長公主拜駙馬都尉大寶中鄱陽太守卒官後高宗赴江陵梁元帝以后配焉生後主江陵陷與後主俱留穰城文帝天嘉二年高宗自周還立為安成王妃及即位為皇后后美姿容身長七尺二寸垂手過膝初錢貴妃甚寵后傾心下之每有供奉之物其上者推於貴妃而自御其次者高宗崩叔陵為亂後主賴后及吳媪救護得免是時新失淮南之地國遭大喪後主又病瘡不能聽政百司衆務假以後主命實皆决於太后也案陳書后陳亡後入長安隋大業十三年薨於東都年八十三甲戌於太極殿設無礙大齊詔內外百官各薦一人是月右衛將軍祕書監傅縡下獄死縡字宜事北地靈州人父彛梁臨沂令縡幼聰敏七嵗能誦古詩賦至十餘萬言長為世祖撰史學士纍遷安成王記室縡篤信佛教從興皇寺惠朗法師受三論盡通其學初有大心寺曇法師著無淨論以詆之縡乃為明道論用釋其難後主即位拜祕書監中書舍人掌詔誥為文典麗性敏速雖軍國大事下筆輒成未嘗起草然木彊不持檢操負才使氣凌侮人物朝士多銜之初施文慶沈客卿便佞親幸而縡益疏慶等因共譛毁受高麗使金後主收縡下獄縡素剛因獄中上書曰夫人君者恭事上帝子愛下人省嗜欲逺諂佞未明求衣日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟小人在側宦豎弄權惡忠直如仇讎視百姓如草芥公行貨賄衆叛親離臣恐東南王氣自斯而盡書奏後主大怒頃之意解遣使謂縡曰我欲赦卿卿能改過否縡對曰臣心如面臣面可改則心可改後主益怒命宦者李善度窮治其罪遂賜死獄中年五十五有文集十卷行世四月丙申立子𦙍為皇太子賜為父後者爵一級假王公已下賚帛有差七月辛未大赦天下是月自建康至荆州江水色赤如血八月丁酉天赤如火九月設無礙大會於太極前殿捨身及乘輿御服又大赦天下辛亥夜天東北有聲如蟲飛漸移西北乙卯太白晝見至德元年春正月大赦改元秋八月丁卯以長沙王叔堅為司空九月丁巳天東南有聲如蟲飛冬十月封弟九人為郡王案陳書封弟叔平為湘東王叔敖臨賀王叔宣陽山王叔穆西陽王叔儉南安王叔澄南郡王叔興沅陵王叔韶嶽山王叔純新興王十二月丙辰頭利國遣使朝貢戊午夜天門自西北至東南其內青黃雜色隆隆若雷聲是嵗左光祿大夫太子少傅徐陵卒陵字孝穆東海郯人祖超之父摛梁昭戎將軍太子左衛率母王氏常夢五色雲化為鳯集左肩上已而誕陵年數嵗家人擕見寶志上人志以手摩頂曰天上石麒麟也光宅寺慧雲法師每嗟陵早就謂之顔回八嵗能屬文十三通莊老長乃口辨縱橫起家寧蠻府參軍纍遷通直散騎常侍使魏魏人館宴之日甚熱魏之主客魏收謂陵曰今日之熱當由徐公陵答曰昔王肅至此為魏始制禮儀今僕來聘使卿復知寒暑收大慚留連數年後隨真陽侯蕭淵明歸陳有天下纍官吏部尚書領大著作尚書僕射自陳創業文檄軍書及受禪制策皆陵所製而九錫尤美為一代文宗亦不以此矜物於後進者接引無倦世以此重之有集三十卷子四人儉份儀僔皆至班位陵第三弟孝克少通𤣥理曉五經正義解褐梁太學博士性至孝值侯景亂京邑大餓死者十有八九孝克養母饘粥不給其妻領軍將軍臧氏女有容色孝克謂妻曰今饑荒如此供養交闕欲假卿於富家望其彼此俱濟如何臧氏初不許之孝克乃私與媒者商量嫁與侯景將孔景行從左右以逼之臧氏涕泣而去所得穀帛悉以養母孝克乃自剃髮為沙門名法整兼乞食以充給焉臧氏猶念舊恩亦數私致餉饋故不乏絶後景行戰死世平臧氏伺孝克於塗中纍日乃見謂曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻天嘉中徴為剡令纍遷散騎常侍國子祭酒每侍宴會無所噉至席散當其前羞膳减損高宗密記伺之見孝克取珍果內紳帶中歸以遺母高宗咨嗟久之自後宴饗孝克前饌並遣將歸餉母後主即位遷都官尚書陳亡隨例入長安家徒壁立母患思粳米粥不能辦母亡後遂終身噉麥有遺粳米者對之而泣開皇十九年卒於長安有子萬載位至隋太子洗馬至德二年甲申正月丁卯分遣八使巡省風俗夏四月以江總為右僕射七月壬午皇太子加元服在位文武賜帛有差孝悌力田為父後者爵一級鰥寡孤獨不能自存者人穀五石至德三年正月戊午朔日有食之三月豐州刺史章大寶舉兵反四月豐州義軍主陳景詳斬大寶傳首京師八月戊子老人星見十一月詔修孔子廟辛巳幸長干寺大赦高麗百濟使來朝賀至德四年九月幸𤣥武湖肆艫艦閲武宴群臣賦詩十月以江總為尚書令謝胄為尚書右僕射禎明元年春正月戊寅大赦改元乙未地震四月光祿大夫毛喜卒喜字伯武滎陽陽武人好學善草𨽻書起家為梁西昌侯參軍高祖鎮京口命喜與高宗俱往江陵謁元帝帝以喜為尚書及江陵陷高宗遷關右喜走郢州及高宗還喜自郢州奉迎高宗遣入關以家屬為請周冡宰宇文護執喜手曰能結二國之好者卿也遂將栁皇后及後主還初世祖謂高宗曰我諸子皆以伯為名汝諸兒宜以叔為稱高宗以訪於喜喜即條自古名賢杜叔英虞叔卿等二十餘人以答世祖世祖稱善世祖崩僕射劉仲舉與右衛將軍韓子高等知朝望有歸乃矯太后令遣高宗還東府喜入諫高宗曰陳有天下日淺海內未夷萬邦恐悚皇后深惟社稷之計令主入省共治庶績今日之言必非太后之意宗社至重伏願三思須臾奏聞竟如其議後主即位山陵未踰年置酒作樂命喜喜不懌欲進諫及升階後主已醉喜佯為心疾仆階下舁去尋負氣出為南安內史禎明元年徴還百姓沐其惠政追送者數百人道卒年七十二秋九月庚寅梁太傅安平王蕭巖荆州刺史蕭巘以其文武官寮家屬濟江還十月以蕭巖為平東將軍乙亥割揚州吳郡置吳州以錢唐縣為郡屬焉是嵗起部尚書孫㻛卒㻛字德璉吳郡吳人祖文惠父修道㻛少倜儻博學經史起家梁臨川王參軍纍進平南府司馬陳高祖即位遷散騎常侍都督荆郢武巴湘五州諸軍事安西將軍郢州刺史天嘉初封定襄侯世祖嘗從容謂㻛曰昔朱買臣願為本郡卿有意乎乃授持節安東將軍吳郡太守給鼓吹一部將辭乘輿幸近畿餞送鄉里榮之宣帝大建四年除安西將軍荆州刺史後主嗣位拜散騎常侍兼起部尚書瑒兄弟篤睦性通泰有財皆散之親友居處奢豪宅在青溪東大路北西臨青溪溪西即江總宅瑒家庭穿築極林泉之致歌鐘舞女當世罕儔賓客填門軒車不絶及出鎮郢州乃合十餘船為一大舫於中立池亭植芰荷良辰美景賓寮畢集泛長江置渌酒亦一代之勝賞又立山齊設講肆集𤣥儒之士冬夏資奉而處己率易不以名位驕物又深有巧思多所創立及卒尚書令江總為之銘鋕後主又題銘後四十字遣左户尚書蔡徴就宅宣敇鐫之其詞略曰秋風動竹烟水驚波幾人樵徑何處山阿今朝日月宿昔綺羅天長路逺地久靈多功名未勒此意如何世論以為榮子讓早卒案陳書次子訓知名入隋為高康太守禎明二年春正月立皇子恮為東陽王恬為錢唐王夏四月戊申羣鼠無數自蔡洲岸入石頭緣淮至於青塘兩岸數日自死隨流入江是月郢州南浦水黑如墨五月甲午東冶鑄鐵有物赤色如火大數升自天墜鎔所隆隆有聲如雷鐵鑄飛出墻外燒人家庚子廢皇太子𦙍為吳興王立始安王深為皇太子丁巳大風自西北激濤水入石頭城淮渚暴溢漂沒船舫己酉帝幸幕府山大獵初隋文帝受周禪甚敦鄰好宣帝尚不禁侵掠大建末隋兵大舉聞宣帝崩乃命班師遣使赴弔行敵國之禮書稱姓名頓首而後主益驕怠答書甚慢末云想彼統內如宜此宇宙清泰隋文覽書不悅以示朝臣清河公楊素以為主辱臣死再拜請罪襄邑公賀若弼等並求致討後主意愈驕不虞外難荒於酒色不恤政事左右嬖幸珥貂者五十人婦人姜貌麗服以從者千餘人後主嘗使張貴妃孔貴人等八人夾坐江總孔範姚察等十人預宴號曰狎客先令八婦人襞彩箋制五言詩十客一時繼和遲則罰酒君臣酣飲從夕達旦以此為常而復盛修造起土功稅市稅船徴取百端刑罰酷濫初覆舟山及蔣山松柏林冬月恆出木醴後主以為甘露之瑞俗呼為雀餳前後災異甚多又有神人自稱老子以遊都下與人言而不見形言吉凶多驗經三四年乃去船下有聲云明年亂視之得嬰兒長三尺無頭又蔣山衆鳥鼓翼拊膺曰奈何帝奈何帝又建康城自壞又青龍出建陽門井中湧赤霧地生白黑毛又大風拔朱雀門又臨平湖舊常草塞不通忽然自通此湖孫皓末年已曽開通案吳書江表傳云自漢末年吳郡臨平湖草塞不通吳後主末忽然自開故老相傳此湖開即太平及晉平吳天下一統永嘉初又草穢禎明初又忽開通時後主又自夢黃衣圍城有血霑階至卧床頭而火起又有狐入其床下捕之不見以為妖精後主乃自賣身於佛寺為奴以禳之又於郭內大皇寺造七層塔未畢功而火從中起飛向石頭城燒人家無數又使人採木於湘州城筏下至牛渚磯盡沒水中既而漁人見筏浮於海上乃起齊雲觀未就國人歌曰齊雲觀賊來無際畔始北齊末諸省官人皆稱省主未幾而滅至是朝官亦稱省主識者以為省主主將見省之兆也隋文帝謂高熲曰我為百姓父母豈可阻一衣帶之水不拯蒼生塗炭乃命大作戰船羣臣曰伐國大事事宜密之文帝曰吾將顯行天誅何密之有使投柿流下於江彼若能改吾又何求後主殊不知悟文帝益忿乃敕晉王廣為元帥督八十總管致討先送璽書暴後主二十惡又散寫詔書三十萬紙遍諭江外及隋軍繼下江濱鎮戍相繼奏聞施文慶沈客卿掌機密並抑而不言及隋軍臨江諸防戍船艦悉還都下江中無一鬪艦上流諸軍鎮兵士皆阻楊素軍不得下後主聞隋軍臨江曰王氣在此齊兵三來周人再至皆並摧沒今虜雖來必應自敗孔範亦言無渡江之理但奏伎縱酒作詩不輟有東宫學士張譏因皇太子以進諫曰彊冦侵境沿江無禦備之敵請停內宴以調軍事後主大怒譏字直言清河武城人祖僧寶父仲悅梁尚書祠部郎譏幼好學愛𤣥言受業於周𢎞正梁大同中召補國子正言生與袁憲侍講於文德殿敕令論議諸儒莫敢先發譏整容而進咨審循環辭令溫雅梁帝器之賜裾襦絹等曰表卿稽古之力進位國子博士後主在東宫新造玉柄麈尾成後主執之曰當今多士如林至於堪捉此者獨張譏耳即手自授譏乃令於溫文殿講莊老後主即位荒殆前政及隋軍逼江孔範等言無渡江之理惟譏知其必濟又進諫請恤軍士後主大怒收下獄或救者僅獲免城陷隨例入長安終不仕譏性恬雅所居宅舍築山池植花果講周易莊老教授門徒年七十六卒所著書易禮詩莊老等疏共一百卷皆入祕閣子孝則嗣禎明三年春正月乙丑朔朝大霧四塞入人鼻皆辛酸後主昏睡至晡乃醒是日隋將賀若弼從廣陵濟京口韓擒虎從橫江濟採石南北俱進緣江鎮戍望風盡走丙辰採石戍主徐子建馳告變是日後主方下詔曰犬羊凌縱侵竊郊畿蜂蠆有毒宜時掃定朕當親御六師廓清八表內外並可戒嚴以驃騎將軍蕭摩訶為皇畿大都督樊猛為上流大都督樊毅為下流大都督司馬消難施文慶並為大監軍重立賞格分兵鎮守僧尼道士盡皆執役庚午賀若弼陷南徐州辛未韓擒虎又陷南徐州乃遣豫章王叔英屯朝堂追蕭摩訶屯樂遊苑樊毅屯闍黎寺魯達屯白土岡忠武將軍孔範屯寶田寺鎮東將軍任忠自吳興入戍仍屯朱雀門辛巳賀若弼進據中山頓白土岡東南大破陳軍士卒奔北弼乘勝破魯廣達蕭摩訶等於樂遊苑遊騎次宫城燒北掖門是日韓擒虎率衆自新林石子岡進大將軍任忠出降乃引擒虎徑至朱雀航趨宫城自南掖門入文武百司皆遁出惟尚書令江總吏部尚書姚察侍中王寬度支尚書王援等居省中尚書僕射袁憲後閣舍人夏侯公韻二人入居殿中以侍後主俄頃隋兵至憲韻二人勸後主端坐殿上正色待之後主曰鋒刃之下未可交當吾自有計乃將張麗華孔貴嬪二妃入景陽樓井中憲韻等苦諫以身蔽井後主不從與之力爭久之方得入二人拜哭而去袁憲字德章陳郡人尚書僕射樞之弟幼聰敏年十四召為國子正言生在學一年博士周𢎞正深重其才舉高第以貴公子選尚梁簡文女南海公主起家祕書郎纍遷南康內史入陳位僕射禎明三年隋伐陳軍人燒北掖門朝士皆散走獨憲與夏侯公韻入殿侍後主後主謂曰我從來待卿不先他人今日見卿可謂嵗寒然後知松柏之後雕及隋兵入閣後主遑遽避匿憲正色曰北軍兵人必無所犯大事如此陛下安之整衣冠御前殿依梁武見候景故事後主不從因下榻馳去憲從出後堂至景陽殿後主投下井中憲等拜哭而去國陷入隋文帝嘉其雅操授開府儀同三司昌州刺史開皇十八年卒贈大將軍安成郡公諡曰簡長子承家仕隋至祕書丞是日隋軍雖亂沈皇后居處如常太子深年十五閉閣而坐舍人孔伯魚侍側及隋軍叩閣入深安坐勞之曰戎旅在塗不至勞乎既而隋軍求後主不得因窺井呼之後主初不應欲下石始聞吳人呌聲乃以繩引之驚其太重俄與張麗華孔貴嬪三人同乘而上隋文帝聞之大驚開府鮑宏曰東井上於天文為秦今王都所在投井其天意耶丙戌隋晉王廣入據臺城送後主於東宫命斬張貴妃於青溪橋妃姓張字麗華襄陽兵家女素貧賤父兄織席為業後主為太子以選入東宫侍龔良娣給使後主見悅之因得幸生太子深後主即位拜貴妃始興王叔陵構亂後主被傷卧於承香閣中諸妃並不敢進惟貴妃侍焉至德二年於光昭殿前起臨春結綺望仙等三閣閣高數丈並數十間窗牖户壁欄檻皆以沉檀香木為之又飾以金玉珠翠外施珠簾內有寶帳其服玩之屬瓌寶珍麗皆近古所未有每微風一至香聞數里朝日初照光映後庭其下積石為山引水為池植以竒樹雜以花果後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並復道交相往來又有王李二美人張薛二淑媛袁昭儀何媫妤江修容等七人並有寵遞代以遊其閣上宫人有文學如袁大捨等並為女學士後主每引賓客同貴妃等遊宴使諸貴人及女學士與諸狎客共賦新詩互相贈答采其尤艷麗者以為曲詞被以新聲選宫女有容色者以千百數令習而歌之分部迭進持以相樂有玉樹後庭花臨春樂等大抵所歸皆美張貴妃孔貴嬪之容色其略曰璧月夜夜滿瓊樹朝朝新皆此之類也張麗華髮長七尺鬒黑如漆其光可鑑特聰惠有神彩進止閒雅容色端麗每瞻視顧盼光彩溢目照映左右常於閣上靚粧臨軒檻宫中遙望杳若神仙兼有才理辨識强記善候人主顔色薦引宫女假鬼道以惑後主後主怠於政事百司啓奏並因宧者蔡臨兒等進之後主置張妃於膝上共决之有不能記者貴妃並為疏條無所遺脫由是益加寵異冠於後宫更於閹宦便佞之徒內外交結轉相引致賄賂公行綱紀瞀亂及隋軍陷城與後主俱入井中後為晉王廣斬於青溪三月己巳後主與王公卿士內外文武百司發自建康而入長安隋文詔京城權分人家第宅以禮接待之遣使迎勞使人還奏曰後主已下在路五百餘里纍纍不絶文帝歎曰一人無良以至於此及至京師列輿服器皿等於庭引後主及二太子諸王弟二十八人及司空司馬消難尚書令江總僕射袁憲驃騎將軍蕭摩訶征西將軍樊毅安北將軍魯廣達鎮東將軍任忠吏部尚書姚察中書令蔡徴散騎常侍王元規等二百餘人帝使納言宣慰內使宣詔讓後主後主伏地雀息不能祇對並赦宥之賜封長城侯文武皆隨才擢用詔下江南陳文武宣帝陵各給五户看守之給賜後主甚厚常引同三公之席敕樂户不奏吳音之樂恐傷其心至仁夀四年冬十一月壬子終於洛陽葬河南之芒山沈皇后自為哀策詞甚酸楚后諱務華吳興人儀同三司沈君理之女母高祖女㑹稽公主早亡后年幼哀慟過禮大建三年納為太子妃後主即位立為后性端靜好學工書當張貴妃盛寵勢傾後宫淡然居求賢殿未嘗有怨尤之容居處儉約衣無錦繡左右近侍才留五人惟尋閲圖史及佛經陳亡與後主俱入長安及後主薨后感其家國亡滅自為哀誄詞甚悲切案後主年三十即位立七年年三十七以陳禎明三年當開皇九年正月二十日國亡入隋封為長城侯後十五年年五十二薨有子二十二人初陳高祖即位日其夜奉朝請史普直宿省中夢有人自天而下導從數十人至太極前殿北面執策策金字曰陳氏五帝三十四年又後主在東宫有婦人突入唱曰畢畢國國主主尋而不見又嘗有一足鳥集於殿庭以觜畫城成文曰獨足上高臺茂草化為灰欲知我家處朱門向水開解者以為獨足蓋指後主獨行無衆盛草言荒穢也隋承火運草得火故為灰矣及後主至京師與其家屬館於都水臺所謂上高臺當水開者其言皆驗初宣帝器宇𢎞廓有人君之量文帝知冡嗣仁弱早存太伯之心未及而崩既承萎薾之後志纂鴻運拓土開疆晚致吕梁之敗江左日蹙後主因削弱之餘滅亡之運加以荒淫沉敗酒色過度梁末童謡曰可憐巴馬子一日行千里不見馬上郎但見黃塵起黃塵汚人衣皂莢相料理及王僧辨滅羣臣以謡言奏高祖曰王僧辨本乘巴馬以擊侯景馬上郎王字也塵為陳也世不解皂莢之義及陳滅於隋隋氏姓楊楊羊也說者以江東人謂羖羊角為皂莢言終滅於隋夫興廢之兆其由來定矣陳朝功臣江總字總持濟陽考城人晉散騎常侍統十代孫宋光祿大夫洪五代孫祖奮父經皆列職中外總性至孝少孤養於外家蕭氏好學年十八起家梁武陵王法曹參軍纍至太子洗馬侯景亂隨舅蕭勃在廣州侯景平後梁元帝徴為明威將軍入陳纍位司徒左長史太常卿尚書令中權將軍入隋為上開府開皇十四年卒於江都蕭摩訶字元𦙍南蘭陵人祖靚父諒卒於始興摩訶少孤姑夫蔡路養收養之少果毅有勇力高祖破路養摩訶出戰敗歸侯安都常從征伐先登陷陳纍至巴山太守大建五年隨吳明徹北伐濟江攻秦郡齊軍大至衆十餘萬其前隊有蒼頭犀角大力之號皆身長八尺膂力絶倫又有西域胡人妙嫻弓矢弦不虛發來氣甚鋭衆軍尤憚之明徹自起酌酒飲摩訶曰關侯斬顔良正今日矣摩訶飲訖馳馬挺身入齊軍遙擲銑鋧擊中胡人又斬十餘大力者而還齊兵莫不驚懾後從戰吕梁突衆手奪齊軍大旗屢以戰功進驃騎大將軍侍中光祿大夫舊制三公黃閣㕔置鴟尾後特詔摩訶開黃閣門施行馬㕔事寢堂並置鴟尾仍納其女為皇太子妃及隋軍來韓擒虎賀若弼進至鍾山龍尾後主謂摩訶曰公可為我一决摩訶曰從來行陳為國為身今日之事兼為妻子摩訶引兵於賊軍南偏鎮東大將軍任忠次之護軍樊毅尚書孔範又次之衆軍南北亘二十里首尾各不相知遂戰魯廣達率所部俱進陳未合士卒潰散摩訶無所用力為隋軍所執及京師陷後主為隋人守衛於內省摩訶請弼曰今為囚虜命在須臾願一見舊主死無所恨弼許之摩訶入見後主俯伏號泣仍於舊廚取食進之辭訣而去守衛者皆不能仰視入隋為開府後同漢王諒反於并州伏誅樊毅字智烈南陽人祖方興梁同州刺史父文熾梁益州刺史叔父文皎侯景亂戰死於青溪毅陳亡入關頃之卒魯廣達字遍覽吳州刺史悉達之弟廣達少聰悟慷慨愛賓客纍至壯武將軍晉州刺史及王僧辨之下平侯景廣達出境候接資奉軍儲僧辨謂沈炯曰魯晉州亦是王師東道主人進位散騎常侍陳有天下纍以功勞至安南將軍侍中轉安北將軍入隋悲愴本朝淪沒發疾而卒任忠字奉誠小名蠻奴汝隂人少孤微不為鄉里所齒晉熙太守梅伯龍討景纍遷蕩冦將軍陳有天下進號征南將軍給鼓吹一部尋加侍中信安郡王出為吳興內史及隋軍到白土岡忠馳入啓白當具舟楫以就上流臣以死奉衛後主信之令宫人裝束以待久望不至既而忠已率數十騎往石子岡降於韓擒虎後入隋為開府儀同三司卒隋文帝嘗因宴集謂羣臣曰我常恨初平陳之日不先斬任蠻奴以懲不忠蔡徴字希祥侍中中撫軍景厯之子徴幼聰敏纍遷吏部尚書為人清簡無事京城陷入隋為民部尚書給事中有口辨多所詳究至於仕流官宧皇宗戚屬及朝儀制度憲章軌則户口風俗山川土地問無不對子翼位至司徒姚察字伯審吳郡武康人六嵗誦書萬餘言十二能屬文起家梁朝司文侍郎梁室傾亂﨑嶇采野實以供給養入於已分减推諸弟妹乃至故舊亦皆相分自甘藜藿雖亂離之中篤學不廢陳有天下纍進位尚書祠部郎中轉祕書監領著作入隋為祕書郎别敕成梁陳二代史隋文帝嘗召察謂朝臣曰我平陳惟得察一人而已大業二年卒於東都王元規字正範太原晉陽人祖寶父偉早卒元規八嵗而孤隨母舅氏往臨海郡年十二郡豪劉瑱有財巨萬欲以女妻之母將許焉元規泣諫曰因不失其親古人所重豈得茍安異壤輒婚非類母感其言而止梁時山隂縣有暴水流漂居人元規惟有一小船倉卒引其母妹并姑姪等並入船留其男女三人閣於樹杪及水退俱獲全濟世人稱其志行少好學起家為梁相國左常侍陳有天下纍遷散騎常侍南平王府參軍自梁諸儒相傳為左氏學者皆以賈逵服䖍之義難駮杜預凡一百八十條元規引證通析無復疑滯禎明三年入隋為秦王府東閣祭酒年七十卒於廣陵所著春秋發題辭及義記十卷續經典大義十四卷孝經義兩卷左傳音三卷禮記音兩卷建康實録卷二十
