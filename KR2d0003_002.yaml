body:
  text: 建康實録卷二唐許嵩撰吳太祖下黄武八年春正月公卿百司連上表勸王正尊號王猶謙讓再三夏四月黄龍鳳皇見武昌夏口並言之甲午公卿再請王曰羣臣百辟咸以寡人上副天心寡人敢辭甲申立壇於南郊即帝位柴燎告天禮畢法駕旋武昌宫陞太極殿大赦改元黄龍元年建黄龍大牙常在中軍令諸將進退向之詔侍中胡綜為賦其畧曰乃律天時制為神軍取象太一五將三門疾則如電遲則如雲進止有度約而不煩四靈既布黄龍中央周列日月實曰太常傑然特立六軍所望云云綜字緯則汝南固始人也少孤將毋避亂江東年十四為孫䇿門下客好學攻文黄龍初蜀使修好帝令綜作盟文文義婉美自黄龍後詔誥冊命隣國答書皆綜所為與是儀徐祥同典機宻按同典機宻句下載胡綜事未全疑有闕文丁酉追尊父堅為武烈皇帝廟號始祖陵曰髙陵母吳氏為武烈皇后兄䇿為長沙桓王立子登為皇太子内外文武百司皆即位行賞邊軍征防各賜勲五轉鰥寡孤獨量給糓帛百姓並免今年租賦天下賜酺五日初漢末興平中童謡曰黄金車斑蘭耳開閶門出天子閶門即吳西郭門也夫差所造帝即吳人六月蜀使衛尉卿陳震来慶踐位帝乃立壇與蜀使盟約滅魏中分天下以幽豫青徐兖鄆冀凉屬蜀其司州之土以函谷關為界有害於吳蜀伐之有害於蜀吳伐之凡百之約皆如載書有渝此盟創禍先亂時童謡云寧飲建業水不食武昌魚寧就建業死不就武昌居秋九月帝遷都於建業案江表傳漢建安中劉備嘗宿於秣陵觀江山之秀勸帝居之初張紘謂帝曰秣陵楚威王所置名金陵地勢岡阜連石頭古老云秦始皇東巡㑹稽經此縣望氣者云金陵地形有王者都邑之氣因掘斷連岡故名秣陵今據所見存地冇其氣象天之所令今宜為都邑帝深善之後聞劉備語曰智者意同故即帝位聞謡言而思張紘議乃下都之又案吳録劉備曽使諸葛亮至京因觀秣陵山阜曰鍾山龍盤石頭虎踞此乃帝王之宅也以陸遜為上將軍詔輔太子登留守武昌冬十月至自武昌城建業太初宫居之宫即長沙桓王故府也因以不改今在縣東北三里晉建康宫城西南今運瀆東曲折内池即太初宫西門外池吳宣明太子所創為西苑案其地今在惠日寺後僧相傳呼為果師墩初吳以建康宫地為苑其建業都城周二十里一十九步十一月右長史張紘卒遺令戒子孫無為不善紘字子綱廣陵人少游學京師還本郡舉茂才公府辟皆不就漢末避亂江東桓王創業遂委質焉紘為謀主毎出入諫王持重不宜輕脫建安四年奉使許昌宫時曹操為司空辟為掾兼侍御史紘心戀昔恩思還返命未果桓王薨而帝統事操欲紘輔帝内附拜紘為㑹稽東部尉帝不以紘北任介意至因為長史與張昭二人為左右腹心一人従征一人居守及帝都秣陵辭還東迎家道病卒年六十一留牋勸帝修徳納善帝省書流涕乆之子𤣥清介髙行官至南郡太守二年春正月詔立國學置都講祭酒二月使將軍衛温諸葛直下海求亶夷二洲得夷洲數千人而還案二洲皆在海中長老傳云秦皇遣方士徐福將童男女數千人入海求蓬莱神山及仙藥遂遇風皆止此洲不還世世相承有數萬家時有㑹稽東縣人行海遇風至夷洲其亶洲絶逺不可得到故溫只得夷洲人還也三年夏五月建業有野蠶為繭大如鳥卵由拳生野稻詔改由拳為禾興縣冬十月始平言嘉禾生十二月丁卯大赦改明年為嘉禾元年春丞相顧雍奏宜修郊廟社稷以承天意詔答未許二月皇子建昌侯慮薨慮字子智太祖次子性聰敏才兼文武黄龍初大臣等奏宜進爵為王使出鎮任以光大業帝許之假節開府鎮軍大將軍臨事遵奉法度敬納師友深見寵愛薨時年二十帝為之降損夏六月皇太子登歸自武昌留省侍以太子少傅都卿侯是儀為侍中儀字子羽北海營陵人本姓氏少仕郡郡相孔融謂曰氏字民無上可改為是乃従焉後避地隨劉繇過江太祖統事徵用之専典機要性謇諤帝以為趙之周舍累官至侍中遷少傅輔皇太子鎮武昌隨還復拜侍中轉僕射為人謙讓不治産業又愛惠施宅在西明門外甚卑陋雖處尊官弊衣單食帝聞之幸其宅求視蔬飰親嘗之對而太息有所増益皆讓而不受時或進逹未嘗言人之短卒時年八十一冬十月魏遼東太守公孫淵叛魏使校尉宿舒閬中令孫綜来奉表稱藩請援并獻方物帝進公卿議輔吳將軍張昭及丞相顧雍等率大臣切諫淵反覆難信兼嶮路遥逺願勿納之帝不信遣太常張彌執金吾許晏將軍周賀賀逹校尉裴潜將兵一萬浮海應接并齎珍寳九錫備物封淵為燕王領幽青二州十七郡諸軍事二年三月漢獻帝崩率公卿舉哀三日公孫淵果反為魏魏將田預要擊破周賀裴潜等於成山而淵殺張彌許晏賀逹三人分其部伍秦旦杜徳等走於𤣥菟八月旦等自𤣥菟走句麗句麗王見旦徳等甚敬之曰此天子邊人也乃發皁衣使二十五人送歸兼表獻方物豹皮千枚鶡鷄皮十具帝喜句麗大怒公孫淵將自征遼東尚書薛綜等率大臣切諫帝猶怒選曹尚書陸瑁上疏曰古来荒服慌忽無常不可保也夫兵革者前代所以誅暴亂滅四夷然皆姦雄己除天下無事従容廟堂之上以議之至於中夏鼎沸九域盤互之時深根固本愛力惜費務自將養以待隣敵之闕未有逺征於此時也捨近馳逺疲於軍力願陛下少思之帝乃止冬十月詔使中書郎陳恂謝宏往拜句麗王宫為單于并賜衣服恂至句麗已受魏幽州牧諷㫖不受詔賜遂郊止吳使令主簿笮資帶固往與恂宏相見恂等怒乃縳資固為質使讓句麗句麗王謝罪獻馬百疋乃釋資等令奉詔賜物而將馬還三年夏六月帝率六軍親征合淝别使大將軍陸遜諸葛瑾等屯江夏沔口張承孫韶等將兵往廣陵淮陽魏明帝自東出拒之帝還軍九月朔旦隕霜傷糓誅不由君上之應也時典校事吕壹専威福帝任之郡臣無敢言是歳復曲阿為雲陽丹徒為武進四年秋七月魏使以馬二百疋求易珠璣翡翠帝曰此朕不用之物乃與交易八月雨雹又隕霜雹者隂之脅陽佞臣小人専任之應五年春議鑄大錢一當五百詔吏民輸銅畀直設盗鑄之科三月武昌甘露降於禮賓殿夏旱自去冬不雨至于五月秋七月輔吳將軍婁侯張昭薨遺令幅巾素棺歛以時服帝素服臨弔祭以太牢諡文成侯昭字子布彭城人好學善談論能𨽻書従白侯子安受春秋衆書與趙昱玉朗俱發名友善與朗共論舊君諱事處士陳琳善之舉茂才不應徐州刺史陶謙以為輕已將拘之趙昱救免乃避難江南及桓王創業為府長史一事己上並委之陞堂拜母如舊好焉桓王臨薨以後事託昭輔帝帝即位以昭為軍師將軍每以直諫整齊徳行帝嘗於武昌宫臨釣䑓飲酒大醉使人以水洒羣臣曰今日酣飲唯醉墮䑓中為止耳昭正色不言出外坐車中帝使人呼還謂曰作樂公何為怒昭對曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也帝慙而止黄龍初與孫邵滕躭鄭禮等採周漢故事定朝儀帝即尊號拜輔吳將軍封婁侯食邑萬户在宅無事嘗著春秋左氏傳觧及論語孝經注每有隣國使命昭輒折之時帝遣張彌許晏應接公孫淵昭諫曰淵背魏懼討逺来求援非本意也若淵改圖欲自明於魏兩使不返取笑天下帝不納昭切諫止之帝横刀於膝上大怒曰吳之士大夫入則拜朕出則拜卿朕之敬卿亦為至矣而數於衆中折朕失計何也昭熟視帝面良乆進曰誠知言不見用每竭愚衷者誠以太后臨崩呼老臣於牀下遺詔顧命之耳因即涕泣横流帝投刀於地與昭對泣然竟遣彌晏昭忿言不見用杜門稱疾不朝帝數召起昭稱疾篤帝恨塞其門昭於内又自以土封之帝後悔過親至門呼昭昭猶稱病帝燒其門以恐之昭更閇户帝使人滅火自責良乆昭諸子共扶昭起載而還宫昭進謝帝跪止之坐定仰而言曰昔太后桓王不以老臣屬陛下而以陛下屬老臣是以思盡臣節以報厚恩使泯没之後有可稱述而意慮愚淺違逆盛㫖自分幽淪長棄溝壑不圖復䝉引見得奉帷幄然臣愚事國志忠畢命而已若乃變心易慮偷榮取容此臣所不能也帝謝之昭為人容貌矜嚴有威風帝常曰孤與張公言不敢妄發舉邦憚之案江表傳初帝於羣臣皆呼字唯呼昭曰張公張紘曰東部初建安中吳太后臨崩以江外多虞召昭與張紘受遺託孤深委寄之而命帝以師父事昭故昭盡忠輔成王業薨時年八十一長子承少以才學知名為人壯毅忠謹甄識人物㧞蔡欵謝景於寒微並為國士封侯其妻諸葛恪妹也見恪歎曰敗諸葛氏者元遜也性勤於進賢篤於物類庶幾之流無不造門焉案丹陽記大長干寺道西有張子布宅在淮水南對瓦官寺門張侯橋所也橋近宅因以為名其長干是里巷名江東謂山隴之間曰干建康南五里有山隴其閒平地民庶雜居有大長干小長干東長干並是地里名小長干在瓦官南巷西頭出江也冬十月彗星見于東方六年春正月詔曰郎吏者宿衛之臣古之命士閒者所用頗非其人自今選三署皆依四科不得虚詞相飾夏用左執法胡綜左節度顧譚議定法長吏不許奔喪詔曰遭喪不奔法非古也葢隨時之宜以義斷恩自今以後長吏不得奔喪廢職有犯者大辟行治冬十二月赤烏羣集前殿大赦改明年為赤烏元年元年春正月侍御史謝宏奏更鑄大錢一當千以廣貨帝許之二月追拜夫人步氏為皇后后諱練師臨淮淮隂人也隨母徙廬江廬江為桓王所破皆東渡夫人以美麗得幸於帝生二女魯斑魯育性不嫉妬多推進故久見愛寵冠後庭及帝即位數次欲立為后公卿意在太子母徐氏帝不得已依違十餘年薨追思之至是年追拜之後合葬蔣陵秋七月典校事吕壹坐姧事伏誅帝深慙亂法使中書郎袁禮以誅壹事諭四方諸大臣兼手詔一一條件而問時事損益并責不直言切諫八月麒麟見武昌二年春正月魏明帝薨夏五月城沙羡三年春詔曰葢君非民不立民非穀不生下州郡勸治農桑農桑時不得役事夏四月大赦諸郡縣治城郭起樓穿壍發渠以備非常冬十一月詔開倉賑給貧民十二月使左臺侍御史郗儉鑿苑城而南自秦淮北倉城名運瀆案建康宫城即吳苑城城内有倉名曰苑倉故開此瀆通轉運於倉所時人亦呼為倉城晉咸和中修苑城為宫唯倉不毁故名太倉在西華門内道北四年春正月大雪平地三尺鳥獸死者大半三月右將軍孫韶卒韶字公禮父河本姓俞氏吳人常隨桓王征伐立功賜姓孫初邊鴻與媯覽等殺丹陽太守孫翊河往苑陵詰鴻覽戴貟貟等懼罪又殺河韶年十七收河衆歸治京城樓櫓以備禦帝聞之將還吳引軍夜至城下試攻之韶皆乗城傳檄備警讙聲動地帝使人諭止明日召見深器之拜為校尉統河部曲食曲阿丹徒二縣自置長吏帝即尊號遷鎮北將軍在邊十數年善待士卒得其死力常以警疆場逺兵候為務故鮮有敗軍之事帝在武昌詔屯京知青徐汝沛等軍事及帝下都建業朝見問其土人物韶答屯戍逺近人馬衆寡將帥姓名盡識之身長八尺儀貌都雅帝喜曰吾不見汝乆不圖進益乃爾加州牧卒夏四月使衛將軍全琮征魏掠淮南決芍陂燒安城邸閤收其人民中郎將秦傀等與魏將王陵大戰芍陂中斬獲千餘人車騎將軍朱然圍樊大將軍諸葛瑾取湘中地時零陵太守殷禮上書於帝曰今天棄曹氏國内虎爭㓜童涖事取亂侮亡宜於今日願陛下親自禦戎舉荆揚之衆盡彊弱之數彊者執㦸羸者轉運西命益州軍于隴右授諸葛瑾朱然大衆指事襄陽陸遜朱桓别征夀春大駕方入淮泗凌轢青徐襄陽夀春困於受敵長安以西務對蜀軍許洛之師勢必分散掎角瓦觧民必内應將相對向或失宜便一軍敗績三軍離心便當秣馬脂車踐踏城邑乗勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退民疲威竭非出兵之䇿也帝善之不能用禮字徳嗣雲陽人㓜而聰穎過人顧劭㧞於微賤之中累遷郎中與輔義中郎將張温使蜀蜀諸葛亮見而歎曰江東菰蘆中生此竒才使還守郡卒於官五月皇太子登薨帝聞驚惋哀不自勝詔曰國喪明嫡百姓何福下有司諡為宣明太子太子字子髙帝長子性謙讓好學既居儲位以諸葛恪為左輔張休為右弼顧譚張承為都尉是為四友謝景范慎刁𤣥羊衜等為賓客每侍講東宫號為多士登接師友同布衣之禮常與共帳同輿及鎮武昌逰獵出入不踐良田頓息又擇空濶之地而不煩民曽乗馬出有彈丸過其側左右求之見一人操彈佩丸咸以為賊對不伏従者欲捶之登使求過丸比之非類乃釋之所養母徐氏廢在吳而日夕思戀及立為太子辭曰本立而道生欲立太子宜先立后帝曰卿母何在對曰在吳中帝黙然毎有賜衣皆沐浴以服之立二十一年年三十三臨終上表進賢勸善寛刑省賦皇子和仁孝聰哲徳行清茂願早建置以副民望諸葛恪張休顧譚謝景皆通敏有識斷入宜腹心出可爪牙范慎華融矯矯壯節有國士之風羊衜有専對之才刁𤣥裴欽蔣修虞翻志節外明凡此諸臣或宜廊廟或堪將帥明習法令守信固義有不可奪之志此皆陛下日月所照選置臣宫備知愫素敢以陳聞帝覽之摧感初葬句容後三年移葬鍾山西蔣陵置園邑奉守次子英嗣封吳侯閏六月大將軍豫州牧諸葛瑾薨瑾字子瑜瑯琊陽都人也性寛緩容貌思度于時伏其𢎞雅少遊學博聞有孝徳漢末避難渡江𢎞咨薦於帝帝善之為人善譚論諫諭未嘗切諤人主粗陳指歸有未合則言他事物類相求帝亦解悟瑾兄弟三人各事一方每使往来兄弟相見言於公庭曽無私語帝即尊位進拜大將軍豫州牧封陽都侯臨終遺令素棺殮以時服長子恪自得侯次子融襲封振威將軍統部曲鎮方外融多伎藝好賓客在軍休吏假卒或不逺千里而造焉常訪問賓客其言能者隨其書史樗蒲弓彈犬馬分部别類與之任性融乃繼進甘果酒肉自巡牀周流看省終日不倦吏士親附彊無外事案江表傳孫峻害諸葛恪宻使無難督施寛等上取融融不之知忽聞兵至猶豫不決及寛等圍城遂飲毒死三子見殺先是公安有靈鼉鳴時謡曰白鼉鳴龜背平南郡城中可長生守死不去義無成及此融果刮金印龜服之而死也秋八月陸遜城邾冬十一月詔鑿東渠名青溪通城北壍潮海潮溝亦帝所開以引江潮其舊跡在天寳寺後長夀寺前東發青溪西行經都古承明廣莫大夏等三門外西極都城牆對今歸善寺西南角南出經閭闔西明寺二門接運瀆在西州之東南流入秦淮其北又開一瀆在歸善寺東經栖𤣥等門北至後湖以引湖水至今俗為運瀆其實古城西南行者是運瀆自歸善寺門前東出至青溪者名曰潮溝其溝東頭今已埋塞纔有處所西頭則見通運瀆北轉至後湖其清溪北源亦通後湖出鍾山西今建元寺東南角度溪冇橋名募士橋吳大帝募勇士處其橋西南角過溝有埭名鷄鳴埭齊武帝早遊鍾山射雉至此鷄始鳴因名焉其溝是吳郗儉所開在苑陵後晉修苑城為建康宫即城北壍也東自平昌門西出經閶闔門注運瀆今東頭見在建元寺門西頭出今夏公亭前驀路西至孝義橋入運瀆運瀆舊有六橋孝義本名甓子橋次南有楊烈橋宋王僧逹觀鬬鷄鴨處次南出有西州橋今縣城東南角路東出何后寺門次南有髙曄橋建康西尉在此橋西今延興寺北路東度此橋次南運瀆臨淮冇一新橋對禪靈渚渡今之過淮水橋名新橋本名萬歳橋其青溪上亦冇七橋㝡北樂遊苑東門橋次南有尹橋今潮溝大巷東出度此橋次南有鷄鳴橋即輿地志所謂今新安寺南東度開聖寺路度此橋次南有募士橋次南有菰首橋一名走馬橋橋東燕鵲湖湖連齊文惠太子博望苑隋末輔公祏築其地為城唐朝陸彦恭為江寧令開金華坊坊於郭東東逼清溪乃廢菰首橋路而於興業寺門前東度溪立橋名金華橋次南有清溪中橋今湘宫寺門前巷東出度溪東有桃花園是齊太祖舊宅即位後修為園亦名芳林園王延長曲水詩序云載懐平圃乃睠芳林即此園也次南青溪大橋今縣東出向句容大路經北橋東即陳五兵尚書孫瑒宅西即陳尚書令江摠宅與瑒對夾清溪俱在路北陶季直京都記云典午時京師鼎族多在清溪左及潮溝北俗說郗僧施泛舟清溪每一曲作詩一首謝益夀聞之曰清溪中曲復何窮盡也五年春正月立子和為皇太子大赦改禾興縣為嘉興縣二月羣臣奏請立皇后及皇子為諸侯王辭曰今天下未定民物勞瘁有功未録饑寒未恤猥割土壤以封子弟崇爵位以寵妃妾朕不取焉三月海鹽言黄龍見夏四月旱詔禁獻御減太官膳秋七月有司又奉立皇后諸侯王八月立子霸為魯王九月遣將軍陸凱討定珠崖儋耳郡六年春騶虞見新都冬十一月丞相顧雍薨時年七十六是月太子太傅都鄉侯闞澤薨澤字德潤㑹稽山隂人家世農夫幼好學居貧常與人傭書以供紙筆所寫既了誦之亦過究竟典籍兼通厯數察孝亷累遷吏部尚書時蜀使張奉来聘帝命公卿宴奉於座别澤姓名嘲謔澤不能對時太子少傅薛綜因行酒至奉代澤對曰蜀者何也有犬為獨無犬為蜀横目句身蟲入其腹奉曰不當復列吳耶綜應聲曰無口為天有口為吳君臨萬國天子之都衆座歡笑奉無以對澤性謙恭小吏對問皆與抗禮人有非短口未嘗言容貌似不足者然所聞少窮嘗以賈誼過秦論進帝欲方便諷諭以明治亂十二月扶南國獻樂人是歳諸葛恪大破六安殺魏將謝景收其民而還魏司馬懿率軍入舒恪遷於柴桑七年春二月以大將軍陸遜為丞相秋嘉禾生宛陵八月詔曰督將亡殺其妻子是使妻去夫子棄父也甚傷義教自今勿殺之車騎將軍朱然驃騎將軍步騭等各上疏言自蜀還者言蜀欲背盟與魏交通多作舟船繕治城郭又前蔣琬守漢中聞司馬懿南向不出兵乗虚以犄角之反委漢中還成都事已彰露的無所託宜為之備帝良乆曰不然吾待蜀不薄聘享盟誓無以負之何以致此又司馬懿前来入舒旬日便退蜀在萬里何知緩急而便出軍昔魏入漢川此間始戒嚴亦未舉制㑹魏還而止蜀寧可復以此為疑也且又治國舟舡城郭何得不䕶今此間治軍豈欲禦蜀人言皆不可信朕為諸君破家保之果如帝言而蜀竟無謀八年春二月丞相江陵侯陸遜薨遜字伯言吳人也本名議世為江東大族妻桓王女也遜年二十始仕幕府歴東西曹令史出為海昌屯田尉領縣事海昌今之鹽官也時旱遜開倉賑窮百姓懐之及帝統事而遜䇿定山賊帝用為帳下都督時㑹稽太守淳于式表遜枉法擾亂人民遜入乃薦式為佳吏帝曰式表卿卿何稱善對曰式意欲養民是以白臣臣更毁之是亂聖聴帝以為長者後吕䝉臥疾因上表言意思深長才堪負重觀其規慮終可大任帝納之累遷䕶軍鎮西將軍代吕䝉為右部督征關忠義克公安定南郡封華亭侯持節揚州牧多所辟舉及帝定荆州上表勸帝薦㧞英異以進南土人深納其言黄武初大破劉備於馬鞍山尋敗曹休于夾休發背死遜還軍振旅凱歌入武昌帝授遜輔國將軍郢州牧改封江陵侯勅左右以御葢覆之出入殿門凡所賜與皆御物上珍羣臣莫比嘉禾中都䕶諸軍與諸葛瑾等征襄陽定安陸石陽及為丞相詔領揚州牧都督如故時帝寵魯王霸欲廢太子和遜上書諫曰太子正統宜有磐石之固以副至尊不宜動揺生惡人心表三四上帝怒以重臣未即加法使人責之遜不勝憤恚而薨性忠梗出言無私立朝肅如也帝嘗以諸子委遜教誨故建昌侯慮曽於堂前作鬭鴨欄遜見責之即令毁除學士南陽謝景與劉廙之談講以先刑後禮遜引大義訶之曰禮長於刑乆矣何以細辯而詭先聖之教若此之論不須講也左右失色為人素儉知足時年六十三死之日家無餘財夏五月電霆犯宫門柱又擊南津大橋楹茶陵縣洪水溢出漂損二百餘家秋七月帝遊後苑觀公卿射征西將軍馬茂符節朱真牙門將朱志無難都督虞欽等謀逆欲刼公卿襲帝事覺夷三族八月大赦使校尉陳勲作屯田發屯兵三萬鑿句容中道至雲陽西城以通吳㑹舡艦號破崗瀆上下一十四埭通㑹市作邸閣仍於方山南截淮立埭號曰方山埭今在縣東南七十里案其瀆在句容東南二十五里上七埭入延陵界下七埭入江寧界初東郡舡不得行京行江也晉宋齊因之梁太子嗣改為破墩瀆遂廢之而開上容瀆在句容縣東南五里項上分流一源東南三十里十六埭入延陵界一源西南流二十五里五埭注句容界上容瀆西流入江寧秦淮後至陳髙祖即位又堹上容而更修破崗至隋平陳乃詔並廢此瀆九年夏四月甘露降武昌宫秋九月以驃騎大將軍步騭為丞相車騎大將軍朱然為左大司馬衛將軍全琮為右大司馬鎮南將軍吕岱為上將軍諸葛恪為大將軍時用大錢物貴百姓不便詔除大錢卑物價使收其錢鎔為器十年春適南宫案輿地志南宫太子宫也宋置欣樂營其地今在縣城二里半吳時太子宫在南故號南宫改為太初宫詔移武昌材瓦有司奏武昌宫作已二十八年恐不堪用請别更置帝曰大禹以卑宫為美今軍事未已所在多賦妨損農業且建康宫乃朕従京来作府舍耳材柱率細年月乆逺嘗恐朽壊今武昌材木自在且用繕之冬十月大赦死罪是歳康僧㑹入境置經行所朝夕禮念有司以聞帝曰昔漢明帝感夢金人使往西方求之得摩滕竺法蘭来中國立經行教今無乃是其遺類乎因引見僧㑹其言佛教滅度已乆唯有舍利可以求請遂於大内立壇結静三七日得之帝崇佛道以江東初有佛法遂於壇所立建初寺帝初好道術有事仙者葛𤣥嘗與遊處或止石頭四望山所或遊於列洲時忽遇風𤣥舩傾溺帝悲怨久之俄見𤣥曵履従江上行来衣不濡而有酒色𤣥性好酒嘗飲醉臥門前陂水中竟日醒乃止帝重之為方山立洞𤣥觀後𤣥白日昇天今方山猶有𤣥煑藥鐺及藥臼案地輿志赤烏二年為𤣥於方山立觀又吳録云有術人姚光自言火仙帝焚之火滅光坐灰中手持一卷帝看之不識初在武昌日徵方士㑹稽介象者帝為立第給御帳號為介君帝毎従學匿形法前後所言皆驗帝曽問象鱠魚何者為上象曰鯔帝曰海中魚不可卒得且言近者象曰易得因塪地灌水其中釣之得鯔以為鱠仍請使往蜀市薑為虀初作鱠而去欲了而還使者於蜀見張温張温因附家書而歸十一年春正月朱然城江陵三月太初宫成周迴五百丈正殿曰神龍南面開五門正中曰公事門東曰昇賢門左掖門西曰明陽門右掖門正東曰蒼龍門正西曰白虎門正北曰𤣥武門起臨海等殿夏四月雨雹此有徳遭險誅伐過深之慮也雲陽言黄龍見五月鄱陽言白虎仁帝曰符瑞之應表徳也何以臻於兹書云雖休勿休公卿百司勉修所職以匡不逮宜各勵精思朕過失秋丞相冀州牧畨禺侯步騭薨騭字子山臨淮人性寛雅深沈能降志辱身研博道藝靡不貫覽漢末渡江單身窮困與廣陵人衛旌種𤓰自給晝則耕斸以勤四體夜則端坐讀誦經書吳録㑹稽焦矯嘗為征羌令郡之豪也騭旌等共修刺奉𤓰以謁矯矯遇之甚薄旌恥之騭辭色自若及食矯自饗大案飯騭等小盤菜茹而已旌不能食騭飽食訖辭出旌怒曰寧能忍此騭曰吾等貧賤主人以貧賤遇之固其宜也復何恥為旌字子旗位止尚書帝初統事召騭為主簿與諸葛瑾嚴畯等並著英聲於吳中累遷位持節征南中郎將交州刺史徵為驃騎將軍領冀州牧時皇太子登在武昌與騭書問逺近士君子先後之宜具條答于時建業人物在荆州界者諸葛瑾陸遜朱然程秉潘濬裴𤣥夏侯承衛旌李肅周條石幹等一十一人甄别行狀因上疏奬勸臣聞人君不親小事百官有司各任其職是以舜命九賢而天下治齊桓用管仲則國治漢祖攬三傑以興帝業西楚失雄俊以喪成功汲黯當朝淮南謀寢郅都守塞匃奴竄遁且賢人所在折衝萬里信國家之利器崇替之所由也方今王化未被於漢北河洛有僣逆之醜誠覽英㧞俊任賢之時願明太子重以經意則天下幸甚尋代陸遜為丞相封侯督西陵事在府舍誨育門人手不釋卷被服居處有如儒生喜怒不形於色寛𢎞得衆内外肅然帝深重之前後所薦逹屈滯救患難書數十上并條疏時事帝並採用十二年春三月左大司馬朱然卒然字義封本姓施氏丹陽人安國將軍朱治姊子也治初未有子啟桓王養為嗣時年十三桓王許焉命召以羊酒賀之嘗與同學結好及帝統事年十九初為餘姚長建安二十四年従討關忠義立功遷昭武將軍假節代吕䝉鎮江陵與陸遜破劉偹斷後道拜征北將軍封永安侯魏將夏侯尚曹真等圍江陵内外縣絶真等鑿地道立樓櫓起土山日夕臨城上弓弩雨射城中將士皆失色然神色自若意氣方厲率吏卒伺閒出攻破賊兩屯攻圍凡一百八十日而撤還威振敵國改封當陽侯授左大司馬右軍師寢疾二年帝日夜不安醫藥相望於道卒時年六十八帝素服舉哀子續嗣夏四月兩烏銜鵲墜於東觀丙寅詔驃騎將軍朱據領丞相燎鵲以祭此羽蟲之孽又視不明聴不聰之罰也東觀典校之府實天意焉六月戊戌寳鼎出臨平湖秋八月癸丑白鳩見於章安冬右大司馬全琮卒琮字子璜吳郡錢塘人父柔舉孝亷累遷尚書郎桂陽太守嘗使琮將米數千石往吳中有所市易属吳中饑荒琮皆散用空舡還柔大怒琮頓首曰愚以所市非急當今士大夫有倒懸之患故便賑贍不及啟報柔深竒之自是北州人士避地多南依琮居者百數琮傾家給濟之遂名顯逺近建安二十四年劉備東出琮上疏請討關忠義帝與吕䝉隂議征之乃擒闗侯㑹公安置酒以琮為偏將軍封當陽亭侯尋與吕範破魏軍洞口遷綏南將軍改封錢塘侯帝以吳地險於富春東安郡使琮為太守琮到官明賞罰招誘降附得萬餘人徵還尚魯班公主進衛將軍領徐州牧左䕶軍自為將勇決當敵臨難奮不顧身及作督養威持重御軍任計不營小利初帝欲使太子登出征大臣不敢言琮上疏諫之為人恭順善於承顔納規言詞未嘗忤㫖每進諫事輒納受宗族賞賜家累千金然尚謙虚接士貌無驕色臨終上書諫帝不征珠崖夷州殊方異域隔絶瘴海水土氣毒兵多疾病必無所獲萬一之利卒時年五十二帝流涕十三年夏五月日至夜熒惑入南斗秋七月犯魁第二星而東八月丹陽句容及故鄣寧國諸山崩洪水溢説曰山陽君也水隂百姓也戒君道崩壊百姓將失其所亡𦙍嗣之應也時宫掖不穆魯王霸權傾太子大將軍陸遜太子太傅吾粲等極諫帝不納粲字孔休吳郡烏程人也生數嵗孤城嫗見之謂其母曰此兒卿相骨也少孤賤為縣小吏縣令孫河竒之及河為將軍表粲為曲阿丞治有聲丞相孫劭知之舉為主簿累拜㑹稽太守徵入為太傅粲性忠亮抗直見魯王太盛上表切諫嫡庶不分非有國之宜魯王怒因譖於帝帝怒收粲下獄死嗚呼以正喪身悲夫冬十月全公主魯班與太子母王夫人有隙數讒太子帝乃幽閉和於省内驃騎將軍丞相朱據進曰臣聞太子國之本根立性仁孝天下歸心今卒責之將有一朝之患帝終不受諫固執廢之據擁太子拒諫萬死不退大臣泥首再拜而尚書屈晃復進諫曰太子仁明顯聞四海今三分鼎峙不宜揺動太子以生衆心願陛下少垂聖恩老臣雖死之日猶生之年因叩頭流血詞氣不撓帝登白爵觀見其言切惡之勅晃等曰無事何忽忽遂斥還鄉里無難督陳延與五營督陳䝉等見帝廢太子乃進諫云昔晉獻公殺申生奚齊晉國擾亂三代不止帝大怒䝉等乃右出朱據為宜都丞中書令孫𢎞素惡據耿直潜以偽詔賜死竟廢太子和為庶人遷於故鄣賜魯霸死大臣坐誅者十餘人朱據字子範吳郡人少有姿貌膂力絶人善論難才兼文武累至建義校尉黄龍初帝將都建業召入尚主拜駙馬都尉遷左將軍封雲陽侯領丞相年五十七見殺十一月立子亮為皇太子是月遣軍十萬作堂邑涂塘以淹北道十二月有神人授書告改年立后帝大赦改明年為太元元年太元元年臨海羅陽有神自稱王表周旋人間言語飲食與人無異而不見其形有一婢名紡績常隨侍帝聞之使中書郎季崇齎輔國將軍羅陽王印綬往迎之神至建業勅於蒼龍門外立第宅所經山川之神輒使與神相聞言吉凶水旱往往有驗帝之納邪拒諫近之矣五月立皇后潘氏八月朔大風江海溢平地水一丈右將軍吕據取太舡以備宫内帝聞之喜是月風㧞髙樹三千餘株石碑磋動吳城兩門瓦飛落華覈以為役繁賦重區務不容之効也因條奏之帝曽不省冬十一月幸曲阿祭髙陵大赦還風疾驛徵大將軍恪為太傅詔省徭役二年春正月帝臥疾悟和無罪欲徵還孫𢎞等固諫事不再乃止封為南陽王居長沙子奮為齊王居武昌子休為瑯琊王居虎林二月大赦天下改元神鳳元年皇后潘氏暴崩於内宫后諱淑㑹稽句章人后自織室召入得幸常說夢有似龍頭授己者已以蔽膝受之遂生少帝性隂妬善容媚自始及卒譛害無己既病宫人侍疾不堪勞苦伺其昏臥共縊殺之言中惡尋而事泄坐誅者六七人三月帝疾使有司傳詔問神人王表請福表云國之將興聴之於人國之將亡聴之於神夏四月乙未帝崩于内殿遺詔太子太傅諸葛恪與太常滕𦙍衛將軍孫信等輔太子亮秋七月葬蔣陵今縣東北十五里鍾山之陽案帝四十即吳王位七年四十七即帝位二十四年年七十一崩羣臣上諡為大皇帝廟曰太祖帝屈身忍辱任才尚計有句踐之竒英故克跨江表成鼎峙之業然多嫌忌果於殺戮末年滋甚信用讒說竟廢嫡嗣初桓王定江東逺修貢於漢漢使劉琬加錫命琬至江東見桓王諸兄弟顧諸人曰孫氏諸子皆俊傑然夀並不長唯中子孝亷權當有大貴之相骨體非人臣也夀又最長君試記之後果成帝業何見知之明也建康實録卷二
