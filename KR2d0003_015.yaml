body:
  text: 建康實録卷十五唐許嵩撰齊太祖高皇帝太祖高皇帝姓蕭諱道成字紹伯小名鬬將漢相國何二十四代孫何初居沛何孫侍中彪免官居東海蘭陵縣中都里晉元康元年乃分東海為蘭陵郡中朝亂帝四世祖淮隂令整過江居晉陵武進縣寓居江左者僑置本土加以南名于是為南蘭陵人也皇考承之字嗣伯少有大志而才力過人初為宋建威大將軍府參軍纍遷漢中太守追破氐帥楊難當於峨公山乃平梁州入為右軍將軍元嘉二十五年梁土思之於峨公山立廟太祖以宋元嘉四年丁卯歲生姿表英異龍顙鐘聲鱗文遍體年十三從雷次宗學於雞籠山受禮及左氏春秋二十三年隨戍沔口初為左軍中兵參軍二十九年領偏軍征仇池破二壘文帝崩纍遷自建康令為右將軍大破薛索兒於石梁明帝即位授南兖州刺史冠軍將軍而明帝常嫌太祖非人臣相且民間流言蕭姓當為天子明帝愈以為疑泰始七年徵赴京師拜散騎常侍太子左衛率明帝崩詔為右衛將軍加兵五百人與尚書令袁粲禇淵等共掌機事及蒼梧王立元徽二年江州刺史桂陽王休範舉兵叛於尋陽衆二萬發湓口太祖議分軍屯守出鎮自新亭單車白服宋天子加太祖持節都督征討諸軍事平南將軍築新亭城未畢賊前驅已至太祖方解衣高卧以安衆心乃索白虎幡登西垣使將軍高道慶陳顯達浮舸與賊水戰自新亭北至赤岸大破之燒其船艦賊上新亭休範乘肩輿率衆至而太祖大破之張敬兒斬休範首而賊將丁文豪仍設伏破臺軍於皂莢橋至朱雀航而太祖使陳顯達任農夫張敬兒周盤龍等散討諸賊時休範典籖許公與等詐稱休範在新亭士庶惶懼詣壘期赴休範投名者千數太祖得而燒之喻遣還乃振旅凱入百姓聚觀曰全國家者此公也遷鎮軍將軍兖州刺史進爵為公邑三千戶休範平後蒼梧王凶暴猜忌欲加大禍陳太妃罵之曰蕭道成有功于國今若害之後誰為汝著力也乃止太祖加憂懼後常欲以太祖臍為射的僅得免乃與二十五人謀反與楊玉夫等同謀殺蒼梧王而迎立汝隂王其夜王敬則馳蒼梧首于太祖太祖夜入承明門乘所騎赤馬入殿內及太祖踐阼號此馬為龍驤將軍世謂龍驤赤色也及沈攸之矯太后令下都京師恐懼太祖入居朝堂命諸將西討之袁粲劉秉等謀於石頭皆殺之秉走雒簷湖王蘊走鬬場追擒斬之粲無經世之略而疏放好酒步屧白楊郊野間道遇士大夫便呼與酣飲明日謂彼知故到門求通粲曰昨飲酒無偶聊相邀爾竟不相見初蒼梧之廢也秉出集議於路逢弟韞曰今日之事故當歸兄耶秉曰吾等已讓領軍矣韞自捶胸曰君肉中詎有血乎詔假太祖黃鉞率大衆出新亭中興壘以拒攸之攸之敗傳首京師進太祖太尉都督徐兖等十六州諸軍事己酉增班劒四十人甲仗百人入殿加羽葆鼓吹自大明太始已來相承奢侈百姓成俗太祖輔政罷御府省二尚方諸飾玩請禁不得以金銀錦繡為緣器等九月進位領揚州牧劒履上殿入朝不趨贊拜不名置左右長史司馬從事中郎將掾屬各四人升明三年三月甲辰詔進位相國總百揆封十郡為齊公備九錫之禮加璽紱逺逰冠位在諸王公上加相國緑綟綬三讓公卿敦勸乃受宋帝䇿命詔齊國初建給錢帛布四月癸酉進齊公爵為王衛將軍禇淵奉䇿授璽紱金虎符第一至第五錫兹玄土苴以白茅改立王社丙戍命齊王冕十有二旒建天子旌旗出警入蹕一依天子儀辛卯宋帝禪位便遜位别宮詔依唐虞魏晉故事是日宋帝遜位東邸備羽儀出東掖門曰何不奏鼓吹左右無有答者壬辰䇿命齊王遣使持節兼太保雩都縣侯禇淵兼太尉王僧虔奉皇帝璽紱受終之禮一依唐虞故事太祖三辭宋帝王公已下固請太史令將作匠文建陳符命曰六亢位也漢建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十六年而禪晉晉自泰始至元熙二年一百五十六年而禪宋宋自永初元年至升明三年凡六十年咸以六終六受右僕射王儉奏被宋詔遜位臣等參議冝尅日輿駕受禪撰立儀注太祖乃許之建元元年夏四月甲午上即皇帝位於南郊設壇柴燎告天禮畢車駕還宫臨太極前殿大赦天下改升明三年為建元元年封宋帝為汝隂王築宫丹陽故縣行宋正朔車旗服色一如晉宋故事上書不為表答表不稱詔宋諸王降為公公主為縣君詔封降有差有司奏除元嘉厯為建元厯木德盛邜終未以正月邜社十二月未臘丙辰詔遣大使巡行四方己未汝隂王薨諡為順帝追尊皇考曰宣皇帝妣曰孝皇后追尊兄道度道生為王庚辰七廟主備法駕即于太廟詔諸將及客戮力艱難盡勤直衛其從還宫者普賜位一階甲申立皇太子賾見刑入重者降一等立皇子嶷等為王乙酉葬宋順帝於遂寧陵秋七月詔南蘭陵桑梓本鄉長蠲租賦武進王業所基復十年丙子立彭城劉胤為汝陰王奉宋帝後二年四月丙寅高麗吐谷渾遣使貢獻進高麗王高璉為樂浪公號驃騎大將軍五月立六門都牆六月癸未詔昔嵗水旱曲赦丹陽等郡遭水尤劇之縣元年以前三調未充虛列已畢官長局吏應共償備外詳所除宥秋七月甲寅以輔國將軍盧紹之為青冀二州刺史九月葬皇太子妃裴氏休安陵時議欲立石志不出禮典起宋元嘉中顔延之為王球石志素族無碑䇿故以紀行自爾以來王公以下咸共遵用儲妃之重禮殊恆列既有哀䇿謂不須石志從之闕黃門郎沈攸之在荆楚宋朝密為之備至元徽四年沈攸之事起上以中流可以待敵據湓口城為戰守之備太祖聞喜曰真我子也齊國建為齊世子以石頭為世子宫太祖即位為皇太子建元四年三月壬戍太祖崩上即位大赦征鎮州郡令長軍屯部伍各行喪三日不得離任乙丑以司徒禇淵録尚書事左僕射王儉為尚書令車騎將軍張敬兒開府儀同三司六月立皇太子長懋丙寅立皇太子妃王氏八月禇淵薨永明元年正月車駕祠南郊大赦改元內外羣僚各舉所知而隨分登敘下詔改葬袁粲劉秉褒贊前功而沈攸之喪柩得送反還舊墓庚申以蕭景先為中領軍甲子詔築青溪舊宫二月熒惑入太微時中書舍人各住一省時謂之四省既總重權而勢傾天下玄象失度史官請行祈禳之禮王儉曰天文乖忤此禍由四省乃具奏舍人吕文顯等専權上納而不改二年秋八月車駕幸青溪舊宫小會金石樂作在位者賦詩戊申幸玄武湖三年八月乙未幸中堂聽訟四年春正月甲申藉田禮畢車駕幸閲武堂勞酒小會五年二月戊子幸芳林園禊宴九月九日登商飈館館所立在孫陵岡世呼為九日臺也六年春正月聽覽京師二百里內獄囚七年五月王儉薨八年六月大雷雨有黃光竟天照地狀如金色王融上金天頌王擒曰此熒惑光非金也十月桃李再花占曰人君妃妾過制虛飾無實今則桃李再花時後宫萬餘人宫內不容九年十年十一年春正月癸丑詔京師見繫囚詳所原遣以江州刺史鄱陽鏘為領軍將軍丙子皇太子長懋薨夏四月甲午立皇孫昭業為皇太孫立妃何氏賜天下為父後者爵一級七月上不豫徙御延昌殿車輿始登階而殿屋鳴吒上惡之戊寅大漸詔曰太孫進德日茂社稷有寄子良善相毗輔尚書中務悉委王晏徐孝嗣等軍旅捍邉委王敬則陳顯達王廣之沈文季等又詔不得寶器入梓宫是日上崩年五十四廟號世祖諡武皇帝上剛毅有斷治教大體以富國為先頗好逰宴九月葬景安陵初十一年秋七月月入太微先是丐奴中謡言云赤火南流喪南國于是丐奴始欲為冦帝方患而憂之是嵗果有沙門從北來齎此火而至火色赤於常火熱小微可治疾貴賤爭取之多得其驗二十餘日京師咸云聖火詔使吏澆滅之而民亦有竊畜者治病先齋戒以火炙桃板七炷而疾愈吳興邱國賔好事士也竊還鄉邑邑人楊道慶虛疾二十年間形容骨立依法灸板一炷能坐即全瘥是月帝崩史臣曰齊高帝基命之初武功潛用泰始開運大拯時艱及蒼梧暴虐釁結朝野而百姓懍凛命縣朝夕權道既行兼濟天下元功振主利器難以假人羣方戮力實懷尺寸之望豈惟天厭水行固已人希木德歸功與能事極乎此武帝雲雷伊始功參佐命雖為繼體事實艱難御衮垂旒深存政典文武授任不革舊章明罰厚恩皆由已出外表無塵內朝多豫機事平理職貢有常府藏內充鮮人勞役宫室苑圃未足以傷財安樂延年衆庶所同幸亦有齊之良王也廢帝鬱林王鬱林王昭業字元尚文惠太子長子也小名法身世祖即位封南郡王户二千永明五年十一月戊子冠於東宫崇政殿其日小會賜王公以下帛各有差文惠薨立為皇太孫居東宫世祖永明十一年七月崩太孫即帝位辛酉追尊文惠為世宗文皇帝尊太妃為皇太后立何氏為皇后初昭業年五嵗戲高帝牀前方拔白髮召問太孫曰我誰耶答曰太公高帝笑曰豈有為人曽祖拔白髮乎即擲鏡鑷隆昌元年春正月丁未改元大赦詔百寮陳得失各舉所知七月癸已皇太后令廢帝為鬱林王昭業美容止好𨽻書世祖敕皇孫手書不得妄出以重之出入常禁其起居節其用度昭業嘗謂豫章王妃庾氏曰阿婆佛法言有福德生帝王家今日見作天王便是大罪左右主帥動見拘摰不如作市邉屠沽冨兒百倍矣及即位極意賜與動百數十萬未期之間世祖庫儲錢億數垂盡而開主衣庫與皇后寵姬觀之人恣意所欲取之諸寶器以相擊剖破碎之以為笑樂居常祼袒著紅縠禈雜綵衵服好鬪雞密買雞至數千世祖御物甘草杖宫人寸斷用之與文帝幸姬霍氏淫通長留宫內聲云度霍氏為尼以餘人代之何皇后亦淫亂齋閣通夜洞開內外混雜西昌侯鸞屢諫不納乃疑鸞有異志鸞懼變先謀廢帝二十二日使蕭諶坦之等于省誅帝羽翼曹道剛朱隆之等率兵自尚書省入雲龍門戎服加朱衣于上比入門三失履廢帝在夀昌殿聞外變走向愛姬徐氏户拔劒自刺不中以帛綿纒頭輿接出延德殿諶初入宿衛將士皆執弓楯相拒諶曰所取自有人卿等不須動宿衛信之及見帝出各欲自奮帝竟無言及被殺時年二十一輿尸出徐龍駒宅殯葬以王禮餘黨亦見誅明日乃宣令而立海陵王廢帝海陵王海陵王昭文字季尚文惠太子第二子也鬱林即位封為新安王其年鬱林廢尚書令西昌侯鸞議立昭文為帝延興元年秋七月丁酉即皇帝位以西昌侯鸞為録尚書事揚州刺史宣城郡公大赦天下改元九月癸未誅司徒鄱陽王鏘大將軍隨王子隆南兖州刺史安陸王子敬於是江州刺史晉安王子懋遂起兵遣中護軍王玄邈討誅之己未鸞假黃鉞內外纂嚴丁酉進宣城公鸞為太傅加殊禮進為王而盡誅諸王為藩鎮者以宣城王輔政帝起居皆咨而後行常思蒸魚菜太官令答無録公命竟不獻十月辛亥皇太后令以嗣主幼沖庶政多失宗王四海藩戚外叛自非樹長君無以鎮淵器太傅宣城王胤體宣皇鍾慈太祖宜入承寶命帝降海陵王建武元年詔海陵王依漢東海王故事十一月稱王有疾遣御師占視乃殞之時年十五諡曰恭王先是寶志沙門住東宫常從平昌門入忽云門限上血汚人衣褰裳走過俄而載帝尸自此門出帝頸血流于門限史臣曰郭璞稱永昌之占二日之象而隆昌之號亦同焉案漢靈帝中平六年四月崩太子辨十嵗即位改光熹元年張讓段圭誅後改為昭寧董卓輔政改為永漢卓廢帝為𢎞農王一百七十日鴆之九月立靈帝子協却號中平一年四號也晉惠帝太平二年長沙王乂事敗成都王頴改元為永安頴自郢奔河間王復改元為永興一嵗三號也隆昌延興建武亦三號故知喪亂之軌雖千載而必同矣高宗明皇帝高宗明皇帝諱鸞字景栖始安貞王道生之子也小名元度少孤太祖撫育過於諸子宋太豫元年為安吉令有嚴能之名纍遷輔國將軍淮南太守太祖踐阼遷侍中封西昌侯世祖即位為度支尚書轉左衛將軍清道而行遷左僕射海陵王立為録尚書事鎮東府加黃鉞班劒進為宣城王太后廢帝為海陵王以上入纂太祖為第三子也羣臣三請乃受命冬十月癸亥即皇帝位大改元建武元年大司馬王敬則等十三人並進封邑户詔省尚方雕刻新林苑地悉以還百姓追尊始安貞王為景皇帝妃為懿王后丙戍以輔國將軍聞喜公遙欣為荆州刺史寧朔將軍豐城公遙昌為豫州刺史詔諸工番假休息戊子立皇子寶卷為皇太子賜天下為父後者爵一級上輔政所誅諸王是月復屬籍各封子為侯二年夏六月誅西陽南海邵陵等三王而殺蕭諶十月納皇太子妃禇氏大赦王公已下賜有差十二月詔晉宋諸陵悉加修理三年冬閏十二月皇太子冠賜王公已下帛有差四年春大赦壬寅詔人産子者蠲父母役一年新婚者蠲夫役一年二月甲子以左僕射徐孝嗣為尚書令蕭季敞為廣州刺史永泰元年春正月朔大赦丁未誅河東臨賀西陽永陽南康衡陽湘東南郡巴陵桂陽等十王子皆死之四月甲寅改元大赦丁丑大司馬會稽太守王敬則舉兵反夏五月使輔國將軍劉山陽東討斬敬則秋七月己酉帝崩于正福殿時年四十七遺詔以沈文季為左僕射江祐為右僕射封江祀侍中劉暄衛尉卿軍政大事內外皆委徐孝嗣遙光蕭坦之等為心膂之任葬興安陵諡明皇帝廟號高宗帝明審有吏才持法無所借制御親幸臣下肅清驅使大存儉約輿輦舟乘剔去金銀還主衣庫太官進食有裹蒸帝曰我食此不盡可四片破之餘充晚食而世祖掖庭中宫服御一無所改性多猜慮故亟行誅戮而出入互唱南出唱北東行唱西而示簡於出入竟不南郊上初有疾信道術身衣絳衣服飾皆赤以厭之巫云後湖水頭徑入宫內致帝有疾乃自至太官行水溝左右啓太官若無此水則不立決意塞之欲南引淮流會帝崩事寢廢帝東昏侯東昏侯寶卷字智藏高宗第二子也本名賢高宗輔政改焉建武元年立為太子永泰元年七月髙宗崩太子即位改元永元元年十一月立皇子誦為皇太子賜為父後者爵一級丙辰揚州刺史始安王遙光據東府反遣領軍蕭坦之討平之傳首九月壬戍以頻誅大臣大赦天下十一月太尉江州刺史陳顯達反十二月顯達至京師乙酉斬首餘黨盡平二年三月詔使崔惠景討豫州刺史裴叔業及兄子植惠景時為平西將軍於廣陵起兵反襲京師徐州刺史江夏王寶元以京城納之乙卯帝使領軍王瑩屯北籬門惠景破之遂入京師豫州刺史蕭懿起義兵大破惠景詔曲赦京邑江夏王寶元伏誅十月害尚書令蕭懿十一月甲寅蕭頴胄起兵于荆州十二月雍州刺史梁王蕭衍起義兵于襄陽三年二月詔羽林兵征雍州中外纂嚴三月丁未衍立南康王寶融即皇帝位于江陵癸丑遣平西將軍陳伯之西征八月以光祿張瓌鎮石頭以太子左衛率李居士總督諸軍屯新亭是日義軍至南州李居士敗新亭降義軍將軍徐元瑜以東府城降義軍十二月王珍國侍中張稷率兵入殿廢帝時年十九帝在東宫便好弄不喜書常夜捕鼠達旦為樂高宗臨崩屬以隆昌為戒曰作事不可在人後故數誅大臣委任羣小性訥澀少言惟親閹竪及左右自江祐始安王遙光等誅後騎馬日夜於後堂戲呌呼倡伎以五更就卧至晡方起王侯朝臣節朔朝見晡後方前或時遣出臺閣奏案月數十日不報二年元會食後方出朝賀才竟便還西序寢自已至申百僚陪位皆僵仆菜色比起就會匆遽便罷陳顯達平後出逰走逐居民于郊外數十里皆空家盡室巷陌懸幔高為障置伎人防守謂之屏除或周環京邑是時一月二十餘出三四更中鼓聲四出幡戟橫路百姓喧走士庶不辨出不言定所夜出夜返火光照天鼓吹鳴鈸聒地置射雉場二百十六所郊郭帷翳四民皆廢業樵蘇路斷又於後宫起仙華神仙玉夀諸殿盡用雕彩以麝雜香塗壁時世祖興光樓上施青漆世謂之青樓帝曰武帝不巧何不純用琉璃貴妃潘氏服御極選珍異主衣庫舊物不復充用琥珀釧一隻直一百七十萬京邑酒租皆折使輸金又立紫閣諸樓壁上畫男女私褻之像種好樹美竹徵求民家望樹便取朝栽暮拔道路相繼又于宫立市太官乃朝進酒肉肴果使宫人閹竪共為禆販潘妃為市令帝為市魁將鬪者就潘氏判決苑中作土山築渠立堰以新蔡人徐世檦為直閣將軍殺戮專決其黨茹法珍梅蟲兒等專權內外緘口及義師至近郊乃聚兵為固守之計而信鬼神迎拜蔣子文為相國揚州牧封鍾山王時范雲謂朱光尚曰卿是天子要人當思諌諍光尚曰至尊不可諌正當以鬼神達意後帝馬驚光尚曰先帝嗔不許數出帝大怒乃拔刀與光尚尋覔不見乃縳草作高宗形北靣斬之懸首苑門上潘妃生女百日死帝斬衰絰杖羣臣來吊盤地坐舉手受執及將軍席豪死於是閉城自守城內軍事一委任王珍國而聞外鼓吹叫聲披大紅袍登景陽樓屋上望弩幾中之士卒怨之不為致力募兵出戰至城門皆坐甲自守恐城外有伏乃燒城旁府署六門之內皆盡於西掖內相聚為市販牛馬肉及義師至便敕太官備百日糧而惜金錢不肯賞賜茹法珍等叩頭請之帝曰賊來獨取我耶而就我求物後堂儲數百具榜板啓為防城之具帝曰擬修殿竟不與故王珍國張稷等見不能用計懼禍及故反率兵入殿是夜帝在含德殿吹笙歌作女兒子卧未熟聞兵入起出北户欲還宫閹人黃泰平以刀傷其膝仆地顧曰奴反耶直後閣張齊遂斬首送梁王宣德太后令言其凶惡追封為東昏侯法珍等伏誅初義師築長圍帝乃著五色衣服登城望賊還輒與六宫御刀在華光殿共立單壘别制鎧仗多用金玉親自攻壘詐作戰敗被瘡板掆將去將來相對為樂和帝和帝諱寶融字智昭明帝第八子也建武元年封隨郡王永元元年改封南康王出為西中郎將荆州刺史督九州軍事二年十一月甲寅長史蕭頴胄奉王舉兵其日太白及辰星俱見西方乙卯教纂嚴丙辰以雍州刺史蕭衍為使持節都督前鋒諸軍事戊午衍表勸進十二月乙亥羣僚勸進並不許壬辰驍騎將軍夏侯亶自建鄴至江陵稱宣德太后令西中郎將南康王冝纂承皇祚光臨億兆可且封宣城王相國荆州牧加黃鉞置僚屬三年正月乙巳王受命大赦唯梅蟲兒茹法珍等不在例是日長星見竟天甲寅建牙于城南二月己巳羣僚上尊號立宗廟及南北郊中興元年春三月乙巳皇帝即位大赦改永元三年為中興文武賜位二等是夜彗星竟天以相國左長史蕭頴胄為尚書令加雍州刺史蕭衍尚書左僕射都督征討諸軍以晉安王寶義為司空廬陵王寶源為車騎將軍開府儀同三司丙午有司奏封庶人寶卷為零陵侯詔不許又奏為涪陵王詔可夏四月戊辰詔凡東討衆軍及諸向義之衆普復除五年秋七月丁卯魯山城主孫樂祖以城降己未郢城主薛元嗣降八月丙子平西將軍陳伯之降九月己未詔假黃鉞蕭衍若定京邑得以便冝從事冬十一月壬寅尚書令鎮國將軍蕭頴胄卒十二月丙寅建康城平己巳宣德皇太后令以征東大將軍蕭衍為大司馬録尚書驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事壬申改封建安王寶夤為鄱陽王癸酉以司徒揚州刺史晉安王寶義為太尉領司徒乙酉以尚書右僕射王瑩為左僕射二年春正月戊戌宣德皇太后臨朝入居內殿壬寅大司馬蕭衍都督中外諸軍事加殊禮己酉以大司馬長史王亮為守尚書令甲寅加大司馬蕭衍位相國梁公備九錫禮二月壬戍誅湘東王寶眰丙戌進梁公蕭衍爵為王三月辛丑鄱陽王寶夤奔魏誅邵陵王寶攸晉熙王寶貞庚戍車駕東歸至姑孰丙辰遜位于梁丁巳廬陵王寶源薨四月辛酉禪詔至皇太后遜居外宫梁受命奉帝為巴陵王宫于姑孰戊辰巴陵王殂年十五追尊為齊和帝葬恭安陵初梁武帝欲以南海郡為巴陵國邑而遷帝焉以問范雲雲俯首未對沈約曰今古殊事魏武所云不可慕虛名而受實禍梁武頷之於是遣鄭伯禽進以生金帝曰我死不須金醇酒足矣乃引飲一升伯禽就加摺焉先是文惠太子與才人共賦七言詩句後輒云愁和帝至是其言方驗又永明中望氣者云新林婁湖青溪並有天子氣於其處大起樓苑宫觀武帝屢遊幸以應之又起舊宫於青溪以弭其氣而明帝舊居東府城西延興末明帝龍飛至是梁武帝衆軍城於新林而武帝舊宅亦在婁湖百姓皆著下屋白紗帽而反裙覆頂東昏曰裙應在下今更在上不祥命斷之于是百姓皆反裙向下此服妖也帽者首之所寄今而向下天意若曰元首方為猥賤乎東昏又令左右作逐鹿帽形甚窄狹後果有逐鹿之事東昏宫裏又作散叛髮反髻根向後百姓爭學之及東昏狂惑天下散叛矣東昏又與羣小别立帽騫其口而舒兩翅名曰鳳度三橋裙向後揔而結之名曰反縳黃麗東昏與刀敕之徒親自著之皆用金寶鑿以璧璫又作著調帽鏤以金玉間以孔翠此皆天意梁武帝舊宅在三橋而鳳度之名鳳翔之驗也黃麗者黃離為日而反縳之東昏戮死之應也調者梁武帝至都而風俗和調先是百姓及朝士皆以方帛填胸名曰假兩此又服妖假非正名也儲兩而假之明不得真也東昏誅其子廢為庶人假兩之意也史臣曰欎林地居長嫡瑕釁未彰而武皇之心不變周道故得保兹守器正位尊極既而愆鄙內作兆自宫闈雖為害不逺而足傾社禝郭璞稱永昌之名有二日之象隆昌之號實亦同焉明帝越自支庶任當負荷乘機而作大致殱夷流涕行誅非云義舉事茍非安能無內愧既而自樹本枝根胤孤弱貽厥所授屬在凶愚用覆宗祊亦其理也夫名以行義往賢垂範備而之禪術士誡之東昏以卷矣藏以終之其兆先徵蓋亦天所命矣列傳栁世隆字彥緒河東解人也祖憑世隆少有風器伯父元景為宋尚書令愛賞之言於宋孝武召見帝曰此兒將來復是三公也宋纍遷虎威將軍上庸太守帝謂元景曰卿昔以虎威之號為隨郡今復以授世隆使卿門世不絶公也以沈攸之叛守郢城有功事定徵為侍中遷尚書右僕射貞陽侯齊太祖踐阼自母憂起為平南將軍豫州刺史進為公帝問禇淵曰向見栁世隆毁瘠過禮使人惻然淵曰世隆至性天深喪過乎禮事陛下在危盡忠喪親居憂杖而後起立人之本二理同極加榮增寵足以勵風俗世隆性好書啓太祖借祕閣書上給二千卷轉尚書令常自云馬矟第一清談第二彈琴第三在朝不干世務垂簾鼓琴風韻清逸甚得世譽以疾遜位永明九年卒詔給東園祕器朝服贈司空班鼓吹葬於倪塘著龜經祕要二卷見行于世張瓌字祖逸吳郡吳人也祖裕為宋金紫光祿大夫父永為右光祿曉音律宋孝武問永太極殿前鍾聲嘶永答鐘有銅滓乃叩鐘求其處鑿而去之聲遂清越瓌解褐江夏王太尉府參軍以遭父喪還吳初劉彥節有異圗弟遐為吳郡守聚師三千太祖密遣瓌取遐瓌領兵直入吳郡斬遐郡內莫敢動太祖以告張沖沖曰瓌以百口一擲出手得盧矣即授吳郡太守封義成縣侯世祖即位為左尚書領右軍及鬱林之廢見朝廷多難恆卧疾而居室妓妾盈房生子十餘人嘗云中應有好者梁天監中卒垣崇祖字敬逺下邳人也族姓豪強石季龍時自洛陽徙鄴曽祖敞為慕容吏部尚書祖苗自宋武征廣固率衆歸降仍家下邳官龍驤將軍父詢之宋冀州刺史崇祖年十四有幹略伯父豫州刺史護之謂門宗曰此兒必大吾門汝等不及也太祖在淮隂崇祖時戍朐山既受都督祗奉甚至及平沈攸之復遷冠軍將軍兖州刺史初下邳見太祖謂妹夫皇甫肅曰此真吾君也太祖亦曰韓白不及太祖踐阼為豫州刺史鎮夀春盡力奉邉建元二年虜遣劉昶馬步號二十萬冦夀春崇祖著白紗帽肩輿登城指揮大破虜軍啓至上笑曰今真得其人矣進平西將軍崇祖聞陳顯達增給軍儀乃啓上求鼓吹上敕曰韓白何可不與遂給鼓吹一部世祖即位徵還為五兵尚書永明元年詔稱與荀伯玉搆扇邉荒誅之時年四十四子惠隆徙畨禺卒張敬兒南陽冠軍人也本名茍兒宋明帝以其名鄙改之父醜為蜀郡將軍敬兒年少便弓馬有膽氣射猛獸發無不中以補府將擊蠻賊纍功為南陽太守後佐太祖大破桂陽王於新亭親詐降斬休範首以功遷為雍州刺史驍騎將軍以平沈攸之封襄陽侯太祖即位為中軍將軍太祖崩遺詔加開府儀同三司將拜謂其妻曰我拜後府開黃閣因口自為鼓吹聲其妻謂曰吾嘗時夢一手熱如火而君為南陽郡元徽中夢半身熱而君得本州今復夢舉身熱矣有閹人聞之以事達世祖世祖疑有異志使收之敬兒脫冠投地曰用此物誤我於是伏誅子道慶見宥王敬則晉陵南沙人母為女巫敬則生而胞紫色謂人曰此兒必有鼓角相人笑曰得為人吹角可矣及年長兩腋下生乳各長數寸夢騎五色獅子年二十餘善拍張好刀劒補刀戟跳刀高與虎幢等如此五六接無不中宋明帝即位為直閣將軍封重安縣子敬則少于草中遇蟲如烏豆集其身摘去乃脫其處皆流血敬則惡之詣道士卜云此封侯之瑞也果如其言出補暨陽令性倜儻不羈初屠狗商販遍於三吳嘗與暨陽縣吏鬭曰我得暨陽當鞭汝小吏背吏唾其面曰汝得暨陽我亦得司徒公矣及作暨陽召吏謂曰汝何時得司徒公邪竟善遇之及佐破桂陽王遂盡力于太祖太祖即位以殺蒼梧功遷安東將軍吳興太守封潯陽郡公世祖十一年纍遷司空出為會稽太守初在吳興出行市見屠肉枅歎曰吳興昔無此枅是我少時在此所作也海陵王立進位太尉敬則名位雖逹不以富貴自遇初為散騎使虜於北館種楊桞後貟外郎虞長曜北使還敬則曰我昔種楊栁今若大小長曜曰北人以為甘棠敬則從世祖嘗宴于華林羣臣各出妓敬則脫章服袒髀以片絹糾髻奮臂拍張叫動左右上不悅曰豈聞三公為此對曰臣拍張故得三公而拍張當時以為名譽明帝即位為大司馬臺使拜授日而雨大洪注敬則不悅及使蕭坦之將齋仗五百人行武進陵敬則憂惶上知使敬則世子仲雄入東安慰其父雖然愈益猜忌高宗疑焉後竟起兵反過浙江帝諸子在京者盡殺之遣將軍左興盛等討之敬則遇興盛遙告敬則曰公兒死已盡公持許底作官軍不敵欲退馬軍主胡松領馬軍突之敬則大敗興盛軍客袁文曠斬之傳首京師時年七十初敬則東起高祖疾篤朝廷倉卒東昏侯在東宫議欲叛使人上屋見征虜亭失火謂敬則至急裝欲走或有告敬則者敬則曰檀公三十六䇿走是上䇿汝父子唯應急走耳蓋諺云檀道濟避虜也陳顯達南彭城人宋孝武世為張永前軍幢主景和中以勞驅使纍遷濮陽太守桂陽王反大敗賊丁文豪等于杜姹宅矢中左眼拔而鏃不出地黃村潘嫗者善禁先以釘釘柱嫗禹步作氣釘即出乃禁顯達目中鏃出以功封彭城侯再遷平越中郎將廣州刺史太祖即位為安西將軍益州刺史山夷震服永明八年徵為征南大將軍江州刺史給鼓吹顯達性謙厚多智計有子十人誡之曰我本不及此汝勿以富貴陵人高宗之世進位太尉鄱陽公常不自安每自卑下及北討督平北將軍崔惠景等圍馬圈城四十日入據城而魏孝文帝率十萬騎自至齊軍敗顯達走軍主崔恭祖胡松以烏布幔盛顯達僅獲免以為江州刺史鎮湓城東昏立無道殺害賢良顯達懼禍十一月遂舉兵朝廷遣胡松等拒於采石大破之松軍敗京邑震駭遂於新林多置屯火於岸十二月潛軍夜渡取石頭入宫城與官軍戰於西州顯達敗走西州烏榜村騎官趙潭注矟刺落馬斬於籬門側血灑湔籬似淳于伯之被刑也時年七十三諸子皆伏誅劉懷珍字道玉平原人漢膠東王後伯父奉伯為宋陳郡太守懷珍幼隨奉伯在夀陽時刺史出獵百姓觀之懷珍獨避不視伯父異之曰此兒方興吾宗也本州辟主簿自宋文以來數有軍功遷至將軍封中宿侯太祖輔政以布衣之舊徵為相國左司馬建元初改封宣城侯而尋轉光祿大夫子靈哲字文明纍遷至前將軍兖州刺史母病靈哲躬祈禱夢見黃衣公曰可取南山竹笋食之靈哲覺如其言乃立愈李安民蘭陵承人也父欽之殿中將軍隨父沒虜率部曲自拔南歸纍遷冠軍司馬廣陵太守初討晉安王子勛事平明帝大會新亭勞諸軍主摴蒱官賭而安民五擲皆盧帝大驚帝自謂安民曰卿面方如田封侯相也及太祖即位為中領軍封康樂侯家國密事太祖唯與安民論議每謂曰署事有卿名我便不復細覽也世祖即位遷尚書僕射以疾辭退為安東將軍吳興太守吳興有項羽神護郡廳事太守至必先殺軛下牛祭安民奉佛不與牛祭而設八關齋俄而牛死埋於廟側今呼為李公牛塜也王元載字彥休下邳人也建元二年為梁秦二州刺史兄弟同時為方伯封河陽侯永明四年卒崔祖思字敬元清河東武城人也魏中尉琰七世孫祖諲宋冀州刺史父僧護州秀才祖思少有志氣好讀書初辟州主簿與刺史劉懷珍於堯廟祀神廟有蘇侯像與堯偶坐懷珍曰唐堯聖人而與雜神同列去之何如祖思曰使君若清蕩此坐則是堯廟重去四凶之伍也遂相與除雜神太祖在淮隂祖思聞風自從之及宋初議封太祖為梁公祖思啓太祖曰讖云金刀利刃齊刈之今冝稱齊實應天命從之太祖即位遷征虜將軍青冀二州刺史因啓陳政事上優詔報答尋遷寧闕宋孝建中為後軍參軍事太祖纍遷寧國將軍東海太守榮祖善彈登西樓見海鵠羣翔謂左右當生取之于是彈其兩翅毛脫盡墜地無傷飬毛生後飛去其妙如此佐命勳封將樂縣子永明二年遷冠軍兖州刺史九年卒吕安國廣陵人也宋大明末以將領見任隱重有幹局副劉勔破殷琰于夀陽以功第一封彭澤男纍以軍功遷金紫光祿大夫給事中永明九年卒周山圗字季寂義興義鄉人也貧微于書題甚拙不事産業有器幹以軍功纍遷左中郎將衆稱其勇呼為武原將以佐太祖輔政出征有功封晉興縣男世祖即位遷竟陵王鎮北司馬及疾上手敕問疾尋卒周盤龍北蘭陵人也盤龍膽氣過人尤便弓馬隨軍討擊陷陳先登纍遷龍驤將軍封晉安子建元二年助垣崇祖拒魏大破之上聞大喜送金叉二十枚與盤龍愛妾杜氏手敕曰餉周公阿杜轉太子左率敕令助成買與虜拒戰於淮隂甬城父子二人衝突出入縈擾數萬衆遷平北將軍兖州刺史後為光祿大夫世祖戲之曰卿著貂蟬何如兜鍪對曰此貂蟬從兜鍪中出病卒子奉叔勇力絶人少隨父征討得直閣將軍善騎馬鬱林從其學騎後遷冠軍將軍青州刺史後為高宗所殺王廣之字林之沛郡相人也少好弓馬有勇力初為馬隊主纍遷左衛將軍世祖見其子珍國異之曰珍國大堪事卿可謂老蚌卒于江州刺史進應城公薛淵河東汾隂人也宋徐州刺史安都從子本名道淵避太祖偏諱改焉安都降虜而親族皆入北太祖鎮淮隂淵來奔委身事太祖隆昌元年封司州刺史卒戴僧靜會稽永興人也少有膽力便弓馬初祖飾謀亂伏法家口徙青州僧靜自歸太祖為北徐州刺史徙高平太守卒桓康北蘭陵承人也勇而驍果宋末隨太祖及世祖起義為郡所縶衆皆散而康裝擔一頭貯穆后一頭貯文惠太子及竟陵王子良自負置山中與門客蕭欣祖四十餘人相結破郡獄出世祖郡兵追急康死戰破之隨世祖起義摧堅陷陳膂力絶人所經村邑恣其行暴江南人畏之以其名怖小兒畫其形而辟瘧無不立愈建元元年封吳平縣伯後軍將軍明年大破魏虜為持節都督青州刺史卒焦度字文續南安氐人也祖文圭避難奔喪居仇池元嘉中僑立天水郡洛陽縣乃屬焉度少有器幹便弓馬孝武初青州刺史顔師伯出鎮滑臺差度領幢主送之後破虜有功拔為輔國府參軍孝武見而謂師伯曰真健物也補晉安王子勛夾轂隊主子勛起兵以度為龍驤將軍事敗逃于宫亭湖中為賊江州刺史王景文誘降之沈攸之事起拒攸之于郢城登樓罵辱攸之攸之攻不能下至今呼此樓為焦度樓事寧後以功為直閣將軍封東昌縣子庾杲之字景行新野人祖深之雍州刺史父粲司功參軍杲之幼有孝行起家奉朝請纍至王儉衛軍府長史蕭緬與儉書曰盛府元僚實難其選景行泛緑水依芙蓉何其麗也世呼儉府為芙蓉池故緬書美之也轉黃門侍郎杲之風範和潤善音吐世祖令對虜使歎其風姿之美王儉在坐曰杲之為蟬冕所照更生光彩遷左衛率上表退蟬冕及章上不許杲之從孫敻家冨于財狀貌豐美頥頰開張人皆以為有方伯之任無凍餒之憂後江陵亂竟餓死又有都督禇蘿面有毛從理入口竟不乏衣食而終高帝十九男昭皇后生武帝及豫章文獻王嶷謝貴嬪生臨川獻王映長沙威王晃羅太妃生武陵昭王曄任太妃生安成恭王皓陸修儀生鄱陽王鏘晉熙王銶袁修容生桂陽王鑠何太妃生始興簡王鑑冝都王鏗歐貴人生衡陽王鈞張淑妃生江夏王鋒河東王鉉李美人生南平王鋭第九第十三第十四第十七皇子早亡衡陽王鈞出繼元王後建康實録卷十五
