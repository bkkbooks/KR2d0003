body:
  text: 建康實録卷十九唐許嵩撰陳高祖武皇帝高祖姓陳氏諱霸先字興國吳興長城下若里人漢太丘長實之後本居潁川實𤣥孫晉太尉凖凖生匡匡生達永嘉初為丞相掾隨晉南遷拜太子洗馬出為長城令悅其山水遂家焉常謂所親曰此地山川秀麗當有王者興焉二百年後我子孫必鍾斯運達生康康復為丞相掾晉成帝咸和中土斷故為長城人高祖即康之九世孫也原案陳書達生康康生盱眙太守英英生尚書郎公弼公弼生步兵校尉鼎鼎生散騎侍郎高高生懷安令詠詠生安成太守猛猛生太常卿道巨道巨生皇考文纘父文纘不仕文纘以梁天監二年嵗次癸未生高祖少倜儻有大志意氣雄傑好史籍讀書長於謀策明緯候孤虛遁甲又善武藝不事産業家貧每以捕魚為事身長七尺五寸日角龍顔垂手過膝髭生連骨普通中嘗遊義興館於許氏夜夢天開數丈有朱衣四人捧日而至納於高祖口中驚覺腹內猶熱心獨喜之初仕鄉為里正後逃於義興吳興太守蕭映過從之建業映遂用為夾寨吏尋轉為油庫長既而映鎮廣州奏高祖為中直兵參軍從至廣州映令高祖招集士馬先是武林侯蕭咨為交州刺史失德土人李賁連結郡縣反而高新二州刺史孫冏盧子雄等不進討賊皆伏誅子雄弟子略與孫冏子侄及杜天合杜僧明等以兵攻廣州高祖率兵大破賊軍虜僧明等是嵗梁大同十年梁高祖聞深異之遙授直閣將軍封新安縣子遣使圖其形貌入觀之既而蕭映卒高祖送映喪至大庾嶺梁帝詔高祖為交州司馬領武平太守與刺史楊膘南討李賁定交趾初楊膘委高祖經略衆軍發自畨禺蕭勃為定州刺史於江西相㑹勃知軍士憚其逺役隂購誘之因詭說留膘膘問計於高祖高祖對曰交趾叛渙罪由宗室遂使僣亂數州彌歷年稔定州復欲昧利目前不顧大計節下奉辭伐罪故當死生以之豈可畏憚宗室抵拒邦憲今若奪沮其衆何必交州討賊問罪之師即回有所指矣於是勒兵鼓行而進梁大同十六年六月軍至交州賁衆數萬於蘇麻江口城栅以拒官軍膘推高祖為前鋒所向摧陷賁走曲徹湖於屈獠洞界立寨大造船艦充塞湖中衆憚之頓於湖口不敢進高祖謂諸將曰我師已老將復疲勞嵗月相持恐非良計且孤軍無援入人腹心若一戰不捷豈得生全今藉其屢奔人情未固夷獠烏合易為摧殄只當共出百死决力取之無故停留王事去矣諸將皆默莫有應者是夜江水暴起七丈注湖中奔流迅激高祖勒所部兵衆乘流先進衆軍鼓噪隨之賊衆大潰賁竄入屈獠洞中洞中人斬賁傳首京師李賁兄天寶遁于九真因逼冦愛州梁太清元年高祖討天寶平之除振逺將軍西江督護高要太守梁太清二年侯景作亂廣州刺史元景仲謀同侯景高祖知之擊破之殺景仲而迎定州刺史蕭勃為廣州刺史及京師不守高祖遣杜僧明胡潁等將兵二千屯於嶺上遂厚結始興豪傑同謀義舉以救京師侯安都張偲等率衆來附將東下蕭勃聞之使鍾休悅留高祖不許度嶺言侯景驍雄天下無敵援軍前後無敢當鋒嶺北王侯又已自相屠戮君之疏外豈可暗投未若且住始興以張形勢高祖泣謂休悅曰君辱臣死誰敢愛命吾行計决矣勃既不能止因令蔡路養等以兵遏高祖軍大寶元年正月庚午高祖於始興大破蔡養談逺軍於大庾嶺高祖進鎮南康南康今之䖍州乃遣使間道往江陵禀承節度於梁湘東王蕭繹是為元帝帝承制授高祖持節明威將軍交州刺史改封南野縣伯高祖乃修南康古城居之人常逺望見城上有紫雲氣埀覆左右深結事之尋遷南江州刺史改封長城侯大寶二年六月高祖發自南康下頓西昌案陳書南康贑石水舊有二十四灘灘多巨石行旅為難自高祖之發水暴漲高數丈三百里間巨石皆沒時有龍見於水濵約高五丈五彩鮮明軍人觀者大歎慶焉時湘東王遣征東將軍王僧辨督衆討侯景師次湓城高祖率杜僧明侯安都等戈甲三萬將往會焉高祖聞西軍乏糧乃分三十萬斛米以資西軍案陳書高祖自下南江有軍糧五十萬石聞西軍乏糧乃分三十萬資之是年侯景廢簡文帝嗣而闕月五日龍見於御路自太社至於象魏太平二年春正月加高祖班劍三十人置丞相别榻以近扆坐追贈高祖考侍中加金章紫綬封義興郡公諡曰恭又追贈高祖兄道談為散騎常侍平北將軍封長城縣公諡曰昭烈弟休光侍中使持節驃騎將軍南徐州刺史諡曰忠壯各邑二千户遣侍中僕射陸繕策拜長城夫人章氏為義興國夫人追贈章夫人祖侍中追封高祖母許氏為嘉興縣君諡曰敬皇妣張氏義興國太夫人諡曰宣二月廣州刺史蕭勃反㳂江而下江州刺史余孝頃起兵應之高祖命侯安都討平之秋八月甲午進高祖位太傅加黃鉞劍履上殿入朝不趨前後羽葆鼓吹皂輪車九月進加相國封十郡為陳公備九錫之禮十月戊辰進爵為王加二十郡冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備副車置旄頭雲罕樂舞八佾設鐘簴宫縣陳臺百官一依舊式辛未梁敬帝禪位於陳王策命曰惟王乃聖乃神欽明文思二儀並運四節合敘天錫勇智人挺雄傑爰初投袂日夜勤王王公卿士莫不攸屬敬從人神之願授帝位於爾躬四海困窮天祿永終王其允執厥中乃命太保王通太尉長史王瑒奉皇帝璽紱受終之禮一依唐虞故事是日梁敬帝方智遜位於别宫高祖三讓羣臣固請以梁太平二年冬十月乙亥設壇於南郊即皇帝位柴燎告天禮畢輿駕旋建康宫臨太極前殿大赦改梁太平二年為永定元年丁丑冬十月乙亥先是氛霧雨雪晝夜晦暝至此日景氣清晏詔百官文武進位有差先繫囚徒一切釋放奉梁帝為江隂王居晉陵行梁之正朔車騎服色一依前凖宫館資待務盡優假又降皇太后為江隂國太妃丙子輿駕幸鍾山祀蔣帝廟遣使宣勞四方庚辰詔出佛牙於杜母宅集四部設無遮大齊帝出大司馬門致禮辛巳追尊皇考為景皇帝廟號太祖皇妃董氏為景太后追諡前夫人錢氏為昭皇后追諡世子克為孝懷太子立夫人章氏為皇后癸未尊景帝陵為瑞陵昭后陵曰嘉陵依梁初園邑故事追封兄道談為始興郡王諡曰昭烈追封母弟休光為南康郡王諡曰忠壯乙酉立刪定郎刊定律令十一月封兄子蒨為臨川王遙襲封昭烈王子頊為始興王祀昭烈後遙襲忠壯王子曇朗嗣南康王後永定二年春三月王琳立梁永嘉王蕭莊於郢州以奉梁後令兵向建康使招北齊為援齊乃進兵助之四月甲子駕親祀太廟戊辰重雲殿東鴟吻有紫煙出屬天五月辛酉帝幸大莊嚴寺捨身壬戌王公已下奉表請還宫六月詔司空侯瑱徐度等討王琳七月新作太極殿缺一柱忽有樟木大十八圍長四丈五尺自流泊陶家後渚監軍鄒子度以聞詔起部尚書蔡儔兼將作大匠取木以構之案梁書侯景作亂王僧辨下平之縱軍士入宫探取火燒宫及太極殿兼西堂省寺陳有天下至此復之耳冬十二月甲子又幸莊嚴寺設無礙大會捨乘輿法駕羣臣備禮奉迎還宫三年春正月丁酉大雪太極殿前有龍跡見甲午廣州有仙人見於羅浮山小石樓長三丈通身潔白衣服麗楚夏四月豫章太守熊曇朗反殺江州刺史周文育育字景德義興陽羡人五月朔日有蝕之有司奏舊儀御前殿合服朱紗袍衮冕之服自今永可為凖丙寅扶南使貢方物乙亥周文育喪至帝素服哭於朝堂哀慟甚因發疾六月丁酉帝不和遣太宰尚書左僕射王通以疾告太廟太宰中書令謝哲告太社及南北郊癸丑夜熒惑在心詔賜尚書令沈衆死衆字仲監吳興武康人祖約父珽衆好學頗有文詞起家南平王參軍高祖即位遷侍中性鄙於財而不潔於已每於朝會中衣裳破裂或躬提冠履又薄於奉養在朝常服布袍芒屩以麻繩為帶及囊麥飯食之朝士咸共笑其所為性急於忿恨非毁朝廷高祖大怒因其休假遂賜死帝漸疾甚詔迎臨川王蒨入纂大業丙午高祖崩於琁璣殿秋七月甲寅大行皇帝遷殯於太極西階丙申葬於萬安陵在今縣東南三十里彭城驛側周六十步高二丈帝年五十五即位在位三年年五十七諡武帝廟號高祖帝神武莫儔英謀獨斷性貴儉素志賤浮華常膳進不過數品私饗曲宴皆用瓦器蚌盤肴庶珍羞才足而已自總軍要及即位玉帛子女悉頒將士歌鐘伎樂不列於前末年躬儉彌篤世祖文皇帝帝諱蒨字子華始興昭烈王長子案陳書昭烈王是高祖第二兄也少沉敏有識量美容儀精經史高祖甚愛之常稱此兒吾家英秀也梁太清初蒨曽夢兩日鬪一大一小大者光滅墮地蒨取而懷之侯景之亂避地於臨安縣郭文舉舊宅及高祖與王僧辨東下帝為侯景所收以幽禁之數欲加害會景敗乃免原案陳書侯景初聞高祖舉義兵景怒使收世祖及衡陽獻王囚之初世祖見收乃密懷一小刀冀因便而害景及至以付郎中王翻幽守故事不獲行高祖既圍石頭欲加害者數矣會景敗乃免起家為吳興太守高祖討王僧辨先密令世祖防備僧辨腹心人震州刺史韋載杜龕等據吳興遣使掩襲蒨士卒皆惶恐失色而帝獨言笑處分益明及高祖遣周文育討杜龕蒨已先攻下之拜為會稽太守高祖即位進封臨川王拜侍中安東將軍永定三年六月丙午高祖崩遺詔徴帝入纂皇儲甲寅至自南皖辭讓再三羣臣內外固請其日入居中書省皇太后令曰昊天不弔上𤣥降禍大行皇帝奄棄萬國諸孤藐爾反國無期須立長君以寧㝢縣侍中臨川王四海宅心可膺寶籙是日具禮儀即位於太極前殿大赦公卿百官進位一等尊皇后為太皇后詔封子伯茂為始興郡王繼昭烈之後賜為父後者爵一級伯茂字鬱之初昭烈王仕梁為東宫直長後值侯景亂中流矢卒高祖即位追贈驃騎大將軍太傅揚州牧始興郡王生帝及安成王頊梁江陵陷安成王遷於關右高祖襲封安成王為始興祀及帝以本宗之饗詔改封嗣王頊為安成王封伯茂為始興王以奉昭烈祀初東征北軍於丹徒盜發晉郤曇墓大獲晉王羲之書及諸名賢遺跡事覺其書悉入於祕府帝以伯茂好書賜之由是大工草𨽻秋七月尚書八座奏請立皇后及諸王太子九月辛酉立皇子伯宗為皇太子立妃沈氏為皇后十一月乙卯王琳進冦大雷前鋒逼梁山詔太尉侯瑱禦之天嘉元年正月大赦改元賜鰥寡孤獨孝悌力田粟各五斛甲寅發使宣勞四方二月辛卯老人星見丙申侯瑱大破王琳於梁山敗齊軍於博望擒王琳下將劉伯球王琳及梁王蕭莊走齊之鍾陵三月丁巳江州刺史周迪追斬賊帥熊曇朗於新塗曇朗豫章南昌人世為郡著姓曇朗跅跎不羈有膂力容貌甚偉侯景之亂因聚少年據豐城縣多為劫盜梁元帝平侯景拜巴西太守江陵陷後遂劫掠鄰縣縳賣人民山谷之中最為巨患高祖即位以曇朗南川豪帥拜飊猛將軍桂州刺史與周文育討余孝勱既而反害文育盡收其衆以應王琳乃修新塗縣城居之及王琳東下南川兵為曇朗所梗江州刺史周迪與高州刺史黃法氍等會兵攻曇朗曇朗敗走入山村村民斬之傳首京師懸於朱雀觀於是盡收其宗黨無少長皆棄市是月驃騎將軍湘州牧衡陽王昌薨於魯山江中夏四月喪至帝親臨詔諡獻王立第七子伯信為衡陽王奉獻王祀六月壬辰葬梁元帝於江寧舊塋車旗禮章並依梁典帝臨於太極前殿百寮陪哭秋八月戊子詔非兵器及國容所須金銀珠玉衣服雜玩悉皆禁斷九月乙卯周將獨孤盛與賀若敦等水陸引軍趨巴湘兩道俱進太尉瑱自尋陽往破盛等於楊葉洲是嵗以侍中國子祭酒周宏正使長安迎帝弟安成王頊周人并留之天嘉二年正月高麗倭國及百濟並遣使貢方物六月齊人通好冬十月乙卯東夷遣使朝貢乙未領大著作虞荔卒荔字山披會稽餘姚人祖權父儉荔幼而聰敏年九嵗太常陸倕問五經凡十條荔隨問應答無遺失及梁末將母入臺城尋遇城陷情禮不申由是蔬食布衣不聽音樂及陳受禪世祖嗣位除太子中庶子尋領大著作荔第二弟寄寓於閩中為陳寶應留連不得還荔每言之流涕帝哀之曰我有弟在逺此情甚切他人豈知乃敕寶應求寄寶應終不遣荔亦感疾年五十九卒柩還鄉里世祖親送人以為貴子世基世南並知名寄字次安年數嵗有人嘲之曰郎君姓虞必定無智寄應聲曰文字不辨豈得非愚客大慙陳寶應破後乃歸朝拜大中大夫是嵗南安將軍周迪不受徴與留異結構謀逆天嘉三年正月庚戌設帷於南郊告胡公以配天是月後梁蕭察薨子巋代立二月安成王頊自後周還帝見之大喜以功進周𢎞正位金紫光祿大夫以安成王頊為司空閏二月甲子改鑄五銖錢三月周迪留異等舉兵反司空侯安都破之於桃枝嶺四年三月甲申留異等走投閩州刺史陳寶應寶應納之五月己巳太白晝見是日侯安都自盡安都字成師始興曲江人善書能鼓琴好騎射自始興內史主簿招集兵馬得三千人討侯景與高祖攻破蔡路養下平侯景有功梁元帝封為猛烈將軍隨高祖鎮京口定計入誅王僧辨自石城北捨舟登岸被甲帶長刀踰城北女牆而入僧辨卧室以功授散騎常侍南徐州刺史既而秦郡太守徐嗣徽等引北齊入冦安都領水軍於中路斷賊糧運并收其家口騾馬鷹犬及嗣徽所彈琵琶嗣徽大懼請和時紹泰元年也明年嗣徽又入丹陽至姑孰高祖使安都拒之大戰破於高橋斬徽生擒齊儀同乞伏無芳追敗於蔣山龍尾及幕府山纍以戰功封曲江公給鼓吹一部世祖嗣位討留異於桃枝嶺中流矢血流至踝容色不變收其妻子人馬甲仗振旅而歸自以勳庸漸高驕恣數招文武之客隂鏗褚才張正見等每有表啓事所未盡乃開封更自書之云又啓某事及侍宴酒酣或箕距傾倚自白帝曰何如作臨川王日帝佯不應乃再三言之帝曰此雖天命亦明公之力也或坐御牀賓客稱夀後重雲殿災安都帶甲而入帝惡之出為江吳二州刺史征南大將軍自京口還都於石頭世祖引安都宴於嘉福殿又集會將帥於朝堂坐上收安都囚之西省出中書舍人蔡景歷表以示於朝數安都之罪詔速刑書是日安都上表陳謝自殺六月丁未夜白虹兩道出北斗間秋七月乙未皇太子納妃朱氏在位文武賜帛有差九月辛丑周迪復冦臨川詔護軍將軍章昭達討平之十二月昭達軍次建安討陳寶應丙申大赦殊死已下五年四月庚子太白嵗星合在奎中十一月章昭達擒陳寶應留異等異東陽長山人少豪雄多聚惡少凌侮貧賤守宰皆患之起家為梁朝蟹浦戍主紹泰二年自安固令有應接功領東陽太守封永興縣侯纍遷散騎常侍信威將軍陳文帝長女安豐公主配異第三子貞臣徴異為南州刺史異不進尋改東陽太守異遣長史王漸入朝還言朝廷虛弱異信之外示臣節內懷兩端遣使自鄱陽信安嶺潜通於王琳分兵戍下淮及建德以備江路帝使侯安都討之異本謂官軍自錢唐江而上安都乃密由會稽諸暨步道襲之異聞兵至走桃枝嶺安都進破之異與第二子忠臣及周迪等奔陳寶應寶應晉安候官人世為閩土著姓多變詐梁朝晉安數為反叛屢殺守將陳寶應因官軍鄉導討平之由是一郡兵權皆自己出帝嗣位録其功命入宗室并遣使條其子女無大小並加封爵及安都討留異寶應乃遣兵助異帝大怒命章昭達督衆軍由建安南道度嶺又命余孝頃督會稽東陽臨海永嘉等兵討之詔宗正絶其屬籍寶應遂據建安湖際逆拒王師水陸為柵昭達至深溝高壘不與戰達命軍士伐竹木為筏俄而水盛遂乘流放筏突其水柵而使步騎薄之寶應衆潰追擒於草中并留異等同逆者俱送建康市斬之是日詔討陳寶應將士亡者並與棺木遞還本土六年正月乙酉皇太子加元服王公已下賜各有差六月周人來聘七月癸未大風自西南至才廣百餘步激壞靈臺候館甲申儀賢堂前架無故自壞原案儀賢堂吳時造號為中堂在宣陽門內路西七間亦名聽訟堂每年策孝廉秀才考學士學業嵗莫習元會儀於此前在鴻臚寺西南衛尉府南宗正寺太僕寺大弩署脂澤庫更南即太史署太府寺東南角逼路宣陽門內過東即客省右尚方並在今縣城東一里二百步𤣥風觀後隔路儀賢堂更近北也丙戌臨川太守駱牙斬周迪於山穴傳首建康梟於朱雀門迪臨川人少居山谷有膂力能挽彊弩以弋獵為事梁元帝平侯景以功遷振逺將軍高祖秉政加江州刺史及即位王琳東下至湓城與新吳洞主余孝頃相合衆二萬來趨工塘連八城以逼周迪迪使周敷率兵頓臨川故郡迪自斷江口與樊猛等戰大破之屠其八城生擒李欽樊猛余孝頃遞送建康市收其器械軍實山積虜其人馬並自納之永定二年以功進迪平南將軍開府儀同三司給鼓吹一部王琳既平帝徴迪出鎮湓城令子入朝迪乃顧望生疑不至及帝録破熊曇朗功加周敷黃法氍等官賞迪甚不平遂隂與留異相結及王師討異迪疑恐不安乃令弟方與率衆襲周敷於豫章不利而退三年帝使章昭達討迪迪衆潰妻子悉擒乃脫身踰嶺赴晉安依陳寶應寶應使兵助之明年秋復越東興嶺世祖使程靈洗等破之迪竄山穴中日月既久遣人潜出臨川郡買鮭魚使人腳痛舍於邑子邑子告太守駱牙牙執之令取迪自效因使勇士隨入山中誘迪出獵伏兵斬於道傍傳首京師七年春二月丙子大赦改元為天康元年三月己卯進司空安成王頊為尚書令夏四月癸酉帝崩於有覺殿丙戌葬永寧陵陵在今縣東北四十里陵山之陽周四十五步高十丈九尺帝年四十即位在位八年羣臣上諡曰文皇帝廟號世祖帝起自布衣知百姓艱難疾苦國家資用務在儉約常所調斂事不獲已者必咨嗟改色妙識真僞下不容姧一夜內刺閨取外事分判者前後相續每雞人伺漏傳籖於殿中者令投之於階石上使鏘然有聲云吾雖眠睡亦令驚覺其終始自彊梗槩如此廢皇帝帝諱伯宗字奉業文帝嫡子梁承聖三年五月庚寅生永定二年春二月戊辰拜臨川王世子三年文帝嗣位八月立為皇太子自梁侯景亂離東宫焚火太子居永福省天康元年四月癸酉文帝崩是日即位於太極前殿大赦內外復職逺方悉停赴喪五月上尊皇太后為太皇太后皇后曰皇太后以司空安成王頊為司徒録尚書都督中外諸軍事始興公伯茂為征東將軍袁樞為尚書左僕射沈欽為右僕射七月丁酉立妃王氏為皇后后諱少姬侍中金紫光祿大夫固之女天嘉四年聘為太子妃固字休堅琅邪臨沂人祖汾父林固少涉史籍以梁帝外甥封英口亭侯舉秀才起家為尚書郎太子洗馬高祖即位纍遷至侍中禮遇甚厚性信佛法嘗禪坐誦經又妙於𤣥言使聘魏國宴饗請救一羊羊於固前跪足而拜又宴昆明池魏朝以固南人嗜魚大設罔罟於水中固以佛法呪之一無所獲冬十月享於太廟十一月乙亥周人來弔光大元年春正月辛亥改號辛卯祠南郊大赦二月南豫州刺史余孝頃反伏誅五月湘州刺史華皎反引後周為援六月詔征南大將軍淳于量討平之七月戊子立皇子至澤為太子九月周將元定入郢州與華皎水陸俱進淳于量吳明徹等逆擊大破之皎單舸奔江陵擒元定送建康二年春正月以侍中安成王頊為太傅領司徒揚州牧加殊禮劍履上殿入朝不趨贊拜不名庚子以淳于量為中軍大將軍四月辛巳太白晝見五月丙辰太𫝊安成王獻玉璽一紐六月丁卯彗星見九月新羅林邑狼牙修國並使朝貢時安成王與僕射到仲舉中書舍人劉師知等恆在禁中參决衆務而安成王為揚州刺史左右甲仗三百人入居尚書省十一月劉師知到仲舉等見安成秉政惡其權重隂說於帝矯太后令下詔安成王曰今四方無事可遷東府經治州務安成將出毛喜馳入止之曰王今出外便受制於他人譬如曹爽願作富家翁不可得也此必師知等矯太后之令請覆之安成大懼乃稱疾召師知留與語遂遣毛喜入言白於太后太后曰今伯宗年幼政事並委二郎此非我意喜出以報安成安成囚師知自入見后及帝極陳師知之過乃自草敕收師知付廷尉獄賜死自是政事大小皆决於安成王王以上流多反叛乃諷慈訓太后甲寅太后令廢帝為臨海王送之藩邸詔曰太傅安成王頊固天生德齊聖廣深二后鍾心三靈佇眷自先朝不豫任總邦家威惠相宣刑禮兼設且地彰靈璽天表長彗除舊布新禎祥咸顯文皇知子之鑒事甚帝堯傳弟之懷允符太伯今可崇立賢君內外宜依舊典以輿駕奉迎是日廢帝出居别第大建二年四月乙卯薨年十九帝仁弱無人君之量世祖每虞不堪繼業既居冡嫡廢立事重是以依違積年及將大漸召高宗謂曰吾欲遵太伯之事高宗初未達㫖良久方悟乃拜伏流涕固辭其後宣太后依先帝之㫖乃此廢帝焉建康實録卷十九
