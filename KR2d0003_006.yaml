body:
  text: 建康實録卷六唐許嵩撰晉肅宗明皇帝明帝諱紹字道畿中宗長子母豫章君帝幼而聰哲年數嵗嘗置中宗膝上㑹長安使來中宗因問曰汝謂日與長安孰遠對曰日遠中宗問其故答曰不聞人從日邉來居然可知爾中宗異之明日㑹羣臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益竒之大興元年春三月改晉王太子立為皇太子性至孝有文武才略當代名臣王導庾亮溫嶠等咸親待之嘗論聖人真假之意導等不能屈又習武藝善撫將士于時東朝濟濟遠近屬心焉及王敦執政知帝神武明斷朝野共欽欲謀以不孝廢之㑹百官問皇太子何德可稱聲色俱厲必使有言中庶子溫嶠對曰鈎深致遠蓋非淺局所量以禮觀之可稱為孝矣衆皆以為然敦謀遂止永昌元年閏十一月己丑中宗崩庚寅即皇帝位大赦天下尊所生荀氏為建安郡君二年春正月赤烏見癸巳黃霧四塞二月葬元皇帝於建平陵帝徒跣至陵所三月戊寅朔大赦改元太寧元年臨軒懸而不樂丙戌隕霜殺草饒安東光安陵三縣災燒七千餘家死者萬五千人是月王敦獻皇帝信璽一紐敦將謀篡奪諷朝廷徴己帝手詔徴之敦下屯於湖陰帝乃轉司空導為司徒敦自領揚州牧五月蜀李驤冦寧州刺史王遜遣將軍姚崇拒戰于堂狼大破之崇以道遠不敢窮追渡瀘水遜大怒髮上衝冠冠盡裂中夜而卒遜字邵伯魏興人纍遷魏興太守在郡私牛馬生駒犢者秩滿悉以付官云是郡中所産中宗即位拜寧州刺史封褒中公是月王敦害從事中郎將周嵩及尚書周札札字宣季義興人征西將軍處之少子以豪右自處纍遷右將軍都督石頭水陸軍事王敦舉兵下攻石頭札不守開門納敦敦用為尚書兄弟皆居列位吳士多依附王敦深忌之及周莚母喪送葬者千數敦益憚焉錢鳳說敦曰夫有國者患於彊逼自古釁難恆必由之今江東之豪莫過周沈公萬世之後二族必不靜矣周氏最彊而多俊才宜先為之所則後嗣可安國家可保敦納之因有道士李脫妖術惑衆自言八百嵗故號李八百時人多信事之弟子李弘養徒灊山作逆敦使廬江太守李恆告札及宗黨與李脫謀反遂盡掩札兄弟子姪等同殺之嵩字仲智尚書僕射顗之次弟狷狹每以才氣凌物中宗作相引為參軍及晉王即位拜奉朝請纍遷御史中丞時王敦勢盛中宗漸䟱王導嵩因上書言導忠諒竭誠義以奉主雖有不軌之謀父子尚無反顧之義况兄弟乎此固舊德不可棄垂成之業也中宗感悟與導親如故及敦破石頭擅朝柄而害顗使人弔嵩嵩曰亡兄天下人為天下人所殺復何弔焉敦甚銜恨懼失人情故未加害用為從事中郎嵩以兄遇橫禍恆憤憤敦知之使妖人李脫誣嵩反害之嵩精於事佛臨刑猶誦經初顗母李氏冬至舉觴賜三子曰吾本謂渡江託足無所不期爾等並貴列吾目前復何憂也嵩起曰恐不如尊㫖伯仁志大而才短名重而識聞好乘人之弊此非自全之道嵩性抗直亦不容于世惟阿奴碌碌在母目下阿奴謨小字也後果夀終位至侍中封西平侯卒贈金紫光祿大夫諡曰貞也六月壬子立皇后庾氏秋七月丙子朔震太極殿柱冬十月散騎常侍薛兼卒兼字令長丹陽人祖綜父瑩並仕吳顯位兼少清素與同郡紀瞻廣陵閔鴻㑹稽賀循吳郡顧榮齊名號為五俊初入洛舉孝亷拜北陽相中宗鎮江左用為軍咨祭酒纍遷左長史進爵安陽鄉侯中興建遷尚書領太子少傅自綜至兼三世傅東宫談者美之及帝即位詔以師傅加進崇禮八月石勒將石季龍攻陷青州刺史曹嶷遇害冬十一月以國饑乏調刺史已下米各有差二年春正月丁丑朔帝臨軒懸而不樂庚辰赦五嵗刑以下夏五月王敦在湖陰謀舉逆帝密知之自乘巴滇駿馬微行至於湖陰察敦營壘而出時有軍士疑帝非常人敦時晝卧夢日繞其營驚起曰此必黃鬚鮮卑奴來也案晉書帝母荀氏代州人帝狀類外氏鬚黃故敦謂帝曰黃須鮮卑奴也於是使五騎追之帝巳馳還見逆旅賣飯嫗以七寶鞭與之曰後有騎來以此示也俄而敦追騎至問嫗嫗曰去已遠矣因以鞭示之五騎傳玩稽留遂久又見馬糞冷晉書云帝以水灌糞令冷以為信而止帝僅獲免丁巳敦病亟無子養兄含子應為嗣矯詔拜其子應為武衛將軍以自副而拜含為驃騎大將軍都督揚州江西諸軍事含字處𢎞少頑凶以敦故纍遷顯位日夜與敦計以沈充錢鳳為謀主諸葛瑶鄧嶽周撫李恆謝雍為爪牙戊午敦以左司馬溫嶠為丹陽尹使覘伺朝廷嶠至具言敦逆狀今病篤恐左右促其事請為之備帝召侍中陳晷往問疾使密觀形勢錢鳳以敦病懼不諱因謀發兵向京師丙寅帝乃詔王敦將帥官寮唯討錢鳳一人其餘文武無所問罪其有捨王敦而稱大將軍者凖軍法從事丁卯以司徒王導為鎮南將軍前鋒大都督以溫嶠為中壘將軍與尚書卞壼守石頭以應詹為護軍將軍督朱雀航南諸軍事以建威將軍趙𦙍等武旅三千十道俱進以奮威陶瞻精鋭三萬繼之水陸齊勢帝親御六師以尚書郗鑒庾亮為左右衛將軍都督從駕諸軍事徴平北將軍王邃平西將軍祖約臨淮太守蘇峻等並入衛京師以太宰西陽王羕總統諸軍以虞潭為㑹稽太守使躡沈充别遣充鄉人沈構往吳興諭充許以為司空充謂構曰三司具瞻之重豈吾所任幣厚言甘古人所畏且丈夫共事終始當同寧可中道改易人誰容我構因陳禍福成敗苦勸之充不納率兵臨發謂其妻子曰男兒不竪豹尾終不還也時虞潭舉兵于㑹稽將建牙有野鷹飛集帳屋衆懼潭曰起大義而剛鷙鳥來破賊必矣敦病轉篤不能統衆兄含謂敦曰此家事吾便當之戊辰敦上疏罪狀溫嶠以誅奸臣為名以含為元帥率錢鳳鄧嶽周撫等將發鳳問敦曰事克之日天子云何敦曰尚未南郊何得稱天子但盡卿兵勢唯保護東海王及裴妃而已辛未含至江寧王導使人送書與含廣言禍福勸含還武昌保其門户無黨犬羊以肆逆導雖不武情在寧國明目張膽為六軍首寧忠臣死不無賴生含不答秋七月壬申朔含與錢鳳等水陸五萬至于南岸遊騎逼淮溫嶠乃燒朱雀桁以挫其鋒帝躬率六軍出次南皇堂欲討之知其為物情所畏密與王導謀曰自上人情業業皆仗敦為勢若聞其斃衆必危殆因而擊之可破矣導遂集宗人詐云敦死舉哀衆果大危癸酉夜募壯士與中軍司馬曹渾左衛將軍陳嵩段秀等領甲卒千人渡水掩其未備平明大破含軍於越城臨陳斬前鋒何康鄧嶽等晉書嶽陳郡人也字子遐勇力絶人為王敦參軍時人方之樊噲襄陽城北沔水中有蛟常為人害嶽入水截蛟而出人皆異之敦聞軍敗大怒曰我兄老婢兒耳門户事去矣語參軍吕寶曰吾當自力行因作勢而起起而復困卧遂憤惋而死臨絶召羊鑒及子應曰我亡後應便即位先立朝廷置百官然後營葬事俄而敦死祕不發喪裹尸以席蠟塗其外埋於㕔事中夜與左右縱酒淫樂王含錢鳳乃率餘黨自柵塘西置五城造營案圖經五城狀如却月勢高二丈相去各二十丈在今縣東二十五里陶季直京都記五城邉淮帶湖祖道送歸多集此處唐景雲中縣令陸彥恭於城側造橋渡淮水則今之五城橋也壬辰沈充自吳興率兵萬餘來㑹含等進築壘於陵口乙未賊分軍從竹格渚濟水光祿勳應詹拒之不利含鳳長驅至御街沈充自青溪引軍與含㑹至宣陽門北中郎將劉遐歷陽太守蘇峻等率輕騎從南塘出橫擊之賊軍大潰劉遐乘勝追破沈充於清溪丙申含等燒營遁走蕪湖與子應乘單舟奔江陵荆州刺史王舒使人迎之並沉于江餘黨平晉書王舒子允之總角時嘗隨從伯敦敦與錢鳳謀為逆允之時飲酒帳中卧已醒悉聞其言慮敦疑之便於卧處大吐衣面並汚鳳既出敦果照視見允之卧吐中以為大醉不復疑之允之求還京師具以敦謀白父父即與導白帝及敦平後纍位至會稽內史詔御史劉彜往蕪湖發瘞出敦跽而刑之焚其衣冠梟首於大航觀者稱慶數旬尚書令郗鑒啓帝聽牧私葬詔許之敦字處仲司徒導之從父兄也伯祖祥字休徴魏太尉祖覽祥異母弟魏宗正卿生六子裁基㑹正彥琛裁生導基生敦敦少有成人之風尚晉武帝襄城公主拜駙馬都尉除太子舍人時王愷石崇以豪侈相尚愷嘗㑹賓客因樂失調殺美人一坐為之改容敦神色自若時又使美人行酒以客飲不盡輒殺之酒至敦所故不肯持美人悲懼慠然不視導歎曰處仲若當世心懷剛忍非令終也時洗馬潘滔見敦曰處仲蜂目已露但豺聲未振若不噬人必為人所噬後遷中書監永嘉末天下大亂敦悉以公主時侍婢百餘人配給將士金銀寶物散之於衆及東海王越輔政以敦為揚州刺史潘滔進諫越曰今樹仲處於江外使其肆豪彊之心是見賊也越不從元帝召為安東軍咨祭酒進左將軍與從弟導同心翊戴元帝於江東以隆中興時人為之語曰王與馬共天下大興初與陶侃周訪討杜韜敦以元帥進拜鎮東大將軍都督江揚荆湘交廣六州諸軍事江州刺史封漢安侯敦始自選置於是專權之跡漸彰帝安慰之加侍中荆州牧敦既專任閫外有問鼎之志帝畏而怒之遂引劉隗刁協為腹心及隗用事頗間王氏敦怒上疏陳之自爾憤憤不平每酒後輒詠魏武帝樂府歌曰老驥伏櫪志在千里烈士暮年壯心不已以鐡如意打唾壺為節壺邉盡缺乃率衆內向以誅劉隗為名既破王師擁兵石頭多行殺害肆其劫掠稱疾不朝而去及帝即位乃諷朝廷徴已因下鎮姑孰帝使兼太常應詹授敦加黃鉞班劍虎賁二千人奏事不名入朝不趨劍履上殿又使侍中阮孚齎牛酒犒勞敦不見使主簿受詔敦既得志暴慢愈甚諸方貢獻多入己府王含既凶戾黨成不軌初敦始病也夢白犬自天而下噬之又夢刁協乘軺車導從瞋目叱左右執之意惡而死敦眉目䟱朗性簡脫口不言財利武帝嘗召時賢共言伎藝之事敦都不關意自言惟知擊鼓因振袖揚枹音節諧韻神氣自若舉坐歎其雄爽案晉書石崇以奢豪矜物厠所常有十餘婢列侍置香粉有容色如厠者皆易新衣而出客多羞脫衣而敦脫故著新意色無怍婢相謂曰此必能作賊又嘗荒恣於色左右或諌之敦乃開後閣驅諸婢妾數十人並放之丁酉帝自南皇堂還宫大赦天下詔王敦徒從被逼者一切無所問唯其黨不原是月分遣諸將追逐敦所置宫室及將帥逃者丁未義興人周騫殺敦所置太守劉芳于郡祖約逐敦淮南太守任台於壽春戴淵弟良及周光獲錢鳳斬之沈充奔於吳故將吳儒誘充於復壁中殺之並傳首京師九月論平賊功封王導始興公溫嶠建寧公卞壼建興公庾亮永昌公餘賞各有差冬十二月壬子帝謁建平陵行大祥禮是嵗驃騎將軍臨湘侯紀瞻卒瞻字思遠丹陽秣陵人祖亮父陟皆吳三公瞻少以方直知名吳平徙居歷陽察孝亷不行尋舉秀才為司馬東閣祭酒太安中棄官歸家與顧榮共討陳敏徴為尚書郎中宗鎮江外引為軍咨祭酒帝親往瞻宅與同車而歸加揚威將軍拒石勒功除㑹稽內史時有詐為將軍府吏收諸暨令拘之瞻疑其僞破檻出令而訊問使者果伏詐妄及中宗踐位纍拜侍中領尚書令上疏諫諍多所匡益帝甚嘉其忠烈因疾上疏自責因以疾免尋除尚書左僕射屢辭疾篤還第不許上疏言郗鑒節操今孤軍在鄒山恐為冦賊所獲請朝廷徴還及帝即位嘗獨引瞻於室慨然憂天下曰社稷之臣無復十人因屈指曰君便其一也轉領軍將軍當時服其嚴毅雖恆疾病六軍敬憚之加散騎常侍及王敦之逆帝使謂瞻曰卿雖病卧護六軍所益多矣賊平自表還家帝聽之遣使就拜驃騎將軍以家為府尋卒追封華容子封次子一人亭侯瞻性靜默少交逰而好仁義有託後者皆為立園宅少與陸機善及機遇害瞻恤其家成其男女同其所生立宅於烏衣巷屋宇崇麗園池竹木有足賞玩焉子景鑒並早卒是嵗置廪犧署養天地宗廟犧牲今在東府城後三年春二月戊午復三族刑惟不及婦人三月戊辰立皇子衍為皇太子大赦增文武位二等大酺三日賜鰥寡孤獨帛人二匹癸巳徴處士臨海任旭㑹稽虞喜並為博士旭字次龍臨海章安人有清操不染流俗郡守蔣秀請為功曹秀貪穢旭正色諫不納乃謝去及坐事旭狼狽營送之永康初求俊異旭辭疾歸尋天下大亂陳敏之逆惟旭與賀循等守死不從中宗初頻徴不到及王導啓立學校以旭與虞喜俱為隱學同召之夏四月詔大事初定其命維新可令太宰司徒已下詣都坐參議政道諸所因革務盡事中餐直言引亮正想羣賢達吾此懷矣己亥石勒冦河南司豫兖三州並沒將軍李矩衆潰矩字世迪平陽人以滎陽守隨中宗加冠軍將軍領河南平陽太守頻破劉聰以功進安西將軍劉聰死其將靳凖殺聰子粲盡滅劉氏乃上言二帝幽沒賊庭今謹扶持梓宫請矩上聞矩馳表于帝帝使太常韓𦙍迎梓宫未至遇石勒劉曜破靳凖矩舉衆南走墜馬死五月以征南大將軍陶侃為征西大將軍都督荆襄雍梁四州諸軍事荆州刺史以荆州刺史王舒為都督湘中諸軍事湘州刺史以劉顗為平越中郎將廣州刺史六月太子庶子孔衍卒衍字舒元魯國人孔子二十二代孫少好學諸識古事朝儀軌制多取正焉著春秋後語十卷秋七月詔郊祀天地之重事自中興已來唯南郊未曽北郊四時五郊之禮都不復設五嶽四瀆名山大川載在祀典應望秩者悉廢而未舉主者其依舊詳處以時置祭八月詔吳時將相名賢之胄有能纂述家訓忠孝仁義靜已守真不聞於時者州郡中正亟以名聞勿有所遺閠月壬午帝不豫召太宰西陽王羕司徒王導尚書令卞壼車騎將軍郗鑒護軍將軍庾亮丹陽尹溫嶠等並受遺輔太子丁亥遺詔斂以時服務從簡約戊子帝崩于太極東堂九月辛丑葬武平陵在縣城北九里雞籠山陽與元帝同案帝年二十五即位三年年二十七崩諡曰明帝廟號肅宗帝聰明有機斷尤精物理于時兵凶嵗飢死疫過半虛弊既甚事極艱虞王敦震主之威將移神器帝﨑嶇遵養以弱制强潜用獨斷廓清大祲改授荆湘四州以分上流之勢撥亂反正彊本弱枝雖享國日淺而規謀𢎞遠矣建康實録卷六
