body:
  text: 建康實録卷十七唐許嵩撰梁髙祖武皇帝髙祖武皇帝姓蕭諱衍字叔達小字練兒蘭陵中都人漢相國何之後而與齊朝同承淮隂令整整生皇髙祖轄位濟隂太守轄生皇曽祖副子位州治中從事副子生皇祖道賜位南臺治書侍御道賜生皇考順之字文緯齊高帝族弟參預佐命封臨湘縣侯歷官侍中衛尉太子詹事領軍將軍丹陽尹贈鎮北將軍髙祖以宋孝武大明八年甲辰嵗生于秣陵縣同夏里三橋宅初皇妣張氏常夢抱日已而有孕乃生帝帝生有竒異之光兩胯胼骨狀貌殊特頂上隆起日角龍顔重嶽虎顧舌文為八字項有浮光身映日無影為兒童能蹈空而行有文在左手曰武及長博學多通好籌略有文武才幹流輩咸推許焉所居宅常若有雲氣人有過者體輒肅然起家巴陵王參軍遷衛軍王儉府東閣祭酒王儉一見深相器異請為户曹屬謂廬江何憲曰此蕭郎三十內當作侍中出此則貴不可言竟陵王子良開西邸招文學之士髙祖與沈約謝朓王融蕭琛范雲任昉陸倕等並遊焉號為八友王融俊爽識覽過人尤敬異髙祖每謂所親曰宰制天下必在此人纍遷隋王咨議行經牛渚逢風入泊龍瀆有一老人謂曰君龍行虎步貴不可言天下將亂能安之者其在君乎以皇考艱去職齊明帝輔政為寧朔將軍鎮夀春服闋拜黃門侍郎入直殿省與蕭諶等定策封建陽侯建武二年虜冦司州以髙祖為冠軍討之進戰魏軍棄圍走還為太子中庶子領羽林監頃之出鎮石頭四年敗魏軍於雍州進使持節雍梁南北秦四州軍事雍州刺史其月齊明帝崩及東昏侯立而揚州刺史始安王遙光尚書令徐孝嗣右僕射江祐將軍蕭坦之侍中江祀衛尉劉暄更直內省使分日帖敕世所謂六貴髙祖聞之謂從舅張宏策曰政出多門亂其階矣詩云一國三公吾誰適從況此六貴也又有御刀茹法珍梅蟲兒豐勇之等八人號為八要及舍人王暄之等四十餘人皆口擅王命權行國憲今有六貴而何得理嫌隙若成方將誅滅當今避難唯有此地但勤行仁義可坐作西伯然諸弟在都恐不離患須與益州圗之時髙祖長兄懿罷益州還仍行潁州事使宏策詣都陳計於懿云晋惠庸主諸王爭權遂內難九興外冦三作今六貴爭權人握邦憲制主畫敕各欲專威始安將為趙倫形迹已見蹇人上天信無此理乎徐孝嗣才非柱石聽人穿鼻幸圗身計不可後人智者見機無待終日懿聞色變心不之許是嵗髙祖到襄陽潜造器械伐竹木于檀溪密為舟裝之備所住齊常有五色氣回轉狀若蟠龍其上紫雲騰起形如繖蓋望者莫不異焉永元二年冬懿被害信至髙祖密召長史王茂中兵吕僧珍别駕栁慶逺功曹史吉士瞻等謀之以十一月乙巳召僚佐集於㕔事謂曰武王㑹孟津皆曰紂可伐今昏虐暴主誅戮朝賢生民塗炭卿等同心嫉惡共興義舉良在兹日是日建牙于軍門收拾甲士三萬餘人馬一千匹船三百艘髙祖謂張宏策曰夫用兵之道心戰為上兵戰次之乃使行人封空函以疑劉山陽而定荆土引荆州軍下沔南立新野郡以集新附三年二月南康王寶融為相國以髙祖為征東大將軍封公給鼓吹一部戊申髙祖發襄陽留弟偉守城總州府事録事郭􅌂知轉漕移􅊾京師命長史王茂與景陵太守曹景宗為前將軍出漢口輕兵㳂江逼郢城大破刺史張冲軍于石橋追斬于九里亭髙祖築漢口城以守時張冲軍復以長史程茂為主己巳南康王寶融即帝位于江陵改永元三年為中興元年遙廢東昏為涪陵王以髙祖為左僕射假黃鉞西臺置百官司馬七月襲破上流征鎮相繼歸欵九月留長史鄭紹叔守江州前軍次蕪湖南豫州刺史申胄棄姑孰奔歸東昏又使屯破墩髙祖悉大軍據姑孰使曹景宗蕭頴達領馬步進屯江寧東昏征虜將軍李居士率馬步逆戰擊破之進與新亭城主江道林大戰于路生擒之而次新林使王茂進據越城曹景宗據皂莢橋鄧元起據道士墩陳伯之屯籬門李居士收散軍猶據新亭壘請東昏燒南岸邑屋以開戰場自大航以西新亭以北蕩然矣十月石頭軍主朱僧勇率水軍二千歸義東昏又遣征虜將軍王珍國率胡虎牙等列陳于航南大路珍國决死戰大敗投淮死者與航等追兵乘之以濟諸軍相望大潰追至宣陽門東府石頭白下等諸軍並降壬午髙祖鎮石頭命衆軍圍城十一月東昏悉燒門內驅逼營署官府並入城有衆二十萬髙祖築長圍逼之十二月丙寅旦兼衛尉張稷北徐州刺史王珍國斬東昏首送髙祖遣使曉喻南徐兖及四方屯戍悉降乃分遣宗黨鎮守而使吕僧珍勒兵封庫及圗藉嬖庶凶黨王咺之已下四十八人並誅之宣德皇后下令追廢涪陵王為東昏侯依漢海昏故事授髙祖中書監揚徐軍事大司馬録尚書驃騎大將軍揚州刺史封建安公食邑萬户給班劒四十人假黃鉞依晉武陵王司馬遵承制故事己卯髙祖入屯閲武堂下令曰皇家不造遘此昏凶禍延動植虐被人鬼社稷之危幾于纍卵吾身籍皇宗曲荷先顧受任邉疆推轂萬里投袂受戈克殄多難凡厥負釁咸與惟新可大赦天下唯王咺之已下四十八人不在原例又下令曰一切淫刑濫罰賦役並原放今明昏遞運大道公行思治之氓來蘇兹日二年正月齊和帝自江陵遣侍中席闡文兼黃門侍郎樂法才慰勞京邑追贈髙祖皇祖散騎常侍皇考侍中戊申宣德皇后臨軒入內殿大司馬承制百僚致敬如前詔進髙祖劒履上殿入朝不趨贊拜不名加前後羽葆鼓吹置左右長焉從事中郎掾屬各四人尋進相國封十郡為梁王備九錫之禮加璽紱逺逰冠位在王公之上加相國緑綟綬任總百司髙祖固辭二月府寮勸進是日焚東昏淫奢異服共六十二事于都街乙丑南隊主陳文興于城內鑿井得鏤騏驎玉璧水精環各二枚又鳳皇見建康縣桐下里宣德皇后稱美符瑞歸于相國府丙寅詔梁國初建可依舊選諸要職悉依天朝之制髙祖上表曰臣聞以言取士士飾其言以行取人人竭其行所謂才生于世窮達惟期而風流遂行馳騖成俗媒糵誇衒利盡錐刀遂使官人之門肩摩轂擊豈直暴蓋露冕不避寒暑兼乃戢屨杖䇿風雨必至良由鄉舉里選不師古始請自今選曹精加隱括依舊立簿使冠履無爽名實不違庶人識涯涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏豈所以𢎞奬風流希向後進此實巨蠧尤冝刋革詔依表施行丙戍詔進梁公爵為王以豫州之南譙廬江江州之尋陽郢州之武昌西陽南徐州之南琅琊南東海晉陵揚州之臨海永嘉十郡益梁國并前為二十郡帝固辭有詔斷表相國左長史王瑩等率百寮敬請正月辛卯延陵縣華陽邏主戴車牒稱云十二月乙酉甘露降茅山彌漫數里正月己酉邏將潘道益於山石穴中得毛龜一三月辛酉邏將徐靈符又于山東見白麞丙寅平旦山上雲霧四合須臾有𤣥黃色狀如龍形長十餘丈乍隱乍見久乃西北升夭夀張縣見騏驎一物己未夜郢城有一物如獸色白而長攀樹而泣若將别者因投城外黃鶴磯水中庚申郢州降梁梁王曰何意罵義軍朱曉曰明公試思桀犬何嘗不吠堯王以為知言丙午命王冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五時副車置毛頭雲罕樂舞八佾設鍾簴宫縣王妃王子王女爵命進號依舊儀丙辰齊帝禪位于梁王王即位于姑孰依唐虞晉宋故事四月辛酉宣德太后下令曰憲章前代敬禪神器於梁明可臨軒遣使恭授璽紱壬戍遣使持節兼太保侍中中書監兼尚書令汝南縣開國侯亮兼太尉散騎常侍中書令新吳縣開國侯志奉皇帝璽紱受終之禮王其陟元后君臨萬方式傳洪業以答上天之休命髙祖抗表陳讓於是齊百官豫章王綝等八百一十九人及梁臺侍中臣雲等一百一十七人並上表勸髙祖謙讓不受太史令蔣道秀陳天文符䜟六十四條事並明著羣臣等固請乃從之夏四月丙寅髙祖即位南郊設壇柴燎告類于天禮畢備法駕還建康宫太極前殿大赦天下改元中興二年為天監元年天監元年壬午封齊帝為巴陵王全食一郡一依齊典行齊正朔降宣德太后為齊文帝妃后王氏為巴陵王妃詔降前代王公封爵悉皆除省唯宋汝南王不在除例追尊皇考為文皇帝廟號太祖皇妣張氏為獻皇后妃郗氏為德皇后諡兄懿為長沙王詔封文武各有差以弟宏為臨川王揚州刺史弟秀為安成王弟偉為建安王弟恢為鄱陽王弟憺為始安王詔後宫樂府一切放還戊辰巴陵王薨于姑孰諡為和送終一依宋順帝故事詔分遣內侍周省四方觀政舉淪滯求遺隱問百年蠲獄訟天下有罪許人贖論復蘭陵武晉縣依前世之科乃立公車府謗木肺石傍各置一函欲有橫議投謗木函五月江州刺史陳伯之舉兵反使王茂為征南將軍江州刺史討平之伯之奔魏丁未詔中書監等八人參定律令林邑國于陀利國各遣使貢方物十一月乙未立小廟甲子立皇子統為太子是嵗旱米一斗五千文人多餓死立長干寺原案寺記寺在秣陵縣東長千里內有阿育王舍利塔梁朝改為阿育王寺昔佛涅槃後周敬王朝阿育王造八萬四千舍利塔此其一焉又案梁書大同二年八月髙祖改阿育王塔塔下舍利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形此塔比吳朝因孫綝亂曽毁廢之塔亦同泯平吳後諸道人于舊所建立焉晉末宋初更修飾之至簡文咸安中使沙門程安造小塔未成而亡弟子僧明繼而修立至孝武太元九年上金相輪及承露盤其後離石縣人劉薩阿因死更蘇便出家名惠達行禮次至丹陽未知阿育王塔處乃登城四望見長千里有異氣因就禮拜果見先置塔所方知必有舍利乃對衆掘地一丈得三石碑各長六尺中碑下有鐡函函內有銀函函內又有金函盛三舍利及爪髮各一枚髮長數尺即選比丘簡文所造四層十六年又使沙門僧尚加三層即髙祖所開者也髙祖初穿三四尺得龍甲九尺許方得石石下有石函函內有鐡壺以盛銀坩坩內有金縷罌盛三舍利如粟粒大圎正光潔又有琉璃碗碗得四舍利及爪髮爪有一枚為沉香色髙祖至寺大㑹造二剎各以金罌及罌重盛舍利爪髮內七寶塔中又以石函盛寶塔分入剎下二塔俱放光明敕鎮東將軍邵陵王綸製寺大功德碑文晉咸和中丹陽尹髙悝行至張侯橋見地中有五色光長數尺不知何怪乃令人于光處剖視之得金像悝乃下車載像至長干巷首牛不肯進悝令御人任牛所之牛直牽車至寺悝因留像付僧每至中夜嘗放光明又聞空中有金石之響經一嵗臨安縣漁人張係世于海口忽見有銅花趺浮水上係世取以送縣縣以送臺乃施于像足宛然相當又晉簡文咸安元年交州合浦縣人董宗之採珠投水底得光熖交州押送臺以施像上又合焉自咸安歷隆安二十餘年光趺如其初髙悝得像後西域有胡僧五人來詣悝曰昔于天竺得阿育王所造像來過鄴下值冦亂埋像於河邉尋失所在五人嘗一夜夢像語曰吾出江東為髙悝所得悝乃送五僧至寺諸僧見像歔欷流涕像便放光耀燭殿宇又瓦棺寺僧惠邃欲模寫像形寺主僧慮虧損金色謂邃曰若能請像放光回身西向乃可相許也邃便懇拜請之其像即轉坐放光西向當便模之又銅花趺上先有外國書莫有識者後有三闕除郍趺摩識云是阿育王為第四女所造也及梁朝敕市側數百家以廣寺闕堂殿樓閣頗極輪奐其圖諸經變相並是張僧繇闕石塔之功為其冠絶陳亡寺內殿宇悉皆焚燼今見有三層髙一丈二尺闕福寺尺形狀闕內非人工焉鳥雀不敢棲息西京記光大興寺殿有闕像門爾隋文梁陳數有竒異陳國亡忽面自西向雖止之還帝載入闕內中供養後移置此寺寺衆以殿大像小不可當陽置之于北面明日乃自轉正闕動咸驚異復置北靣明還復轉南面衆乃懴謝不復更又靖安闕崇闕寺有石像一軀髙五尺製作粗惡甚有靈驗傳云是阿育王第四女所造也其女貌醜嘗自慨恨多作佛像及成皆類如此千數乃至誠祝禱忽感佛見形更造諸像相好方具其父使鬼神遍散諸像於天下此石像是其一也天監二年四月癸卯尚書刪定法度上梁律二十卷科四十卷扶南龜兹中天竺國各遣使貢方物交州進鸚鵡能歌不納置法王寺北去縣二十里原案塔寺記武帝造其地本號新林前代苑也梁武義軍至首祚王業故以法王為名武大同九年於寺側起王逰苑尚書令沈約為寺碑文美功也置永建寺北去縣六十里李師建造置佛窟寺北去縣三十里僧明慶造其寺拓山巖殊稱形勝遂因佛窟而名置永修觀東南去縣五十里五月六日武皇帝造至貞觀六年廢三年天下多疾疫四年正月癸卯詔自今九流常選年未滿三十不通一經不得解褐五月建康縣定隂里生嘉禾一莖十二穗六月立孔子廟十月大舉北伐十二月天清朗西南有電光聞雷聲者三嵗大穰榖一斛三十文置敬業寺禮部侍郎盧法振造五年正月丁卯詔凡諸舊族無在朝位者選官搜括四月丙申廬陵髙昌之仁山獲銅劔二始豐獲八目龜一置净居寺北去縣六十二里潁州刺史劉威造六年詔隱淪之士皆令自陳三月有象入京師四月置左右驍衛左右逰擊將軍七月甲子太白晝見丙寅置桂州八月戊戍大風折木京師大水濤入加御道七尺乙亥改閲武堂為德陽堂聽訟堂為儀賢堂置光宅寺西去縣十里武帝捨宅造寺未成于小莊嚴寺造無量寺像長一丈八尺及鑄銅不足帝又給功德銅三千斤臺內送銅未至像處已見銅車到爐所於是就冶一灌便足在後臺司銅至方知向來送銅靈感所致及開模像以成丈九而相好不差又有大錢二枚見衣條上竟不消鑠其年九月𣣔移像過寺未移前淮中估客每夜輒聞大橋上數百人修道路往視不見人俄而像度光彩輝焕觀者莫不歸心又東都記云祕書省內著作院後有梁武帝及名臣沈約范雲周興嗣已下三公數十人銅像初梁武帝登極乃立私宅為寺寺內有此像後長慶中李千里為明堂採木使船載至東都置於省內置明慶寺後閣舍人王曇明造去縣十八里寺內有泉水清徹陳梁已前嘗取供御愈疾寺碑太子舍人陳昭之文七年夏四月乙卯太子納妃赦大辟已下罪五月己亥詔復置宗正太僕大匠鴻臚等卿又增太府太舟充為十二卿六月辛酉復建修二陵周回五里改陵監為陵令七月壬辰置童子奉車郎置涅槃寺在縣北二十里沙門僧寵造峯頂又有翠微寺天晴日暖望見廣陵城在目前水陸之逺蓋二百里前潤州畢構因行屬城造於山頂勒石為銘八年正月詔能通一經始末無差許以敘録九年新作緣淮塘北岸起石頭迄東冶南起後渚離門連于三橋三月己丑輿駕幸國子學親臨講席賜祭酒已下帛有差四月丁巳選尚書五都令史革用士流是嵗置本業寺西去縣五十里比丘淨潔造在蔣山里十年春正月親祠南郊六月異蓮一莖三花生樂逰苑九月丙申天西北隆隆有聲赤氣下至地冬十二月山車見于臨城縣庚辰馬仙琕大破魏軍斬馘十萬克復昫山是嵗初作宫城門三重及開二道置解脫寺在縣西南六百里武帝為德皇后造大清里內十一年二月新昌濟陽二郡野蠶成繭癸丑齊宣德太妃王氏薨十二年正月詔掩骼埋胔二月辛巳新作太極殿改為十三間四月京邑大水六月癸巳新作太廟增基九尺庚子太極殿成十三年二月丁亥輿駕躬耕藉田孝悌力田增爵一級老人星見七月乙亥立皇子綸為邵陵王繹為湘東王紀為武陵王八月作浮山堰時都下訛言有魋鬼取人肝肺以祠天狗百姓大懼置勸善寺去縣西北十八里帝為賢志造十四年正月乙巳皇太子冠大赦天下賜為父後者爵一級王公以下有差停逺近上慶禮十五年詔以兵騶奴婢六十者皆為庶人十六年春正月辛未祀南郊詔尤貧家勿收今年三月調無田業者所在量冝賦給及優蠲産子之家恤理寃獄并振孤老鰥寡不能自存者二月辛亥耕籍田甲寅赦罪人三月丙子敕太醫不得以生類為藥公家織宮紋錦飾並斷仙人鳥跡之形以為䙝衣裁剪有乖仁恕於是祈告天地宗廟以去殺之理欲被之含識郊廟牲牷皆代以麵其山川諸祀則否時以宗廟去牲則為不復血食雖公卿異議朝野喧囂竟不從冬十月宗廟薦羞始用蔬果十七年春二月癸巳雍州刺史安成王秀薨甲辰大赦三月丙寅改建安郡王偉為南平王十八年四月丁巳大赦天下七月甲申老人星見置惠日寺原案西南去縣二里阮翻捨宅造之在建西尉定隂里舊說云大同八年丹陽尹王齡造今在縣東二里考其二跡不同此惠日寺是宋之禪林寺王修儀為尼淨秀立精舍新蔡公主為佛殿泰始三年明帝助修號曰禪林濟惠文起房如此之狀歷歷明矣隋末亂離並從毁壞唐初杜伏威與輔公祏等共修殿內文六金像并左右侍者始武德四年止六年正月十五畢功寺西廢禪林寺亦併入禪林之域其年公祏背叛七年李孝恭來討為軍火所及貞觀七年始移加惠日之名於此矣十九年春正月改天監十九年為普通元年普通元年大赦天下丙子日有蝕之扶南高麗遣使貢獻三月丹滑國貢獻四月河南國貢獻七月江淮海三瀆並溢九月乙亥夜有星晨見東方光爛如火是嵗魏明帝正光元年也置大愛敬寺西南去縣十八里武帝為太祖文皇帝造大通四年又造一丈六尺旃檀像量之剩二尺成丈八形次衣文及手足更重量又剩一尺五分至大通五年寺主僧洽重量又剩七寸即是長二丈矣大同四年移入大殿敕主書吳文寵更量又剩五寸凡五度量即長二丈七寸豈非精誠所感耶置永明寺西北去縣五十里原案寺記南平襄王造大唐武德六年廢上元二年五月奉敕重造置果願尼寺西南去縣五十里東陽太守王均造須陀寺去縣十七里二年春正月辛巳祠南郊詔置獨孤園以恤孤幼戊子大赦二月辛丑祠明堂四月乙卯改作南北郊丙辰詔曰平秩東作義不在南因徙籍田于東郊外十五里五月癸卯琬琰殿火延燒後宫三千餘間八月丁亥始平郡石鼓村地自開成井方六尺六寸深二十二丈十二月百濟新羅遣使貢獻以百濟王餘隆為寧東大將軍三年五月詔公卿百寮各上封事連帥郡國舉賢良方正直言之士八月甲子婆利白題國遣使貢獻十一月造猛信尼寺西北去縣五十里後閣主書髙僧猛造在鋪山西北梁紹泰二年廢上元二年敕令重造福靜寺西北去縣六里尼修義造四年十二月給事王子雲議鑄錢狼牙修國遣使貢獻五年六月乙酉龍鬬于曲阿陂西行至建陵所過樹木皆折地開數十丈征北將軍元澍率衆侵魏置衆造寺西南去縣五十里後閣舍人吳慶之造置善覺尼寺在縣東七里穆貴妃造其殿宇房廊剎置竒絶元帝繹為寺碑六年正月魏徐州刺史元法僧以城來降封始興郡王七年正月詔在位郡縣各舉所知凡是清亷咸須聞薦十一月河南髙麗林邑滑國並遣使貢獻八年正月甲戍大赦改元大通元年辛未祀南郊詔流亡者復其宅業蠲役五年尤貧者勿令出今年三調孝弟力田賜爵一級帝創同泰寺寺在宫後别開一門名大通門對寺之南門取反語以協同泰為名帝晨夕講議多逰此門寺在縣東六里原案輿地志在北掖門外路西寺南與臺隔抵廣莫門內路西梁武普通中起是吳之後苑晉廷尉之地遷於六門外以其地為寺兼開左右營置四周池塹浮圗九層大殿六所小殿及堂十餘所宫各像日月之形禪窟禪房山林之內東西般若臺各三層築山構隴亘在西北柏殿在其中東南有璇璣殿殿外積石種樹為山有蓋天儀激水隨滴而轉起寺十餘年一旦震火焚寺唯餘瑞儀柏殿其餘略盡即更構造而作十二層塔未就而侯景作亂帝為賊幽餒而崩帝初幸寺捨身改普通八年為大通元年五月丙寅成景雋剋臨潼竹邑十月庚戍魏東豫州刺史元慶和降十一月丁卯蕭藻為都督鎮渦口侵魏是嵗林邑師子髙麗等國各遣使貢獻置園居尼寺北去縣四十三里大通四年舍人袁頵造二年二月築寒山堰四月戊戍魏爾朱榮廢君殺主胡太后臨朝時魏大亂魏王子北海臨淮汝南等並割地來奔又郢州北青州南荆州皆以地來降十月帝以魏北海王元皓為魏主令東宫直閣將軍陳慶之衛兵以送還北魏豫州刺史鄧獻以地降三年十月改中大通元年大赦賜孝悌力田爵一級夏四月癸巳陳慶之拔魏梁城進屠考城擒魏濟隂王暉業五月又進剋虎牢魏莊帝出居河北元皓入洛陽僣號建元元年稱建武皇帝六月都下疫甚帝于重雲殿為萬姓設救苦齊以身為禱九月辛未幸同泰寺設四部無礙大㑹上釋服御法衣行清淨大捨以便省為房用素床瓦器乘小車私人執役甲午升法座為大衆講涅槃經癸卯群臣以錢億萬奉贖皇帝衆僧默許乙酉百辟詣寺東門奉表請還宫三請乃許帝三答書前後並稱頓首十月己酉又大㑹設四部道俗五萬餘人㑹畢帝御金輅還宫御太極殿大赦十一月盤盤蠕蠕國並遣使朝貢置禪巖寺西北去縣三十五里大通元年嚴袪之造貞觀六年廢上元二年敕重造二年四月癸丑幸同泰寺六月林邑扶南遣使貢獻八月幸德陽堂三年四月己巳太子統薨諡曰昭明六月癸丑立昭明太子子歡譽並為郡王是月丹丹國使貢獻七月乙亥立晉安王綱為皇太子大赦賜為父後者爵一級忠孝文武清勤並如之庚寅皇宗族有服屬者並賜湯沭食邑九月狼牙修國遣使貢獻是嵗吳興生野稻饑者賴焉十一月幸同泰寺講般若經十二月魏渤海王髙歡舉兵于信都别奉渤海太守元朗為天子改元號中興其年二月爾朱隆等已立獻文孫廣陵王元恭于洛陽改元號普泰四年二月封諸王嫡子為王庚子皇子邵陵王綸有罪免為庶人是日髙麗平爾朱氏廢元恭以鴆殺之諡曰節閔年三十五又中興帝元朗自以疏屬遜位别邸髙歡立孝文孫平陽王修于洛陽改元永興又改永熙七月甲辰星殞如雨十月侍中領國子博士蕭子顯表置制㫖孝經助教一人生十人專通上所釋孝經義十二月髙麗遣使朝貢是歲魏相髙歡以女妻孝武帝元修為后五年正月辛卯祠南郊忽聞異香三隨風至及行事奏樂迎拜拜畢有神光圓照滿壇上五色食頃乃滅戊申京師地震己酉長星見五月戊子京師大水御道通航海南波斯盤盤遣使朝貢置法苑寺北去縣五十里案寺記大通五年張文闕造一名廣化寺貞觀六年廢上元二年奉敕重造六年二月親耕籍田大賜孝悌力田三月百濟遣使貢方物四月丁卯以信都將軍元慶和率衆北侵魏閠八月魏孝武帝西入關都長安以宇文泰為丞相孝武又與文泰不平至十一月遇鴆崩泰立孝文孫南陽王寶矩為文帝初魏武入關髙歡立孝文曽孫清河王亶世子善見都鄴改元天平號東魏魏于是始分為兩十二月西南有雷聲二七年正月戊申大赦改元大同元年髙麗丹滑波斯等國朝貢壬戍上幸同泰寺鑄銀像十月黃塵如雪十二月北梁州刺史蘭欽攻漢中魏梁州刺史元羅降是嵗西魏文皇帝大統元年置頭陀寺東北去縣二十二里原案寺記舍人石與造其寺在蔣山頂第一峯殿後有泉井與江淮水通隨潮水增减非常靈異纍世仍舊萬福尼寺北去縣十八里吳僧暢造本願尼寺湘州刺史蕭環造巖栖觀去縣東六十里貞觀六年併入洞𤣥觀二年正月詔求讜言及令文武官舉士十一月己亥詔大舉兵北侵魏壬午幸同泰寺設無礙大齊雨塵如雪攬之盈掬大兵班師都下地生白毛長二尺壬申魏遣使來請和許之置慈恩寺東南去縣二十五里邵陵王綸造普光寺東南去縣八十里安豐縣令張延造化成寺東北去縣七十里江寧縣令陶道宗造興福寺東北去縣一百里袁平造善業尼寺東北去縣五十里蕭恪造寒林寺西北去縣三十五里常侍陳景造三年四月辛丑夜朱雀門災壬寅大雨灰黃色七月東魏遣人來聘閏九月使散騎常侍張臯報聘東魏冬地大震年饑置一乘寺西北去縣六里邵陵王綸造在丹陽縣之左隔邸舊開東門門對寺梁末賊起遂延燒至陳尚書令江總捨書堂於寺今之堂是也寺門遍畫凹凸花代稱張僧繇手跡其花乃天竺遺法朱及青緑所成逺望眼暈如凹凸就視即平世咸異之乃名凹凸寺置玉清觀西北去縣五十八里南康令鬷哲造四年三月河北蠕蠕國朝貢東魏人來聘七月散騎常侍劉孝儀聘東魏八月甲辰詔淮南十二州飢饉逋租宿債勿收九月閲武于樂逰苑十二月國子助教黃侃表上禮記疏義五十卷置洞靈觀在縣南四十里陳宣逺所造五年春正月賜廬陵王等官階丁巳御史中丞參禮儀事賀琛奏今南北郊籍田往還並冝御輦不復乘輅二郊請用素輦皆以侍中陪乘停大將軍及太僕詔付尚書博議施行改素輦為大同輦八月扶南獻生犀十一月魏人來聘遣侍中栁豹聘之是時都下訛言云天子取人肝以飼天狗大小相驚日晚閇門持刀杖數月乃止六年二月己亥耕籍田五月己卯河南王遣使獻馬及方物求經論十四條并請制所定涅槃經般若經光明經講疏一百三卷七月東魏人來聘九月始興太守獻嘉禾一莖十七穗七年二月于宫城西立士林館延集學者宕昌蠕蠕各遣使貢物百濟王求涅槃經疏及醫工畫師毛詩博士並許之八年正月安城郡劉敬躬反江州刺史湘東王繹遣中兵參軍討平擒送都下斬之十一月丙子詔所在役女丁罷之是嵗交州賊李賁攻刺史蕭咨奔越州九年正月丙申地震生毛置江潭苑去縣二十里原案地志武帝自新亭鑿渠通新林浦又為池開大道立殿宇亦名王逰苑未成而侯景亂十年春李賁竊位交趾置百官號天德元年三月甲午幸蘭陵庚子謁建陵陵上有紫雲覆久而乃散帝望陵流涕所沾草木變色陵旁先有枯泉是時流水香潔辛丑帝哭于修陵又于皇基寺設法㑹賜蘭陵老少位各一階所經縣邑放今年租賦因賦還舊鄉詩己酉幸京口登北固樓因改為北顧又幸回賔亭宴帝鄉故老及迎候者數千人各賜錢三千文五月辛州刺史盧子雄兄弟被誅乃舉兵反廣州刺史蕭映討平之十一月大雪三尺十一年正月震華林園光嚴殿帝自貶拜謝上天纍刻乃止置履道寺西北去縣二十五里原案注宣集貞威將軍給事後閣舍人章法護造置渴寒寺西北去縣二十五里十二年正月改年為中大同元年中大同元年曲阿縣建陵隧口石壁邪起舞有大蛇鬪隧中其一被傷奔走又青蟲食陵樹葉俱盡癸丑交州刺史楊㬓剋交趾嘉寧城李賁走入屈獠洞交州平三月庚戍幸同泰寺講三惠經乃捨身為奴四月皇太子已下羣臣出錢億萬奉贖是夜同泰寺為天火所燒略盡六月辛巳天有聲如雷及風水相薄之音七月甲子詔今已後有犯罪非大逆及殺父母已下並勿坐丙寅詔通用足陌錢甲午渴盤陀國貢方物二年正月改元太清元年東魏髙歡薨二月白虹貫日庚辰東魏司徒濮陽王侯景率河南十三州地歸降使行臺丁和奉表帝許之壬午以景為大將軍封河南王大行臺承制如鄧禹故事甲辰以司州刺史羊鴉仁桓和等率兵應接侯景乙巳帝升光嚴殿講三惠經又捨身羣臣以億萬奉贖僧衆默許百辟詣鳳莊門上表請帝帝三答皆稱頓首丁亥服衮冕還宫幸太極殿如初即位之禮是日神馬出太子獻寶馬頌六月以雍州刺史鄱陽王範為征北將軍總督緣邉初附之州以大將軍侯景為録尚書十一月軍至寒山為後魏慕容紹宗大敗之蕭明被執置幽巖寺北去縣四十里永康公主造原案釋法論集牛頭山佛窟寺大毗曇師傳云承聖二年法師入秣陵香山始創舍名曰幽巖與佛窟相去十里毗曇所立不云永康矣立儀香尼寺西北去縣五十里宫獲造二年正月朔兩月相承如鈎見西方詔大臣各舉所知己亥交州刺史楊㬓司馬陳霸先破屈獠洞斬李賁傳首京師六月天裂於西北長十丈闊二丈光出若雷聲動如雷七月使常侍謝珽於東魏結和八月侯景敗歸自夀陽舉兵反十月攻下馬頭破歷陽自採石臨江詔邵陵王綸討景景自橫江渡於採石辛亥至京師十一月邵陵王入援京師乙酉戰於𤣥武湖東而保愛敬寺為賊所破十二月戊申天西北裂有光如火時栁仲禮入援京師以仲禮為都督置靈隱寺西北去縣五十里炅待公所造三年三月丁巳侯景破仲禮于青塘壬午火守心乙酉太白晝見三月乙卯景攻陷宫城縱兵大掠己巳景自矯詔為大丞相四月己酉髙祖以所求不供以憂憤寢疾五月丙辰帝幽餒而崩于淨居殿年八十六辛巳遷大行皇帝於太極殿冬十一月追尊為武皇帝廟號髙祖乙卯葬于修陵髙祖自捨身後或書經坐禪盡日不食又于元光殿坐師子座講金字經文於王明殿施素牀瓦器以用性純孝年六嵗獻皇后崩水漿不入口三日哭泣哀苦有過成人及文皇帝崩初為齊王咨議在荆州聞問便投地絶漿及居宸極手不釋卷常至于夜燈燭不絶光著孝經義周易六十四卦二繫文言序卦等義毛詩問答尚書大義中庸講論老子疏凡二百餘卷並正先儒之迷開古聖之㫖并撰吉凶軍賔嘉五禮凡一千餘卷又製涅槃大明三淨等經義疏數百卷又撰通史製譛序凡六百卷天性鋭敏下筆成章又著文集一百卷又撰金䇿三十卷明諸醫藥卜筮隂陽律候占决並善𨽻書解騎射弓馬莫不竒妙衣服儉素冬衣木綿一冠二年一被三年年五十九即斷房室六宫無錦繡之飾不飲酒不聽音樂開蕩蕩之王道革靡靡之商俗鼓扇𤣥風興重儒素然不能息末敦本斫雕為朴慕名好事崇尚浮華抑揚孔墨留連釋老侯景立皇太子綱為簡文帝太宗簡文皇帝簡文帝字世纘諱綱武帝太子太清三年五月武帝崩侯景立帝改元太寶元年二年八月侯景廢帝立豫章王棟使吕季略送詔令帝寫之帝書至先皇念神器之重思社稷之固越升非次遂主震方嗚咽不能自止賊衆皆為掩泣十一月帝遇害諡簡文帝廟號太宗年四十九豫章王棟即位其年十一月景又廢帝自稱漢案豫章王棟即昭明太子子歡之子歡之子長曰棟次曰闕小曰樛景既廢帝自立為漢王改太始元年立一百日而闕太始元年是大寶二年也六月征南將軍陳霸先從南康下頓西昌時湘東王繹遣征東將軍王僧辨督衆軍下討侯景師次湓城陳霸先率杜僧明侯安都等甲兵三萬將往㑹焉先遣長史沈衮奉表江陵勸湘東王進位十一月王授霸先都督東陽新安㑹稽臨淮永嘉五郡軍事平東將軍揚州刺史三年正月王僧辨等諸軍發湓城與霸先㑹于白茅津共登洲立壇刑牲飲血盟約同心併力進討侯景詞理悲切泣下沽衣詞曰賊臣侯景逆天無狀構造姦惡違背恩義掠我國家毒害生民移改宗廟我髙祖聰明睿聖光宅天下劬勞兆庶五十餘年侯景以窮見歸撫之如子故我髙祖於景何薄百姓於景何辜而景肆長㦸以凌蹙朝廷騁鋸牙而殘害百類皇枝襁褓之上皆窮刃極爼豈有人臣忍聞此痛臣僧辨霸先荷湘東王泣血之寄摩足之恩抽腸瀝膽誓誅姦逆雪天地之怨耻報君父之仇讎同心叶和罔有違戾若有欺負明靈殛之二月大軍進姑孰先鋒次蔡洲侯景登石城望官軍之盛不悅密謂左右曰彼軍上有紫氣不可當也乃使盧暉恪守石頭自於石城北築數壘而據髙嶺以拒霸先霸先於石城西北連營立柵至落星山左右俱進霸先謂軍吏曰善用兵者如常山蛇令其救首尾困而無暇於是不日平定侯景矣陳霸先進屯京口案梁書云王僧辨破侯景景之走也郭元建舉廣陵以歸欵請降景子鍳奔清江說元建曰我曹梁氏讎豈能相活耶遂與建謀反降北齊齊使將軍辛術來援廣陵霸先將欲往廣陵納軍至歐陽聞元建已投北齊遂還軍京口世祖元皇帝元帝諱繹武帝子先封湘東王荆州刺史大寶二年即位於江陵改號承聖元年以陳霸先為司空南徐州刺史嶽陽王蕭察引西魏軍冦江陵三年十月西魏將于謹圍江陵十一月城陷帝為魏人所殺年四十七敬皇帝敬皇帝諱方智元帝第九子先封晉安王江州刺史霸先僧辨以承聖三年十二月迎入建康即位改元紹泰元年是月蕭察立於江陵號太安元年稱後梁五月北齊送蕭懿第五子貞陽侯淵歸主梁嗣七月僧辨納之立為帝以敬帝為太子霸先聞之遣使四諌不從霸先憤密謂所親曰武皇盤石之宗逺布四海至於尅雪讎耻寧濟艱難唯孝元而已功業茂盛前代未聞我與王公俱受重寄聲猶在耳語未絶音豈期一旦便有異同嗣主武皇之孫元帝之子海內曯目天下宅心竟有何辜生致廢黜逺求夷狄假立非次觀其此情亦可知矣乃密與徐度侯安都周文育等謀反水陸俱進襲王僧辨使周文育率勇士夜至石頭北踰垣而入霸先自引軍入南門左右告僧辨外有軍僧辨驚起未及召軍主而周文育與僧辨子頠戰於庭霸先攻南門而入僧辨大敗窘急登城南樓霸先因風縱火僧辨就擒縊而斬之遂廢貞陽侯而復方智為帝改紹泰元年進霸先都督中外軍事車騎大將軍揚州牧司空如故班劒鼓吹時義興太守章載震州刺史杜龕等聞僧辨之誅遂舉兵反于吳興霸先自往討之秦州刺史徐嗣徽南豫州刺史任約等聞霸先不在密招北齊舉兵乘虛渡江掩至闕下侯安都拒之乃據石頭霸先聞之卷甲還都十一月北齊遣兵千渡江據姑孰又遣安州刺史翟子崇劉士榮等及淮州刺史栁達摩以兵一萬於湖墅以米三萬石馬千匹潜渡據石頭霸先命侯安都水軍夜襲湖墅燒齊船舫令周鐡虎率舟師斷齊運輸霸先自領精騎出西明門以襲齊軍十二月盡命衆軍分部對冶城以船渡兵攻其水南二柵栁達摩拒淮據之霸先督衆軍疾戰縱火燒柵煙塵漲天齊人敗走使侯安都水軍追破嗣徽嗣徽單舸走達摩等各率軍入保石頭霸先於石頭南北岸絶其汲路又堙塞城東門城中諸井無水水一合質米一升米一升質絹一匹或炒米而食之達摩謂其衆曰我在此聞謡言云石頭搗兩襠搗青復搗黃昔侯景著青色已倒於此今吾徒衣黃豈不是謡言驗乎庚辰達摩請和霸先僞許之與城外盟約任其將士南北辛酉霸先陳兵石頭南門送齊人北歸及至皆殺之二年三月齊將蕭軌東方老裴英洛州刺史李希光并任約徐嗣徽衆軍十萬出柵口向梁山頓軍蕪湖五月丙申齊軍至秣陵故城霸先遣周文育屯方邱徐度屯馬牧霸先自率宗室王侯朝臣等立壇於司馬門外仁虎闕下刑牲告天以齊人背約食言慷慨涕泗交流士卒觀者益加奮勇辛丑齊軍於秣陵東跨淮上橋引兵度自方邱進及倪塘遊騎至城下震恐霸先潜以兵三千配沈泰度江襲齊軍行臺趙彥琛於瓜步獲其舟粟之輜重是日天子總羽林禁兵頓長干寺六月甲辰齊兵度鍾山龍尾據幕府山霸先又遣錢明水軍出江乘斷齊人運糧齊人大饑殺馬以食之壬子齊軍至𤣥武湖西北將屯北郊壇霸先引軍自覆舟山東移於郊南與齊人對陳其夜大雨雷電暴風拔木平地水深一丈餘齊軍日夜坐立泥中懸鬲而㸑足指皆爛而城中及潮溝北水退路乾官軍常得乾地時食盡霸先懼軍人皆給麥餅兵士甚餒㑹陽倩自東陽送米二千石鴨千頭霸先乃炊飯煮鴨誓軍士一戰乃尅之及旦身計裹糧肉數臠畢自率麾下於幕府山南吳明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白下斷其後齊師大潰相藉死者不可勝計生執徐嗣徽斬之以徇追奔至江乘攝山擒蕭軌東方老裴英李希光王僧智等四十六人皆誅之其餘軍士得竄至江者自盧龍縳筏以濟中流筏廢溺死者不知幾極流尸至京口翳水彌岸唯任約王僧愔獲免丁巳霸先出南州燒賊船乙未斬徐嗣彥傅野猪于建康市誅齊將等於城下改元太平元年秋九月天子進霸先位丞相録尚書事揚州刺史義興郡公二年正月又加霸先班劒三十人置丞相别榻霸先房從悉追贈之二月廣州刺史蕭勃反㳂江而下南江州刺史余孝頃以兵應之霸先令周文育討平之八月甲午進霸先位太傅加黃鉞劒履上殿入朝不趨贊拜不名給前後羽葆置皂輪九月進總百揆封十郡為陳公備九錫之禮授璽紱逺逰冠位在諸侯王上陳國置官屬一依舊式十月進爵為王加冕旒建旌旗出警入蹕乘金根車駕六馬備五時副車置旄頭雲罕舞八佾設鍾簴宫懸陳臺並依齊末故事辛未敬帝禪位於陳王乃命太尉王通長史王㻛奉皇帝璽紱受終之禮一依唐虞故事敬帝方智遜位别宫霸先三讓羣臣固請以太平二年十月乙亥霸先設壇于南郊即皇帝位柴燎告天禮畢輿駕還建康宫臨太極殿大赦改永定元年奉帝為江隂王行梁正朔服色一依前典史臣曰唐鄭國公魏徵曰梁太祖固天攸縱聰明稽古道亞生知學為博物允文允武多才多藝爰自諸生有不羈之度屬昏凶肆虐天倫及禍糾合義旅將雪家寃曰紂可伐不期而㑹龍躍樊漢電激湘郢剪離德如振槁取獨夫如拾遺其雄武大略固無得而稱焉既縣白旗之首方應皇天之眷今乃布德施惠悅近來逺大修文教盛飾禮容聲振寰區澤浸遐裔干戈載戢凡數十年濟濟焉洋洋焉魏晉已來未若斯之盛也或終夜不寢終日不食非全道以制物唯飾智以警愚卑心遺榮虛厠倉頭之位髙談脫屣終戀黃屋之尊夫人之大欲在乎飲食男女至於軒冕殿宇非有切身之纍髙祖屏除嗜欲眷戀軒冕通於所難而滯於所易可謂神有所不逮智有所不及矣及夫精華稍竭鳯德已衰惑於聽受權在邪佞儲后百辟莫能盡言躁險之心暮年踰甚利而後動愎諫違卜開門揖盜棄好即讎釁起蕭牆禍成戎羯身殞非命災被億兆衣冠斃于鋒鏑之下老幼粉于戎馬之足瞻彼黍離痛深周廟永言麥秀悲甚殷墟自古以安為危既成而敗顛覆之速書契所未聞也僞漢侯景字萬景父摽本朔方人移家于鴈門少驍勇有膽力魏末遷北鎮戍兵稍立功效魏胡太后臨朝朝政紊亂天柱將軍爾朱榮自晉陽入殺胡后景以私衆見榮甚竒之即委之典軍事㑹榮南逼命景先驅以功拜定州刺史始魏相髙歡微時與景相友好及歡入洛誅爾朱氏景復以衆歸之仍為歡委用景殘虐馭軍嚴整然破掠所得財物皆頒賜將士故人人咸為之用命所向多捷後為河南道大行臺位司徒言於歡曰請兵三萬橫行天下要須濟江縳取蕭衍老公作太平寺主歡壯其言使擁衆十萬專制河南仗任若已之半體及歡疾篤謂子澄曰侯景狡猾多計反覆難知我死後必不為汝用乃以書召之景懼禍乃以梁太清元年遣行臺郎中丁和上表請降梁武封為河南王又遣行臺左丞王偉詣闕請立元貞為魏主梁乃封貞咸陽王資以乘輿副御髙澄又遣慕容紹宗追破景入渦陽食盡士卒散景乃收散卒得八百人奔夀陽爾後徵求稍闕表疏跋扈鄱陽王範鎮合肥司州刺史羊鴉仁素稱景有異志梁相朱异曰景數百叛虜何能為事抑而不奏景知臨賀王正德怨望朝廷乃密使要結以為內應八月景發兵濟自歷陽髙祖命邵陵王綸督衆軍巡江防遏蕭正德屯丹陽至是率兵與景㑹合景乘勢遂至闕下西豐公大春棄石頭走景遣將于子恱據之景乃立正德為帝于儀賢堂改年曰正平正德拜景天柱將軍以女妻之又攻陷東府城城內文武百官裸身而出使交兵殺之死者三千餘人又起土山以臨臺城綸馬步三萬以據鍾山景於覆舟山列陳南安侯駿衆退軍亂敗績十二月景引𤣥武湖水灌臺城闕前御街並為洪波燒劫府寺營衛市肆郭區內外居人略盡湘東王世子方矩李遷哲羊鴉仁任尊等援軍四方雲合衆號百萬景乞和宣城王大器僕射王闕建康實録卷十七
