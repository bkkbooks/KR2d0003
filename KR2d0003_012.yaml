body:
  text: 建康實録卷十二唐許嵩撰宋太祖文皇帝太祖文皇帝諱義隆小字車兒武帝第三子也晉義熙三年生於京口十一年封彭城縣公永初元年封宜都郡王鎮西將軍荆州刺史加都督時年十四長七尺五寸博涉經史善𨽻書是嵗來朝會武帝當聽訟乃遣上訊獄囚辨斷稱旨武帝甚恱景平初有黑龍見西方上蔭五色雲隨之二年江陵城上有紫雲望氣者以為帝王之符當在西方其年少帝廢百官議所立徐羡之傅亮等以禎符所集備法駕奉迎入承皇統立行臺於江陵尚書令傅亮奉表進璽紱州府佐吏並稱臣請題榜諸門一依宫省上皆不許教州府國綱紀宥所統內見刑是時司空徐羡之等新有弒害及鑾駕西迎人懷疑懼唯長史王曇首司馬王華南蠻校尉到彥之共明朝臣並無異志因曰諸公受遺不容背二且勞臣舊將內外充滿今兵力足以制物夫何所疑甲戌乃發江陵命王華知州府留後事令劉彥之監襄陽車駕在道有黑龍負上所乘之舟左右失色上謂王曇首曰此乃夏禹所以受天命我何德以堪之及至都羣臣迎拜於新亭先謁初寧陵次入中堂百官奉璽紱沖讓未受勸請數四乃從之景平二年秋八月丁酉皇帝即位於太極殿詔曰朕閔凶在疚遭家不造崇基景業將墜於地永樂太后深鑒安危股肱忠臣協謀同力用集大命於豫一人兢兢憂懼罔識攸處思與萬國享兹惟新其大赦天下改元為元嘉元嘉元年文武各進位二等逋租宿調一切放免戊戌追復廬陵王國庚子詔撫軍將軍領護南蠻校尉武陵公謝晦為荆州刺史京師精田多割賜之將行色自矜過辭叔父淡淡問以年晦曰三十有五淡曰昔荀中郎二十七為北府都督卿方之老矣晦有慙色癸亥以徐羡之為侍中司徒南平公王宏司空建安公檀道濟征北將軍武陵公傅亮散騎常侍左光祿大夫開府儀同三司始興公食邑各四千戶甲辰封皇第五弟義恭為江夏王第六弟義宣為竟陵王第七弟義季為衡陽王各食邑五千户丙午徐羡之遜位不許九月辛酉給彭城王義康謝晦檀道濟鼓吹各一部丙寅追尊所生胡婕妤曰章皇太后陵曰熙寧丙子立皇后袁氏冬十一月己丑以王華為侍中壬戌追贈后父袁湛為侍中左光祿大夫開府儀同三司是嵗大旱置竹林寺案原注寺記元嘉元年外國僧毗舍闍造又置下定林寺東去縣城一十五里僧監造在蔣山陵里也二年春正月丁酉朔范泰上疏曰元正改律品物惟始頃旱魃為虐元陽愆度通川燥流異井同竭老弱不堪逺汲貧寡疲於負水租輸既重賦稅無降臣年過七十尋春秋之意察洪範之言王澤不流於四方伏願推忠恕之仁矜不逮之獄遊心民瘼措意幽冥如此則苞桑可係危幾無兆而災害自消也故夏禹引百姓之罪殷湯甘萬方之過天髙聽卑吉凶在人循末俗者難為風改正音者易為雅書奏乃棄官如東陽丙寅徐羡之傅亮上疏歸政言自大禮告終鑽燧三改大明佇耀逺近傾屬帝不許書三上帝又辭羡亮重請曰伏願以宗廟為重百姓為心𢎞大業以嗣先軌隆聖慈以增徽烈愚瞽所獻情盡於斯帝乃許之於是徐羡之避位歸第侍中程道惠等勸奉詔攝職羡之舊與高祖深相結無他學術而局力堅正沉密少言憂喜不形於色及居宰輔雅允朝望裴子野曰昔王鳯待罪杜欽説而起之終於漢室中興王氏覆族王韶之説徐公竟速三家之禍人之多言鮮有不敗甚哉夫君子之為人謀也外審治亂內定枉直主於忠信加以篤誠故其詞寡而利溥道大而義明患難靜於一朝風流振乎百世豈惟喋喋矜耳恱色而已哉以詔之交諂於亂惜矣辛未拜郊大赦天下二月乙巳䇿秀才于中堂庚子徴戴顒為國子博士不就顒父逵髙尚不仕顒兄勃又隱桐廬山嘗久病顒慨然曰本謂隨兄得間非有心語默至於窮困顒之罪也請行干祿之事以為藥石之資可乎求為海虞令事未行而勃卒顒亦止衡陽王義季鎮京口常與顒會竹林寺野服鼓琴談宴終日帝聞其好樂贈正聲一部昔韋玄隱於關中髙祖初平姚秦召之不起及赫連勃勃陷關中召玄父華為太常徴玄為太子中庶子玄出就職勃勃怒曰昔劉公辟之而不至吾召玄而玄來豈謂吾曺不識出處遂殺之丁亥加左衛將軍殷景仁為侍中時同居門下者王華王曇首劉湛殷景仁皆以為風力楨幹一時冠冕內侍之美近世莫及是春有江鷗百許頭集太極殿階六月丙午吳郡大風山水湧出五丈殺居人秋八月甲申以三輔流人出漢中者置扶風馮翊二郡冬十月乙卯中散大夫徐廣卒廣世篤學為時儒所宗年過八十猶嵗讀五經一遍俗世禮法皆取決焉十二月戊申蔡廓卒贈太常初穆之當朝士畢集惟謝混郗僧施謝方明蔡廓等數人不至穆之為憾謝混等既誅蔡廓方明始就穆之並稱於髙祖曰鼎才也廓嘗器其小子謂有已風與親故書曰小兒四歲器似不可入非類之室不共小人之遊故以興宗為名興宗為之字也置清園寺東北去縣二里案原塔寺記駙馬王景琛為母范氏宋元嘉二年以王坦之祠堂地與比丘尼業首為精舍十五年潘淑儀施西營地以足之起殿又有七佛殿二間泥素精絶後代希有及者置嚴林寺西北去縣四十五里元嘉二年僧招賢二法師造三年春正月丙寅詔罪徐羡之傅亮謝晦等三人以廢立殺戮事曰廬陵王英秀明逺徽風播發魯衛之寄朝野屬情羡之等暴蔑專求忌賢畏逼構造貝錦成此無端罔主蒙上橫加流貶矯誣先旨致滋禍害寄以國命而剪若仇讐旬月之間再肆凶毒痛感二靈怨結人鬼自書契以來棄常安忍反易天命未有如斯之甚者也命司寇肅明刑典晦據有上流或不即罪朕親御六師為其防遏氛霧既祛庶幾治道思與億兆勵精圖理大赦天下帝去秋便命修舟艦以備北征傅亮書與謝晦曰薄伐河朔事猶未巳朝野之慮所懼者多謝晦不悟帝召檀道濟使西討王華以為不可帝曰道濟從人者也曩非創謀撫而使之必將無慮遣召羡之亮等入省亮將至謝晦弟皭為給事黃門侍郎直門下使人送亮書曰殿中有異處分亮辭嫂疾暫還遣報羡之羡之乘內人問訊車出南郭步走新林縊於陶竈舁尸付獄亮至兄迪墓拜辭告罪追擒廷尉上亦使以詔謂曰以公江陵之誠當使諸子無恙羡之子喬晦子百世休並賜死囚謝皭于東宫流亮妻子於建安郡初亮父瑗與郗超善常見二子焉亮年五歲超使人解衣持去曽無吝色超曰季乃才流位望逾逺於兄然保卿家業其在迪也亮早知名才學強贍為晉給事黃門侍郎直西省髙祖欲以為東陽郡告其兄迪迪還語亮通夜不寐既旦入見髙祖曰昨承賜教東陽以徇私計然亮本願附鳯翼攀龍鱗以成宿昔至於飢寒未敢戚戚髙祖恱之用為從事中郎委任文議及貴幸兄迪每誡之而不即從也裴子野曰夫萬邦思治故言歸君長豈一夫行其辛螫彼蒼有情爰惡治而好禮就其無情故用羣心所事以奪天下為家非常安之道顛覆厥德何世無之道遭聖明可為髙陽之遇賢歸于伊尹蓋前王已然之規矩後世立事之憲章伊尹之廢太甲廢之也霍光之廢昌邑去之也事同主異是以殊途自斯以後抑有百慮晉景則除己之害桓溫即藉已之威提挈自我無辨逆順如徐傅之徒非覬覦者也求其忠順非忘身者也身既未忘不能脫屣權柄誠二君矣何以取信嚴君惡不足信權由震主危亡之機疾于激箭髙位厚味何以久乎昔景平既終奉身夙退滅身之禍庶幾可逃夫賢人君子受六尺之孤任尺寸之命推權變臨大節繫乎存存難乎存亡矣追贈廬陵王侍中大將軍諡曰孝獻王丁卯徙驃騎將軍義康為荆州刺史壬申內外戒嚴閏月乙卯遣中領軍到彥之北征檀道濟為前驅西伐帝問䇿於道濟道濟對曰臣昔與謝晦同從北征入關十䇿晦有其九謀略明練殆難與敵然未嘗孤軍決勝恐非所長臣悉晦智晦悉臣勇今奉王命以討不戰而可擒也江夏太守程道惠遣報謝晦晦以徐傅誅憂恐與南蠻校尉何承天計發兵決戰以南蠻司馬周超為行軍以司馬庾登為長史先舉徐傅哀次發子弟問處分軍旅二三日間得精兵三萬戊申大風折木會稽太守謝方明卒曽為南郡至歲暮囚無輕重皆縱歸家與期三日如期無不至者丙寅以豫章太守鄭鮮之為尚書左僕射以范泰為侍中泰時腳疾賜輿以升殿􅏤申帝御舟丙戌以彭城王義康及王𢎞殷景仁居守癸亥謝晦發荆州軍容甚偉自江陵至于破冡旌旗相亞晦撫巡軍憑流歎曰恨不以為勤王之師造夏口到彥之次彭城丁卯竹林監蕭欽及謝晦中兵參軍孔延秀戰欽敗績于彭城洲彥之退保隱磯謝晦至彭城上疏罪王𢎞㺯威權而責帝忘義負德蕭欽敗而檀道濟次于薄磯謝晦令其黨曰檀公已誅死及聞道濟來師人皆恐懼戊辰檀到等軍併艦泝江俄而便風揚帆俱濟謝晦軍莫能戰皆登岸走晦單舸歸江陵初到彥之退道濟軍至沙橋為周超所破死者過半及晦還退棄衆歸降謝晦與弟姪北走至延頭戍戍主晦故吏也乃檻晦送京師丙午帝自蕪湖班師車駕西至丙戌太白晝見癸未斬謝晦于建康市及弟皭兄子世基周超等晦有風姿鬚鬢如畫兄瞻五歲能屬文十歲善言玄理風華黼藻獨步當時為給事黃門侍郎見晦勢傾朝廷乃堅籬隔其庭曰吾不忍見禍之至也先晦而卒夏五月下檀道濟于獄以沙橋之敗也乙未徙檀道濟為征南將軍開府儀同三司江州刺史到彥之右將軍豫州刺史己巳使使兼散騎常侍巡行天下將命方國周行封畿親與刺史二千石等觀長吏申述至誡亷詢治體觀察吏政切求民瘼旌舉操行存問所疾禮俗得失一依周典每事名為書其條件奏俾朕昭然有如親覽大夫君子其各悉心敬事無墮乃力其有深謀逺圗讜言忠誠之士使者以聞丙午聽訟于延賢堂自是每嵗三訊八月左光祿大夫阮韶之卒韶之嘗為司馬道子太傅主簿蓬首散帶不綜其職自永初已後不復朝請閉門飬志以終其身是歲秋旱且蝗詔使捕之范泰上疏曰陛下昧旦丕顯求民之瘼明斷庶獄無倦政事理出羣心澤布萬里小小災變何以致之宗宰之臣所不能究上天之譴民所不敢誣有蝗去處而縣官訊問捕之無益於枯苖有傷於殺害臣聞桑榖時成無假斤斧因請宥謝晦婦女囚尚方者皆從之冬十二月丁卯前吳郡太守徐佩之羡之兄子以不自安將圖來年春正月謀反伏誅白雀見于京師太清里四年春正月乙亥曲赦京師百里內辛巳郊二月乙卯幸丹徒車府令請易輦䇨欲用紫皮緣輦席上以竹䇨未至於壞紫色貴並不聽三月丙子宴丹徒宫帝鄉父老咸與焉蠲今年租布原五歲已下刑丁亥車駕至自丹徒戊子尚書左僕射鄭鮮之卒鮮之自大司馬録事參軍遷御史中丞為人亮直時號格侯壬寅採富陽令諸葛闡議禁斷夏至日五絲命縷之屬議曰夫歲時有利害之收而農桑有經常之告機杼有不輟之勤而用度有奢儉之異是以愛民者莭其費用務本者躬其女工一月得四十五日明其以夜繼晝匪勤則逸者飾章奢侈有自來矣然不出奉生送死之誠今者民人夏至有五色續命縷之服以為無用之費博矣謹率愚管謂宜禁革從之河南秦綿性至孝母葬至墓留不忍歸鄉人於墓所為築室三年吳逵家疫父母兄嫂並亡逵夫妻行賃力負土成七墳十二棺皆儉而合禮云至是孔邈等並表薦之帝各表其門閭戊辰甘露降于京師五月癸酉散騎常侍袁瑜薦會稽郭世道詔改所居曰孝行里蠲復三世世道事繼母至孝貧産子不舉謂妻曰傷茲以終孝吾無恨也母亡負土成墳親近來助初皆不許墓畢傭力報焉是月京師疾疫使使巡問給醫藥死無家者賜以棺殮六月癸卯朔日有蝕之丙辰青黑虹見東西經天劉懷敬劉懷肅懷慎皆髙祖姨兄也髙祖生夕穆后殂從母乃斷懷敬乳而飬髙祖因以寄奴為小字也王𢎞之曽為桓謙衛將軍屬殷仲文往南州傾都餞送謙邀𢎞𢎞曰凡登髙送逺貴在有情下官與殷風馬不接未敢扈從謙敬其方直也魯國孔淳之隱于上虞謝方明為會稽固延不致謂曰茍不入吾郡何為入吾山淳之笑曰潛遊者未謝其水巢栖者非辨其林飛沉所至何問其主八月詔曰乃者權臣肇亂吉陽令張約之抗疏至誠事屈羣醜隕命遐荒參述前蹤贈以一郡賜錢十萬布百匹散騎常侍殷道鸞薦梓桐張楚母年一百四歲危疾楚祈禱懇惻燒二指誓神母蒙愈十一月辛未甘露降初寧陵散騎常侍陸子真薦豫章雷次宗尋陽陶潛南郡劉凝之並隱者也潛苦貧求仕為彭澤令不屈督郵棄官而去及其亡也顔延之傷而誄之其序曰夫璿玉至美不為池隍之寶椒桂信芳且非園林之飾豈其深而致逺哉蓋云殊性而已矣若乃巢由之雅行夷皓之峻節故以父老堯禹錙銖周漢綿世遐逺光靈不屬菁華隱沒流芳歇絶不其惜乎雖今之作者人自為量道路同塵輟塗殊軌者多矣豈所以照末景泛餘波有晉徴士弱不好㺯長實素心學匪稱師文取指逹處言逾見其默在衆不失其直後為彭澤令道不偶物棄官從好遂乃解體世紛結志區外諡曰靖節徴士又有劉凝之率已自任以老萊嚴遵為師友妻富於財散之親故丘園而居非績不衣非耕不食吏有租布一歲三輸荆州刺史衡陽王餉錢十萬凝之甚悅負出市門付與餓人一旦俱盡其年飢也吳興沈道虔好老易居縣北與人捃拾推已所有以釋爭者尋陽翟法賜四代隱居皆有髙德法賜親亡後不食五榖結草為衣不衣布帛置永豐寺去縣七十里原注案塔寺記元嘉四年謝方明造本名長樂寺為同郡延陵有之改焉畢置南林寺建康闕三里元嘉四年司馬梁王妃捨宅為晉陵公主造在中興里陳亡廢五年正月庚午朔大風司徒王𢎞遜位不許乙亥詔曰恭承洪業臨饗四海風化未𢎞治道多昧求人之事鑒寐惟憂加頃隂陽違序旱疫成患仰惟災戒責深在豫思所以側身尅巳審詳刑獄上答天譴下恤民責羣后百司其各獻讜言指陳得失勿有所諱甲申閲武于北郊戊子京師大火使使賑賜夏四月河南上白麞五月己巳太白經天以張邵為征虜將軍雍州刺史邵為太祖西中郎司馬王華為録事參軍二人共府不睦及華在朝多為之懼邵謂所知曰子陵方以至公允天下必不以私隙害正義邵是任也華先舉焉六月庚戌都下大水乙卯遣使檢行賑贍秋七月己丑大風八月壬戌侍中特進左光祿大夫陽遂鄉侯范泰卒贈車騎將軍諡曰宣侯初議贈開府殷景仁曰范伯倫素望非重不可擬議台鼎竟不行既葬王𢎞撫棺哭曰君平生重殷鐡今以此為報九月癸酉夜有黑氣如流星出奎婁沒羽林壬戌散騎常侍荀伯子上言曰伏見百官位次陳留王在零陵王上臣愚以為疑昔武王尅殷封神農後於焦黃帝後於祝帝堯後於薊帝舜後於陳夏之後於杞殷之後於宋宋杞陳並為列國薊焦蔑爾無聞斯則褒異所承優於逺代之顯驗也逮以春秋次序宋居杞陳之上臣請零陵王宜升陳留王宜降爵十二月天竺毗黎國遣使貢獻平原令河南成粲貽書於王𢎞曰僕聞軌物設教隨時制宜世代盈虛與時消息夫勢之所處非親不居是以周之宗盟異姓為後權軸之重任歸二南斯前代之良謀今世之顯轍明公位極台鼎四海具瞻劬勞夙夜義同吐握名實重盛莫之與儔天道福謙宜存損挹驃騎彭城王道德昭備上之懿弟宜入秉朝政翊贊皇猷竟陵衡陽春秋已長又冝出授列藩齊光魯衛明公髙枕道德燮理隂陽則天地和平災害不生矣初范泰將死亦謂王𢎞曰天下務廣權要難居卿弟兄太盛而彭城王久居南楚安身之道其未足乎𢎞纍求退及是又上疏曰臣聞異姓為後宗周之明義親不在外有國之所同故魯長滕君春秋所美楚出棄疾前史垂誡驃騎臣義康徽猷淵邈明德彌劭冝入總朝務以允民望昔叔孫未進楚人所哂展季在下臧文貽譏臣於古人無能為役負乘竊位物將謂何乞解揚州録事優詔答不聽是歲索虜拓跋燾滅西夏赫連氏盡有關中地六年春正月辛丑祀南郊癸丑徴彭城王義康為侍中司徒録尚書事平北將軍南徐州刺史入知朝政以江夏王義恭為撫軍將軍荆州刺史以侍中劉湛剛正用法為南蠻校尉撫軍長史行荆州事敕書誡義恭曰禮賢下士聖人垂訓驕奢矜尚先哲所去豁逹大度漢主之德猜忌褊急魏武之纍西楚殷廣宜勤接對府舍池堂無求改作訊罪決獄擇善從之不可專意自決凡左右所白不可泄漏或相讒謗勿輕信受每有此事冝善察之官爵賜豫尤宜裁量供奉一身皆令有度竒服異器慎不可興宜與寮吏相見為數不數則不親不親則視聽不博於言事者又得自盡皆急務也爾其慎諸劉湛既西意甚怏怏永初末諸王居憂多曠士禮湛為廬陵王從事禁膳魚肉嘗在王座厨人進車螯及酒湛怒曰既不以禮自處又不以禮處人趨出三月丁巳立皇子劭為皇太子大赦天下文武賜位一等五月壬辰朔日有蝕之七月壬寅會稽晉陵吳郡大風折木庚寅裴松之上書言曰智周則萬里自賔鑒逺則物無遺照雖盡性窮微深不可覩至於餘緒所寄則接乎塵迹臣前被詔使將三國異同注陳夀三國志壽書銓簡可觀事多審正誠遊覽之苑囿乃後世之嘉史然失在於略時有所漏臣案三國雖歷年不逺而事關漢晉首尾所涉出入百齡注記分錯年月舛互其壽所不載事宜存録者罔不畢取以補其闕或同説一事而詞有乖雜或出事本異疑不能制抄內以備聞謹寫封上呈帝覽之曰裴世期為不朽矣九月青州獻白兔十一月己丑朔日有蝕之不盡如鎌星晝見隴西諸國使使貢獻七年春正月乙未孟顗疏康樂侯謝靈運謀反帝不之罪遷為臨川內史二月壬戌雪且雷三月戊子遣右將軍到彥之安北將軍王仲德兖州刺史竺秀靈等率師北伐索虜尅復河北以長沙王義欣監征討諸軍事去年冬殷景仁毋憂去職至是起景仁為鎮軍將軍凡在喪曰起在外曰徴遷曰徙裴子野曰三年之喪有生之巨痛既貫天道實惟民極中世汙隆或行或否末世企勉還尚典刑而國之重臣多從權制因習漸染遂以成俗棄衰麻而服冕辨匪金革而徇冦戎君子辱乎上小人通乎下名教倒置將安用之茍非有為已之可也夏四月己丑有司奏西陵縣民董陽五世同居內無異㸑百濟林邑國使使貢獻六月乙卯爵楊難當為武都王七月丁未侍中王曇首卒贈散騎常侍左光祿大夫諡文侯初曇首為西中郎長史髙祖誡文帝曰王曇首沉毅有器度宰相才也曇首與兄𢎞俱有盛名家世久為揚州彭城心欲其所嘗謂客曰神州詎可卧理而王公久病居之𢎞恐辭疾終不許及曇首求為吳郡上曰豈有欲建大厦而棄其梁棟若賢兄謝病此卿之席也到彥之自淮入泗次東平須昌虜濟州刺史庫悉告燒碻磝兖州刺史羅秩燒滑臺彥之留司徒從事中郎朱循之守滑臺虜將大赤歇未及荆州刺史魯軌守虎牢彥之遣揚武將軍王玄謨進逼虎牢大破虜軍斬大赤歇未等洛州刺史逹奚蟬燒城走彥之使建武將軍杜冀守金墉諸軍進屯靈昌津司兖既收軍有喜色王仲德獨憂曰索虜雖仁義不足凶狡有餘今斂戈北歸并力完聚若河冰冬合方為三軍之憂九月河冰可涉靈昌衆軍還固冬十月乙卯并二豫復為一州鎮壽陽戊午初置錢署鑄四銖錢戊寅虜逼金墉虎牢諸軍相繼奔走到彥之焚舟棄甲而歸詔免彥之官壬辰以征虜大將軍檀道濟都督征討諸軍事率衆四萬北趨成臯甲午西北有赤氣中黑如旌旗十二月丙戌太白晝見甲午斬兖州刺史竺靈秀于彭城靈秀之歸也虜進湘陸秀謂其衆曰湘陸民為抄吾先為收其榖軍徐後來與麾下前走師皆沒是以誅之乙亥夜京師火延太社北垣八年春正月􅏤寅置朱崖郡以屬交州丁酉道濟軍次夀陽與虜悉結庫頰戰高梁亭斬之二月滑臺糧盡城內燻鼠為食辛酉城陷虜執朱修之以歸自是河南復亡且道濟高梁之捷也虜來萬數道濟三十餘戰輒尅敵滑臺既陷糧且盡退軍軍士有叛者以飢告虜師人恐懼道濟夜頓命軍中高唱量沙散布餘米明旦去之虜夜聞量籌曉見棄粟謂降者欺已斬之道濟遂領軍而返大為虜所懼服河畔老小常以檀公相怖二城既陷汝隂太守王玄謨上疏言王途始開隨復淪塞非唯天時抑亦人事虎牢滑臺豈惟將之不良抑亦本之不固本之不固亦由民憚逺役臣謂以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趨崤澠征夫無逺役之思吏民有屢休之歌若以東國之衆經營牢落道途既逺獨尅實難是月大雩夏四月甲子檀道濟請罪不許辛亥太白書見獲白雀于左衛府六月乙丑大赦天下己卯割江南為南徐州江北為南兖州以左將軍竟陵王義宣為兖州刺史鎮山陽是日大雩閏月庚子詔曰頃農桑惰業遊食者衆荒萊不開督課一時水旱便有罄匱不深存務本豐給靡期郡守賦止千里縣宰職主親民宜乃勸勵農桑秋七月壬戌夜白虹見于東方十二月庚辰雷癸亥罷湘州復并荆州九年春二月辛卯詔以先朝功臣王鎮惡劉穆之等皆銘功天府配祭廟庭辛亥華容公王𢎞薨贈太保給節羽葆鼓吹增班劍六十人諡文昭公六月甲戌以樂陵清河平原廣川四郡為州以司徒彭城王義康為揚州刺史解平北將軍開府儀同三司以兖州刺史臨川王義恭為平西將軍荆州刺史壬子江州獻白麞戊辰御史中丞荀伯子奏曰臣聞烏以反哺託體羔羊生而跪乳禮為嘉贄雖在微禽猶識學道矧與人倫而忘愁疾齊侯復九世之怨丁蘭報木母之耻取褒于春秋見列於國傳況乃分天之痛枕戈之戚者哉案給事黃門侍郎郗敬叔父兄為晉故荆州刺史殷仲堪所害仲堪息緬之永初三年除員外散騎常侍敬叔元嘉元年除中書侍郎密迹鄰省經涉三載每到公庭必相瞻覿散騎在前中書在後相去之間不盈咫尺縉紳視而含哂義士聞而增嘆夫復讐禮之所許法之不禁若畏王憲僶俯茍且者宜退藏于家與之遐阻豈可接迹躡影靦然無怍以叨榮祿笑傲卒歲且中書散騎職為同寮若使𬗟之不幸敬叔當素服弔祭於殷氏之庭乎自古悖禮無若斯之甚者也不有嚴革風教將頽案敬叔率其庸鄙乏闕典墳行與道違心與義塞息天屬之性遺顧復之恩傷仁敗俗情禮都盡雖事經曠蕩非肆眚所及請免敬叔所居官禁錮終身情義之敗付之鄉論有詔理焉詔有司盱眙王彭所居曰通靈里蠲復二世彭幼喪母後父亡將營葬值天旱逺汲以泥磚泣號勤悴一旦大霧霧歇於磚竈前有水如池得以周用窆訖歸助者或亡其斧返求之至向水所則積旱揚塵塵有雉浴鄉人異焉裴子野曰天地之大德曰生生民之至德曰孝所以報本返始盡性窮神行莫重焉教莫先焉夫茹藿羮藜父子和恱易衣并食兄弟怡怡所以利不置於有餘則慈愛隆于不足承顔稟色庸淺易敦若乃貴髙九五富有萬國前聆鄭衛傍侍綺羅其始也以宴褻成踈其漸也以勢利嫌隙由是乎恩乏天然思輕膝下今之人互為魚肉聖人知其若是惡其流蔓故禮以節之樂以和之朝夕安否嘗藥侍膳父子之禮也陳詩齒族紏合宴私兄弟之樂也夫然後禮樂交暢無相奪倫孝悌興于國門德教加于百姓上和三光旁穆四海先王化成天下而禍亂不作用此道也昔漢髙有宇內五日一朝櫟陽之禮也魏文有天下同氣建封若狴牢四體若仇讐當塗之制也迄于宋有不可言者焉嗚呼流弊可陳于前鑒戒無悛于後夏四月乙亥宥到彥之為護軍將軍己丑太白晝見乙未雨雹傷牛馬鳥獸八月癸未封江夏王義恭子朗為南豐王奉滎陽王祀第五皇子紹為廬陵王奉孝獻王祀是春司馬飛龍自仇池入冦綿竹破平陸州擊之時益州刺史劉道濟以五城人白氐奴為參軍督護長史費謙固執不可氐奴怒去詐其黨曰司馬殿下在湯泉山中五日奉之則大勳可建蜀人趙廣聚衆數千與會因費謙等貪害百姓百姓咸思亂遂入湯泉山脅沙門程道飬使為司馬飛龍推行益州牧事車騎大將軍僣號蜀王稱太始元年圍益州刺史劉道濟於成都白氐奴號征虜將軍趙廣號鎮軍將軍衆至十萬四面圍城使告道濟曰使君若速送費謙張熙出即解圍臨川內史謝靈運于廣州棄市靈運之居也雅不治職前臨川內史司馬協少子來投義故靈運舍諸正寢為居始如酣笑久而不止非隱其事諷主者以黷貨劾焉江州部從事收靈運乃徙廣州敕於南海行刑靈運名公孫少而文章秀逸聲譽流聞冠耀天下然輕肆躁擾不可大任世以為文與顔延之為江左第一縱橫俊發過之是月劉道濟大破蜀賊因而病十二月蜀賊又圍益州破外軍道濟既久病城內以為死也人情不安振威將軍梁俊説道濟曰將軍久病氣力微怯外有異論今軍人外敗強冦內逼一旦不虞憂禍立至宜稱小損聽侍者出外不然敗矣道濟然之呼給使四十人謂曰吾不幸久卧爾等扶侍有勞今微差矣可以休息須召復歸給事者皆出衆問曰使君已死幾日咸曰無之傳以相告城內乃定是嵗朱修之歸自黃龍初修之見獲遇毛修之於桑乾毛修之三年不敢問其家室語及國事問當軸者誰曰殷景仁毛歎曰吾昔在朝殷時尚少今日歸罪則巾韝詣門乎遂問其子朱具答修之悲甚直視不能復言朱修之懼禍奔馮𢎞𢎞以為天子邊人泛海柁折舟人大懼海師因垂長索舫乃正視上有飛鳥知去岸不逺俄而逹東萊郡帝拜為給事黃門侍郎毛修之竟死於魏十年春正月侍中左衛率謝𢎞微卒𢎞微為從父混所知混嘗論諸子靈運博而無檢宣明納善不周雖復功濟三才終必以此為疾至如微子吾無間然後咸如所言己未大赦天下孤老久病不能自存者賜穀五斛是月益州刺史劉道濟卒梁俊祕之不發喪埋之於齋使書以會之遣前後軍大破賊賊乃散走益州平六月闍婆州訶羅單國遣使貢方物乙亥丹陽尹王淮之卒淮之自曽祖彪之已來稱為多識朝廷舊事問無不對彭城王每稱之曰如得王淮之兩三人天下便足淮之有遺抄一篋謂之青箱學秋八月置太原郡以屬青州冬十月氐賊冦漢中梁州刺史甄法護棄州奔江陵下獄死十一年三月丙申禊飲於樂遊園且為江夏衡陽二王來朝帝有詔會者賦詩命太子中庶子顔延之為序其大略曰有宋函夏帝圖𢎞逺髙祖以神武定鼎規同造物皇上以睿文承厯景屬宸居隆周之卜既永宗漢之兆在焉正體流德於少陽王宰宣哲于元輔左關巖磴右瞰湖源情深景遽歡洽日斜夏四月秦梁二州刺史橫野將軍蕭思話破氐賊於漢中漢中平思話遷郡于南鄭五月青州獻白雀六月省魏郡冬十二月扶南訶羅單國遣使貢獻置竹園寺西北去縣一里在今建康東村蔣陵里檀橋案寺記宋元嘉十一年縣城東一里宋臨川公主造十二年春正月辛酉大赦天下辛未郊癸酉封黃龍馮𢎞為燕王夏四月乙巳以殷景仁為中書令護軍以家為府丙辰詔曰宗周以寧實由多士漢室之盛亦在得人朕寤寐求賢為日久矣遺才在野管庫虛朝永懷前載慙德深矣是夜京師地震六月禁酒秋八月壬申置南晉夀新巴西郡屬益州冬十月壬子太白晝見江州刺史檀道濟來朝十三年春正月癸丑朔不朝會帝疾故也三月己未散騎常侍司空江州刺史永修公檀道濟下獄死道濟威名甚重見忌於彭城王時帝久疾欲先為之所言於帝諷入朝留之纍月會帝有間將遣歸鎮是日帝疾動召入省止焉道濟憤怒氣盛目光如炬俄爾之間引飲一斛王遂矯詔賜死道濟投幘而語曰何故毁汝萬里長城收其妻子皆從坐義興獻白兔夏六月高麗國遣使貢獻武昌得古鼎秋七月己未零陵王太妃禇氏殂追崇為晉皇后九月癸丑封皇子濬為始興王第三子駿為武陵王辛未附葬晉思恭皇后于沖平陵備物一如晉典有司求晉遺臣以襄葬職時前永嘉太守顔延之廢處於家札取延之兼侍中延之投札于地曰顔延之未能事生焉能事鬼遂不行十四年正月辛卯郊大赦天下文武各賜位一等戊戌鳯凰二見於京師有鳥隨之改其地為鳯凰里冬十二月辛酉初停賀雪之禮河南西河訶羅單國使使貢獻十五年春二月京師木連理夏四月黃龍國使使貢獻五月征北大將軍王仲德卒仲德曽在北為慕容垂所逐潦水暴至不知所如有白狼來對仲德號訖厲水渡仲德隨之獲免又曽夜行澤中大道每有炬火照路後每圖白狼祀之秋七月南兖州獻白兔新作東宫賜將作大匠布帛有差八月詔徴南郡宗炳為太子中庶子裴子野曰夫動與靜天地之法也剛與柔隂陽之道也得之以生曰人稟之為靈曰性備之者謂聖偏之者謂賢慘舒動靜有所麗此性分之略也戴顒奏遍舞于山楹沈處移大賚於子姪羊秋足不踐閶闔而終身佩青緺白圭之操斯為玷矣雷次宗頗逺近賢又似避諱肖夫隱者其劉凝之乎若乃黨世位以邀名事流俗以買譽交于貨賄冒于酒食州亭縣簿無不必走榮徴重辟擇而後起是謂路數汙惡史人所耻論也冬十一月壬子流星出太白入紫微有聲如雷是月立儒學于北郊延雷次宗修之辭入宫掖乃自華林東閣入講于延賢堂明年尚書尹何尚之立玄學著作郎何承天立史學司徒參軍謝元立文學各集門徒多就業者時上好儒雅朝臣嘉儉素之風鄉閭耻輕薄之行江左風俗于斯為美帝躬親檢行寬恕被物庶政𢎞而不弭禁網理而不峻邦甸穆然言理政者以元嘉為稱首焉十六年春正月戊寅閲武于北郊癸巳復置湘州二月己丑割長沙江寧江夏四縣為巴陵郡五月丁卯太白經天六月己酉改封吐谷渾慕容延為河南王八月戊午太白晝見閏月戊寅復分豫州置南豫州冬十二月乙亥皇太子劭冠大赦天下劭之初生也帝往視之帽無故墜地名劭訓字以為召刀帝甚惡之改刀為力焉武都河內林邑並遣使貢獻置上定林寺西南去縣十八里原案寺記元嘉十六年禪師竺法秀造在下定林之後法秀初止祗洹寺移居于此也十七年春二月己巳夜有黑氣經天夏四月戊午朔日有蝕之六月己酉太白晝見秋七月壬子皇后袁氏崩于顯陽殿八月徐兖青冀大水使使巡行賑賜辛亥葬袁皇后于長寧詔史臣顔延之作䇿文文成奏帝帝傷之自下筆加其二句追存悼亡感今懷昔以致深意焉冬十一月戊午前丹陽尹劉湛有罪伏誅親眷並死殷景仁之毁也湛不好浮華慕崔琰之為人有經國才志善論理道言之喋喋使聽者忘疲初上為江夏王荆州西歸日夕引見及與殷景仁嫌隙上私謂左右曰劉湛初歸吾與言常候日早晏慮其將出比日對之亦察日早晚慮其不出時帝疾篤彭城王義康內侍醫藥有憂色帝危殆敕義康以周公之事且令具顧命詔草義康出流涕以語湛湛曰行天下事豈幼主所堪義康不答湛私與孔允秀等尋晉成帝崩康帝即位儀注帝既瘳微知其事未之發也及湛丁艱伏甲室中以待上臨弔謀又泄帝召殷景仁彭城王入內省數以湛過是以大赦天下文武賜位二等出義康為江州刺史實幽于豫章太守義康之敗也東府井水無故湧溢野雉江鷗集飛內寢義康將南嘆曰昔謝述唯勸吾退劉湛唯勸吾進今述存而湛死吾敗宜哉甲戌以殷景仁為揚州刺史尚書僕射領太子詹事十一月乙酉朔甘露降于樂遊苑己丑殷景仁卒詔曰尚書左僕射殷景仁秉德𢎞正思理明逺翊亮朝端風猷允集經緯屯夷嘉猷克舉綢繆樞祕獻替惟休方佇良圖以隆國道徽庸不遂痛悼兼深考終之禮宜存優泰可贈常侍司空諡文成公景仁入西州疾篤就寢則見劉湛為厲如是數旬上為之纍息敕西州道上不得有車聲十八年春正月甲辰以彭城王義康都督江交廣三州軍事前龍驤將軍巴東扶令育詣闕上書引漢袁盎諫孝文遷淮南王事臣聞哲王不逆切諫以博聞為道人臣不忘殱夷之罰以盡言為忠是故周昌極諌馮唐面折所以孝惠克固儲嗣魏尚所以復任雲中彼二臣豈好逆主干時犯顔違色者哉書奏帝怒下獄死裴子野曰彼人臣者祿及其親榮庇其後身以之泰道以之行是故君親臨之有恩有敬綢繆繾綣義莫重焉敬之欲其尊愛之欲其報忠諫之道自此而興名實既頽君臣交喪猜離懸隔非近股肱上則疾勝已好文過而倨隔下則階梯緬邈懷憤悶而莫通憤悶在心辭多偏矯矜倨在已易以誅殘故逆彼驪龍自貽虀粉雖趣膚寸動及雷霆若扶令育者無位於國挺然萬里粗明主所甚諱是欲行義古之遺直者歟比夫全軀懷祿之人有殊間矣以太祖之含𢎞尚掩耳於彭城之戮自斯已後誰易由言有宋纍葉罕聞諒直豈骨鯁之氣乃愧前古抑王之刑政使之然乎張約隕于權臣扶育斃于哲后宋之鼎鑊吁可畏哉三月庚子雨雹戊申置尚書刪定郎官夏四月汝隂獻白雉五月南徐獻白燕吳郡獻白雀彭城獻白兔甲申甘露降臨川王園河水溢泛害居民使巡行賑賜七月壬辰夜天有光通照冬十月剡縣獻白鳩氐賊楊難當僣稱秦王立后及太子置百官災異多降復自貶為武都王傾國南寇欲王于蜀遣别將傅沖冦漢川刺史劉道真拒破之十一月氐賊冦萌晉夀昌太守申悝進及涪城巴西太守劉道錫嬰城固守氐不能拔乃退中書舍人徐爰有寵於帝帝嘗命王球及殷景仁與之相知蒨玉辭曰士庶區别國之章也臣不敢奉詔帝改容謝焉十二月河南肅慎高麗林邑蘇摩黎並遣使貢獻十九年春正月乙未中散大夫羊欣卒欣以晉隆安中司馬元顯使欣書扇欣不奉命元顯取為後軍舍人伍衆為耻欣淡然自若二月宣城野蠶成繭三月乙未太白晝見壬寅帝親臨儒學徴士雷次宗以巾幅講學近侍王公卿士畢至迄夕罷賜諸生帛有差詔曰將陶鈞庶品混一殊風四月甲戌大赦天下以何尚之領國子祭酒中散大夫裴松之太子率更令何承天領國子博士于時朝廷碩學推裴荀何傅傅隆長于為政承天病於疏曠伯子通脫率易不以鎮重自居裴西鄉清簡恬素最以不競為法位不踰於三子名則差焉顔延之亦號博聞而剛愎潛忌時人惡之名顔虎五月罷揚州府佐吏京師大水使使賑賜劉真道征仇池自正月至此月始尅之楊難當奔于索虜偽丞相萬夀率左右歸降難當既走以輔國司馬胡崇之為秦州刺史將就鎮焉秋七月甲戌晦日有蝕之九月丙辰有客星在北斗因為彗入于文昌貫五車掃畢拂天節經天苑季冬乃滅冬十月蠕蠕國遣使貢獻輔國將軍雍州刺史劉道産卒道産在州惠化大行有蠻不順化者悉出居樊河村落相望百姓歌之號曰襄陽樂及喪東還漢濵羣蠻縗絰號哭送之千餘里十一月丙申詔曰胄子始集學業方興自微言滅絶將涉千祀懷仁感事意有慨然奉聖之胤速議繼襲於先廟地特為營造給祠直令四時享祭并下魯郡修學舍蠲墓側五戶剪除掃灑婆黃國使使貢獻二十年春正月辛亥郊開萬春千秋等門二月甲戌閲武于北郊是月胡崇之未至仇池八十里遇後魏將拓拔齊戰敗于濁水執崇之餘兵奔西鄭夏四月甲午封第六皇子誕為廣陵王六月吳郡獻白龜秣陵縣言白雀見初劉真道征仇池也郡帥掠居民盜善馬為有司所劾至是下獄死秋八月壬子加右衛將軍沈演之為侍中上曰侍中領衛皆為宰相鴻漸江左罕受此職故以此處卿演之辭謝就職其居顯要能謙約自保上嘗賜以女樂讓不敢當冬十一月辛丑太白晝見十二月壬午詔曰國以民為本民以食為命故一夫不耕飢者必及倉廩既實禮節以興頃有貧罄之家誠由德政不舉以臻斯弊抑亦耕桑未廣地利多遺其有遊食之徒咸令附業朕當親率百辟致禮甸侯庶幾素誠奬彼斯民百濟倭國使使貢獻自去秋迄乎是秋水旱傷稼民多飢詔郡國開倉賜糧種二十一年春正月復禁酒恤飢也辛酉躬耕帝藉下詔大赦天下一切逋負自十九年已前並放免二月庚辰以沈演之為中領軍辛卯封第七皇子宏為建平王三月甲戌太白經天夏四月晉陵民徐耕以米千斛助恤飢民六月京師霖雨使使賑賜七月甘露降樂遊苑原案輿地志縣東北八里晉時為藥圃盧循之築藥園壘即此處也其地舊是晉北郊宋元嘉中移郊壇出外以其地為北苑遂更興造樓觀于覆舟山乃築堤壅水號曰後湖其山北臨湖水後改曰樂遊苑山上大設亭觀山北有氷井孝武藏氷之所至大明中又盛造正陽殿梁侯景之亂悉焚毁至陳天嘉二年更加修葺于山上立甘露亭陳亡並廢八月庚辰徐湛之母會稽長公主薨主臧后所生起自布衣故見尊重彭城王既徙上嘗宴于主第酒酣主下席叩頭流涕帝自起扶之問其故答曰車子嵗暮必不為陛下所容帝揮淚指蔣山曰若其有此則負初寧陵是以畢主身義康無恙九月甲申後魏拓拔帝滅沮渠盡有河西地冬十月丙子起徐湛之本職丹陽尹於郡設喪位乙亥令之國丙子雷且電十一月湘州獻赤鸚鵡何承天上元嘉厯云君當順天以求合非為合以驗天也堯時冬至日在須女十度漢太初厯冬至日在牽牛初後漢四分及魏景初法同在斗二十一度臣以月蝕驗之則景初冬至應在斗十七度又後漢至春分日長秋分日短差過半刻則二至之間而有短長誠由春分近夏至故長秋分近冬至故短也又奏改刻漏二十五箭帝並從之裴子野曰夫厯以端時時以頒政政成而民不僣晷叶而時不違先王厯象日月欽若昊天敬授民時謂是物也後世穿鑿拘於禁忌推步盈虛其細已甚削逺以附近毁雅以敦俗多鄙俚之説亂探索之旨由是縉紳先生不以隂陽為學及何承天能正纍代遺術博物君子也二十二年春正月辛卯朔初班元嘉厯壬辰撫軍將軍武陵王駿為雍州刺史南平王鑠為冠軍將軍豫州刺史以二豫為一州二月甲戌封第八皇子褘為東海王第九皇子昶為義陽王三月乙未皇太子劭釋奠于國學賜王公而下帛有差六月武昌獲古鼎豫章獲鐘秋七月遷南州羣蠻四萬一千口于丹徒劉道産卒而襄陽蠻入武陵鎮主淳于坦遣中兵參軍擊破之故徙也八月甲午太白晝見是月開酒禁有年也九月乙酉建宇於武帳岡上將行敕諸子且勿食至會所有饌日旰食不至皆有飢色上誡曰汝曹少長豐佚不見百姓艱難今使汝等識有飢苦知以節儉御物也裴子野曰善乎太祖之訓也是謂宜其為君夫為君役興於有餘儉生於不足物之數也其欲隱約莫若窮賤縱其驕蹇莫甚尊榮自河徂亳殷宗所以克隆索綯播稼岐周所以聿興習其險艱利以任使達其情偽易以躬臨是以居世之懿德字民之要道不可忽焉太祖若能率此訓也俾之難其志操卑其禮秩教民成德立功然後授以政事則無怠無荒可播之于九服矣初髙祖思固本支崇樹強幹後世遵守迭據方嶽及乎太祖之初升明之季絶恩于衾衽者數十人國之存亡既不是繫早肆民上非善誨也冬藉田獲嘉禾十月己未太子詹事范曄負外散騎常侍孔熙先等奉大將軍謀反伏誅丁酉免侍中彭城王為庶人絶屬籍幽于安城郡孔熙先者廣州刺史默之子有才略頗涉學不為當世所知憤憤不得志且善占星言江州分野出天子文帝當見殘于骨肉因與謝綜等密謀奉大將軍反熙先謂范曄曰潛圖構於表裏疾雷奮于肘腋昔毛玠竭節不容於魏武張溫畢議見逐於孫權彼二人者國之信臣朝之俊乂豈瑕疵暴露言行玷缺然後至於禍辱哉且崇樹聖明至德也大業洪名美號也三王五霸所以覆軍敗將而爭之者也一朝含垢不亦可乎曄為彭城王吏及王太妃殂曄為吏部郎與司徒屬王深及弟廣夜中酣飲開北牖聽挽歌王大怒左遷宣城太守後因孔熙先議謀立大將軍義康而密要徐湛之湛之初與同及武帳之會也逆謀竊發許耀侍上持刀以目曄曄不敢視俄而座散徐湛之以其謀聞于上帝使探索其事始末悉得檄文於是收范曄等親黨皆棄市曄善草𨽻書稱妙著後漢書九十卷起建武迄于延康為一代良史然薄德淺行家禮不足見收之日妓妾不勝珠翠老母唯有二厨盛樵薪熙先先在獄上使使謂曰朕知卿才智如此早相器任庶不及今日熙先乃上書言其首謀之事多言天文事誡上嚴慎骨肉又請其祖察父默集及默所撰榖梁傳乞還家上許之初謝綜交熙先也弟約不預每誡兄曰此人輕事好竒不近於道觀其嬉戲不料敵之強弱每服藥石便謂羽化可期果鋭無檢未可與狎初曄方進何尚之察其意趣言於帝請出曄為廣州刺史帝曰始誅劉湛復出曄人謂卿等不能容才但使共知如此不憂致大也裴子野曰夫有逸羣之才必思沖天據蓋俗之量則閔常均之下其能導之以禮將之以識作而不失于義行而不犯于禮殆難為乎若劉仁𢎞之剛毅才堪上相范蔚宗之致思名出凡庸然皆切志而貪權務才而徇逆天符所釁以欲干時及罪暴刑加子父相哭纍葉風素殞於一朝向之所謂智能翻為亡身之具矣有司奏徐湛之昵比匪人關預逆黨事起積嵗方始歸聞請免官削爵收付廷尉帝不許湛之懼詣闕上疏自理優詔答之是冬浚淮起湖熟田千餘頃置延夀寺西北去縣八十里原案寺記元嘉二年義陽王昶母謝太妃造隋末廢上元二年重置又名延熙寺二十三年正月庚申以孟顗為光祿大夫領太子詹事二月交州獻白鹿丁卯後魏冦兖豫青冀四州刺史申恬拒破之夏四月丁未大赦天下六月癸未朔日有蝕之交州刺史檀和之安西將軍蕭景憲憲副將宗慤等帥師攻林邑國破之林邑王范陽邁悉國之崑崙兵皆乘象以鬬士卒不能當宗慤曰吾聞獅子伏百獸試為之可以逞乃削木為首編毛為身力士數人蒙之以振尅日又戰師乃望陳而馳其象奔迸賊軍乃潰走因滅其國納口二萬餘金五萬斤其無名之寶不可勝算慤奉以歸于其至也唯行時巾櫛衣服上聞而嘉焉擢為太尉中兵參軍慤叔父炳荆楚髙人子弟皆以琴書相尚慤獨感激好功名慤嘗遇炳曰願乘長風破萬里浪炳歎曰汝若不富貴必敗吾宗為江夏國上將軍十五年不改職至是始大知名乙亥以北地段英為都督關隴諸軍事安西將軍雍州刺史後魏破之死其將河東薛安都棄衆走歸國九月乙卯上臨試諸生于國學賜學官帛有差吳郡獲野稻嘉禾秀于華林園殿甘露降于長寧陵是嵗堰玄武湖于樂遊苑北興景陽山于華林園役及居民民有怨者是嵗置華林園東五里原案地輿志吳時舊宫苑也晉孝武更築立宫室宋元嘉二十二年重修廣之又築景陽武壯諸山鑿池名天淵造景陽樓以通天觀至孝武大明中紫雲出景陽樓因改為景雲樓又造琴堂東有雙樹連理又改為連玉堂又造靈曜前後殿又芳香堂日觀臺元嘉中築蔬圃又築景陽東嶺又造光華殿設射棚又立鳯光殿醴泉堂花蕚池又造一柱臺層城觀興光殿梁武又造重閣上名重雲殿下名興光殿及朝日夕月之樓登之而階道繞樓九轉自吳晉宋齊梁陳六代互有搆造盡古今之妙陳永初中更造聽訟殿天嘉三年又作臨政殿其山川制置多是宋將作大匠張永所作其宫殿數多舊來不用乃取華林園以為號陳亡悉廢矣二十四年春正月壬寅以徐湛之為中書令領太子詹事甲戌大赦天下文武賜位一等孤老久疾不能自存者人賜榖五斛蠲建康秣陵今年田租之半華林園職掌疇量賜之二月京師木連理三月甘露降景陽山夏四月河濟俱清六月京師疾疫使使巡行給醫藥初行大錢一當細錢二是時民或盜鑄始剪古錢議其禁沈演之議龜貝行于上古泉刀興于周世所以豐財通利實國富民若以大當兩則國用難朽之貨家贏一倍之利不俟加憲巧源自絶既而錢形不一民不之便是時劉秀之為梁州刺史初令民用錢而遂行之而江湖之南多以布米為貨錢之所行未皆普也八月御史中丞何承天將遷廷尉且欲為吏部郎便自舉代既受旨出為人言之以編敕得罪卒于家十月壬辰盜殺豫章太守桓隆之時胡藩有十七子不遵法度第十四者曰遵世同范曄逆謀帝以藩功臣匿其事敕江州以他罪殺之十六者延世以羣從祕兵二百餘人攻郡殺桓隆之將奉故彭城王以作亂值交州刺史檀和之去官歸便道討平之乃奪藩封邑徙其子于交州十一月甲寅封第十皇子渾為汝隂王是嵗徐兖青冀大水二十五年春正月使使巡行四方貸糧種二月庚寅詔曰安不忘危經世之所尚治兵教戰有國之恆典故服訓明耻然後少長知禁頃戎政雖修而號令未審今宣武場始成便可尅日大習衆軍校獵講武事閏月己酉大搜辛亥雨雹吏部尚書庾炳之有罪免上始臨朝任王華王曇首殷景仁謝𢎞微劉湛等號曰五臣亞以范曄沈演之庾炳之庾炳之後則徐湛之又何尚之王僧綽以終元嘉之世炳之無文學性強急輕淺既居選部好詆詈賔客且通貨賄士咸怨之是時請急還家尚書令史咨事一人善彈一人工歌留與宿有司以違制奏焉上以其事問何尚之尚之因言炳罪上欲去其丹陽尹再問尚之尚之對曰臣既乏賈生應對之才又乏汲黯犯顔之直至于侍坐仰酬多不能盡庾炳之事迹異口同音咸無善聲古今未有受貨數萬而得髙官厚祿如炳之者唯明主審之古人有言無賞無罰堯舜不能為治陛下豈可坐損皇家之重迷一凡人事若復在可否之間臣不敢茍陳管窺今之枉直明白炳然睿主哲王反更不悟帝乃可有司逐炳之歸田里以夀終幸也三月庚辰校獵宣武場夏四月新作閶闔廣莫等門改先廣莫門曰承明開陽曰津陽丁卯太白經天丁丑青龍見于玄武湖南五月乙卯罷當兩大錢戊戌黑龍見玄武湖六月庚戌零陵王司馬元瑜薨時始興王濬潘淑妃之子以母寵故出入後宫不禁遂通于第四妹海鹽公主出適丹陽尹趙伯符子倩倩入宫而怒肆罵搏擊引絶帳帶聞于上上有詔離婚罪主所生蔣美人伯符慙發病死贈西平將軍常侍如故侍中特進太子少傅王敬宏卒于吳興舍亭山贈開府儀同三司敬宏辭職東歸深見禮重清簡方正子弟嵗中不過一再相見子恢之嘗為祕書郎上將為廬陵王納其女辭曰臣女稚年先許孔淳之息乃使恢之求奉朝請曰祕書有限故有競朝請無限故無競吾欲使汝處無競之地上皆許之方其在位帝嘗問得失敬宏對曰天下有道庶人不議裴子野曰有其位無其言君子耻之王公之談為不類矣居官不事以敵為名正始元康之風中原所敗也縱而勿檢致治難哉八月甲子封第十一皇子彧為淮陽王華林園嘉禾秀九月辛未以何尚之為尚書左僕射領汝渭之地二十六年春正月辛巳祀南郊二月己亥幸丹徒宫大赦復丹徒縣僑舊今嵗租布之半所行經縣並蠲免田租之半癸亥使使祭晉故司空忠肅公何無忌墓壬午婆皇國婆達國並遣使貢獻冬十月庚子改封廣陵王誕為南郡王癸卯彗星見于太微甲辰以揚州刺史始興王濬為征北將軍開府儀同三司南徐兖二州刺史二十七年春正月辛卯百濟國遣使貢獻二月魏軍攻懸瓠以軍興減百官俸祿三分之一三月乙丑淮南太守諸葛闡求減俸祿同內百官於是縣丞尉並同減矣戊寅罷國子學秋七月庚午遣建寧將軍王玄謨拒魏軍以大尉江夏王義恭出次彭城總統諸軍冬十一月丁未大赦十二月庚午魏太武率大衆至瓜步聲欲渡江都下震懼咸荷擔而立壬午內外戒嚴沿江六七百里艦舳相接始議北侵朝士多有不同至是帝登石城烽火樓極望不悅謂江湛曰向使檀道濟在此虜敢犯我境耶然侵北之計同議者少今日士庶勞怨豈得無慙貽士大夫之憂在豫過矣甲申使使饋百牢于魏二十八年春正月丁亥魏太武自瓜步退歸俘廣陵居人萬餘家北徐豫青冀二兖州殺戮不可勝計所過州縣無遺矣二月甲戌降太尉領司徒江夏王義恭為驃騎將軍開府儀同三司壬午帝幸瓜步是日戒嚴三月乙酉車駕還宫丙申拜初寧陵大旱四月癸酉婆達國遣使貢獻己卯彗星見于昴是月都下疾疫使使給藥五月乙酉亡命司馬順則自號齊王據梁鄒城丁巳婆皇國河南國並遣使貢獻壬午彗星見太微中對帝座秋七月甲辰進安東將軍倭王綏濟為安東大將軍八月癸酉梁鄒平斬司馬順則是秋猛獸入郭為災冬十月高麗國遣使貢獻十一月壬寅曲赦二兖徐豫青冀六州徙彭城流人淮西流人于姑熟合千餘家是嵗魏正平元年也二十九年春正月甲午詔經冦六州仍連水潦可量加救贍二月乙未雷且雪庚午封皇子休仁為建安王三月壬午大風拔木都下災夏四月戊午訶羅國遣使貢獻秋七月壬辰封汝隂王渾為武昌王淮陽王彧為湘東王丁酉省大司農太子僕廷尉監官九月丁亥以平西將軍吐谷渾拾寅為安西將軍秦河二州刺史封河南王冬十一月壬寅揚州刺史廬陵王紹薨十二月戊申黃霧四塞辛未以兖州刺史江夏王義恭為大將軍南徐州刺史録尚書事如故是嵗魏侍中常侍宗愛構逆太武皇帝崩乃奉南安王余為帝改元承平尋又廢余殿中尚書長孫渴侯尚書陸麗奉皇孫是為魏文成皇帝改元興元三十年春正月乙亥朔會羣臣于太極殿有青黑氣從東南來覆映宫上戊寅以司空荆州刺史南譙王義宣為司徒中軍將軍揚州刺史壬午以南徐州始興王濬為衛將軍開府儀同三司戊子使江州刺史武陵王駿統衆軍伐西陽之蠻二月甲子元凶劭搆逆弒帝崩于含章殿時年四十七諡曰景皇帝廟號中宗三月癸巳葬長寧陵陵在今縣東北二十里周回三十五步髙一丈八尺孝武帝踐阼追諡為文皇帝廟號太祖原案帝聰明仁厚雅重文儒躬勤政事孜孜無怠加以在位日久唯簡靜為心于時政平訟理朝野悅服自江左以來未之有也又性好節儉不好奢侈車府令嘗以輦䇨故改易之又輦席舊欲以紫皮緣之上皆不許其勤儉率此類也建康實録卷十二
