body:
  text: 建康實録卷十三唐許嵩撰宋世祖孝武皇帝世祖孝武皇帝諱駿字休龍幼名道民文帝第三子六歲以元嘉十二年封武陵郡王自江左以來襄陽未有皇子重鎮太祖欲經畧關河故以武陵王為雍秦荆江四州六郡諸軍事撫軍將軍雍州刺史三十年以西中郎將移鎮西陽聞元兇構逆遂垂涕召沈慶之及僚佐等議初慶之統武陵軍事世祖在鎮元兇嘗密與慶之書令致世祖慶之入帝疑之稱疾不敢見慶之突入前以元兇書呈帝帝悲泣求入内與母别慶之曰下官受先帝厚命今日唯力是視殿下何疑帝前拜曰國家安危在將軍也即日令勒兵處分内外軍事一委慶之以主簿顏峻為諮議掌總文書議定慶之即戎勒兵峻乃進曰今步兵少力薄宜待衆軍集慶之怒曰方興大事而黄口小兒參預此禍至矣宜斬以徇峻懼再拜以謝慶之慶之曰君但知筆札事庚寅使顏峻馳檄四方言劭兇異殺害君父毒流王公卿士三月乙未建牙於軍門是日衆軍發自西陽以寧朔將軍栁元景為都督前鋒丁酉軍次尋陽四方征鎮不謀同舉所在雲集是時㑹稽太守隨王誕以衆兵次于西陵劉秀之充前軍來㑹荆州刺史義宣雍州刺史臧質並舉四月辛酉上次溧洲癸亥栁元景至新亭修築營壘歸者相屬時帝中風暴疾殆將數旬顏峻懼聞於衆擁王於膝上親視起居内外軍政室内經畧間以文教書檄應接遐邇自舟中甲士亦不知帝之危疾也甲子賊劭親率衆軍來攻元景開壘鼓噪奔之賊衆大敗劭更率餘衆攻壘復大破之殺傷甚衆劭退至於澗劭軍人馬投澗死者不可勝數澗水為之不流至今猶呼為死馬澗劭走馬還臺城江夏王義恭自東堂與數十人出奔濟於冶渚策馬詣新亭於馬上上疏勸進戊辰帝遷營於新亭己巳百寮奉璽紱帝泣下固辭江夏王再拜三辭因設壇即帝位于營所改新亭為中興亭下詔大赦天下進文武爵位二等賞士卒各有差孤獨不能自存者皆賜穀帛以江夏王義恭領太尉録尚書六條事給鼓吹班劍黄鉞進顏峻為侍中五月丙子擒元兇于太倉井庚辰臧質以甲仗百人入守朝堂辛巳車駕幸龍舟遷於東府羣臣請罪詔曰巨逆作亂人倫道盡王公卿士受制凶威事難勢屈無所追謝甲申尊所生路淑婉為皇太后詔襃故太子左衛率袁淑和加殊禮贈侍中太尉諡曰忠憲公追死王事贈徐湛之散騎常侍司空諡曰忠烈公江湛散騎常侍左光禄大夫諡曰忠簡公王僧綽諡曰忠愍侯以栁元景為領軍將軍甲午初謁長寧陵追贈卜之興龍驤將軍六月丙午謁太廟還登太極殿哭盡哀百官陪位莫不下淚初置殿門及上閣門屯兵丁亥詔諸司薄已厚民去繁從簡悉宜施行辛未大紀勲行賞封南譙王義宣為南郡王隨王誕為竟陵王各五千戸封臧質始興郡公沈慶之南昌郡公柳元景曲江公各三千户宗慤洮陽侯劉延孫東昌侯顏峻建武侯各二千户徐遺寳益陽侯五百户庚子復置南兖州丙子使使兼散騎常侍巡行天下蠲尋陽租布三年己亥立皇后王氏丙申置衛尉官詔使建平王宏迎皇太后於尋陽庚子上諡大行皇帝廟號太祖秋七月辛丑朔日有蝕之辛酉下詔任百姓捕採貴戚不得競利壬戌皇太后至自尋陽八月乙亥以王僧達拜䕶軍將軍僧達時自負才地不稱所望遂上表陳讓曰臣有志於學無獨見之敏有道在身無偏監之識固不足以達言治世備辦時宜竊謂當今之務唯在先䘏庶心從民之欲如使臣享厚禄居重榮衣狐坐熊而無事於世者固不能安也䕶軍之任不敢處書奏帝帝知其不愜志甲午以僧達為征虜將軍吳郡太守封營道侯九月壬寅侍中謝莊上疏宜大臣各舉所知以付尚書依分銓用若任得其才舉主延賞有不稱職宜及其坐凡所涖民之職宜遵六年之限初太祖代限年三十而仕郡縣六周及選代刺史或十餘年至是時皆易之仕者不拘長少涖民以三周為滿故莊復表論之冬十月癸未聽訟于閲武堂琅邪獻白鹿高麗使貢方物十二月罷都水使者置水衡令官孝建元年春正月己亥朔拜南郊大赦改元壬寅立皇子子業為皇太子賜天下為父後者爵一級孝悌力田有差詔長吏勸盡地宜務農食舉孝秀凡無可采而竊榮位者皆禁錮還田里尚書百官之本曹局事無巨細悉歸令僕非羣材成構録事叅軍周朗獻讜言曰男子十三至十七皆令學經十七至二十盡使修武女子十五不嫁宜坐家人地堪滋養悉種麻稻巷陌悉樹桑柘列庭皆植竹栗宫掖金翠工人竒伎淫器皆請焚之錦繡羅縠小民皆不得服帝子服帝弟何必長史參軍但宜置賓師傅官以輔之是月新作正光殿詔鑄四銖錢時車騎將軍江州刺史始興公臧質握强兵據衝要輒散釣磯倉米心慚不安乃要豫州刺史魯爽兖州刺史徐道寳司州刺史魯秀等説南郡王義宣曰夫有震主之威能全衆者萬物係心於公聲迹已著見機不作將為他人所先今命徐魯驅西北精兵來屯江上質帥九江樓艦盤踞中流為公前驅天下已半公以八州大衆鳳翔雲動龍舟徐邁虎視川陸雖韓白更生亦不能為建業之計少主失德天下聞之沈栁小將不足為意夫不再至者年齒也不可失者徐魯也質常恐先朝露填溝壑不得養其膂力為公掃除雖悔黄泉復何及也義宣許之使使報魯爽徐賓於壽陽爽等殺長史韋處穆登壇自進號征北大將軍戴黄標遺法物命書二札一曰丞相劉今補為天子名義宣二曰車騎將軍臧今補為丞相名質使户曹宋興歸報江陵使使京師誓其親屬二月己巳朔有流星大如月西行二月庚午豫州刺史魯爽車騎將軍江州刺史臧質丞相荆襄二州刺史南郡王義宣舉兵反自號建平元年乙亥曲赦司豫二州加柳元景撫軍以王𤣥謨為豫州刺史輔國將軍師次梁山三月癸亥内外戒嚴假江東王義恭黄鉞都督衆軍辛丑栁元景為雍州刺史出次采石以沈慶之為鎮軍將軍率安都西討魯爽夏四月丙戌左將軍薛安都等大破魯爽於小峴斬首傳京師豫州平丙子慶之還師以益元景次于南州五月甲辰義宣至蕪湖而臧質逼梁山使謂義宣曰今日萬人次南州則梁山中絶萬人守梁山王𤣥謨必不敢出下官中流鼓棹直趨石頭此上筞也義宣不用質計盡鋭攻梁山陷其西壘王𤣥謨使崔勲之來救皆沒王師大懼元景聞之欲卷甲赴之桓䕶之諫不如分兵為援將軍自鎮南州元景乃留老弱自守悉其精卒多張旗幟向梁山甲寅王𤣥謨帥衆軍與臧質大戰于梁山質敗走義宣自蕪湖赴焉𤣥謨縱兵苦戰薛安都繼出乘之賊等大敗船舫鱗沓桓䕶之命火焚之時東風急火猛延燒西屯兵義宣單舸南走閉航而泣是日桓䕶之朱脩之等帥師南定遺冦乙未解嚴六月臧質走歸尋陽焚府舍盡家西向武昌無所據投於南湖摘蓮實為食戊辰追兵至南湖質急投水中折荷蒙首軍士遙射之貫腸腹出繞蕰藻就斬之傳首京師子孫皆棄市而漆首藏於府庫甲戌大論功計賞進栁元景沈慶之並大將軍儀同三司進王𤣥謨前將軍封曲江侯朱脩之荆州刺史西昌侯庚寅脩之至江陵殺義宣并其十子餘黨竺超民徐壽之等詔絶義宣屬籍廢為庶人癸未分揚州浙江東五郡為東揚州治㑹稽而揚州仍領十五郡又分荆襄江等三州八郡為郢州治江夏罷南蠻校尉遷其營于京師戊子詔罷録尚書秋七月丙申朔日有食之是月㑹稽大水平地八尺冬十月熒惑犯進賢星戊寅襃孔子同諸侯之制寢廟給祭秩丁丑置安陸郡屬郢州初令王侯内史相及封内官長不臣於封君罷官不追諸王在鎮常行不過六隊車輿不得油幢聽事不得南向施帳幡國臣不得跣登國殿傳命不得朱服障扇不得雉尾十一月癸未詔襃侍中張敷孝道淳深改其所居曰孝張里復置郡都水使者官是月始課南徐州租甲申甘露降長寧十二月徴朱年為太子舍人年㑹稽人也以孝行聞初母以冬亡殮衣無絮年終身不衣綿隠居㑹稽山南以樵採為事每束柴置路間隨取者任留價而去二年春二月婆皇國遣使貢獻丙寅始興公沈慶之請老歸帝聽以公就第月給錢十萬米百碩使何尚之豫往累陳上意慶之笑曰沈公不學何可往而復來尚之有慙色夏四月司馬石亡命反於淮南推立夏方進為主改姓李名𢎞以惑衆豫州刺史王𤣥謨討平斬之懷汝間壬午以王𤣥謨為雍州刺史以交州刺史檀和之為豫州刺史初和之在交州有威名盜賊屏迹獨出獵虎伏不敢起故帝用以鎮懷汝秋七月鎮西將軍郢州刺史蕭思話卒贈開府儀同三司諡穆侯八月庚申征虜將軍雍州刺史武昌王渾在襄陽與左右戲造書檄自署為楚王號元光元年置百官長史王翼之得其檄封奏帝使中書舍人戴明寳往責之有司奏廢為庶人自殺時年十七九月己巳朔齊郡廣饒縣上言嘉禾生異畝同穗丁亥閲武於宣武場詔孝建元年已前以罪徙放悉聽還本犯釁家子弟隨才置吏十月壬午徵江夏王義恭為揚州刺史以建平王宏為中書令十一月戊子王僧達上表自解帝以辭不遜付門下免官三年春正月辛丑祀南郊以驃騎將軍建昌公到彥之衛軍將軍新建文宣侯王華豫寧文侯王曇首配食太廟壬子皇太子納妃何氏二月辛未策孝秀于東堂是月丁丑初置朔望臨西堂接羣臣受奏事是月豫州刺史檀和之卒贈安北將軍諡壯侯閏三月己丑白兔見平原獲以獻癸酉鄱陽王休業薨休業文帝第十五子董美人生夏四月初禁民車及酒器用銅戊戌太白犯輿鬼五月辛酉初令荆雍豫兖徐青冀等七州養馬復其賦役六月上親聽訟于華林園秋八月太常顏延之卒贈特進諡憲子甲午太白入心九月壬子詔顏峻右將軍丹陽尹峻固辭表十奏帝乃許使中書舍人戴明寳抱峻登車載之郡舍賜以布衣一襲大明元年正月辛亥朔改元為大明大赦賜高年孤寡粟帛各有差辛未使使巡行賑貸三月壬戌初命大臣加班劍者不得入宫城門時梁獠請内屬立懷漢郡夏四月京師疾疫丙申使使給醫藥死無以為殮者官為埋殯五月壬子紫氣出景陽樓狀如煙迴薄久之詔改景陽為慶雲樓戊午嘉禾一株五莖生清暑殿鴟吻中六月丁亥以顏峻為東揚州刺史劉秀之為丹陽尹案宋畧秀之從子濰性剛猛有才氣素輕秀之時仕吳興太守聞秀之為丹陽尹書與故人曰吾家黒面阿秀乃居劉安泉處朝廷不為多士庚子白兔見即墨獲以獻秋七月京師獲三脊茅江夏王義恭率百官請奏封禪事奏曰陛下睿孝締基靈武繼業道溢興殷功光復禹日者河鏡海湛景曜階平祥浹郊林氣凝宫沼伏願俯藉民心仰協乾意威羣后詔百辟下齊郊掩高里壇集神光山稱萬嵗臣生屬吉辰方待大禮帝猶謙讓辛未以并雍二州三郡十六縣開一郡郡四縣刺史王𤣥謨請斷流民當時不願屬籍罷之或謗𤣥謨反𤣥謨馳使白啓帝帝報曰梁山風塵初不分意君臣之際過足相了聊復伸卿眉頭𤣥謨為人性嚴少笑眉頭常不伸故帝以此戲之八月甲申青州上言嘉禾生異畝同穗戊戌於兖州立平陽郡屬兖州冬十月丙申詔有懷誠抱志擁鬱衡閭失理負謗未聞朝聽者皆躬自申奏聽政之日朕親覽焉二年春正月丙辰復郡縣田秩并九親禄奉三月丁未建平王𢎞薨贈侍中給班劍二十人諡曰宣簡乙未停太官膳牛以農時也夏四月辛丑地震五月戊申吏部尚書何偃卒贈光禄大夫諡靖子六月戊寅増置吏部尚書一人罷五兵尚書從都官尚書謝莊為吏部尚書帝惡選官權重故分曹以減其勢乙卯有司奏晉陵余齊民少俊孝行改所居為孝義里秋七月甲辰彭城民髙闍自云見龍出于井中當貴謀反為天子事覺伏誅己酉太白入東井八月丙戌帝以高闍事詔收王僧達下獄賜死九月庚戌置武衛將軍武騎常侍官三年春正月夜通天薄雲四方生赤黄氣長三四尺乍見尋皆滅二月乙亥以揚州六郡為王畿并東揚州治㑹稽將置司隸以元兇嘗置故止甲子復置廷尉監官三月土守牽牛己亥司空竟陵王誕殺兖州刺史桓閬據廣陵城反己巳内外戒嚴以車騎大將軍開府儀同三司沈慶之為南兖州刺史帥師北伐豫州刺史宗慤徐州刺史劉道隆並引軍來㑹司空參軍何康之棄母踰城出降原案宋畧康時為竟陵王府參軍聞沈慶之逼招范義曰事必不振子將行乎義曰子不可以背母義不可以棄君人生若何康曰為已遂棄母出降誕聞之怒為高樓置康母絶食暴露數日而死辛亥誕燒郭邑驅居民於城内癸丑慶之至廣陵為長圍誕連戰敗乃自登城巡師因呼慶之曰沈公君垂暮之年何苦來此慶之曰朝廷以君不足煩少壯故老夫來耳帝乃封送章二紐授慶之其一曰竟陵縣開國侯食邑一千户募擒劉誕二曰建興縣開國男三百戸募賞先登詔慶之立烽於桑里尅外城即舉一烽尅内城舉二烽擒誕舉三烽甲子帝御六師出宣陽門夏五月建城侯顏峻死於獄中七月己巳沈慶之克廣陵斬皇弟誕傳首京師殺城中男口五千餘人婦女為軍賞其刑者皆先鞭其面乃斬其首歸淮濱以築京觀貶誕族為留氏誕字休文文帝第六子母殷修華遷驃騎將軍都督南兖州諸軍事以好士見疑心不自安遂據廣陵反誕初修武城自出巡檢功人或大呼曰大兵將至何以為辛苦百姓執而問曰廣陵人姓夷名孫云大禍將至何不立六慎門誕曰六慎門何也答曰古語有之禍不入六慎之門誕殺之將舉兵兵士初夢人告之曰取官髮為鞘眊既覺已失髻矣如是數十人誕又常自夜坐有赤光滿室誕深惡之而不自免辛未大赦天下解嚴王畿内貧者蠲租布一年八月丙戌分淮南北復置二豫州九月月在胃而蝕己巳詔無留獄壬辰初築上林苑於𤣥武湖北今縣北十三里見有古池南俗呼為飲馬塘其西見有望宫臺冬十月詔來歲可使六宫嬪妃修親桑之禮十一月肅慎國重譯獻楛矢石弩西域獻舞馬十二月辛酉初置謁者僕射官四年春正月辛未祀南郊帝耕籍田大赦天下逋租宿債一切原除孝悌力田隨才擢用鰥寡孤獨賜穀有差三月甲申皇后躬桑於西郊夏四月癸卯以南琅邪郡隸王畿五月月入太微丙申尚書左僕射褚湛之卒贈特進諡曰敬侯庚寅以南下邳郡併入彭城六月太白犯井秋七月甲戌左光禄大夫開府儀同三司何尚之薨贈司徒諡簡穆公十月流前廬陵内史周朗于寧州道殺之朗字義利汝南人少愛竒以江夏王太尉府參軍累遷廬陵内史因獵火逸燒郡廨屋以私財償之初朗奏讜言帝銜之及丁母憂便誣朗失喪禮遷之將行朝無送者惟侍中蔡興宗獨往造别帝怒左遷興宗十二月戊辰改細作署令為左右御府令丙戌復置大司農官丁未倭國遣使貢獻五年春正月戊午花雪降江夏王衣散為六出有司奏以為瑞帝悦之庚寅彭城民孫薩亡軍當斬其兄棘詣郡請身代弟曰棘為家長弟之逋逃罪由棘也且亡母遺命以薩最少為屬今乞與身代薩薩亦請曰薩三歲喪父所恃者兄兄雖憐薩薩何忍兄弟二人爭死未定刑棘妻出謂棘曰君當門戸豈可委罪季叔且先姑臨終以叔為累竟未婚立家道君今已有二兒死復何恨彭城太守張岱異而奏之帝詔原薩罪加辟命己酉新昌獻白孔雀二月閲武於𤣥武湖西三月甲戌行幸江乗使使祭太保華容公王𢎞寧文侯王曇首於墓是夜有星西流夏五月嘉𤓰生建康蔣陵里丹陽尹王僧朗表獻之癸亥初制宗室朞親官非禄官者月給錢十萬壬戌南徐州獻白鹿是月新作明堂于丙巳之地始宗祀皇考太祖文皇帝於明堂以配上帝六月赤烏見蜀郡益州刺史劉思孝獲以獻壬子分廣陵置沛郡省東平郡併入廣陵八月戊子封皇子為郡王乙丑詔來歲可修葺庠序旌延國胄庚辰初令方鎮所假白板郡縣依臺除食禄三分之一九月甲寅日有蝕之丁卯幸琅邪郡訊獄甲戌遷南豫州於淮南庚戌河濟清閏月戊子皇太子妃何氏薨丙申初築馳道自閶闔至朱雀門又自承天門抵𤣥武湖冬十月甲寅以車騎將軍南徐州刺史劉延孫為尚書左僕射十一月丁酉増置少府丞一人己巳甘露降新安王第甲戌初令民戸輸布四疋是歲始令士族新婚者補將吏於是民多逃亡王役弗増而盜賊代起侍中沈懷文固諫不聽六年春正月辛卯杞南郊乙未置五官中郎將左右郎將官是月策秀孝于中堂揚州秀士顧法秀對制問曰源清即流深神勝則形全躬化易於上風體訓甚於草偃上覽之疾其諒也投策於地二月月犯左角戊午甘露降於京師乙未復百官秩五月改豫州之南梁郡為淮南郡以淮南故郡併入宣城於姑孰丁未侍中廣陵太守沈懷文以正言左遷下獄死丙午青雀見華林園夏四月新作大航門淑妃殷氏卒贈貴妃諡曰寧班亞皇后丙戌初置隂室於覆舟山修藏冰之禮六月辛酉劉延孫卒贈司徒給班劍三十人諡文穆公秋七月甲申地震有聲如雷八月辛未青冀二州刺史劉道隆表嘉禾生樂陵縣界乙亥置青臺令初武帝自永初迄于元嘉多為經史之學自大明之代好作詞賦故置此官考其清濁冬十月壬申葬宣淑妃殷氏于龍山十一月己卯㑹稽太守張暢卒諡宣子初暢愛其弟子輯臨死欲與合葬論者謂張少微於是乎黷至愛莫若父子同穴可乎七月春正月癸未詔於𤣥武湖大閲水軍并巡江右講武校獵時常多狎遊置酒高㑹酣適之間多詬辱朝士嘗嘲王彧以其父諱吏部郎江智淵正色曰陛下進人以禮無宜此戲帝怒曰卿江僧安兒居然相惜智淵伏涕自是詬之無度智淵不堪其恥退而自殺癸巳以王畿之内郡屬南徐州二月甲寅車駕西巡濟江立行宫於歴陽􅀈石浦丙辰詔使使祭南嶽霍山大蒐于烏江縣榜口己未祭六合山庚申分􅔦陽秦郡置臨江郡即所在也壬戌饗於行宫大赦天下行李所經免今年租布賜民男子爵一級女子百戸牛酒巡問疾苦如有一介之善隨才銓用癸亥幸尉氏縣觀温泉三月汝南獻白燕夏四月詔非臨軍陣不得專殺人是月大風折和寧陵華表秋七月乙酉高麗王髙璉為車騎大將軍開府儀同三司八月南徐州獻白龜時大旱自四月不雨至于是月詔太官徹膳大赦天下自大明七年以前一切放免親幸秣陵訊獄囚冬十月壬寅太子子業冠於太極前殿賜王公已下帛有差丁未車駕南巡百姓有寃厄屈滯皆聽自面朕陳訴自江寧縣南登山及陵望臺甲子館行宫于南豫州城丙寅聽政于行所十一月丙子大㑹行所登白紵山使使祭晉大司馬桓温毛璩等墓置守塚三十户訊溧陽獄囚於行所戊子幸梁山詔為山下征元兇軍士戰死者舉哀加賞賜三世後除癸巳登梁山大閲水軍於中江二白雀集于華葢十二月立雙闕於梁山八年春正月宗祀於明堂安北將軍雍州刺史劉秀之卒贈侍中諡忠誠公二月辛丑領軍朱脩之卒贈侍中特進如故諡貞侯時大早七年不登迄乎是歲三呉尤甚米有價無糴所富人實珠玉錦繡相交枕死于道路建康秣陵兩縣為薄粥賑之前年㑹稽雨績于山澤績初如紵晩似地毛至是飢人將拾死不能食横屍原野如亂麻焉己亥詔公卿致祭山嶽祈雨以穄榖種付秣陵建康二縣隨宜贍恤四月雨雹荆州獻雉詔揚州立左學於山隂置儒林祭酒各一人壬子以吳郡太守顧悌之為吏部尚書加給事中乙卯帝寢疾顧命江夏王義恭為中書監栁元景為尚書令事無巨細悉關二公其典師旅悉沈慶之尚書事委顔師伯外監事委王𤣥謨閏五月庚申帝崩于玉燭殿秋七月丙午葬景寧陵在今上元縣南四十里巖山之陽帝年二十五即位立十一年年三十五諡曰孝武皇帝廟號世祖少帝少帝諱子業小字法師孝武長子也元嘉二十六年正月甲申生三十年元兇構逆世祖討之被囚于侍中下省江夏王義恭保䕶之世祖即位為太子大明二年始出居東宫八年夏五月庚申世祖崩是日即皇帝位大赦天下文武進位有差六月有流星大如斛赤色有光照見人面尾長一丈從參北出東行直下經東井通南河沒戊寅復分宣城為淮南郡復淮南為梁山郡七月癸酉尊皇太后為太皇太后皇后曰皇太后居永訓宫乙卯罷南北二馳道丙辰追崇獻妃何氏為獻皇后己丑皇太后崩于含章殿九月乙卯祔葬孝穆皇后于景寧陵冬十月太白守房十二月乙酉復王畿為揚州浙江以東為東揚州永光元年春正月乙未朔大赦改元二月己巳初減郡縣禄秩之半庚午詔賜沈慶之執仗三望車給親信三十人甲申月入南斗庚寅初鑄二銖錢夏六月庚午熒惑入東井光禄大夫宗慤卒贈征西將軍諡肅侯秋七月己酉有星入紫微經北極八月辛酉誅越騎校尉戴法興壬戌帝始親政事狂暴益甚内外危懼栁元景顔師伯欲廢帝而立江夏王以告沈慶之慶之與王素不協遂發其事於帝癸酉帝自率宿衛兵殺太宰江夏王義恭於第及諸子義恭高祖第四子姿質端麗高祖特愛之帝即位封為江夏王出為荆湘等八州刺史性褊急朝廷為書戒之曰拘忌褊心魏武之累豁達大度漢祖之德元嘉十六年進位司空録尚書二十一年入為太尉元兇構逆進位太保世祖討元兇至新亭元兇殺其子十二人世祖即位拜太傅兼尚書令性嗜不恒奢侈無度曾市百姓物無錢可還有通辭求錢者輒題後作原字及帝無道栁元景等欲立王帝知自率兵殺之時年五十三使使扶出義恭睛漬于蜜中謂之鬼目召栁元景以兵殺於都街又殺顏師伯于路原案宋畧初世祖性急朝臣不敢妄相從既崩之後江夏王與顔栁私相賀曰無横禍矣及山陵後王公大臣聲酒馳逐不舍晝夜及少主兇悖内外憂懼人不自安不能輔之德義而欲謀之廢立語有之曰君不君臣不臣世祖之朝見之矣及廷尉劉徳願詔改永光元年為景和元年賜文武各進位二等乙亥詔天下秀孝隨才擢用帝釋素服御錦衣庚辰罷東揚州以石頭城為長樂宫東府城為未央宫甲戌以北邸為建章宫南第為長陽宫乙未復南北馳道九月丁卯幸湖熟縣始奏鼓吹甲辰廢撫軍將軍南徐州刺史新安王子鸞為庶人發宣貴妃殷氏墓追憾世祖將掘景寧陵太史奏於帝不利乃止案宋書新安王子鸞殷淑妃所生世祖盛寵貴妃素疾帝常欲廢之故帝追恨焉是日詔收吏部尚書謝莊初貴妃薨世祖詔莊為誄曰贊軌堯門方漢鈎弋帝在東宫怨之及此下獄謂曰卿當彼時知有東宫否戊申徐州刺史義陽王昶聞江夏王之誅恐舉兵將襲帝帝聞喜曰自我即位未曾戒嚴令人悒悒己酉内外戒嚴徵兵北伐以沈慶之為前驅㫤聞王師來内無親附遂棄家而載愛妾出彭城北門奔後魏戊午詔親往彭城將耀威宋野是日於白下濟江幸𤓰步城初聽民私鑄錢沈慶之請也十月丙寅帝旋於京師庚辰爵宫人謝氏為貴妃夫人加虎賁鈒㦸鑾輅龍旗出警入蹕實帝姑新蔡公主也出嫁何邁帝召還宫偽稱主薨宫婢泄之歸于何氏邁見公主被納心不安恐禍及乃結惡少伺帝出入將執廢之謀泄十一月帝自率兵誅之案宋書于時帝室子女淫蕩率多剛躁尚髙祖女廣陵長公主下獄死藻父偃初亦尚世祖少女永嘉公主公主嘗怒偃縳之庭樹時天寒夜雪噤凍久之偃兄排閣詬主得免于時貴門子弟咸以尚主為憂邁素豪俠好劍士出入從者滿路及主被納故懼而見害癸巳始興公沈慶之薨贈侍中太保給鑾輅輼輬車前後部羽葆鼓吹諡忠信公甲戌進帝姊山隂公主主性淫泆無禮甚嘗謂帝曰妾與陛下男女雖殊俱託體先帝陛下六宫萬數妾唯一駙馬事不均平乃何如此帝為主置面首左右三十人朝士袁愍孫吏部褚淵等美於貌公主常請帝求十夕淵等奉詔往而終不渝帝促愍孫迫之使走愍孫雖走如常顧而言曰風雨如晦雞鳴不已公主出就淵淵竦立主曰觀君髭鬚乃丈夫何無男子之氣淵曰不敢以為亂階時少主凶悖多殺害喜怒不常于時通官大臣日被構成朝廷危懼内外騷然東海建安湘東山陽等四王皆帝叔也嘗被拘録號建安曰鎩王山陽曰賊王湘東尤肥曰猪王鏁而籠之湘東嘗失音帝勅左右屠猪建安王紿䕶之曰猪未可殺帝曰何對曰應待太子生取其肝肺帝喜勅付廷尉壬寅立皇后路氏原案宋書路道慶女也始用金石之樂十一月丁未太白犯哭星皇太子生是月大赦天下原案宋畧太子少傅劉蒙之子也聞蒙之妻在坐召入宫既生子男將立為太子太史始奏湘東有天子氣帝將南巡以厭之刻取明旦誅四叔乃行諸王見幽日久計無所出乃與阮佃夫李道兒等隂謀執帝時直閣將軍栁先世與姜産之亦有此謀末知所立及聞佃夫所説遂告中書舍人戴明寳明寳響應誣言華林後堂有鬼十一月戊午夕帝同建安王山陽王山隂公主向華林後堂自射鬼直閣將軍宗越童太一譚金乃帝腹心也並宿于外主衣壽寂之姜産之乃懷刀以入弑帝帝驚引弓射寂不中寂乃刃帝而死時年十七即位一年見殺既而殿省倉卒未知所為建安王休仁就秘書省延湘東王湘東王跣至西堂升御座召朝臣稱太皇太后令數少帝子業忍酷害大臣不堪君臨萬國以衛軍湘東王體自太祖可繼宗廟社稷庚辰葬少帝于南郊壇誅同產豫章王子尚出山隂公主初王太后疾篤遣呼帝帝曰病人間多鬼那可往太后聞之語侍者曰將刀來破我腹膓那得生如此兒既居尊位凶狂非分每召諸王妃主列于前以配左右南平穆王敬猷妃江氏不受命帝怒殺其三子而鞭妃一百建康實録卷十三
