body:
  text: 御題許嵩建康實録六朝三百有餘年建業興衰草卷傳文物風流信有矣經綸世教或無焉幸洪武始統歸一逮永樂斯都以遷我每孝陵親奠醑不禁弔古為凄然欽定四庫全書史部四建康實録别史類提要臣等謹案建康實録二十卷唐許嵩撰嵩自署曰高陽蓋其郡望其始末則不可考書中備記六朝事迹起吳大帝迄陳後主凡四百年而以後梁附之六朝皆都建康故以為名其積算年數迄唐至德元年丙申而止則肅宗時人也前有自序謂今質正傳旁採遺文具君臣行事事有詳簡文有機要不必備舉若土地山川城池宫苑各明處所用存古迹其異事别聞辭不相屬則皆注記以益見知使周覽而不煩約而無失云云蓋其義例主於類敘興廢大端編年紀事而尤加意於古迹其間如晉以前諸臣事實皆用實録之體附載於薨卒條下而宋以後復沿本史之例各為立傳為例未免不純又往往一事而重復抵牾至於名號稱謂略似世説新語隨意標目漫無一定於史法尤乖然引據廣博多出正史之外唐以來考六朝遺事者多援以為徴如張彥逺歷代名畫記引以證曹不興顧愷之陸探微畫品鄭文寶南唐近事引以證元武湖劉羲仲通鑑問疑載宋書髙祖紀景平二年書日食舛誤劉恕修長編定日食在是年二月癸巳朔皆取此書為據又陳後主時覆舟山及蔣山松柏常出木醴俗呼雀餳之類陳書遺漏不載者王鞏甲申雜録亦取此書為據謝尚謂蔡謨讀爾雅不熟幾為勸學死案勸學荀子第一篇蟹有六跪二螯即是篇之語晉書誤作勤學姚寬西溪叢語亦據此書駁正又裴子野宋略當時所稱良史沈約自以為不及者今已不傳資治通鑑載有論贊數條亦多首尾不具而是書於劉宋一代全據為藍本並子野論贊之詞尚存什一是亦好古者所宜參證矣新唐書志載入雜史類蓋以所載非一代之事又不立紀傳之名尚為近理郡齋讀書志載入實録類已不免循名失實馬端臨經籍考載入起居注類則乖舛彌甚至鄭樵藝文略編年一類本按代分編乃以此書系諸劉宋之下與宋春秋宋紀並列尤為紕繆今考所載惟吳為僭國然三國志已列正史故隸之於别史類焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀建康實録序司馬子長善敘事古稱良史然班固嫌其疏略是非頗謬於聖人言論數篇以為所蔽嵩述而不作竊思好古今質正傳旁採遺文始自吳起漢興平元年終于陳末禎明三年而吳黃龍已前雖引漢厯二十餘年其實吳之首事及晉平吳太康之後三十餘載復涉西晉之年洎琅琊東遷太興即位元年始為東晉首年東晉一十一帝一百二年而禪于宋宋八帝六十年而禪于齊齊七帝二十四年而禪于梁梁五帝五十六年而入于陳陳五帝三十三年止隋開皇元年陳建首號梁之末年梁稱元年齊之季年齊初即位宋之餘年則四家終始共用三年而吳四帝五十九年南朝六代四十帝三百三十一年通西晉革吳之年并吳首事之年總四百年間著東夏之事勒成二十卷名曰建康實録具六朝君臣行事事有詳簡文有機要不必備舉若土地山川城池宫苑當時制置或互興毁各明處所用存古迹其有異事别聞辭不相屬則皆注記以益見知使周覽而不煩約而無失者也建康實録序建康實録沿革建康者古之金陵地案周禮牽牛婺女之野尚書禹别九州曰淮海惟揚州分為越國立為揚州此則揚州之分域案春秋元命苞曰牽牛流為揚州分為越國立為揚山又云厥土下濕而多生楊栁以為名其地北據淮東距海顔介曰南方水土柔和其音清舉而切天下之能言唯金陵與洛下耳昔周太王長子太伯與次弟仲雍讓少弟季歷位俱奔江南百姓從而君之自號勾吳太伯所築勾吳故城在梅里平墟今常州無錫縣東三十里故吳城是也太伯卒無子百姓共立仲雍為君仲雍已下至周章四代皆君於吳武王克紂因而封之故春秋時其地屬吳自周章已後十八代吳王夫差即位無道立二十三年當春秋魯哀公二十二年冬十一月為越王勾踐所滅其地乃屬越案周書元王四年即越王勾踐四年當春秋之末越既滅吳盡有江南之地越王築城江上距秦淮水一里半廢越城是也案越范蠡所築城東南角近故城望國門橋西北即吳牙門將軍陸機宅故機入晉作懷舊賦曰望東城之紆餘即此城在三井岡東南一里今瓦棺寺閣在岡東偏也勾踐後七代一百四十三年越王無疆即位元年當周顯王三十六年越霸中國與齊楚爭強為楚威王所滅其地又屬楚乃因山立號置金陵邑也楚之金陵今石頭城是也或云地接華陽金壇之陵故號金陵楚威王後一百一十餘年當秦始皇二十四年秦滅楚兼諸侯分天下作三十六郡案秦本紀渭南河上中山潁川三川河東南陽南郡九江鄣郡會稽碭郡泗水薛郡東郡琅琊齊郡上谷漁陽右北平遼西遼東代郡巨鹿邯鄲上黨平原雲中太原鴈門上郡隴西北地漢中巴郡蜀郡已上三十六郡也以金陵為鄣郡於故鄣屬今吳興郡浙江以東為會稽郡楚亡已後十三年當始皇三十六年始皇東巡自江乘渡望氣者云五百年後金陵有天子氣因鑿鍾阜斷金陵長隴以通流至今呼為秦淮其淮本名龍藏浦其上有二源一發自華山經句容西南流一發自東廬山經溧水西北流入江寧界二源合自方山埭西注大江其二源分𣲖屈曲不類人功疑非秦始皇所開古老相傳方山西瀆江土山三十里是秦皇開又鑿石硊山西而疏決此浦後人因名秦淮也乃改金陵邑為秣陵縣秦之秣陵縣城即在今縣城東南六十里秣陵橋東北故城是也秦乃罷周時諸侯置郡縣宰守以秣陵屬鄣郡漢武帝元封二年廢鄣郡置丹陽郡而秣陵縣不改始放虞舜置一十二州刺史以領天下諸郡則虞書所謂咨十有二牧揚州是其一焉自漢初置揚州治無定所案輿地志漢揚州初理歷陽後理夀春靈帝末時揚州刺史劉繇為袁術所逼又徙曲阿也云云晉永嘉中王敦始為建康創立州城今江寧縣城所置在其西偏其西即吳時治城東則運瀆吳大帝所開今西州橋水是也案晉書孝武太元末會稽王道子為揚州刺史治東第時人呼為東府因號此城為西州故傳云東有西州是也橋逼州城東南角因以為名焉王莽改丹陽為宣亭郡後漢初還為丹陽郡郡治於苑陵統一十七縣而揚州因漢不改所統六郡為九十二縣也案前漢初置丹陽郡即治苑陵於潛江乘春穀秣陵故鄣句容涇縣石城胡熟陵陽蕪湖黟溧陽宣城丹陽歙縣等一十七縣後漢仍之不改州所領郡亦依舊焉建康實録沿革
