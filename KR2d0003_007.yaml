body:
  text: 建康實録卷七唐許嵩撰晉顯宗成皇帝成皇帝諱衍字世根明帝長子太寧三年三月立為皇太子閏八月戊子明帝崩己丑太子即皇帝位尊皇后庾氏為皇太后年㓜太后臨朝以司徒王導中書令庾亮輔政四年春正月丁亥朔大赦改元咸和元年文武各進位二等京師百里内復一年租天下賜酺五日鰥寡孤獨穀帛有差夏五月大水秋八月温嶠為平南將軍江州刺史嶠表故吏部郎畢卓為長史案三十國春秋卓性嗜酒太興末為吏部郎以酒廢職時比舍郎酒熟卓因夜竟至甕所盗飲醉卧及旦主人見之曰畢吏部也乃命酒飲盡醉而去父母惡之因取舡以貯酒於屋中卓甚喜入酒中拍浮來徃達明飲之亦盡嘗謂人曰左手執蟹螯右手持酒盃拍浮酒池中足樂一生哉九月尚書右僕射鄧攸卒贈光禄大夫加金章紫綬攸字伯道平陽襄陵人祖殷亮直彊正為淮南太守夢行水邉見一女子猛獸自後斷其盤囊占者以為水邉女汝字也斷盤囊者新獸頭代故獸頭也今不作汝陰當作汝南果遷汝南太守攸㓜以孝德稱舉孝亷為吳王文學累遷河東太守永嘉末天下大亂遇羯賊棄所生子而擕弟子綏走江東元帝以攸為太子中庶子為吳郡太守攸載米之郡俸禄無所受惟飲吳水人民飢者輙開倉賑而後報刑清政明百姓恱之為中興良吏後稱疾去職郡常有送迎錢數百萬攸一無所受百姓争牽船泣留之船不得進攸乃夜中發去吳人歌曰紞如打五鼓鷄鳴天欲曙鄧侯拖不留謝令推不去入為吏部尚書久之遷尚書右僕射晉書攸過江納妾甚寵之訊問其家屬說是北人遭亂憶父母姓名乃攸之甥也攸感恨遂不畜妾後妻不復孕時人為之語曰天道無知令鄧伯道無兒語曰此天道有知也夫父子之道親親之義豈可忍而邀一時之假名損人倫之大義安忍也鄧伯道無兒天道有知冬十月封魏武𤣥孫曹勱為陳留王以紹魏後己巳庾亮誣南頓王宗陰與蘇峻謀叛誅之貶其族為馬氏庚辰赦京師百里内五嵗已下刑甲申徴歴陽太守蘇峻為大司農峻不受命十一月壬子大閱於南郊改定王侯國秩九分食之一時大旱自六月不雨至於是月二年春正月新除交廣寧三州諸軍事廣州刺史阮孚卒孚字遥集陳留人也父咸始平太守孚屬避亂渡江中宗以為安東府叅軍蓬髪飲酒不以世務嬰心轉丞相叅軍遷瑯琊王裒車騎府長史進拜㪚騎常侍孚性既嗜酒嘗以金貂換酒後為所司彈劾帝宥之肅宗即位轉侍中吏部尚書稱疾就家用之尚書令郗鑒以為非禮帝曰就用之誠不快不爾便廢才及肅宗不豫温嶠入受顧命過孚家邀同行升車乃告曰主上大漸江左危弱實藉羣賢共康世務卿時望所歸今欲屈卿同受顧託孚不答固求下車嶠不許垂至宫門告嶠内逼求暫下便徒歩還家初祖約好財孚好蠟屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當著幾量屐神色甚閒暢於是勝負始分咸和初拜丹陽尹時太后臨朝政出舅族孚謂所親曰今江東雖累世而年數實淺主㓜時艱運終百六而庾亮年少德信未孚以吾觀之將兆亂矣遂苦求出王導等以孚䟱放非京兆尹才乃除交廣寧三州刺史未至廣州卒於道時年四十九既而明年蘇峻作逆識者以為知幾三月益州地震夏五月日有食之䕶軍營牛生犢兩頭六足王導家羊生羔無後足冬十一月歴陽太守蘇峻豫州刺史祖約等舉兵於江西以討庾亮為名十二月辛亥峻使其將韓晃入姑熟屠于湖害于湖令陶馥宣城内史桓彜為晃所敗死之庚寅京師戒嚴以䕶軍將軍中書令庾亮為征討都督詔加振威將軍司馬流為左將軍帥衆拒峻前鋒戰於慈湖流敗死之流字子玉國之宗室性懦怯不閑軍旅時率水歩二千南上遇賊懼形於色臨陣方食不知口處問左右吾口何在既而合戰軍敗遇殺三年春正月征西大將軍陶侃率江州刺史温嶠等下援京師丁未蘇峻濟自横江登牛渚二月庚戌峻軍至鍾山領軍卞壼率六軍與峻戰於山南王師敗績案陣圖云蘇峻戰場在鍾山明慶寺前晉所謂王師敗於陵西即吳大帝時陵也峻因風放火進燒青溪柵再破官軍卞壼羊曼周導陶瞻等皆死於柵下遇害者數千人壼字望之濟陰寃句人也祖統父粹以清辯鑒察稱兄弟六人並登宰府世號卞氏六龍𤣥仁無䨇𤣥仁粹字也位中書令壼弱冠有名譽元帝鎮江左召為從事中郎委以選舉甚見親仗轉世子師居師佐之任盡匡輔之節一府貴憚中興建遷太子詹事拜御史中丞忠於事上權貴屏跡累位至尚書令明帝不豫壼與王導同受顧命輔㓜主成帝即位羣臣進璽司徒王導以疾不至壼正色於朝曰王公豈社稷之臣耶大行在殯嗣皇未立寧是稱疾之時導聞之乃輿疾而至及皇太后臨朝壼與庾亮對直省中共叅機要時王導又稱疾不朝而私送車騎將軍郗鑒壼奏導虧法從私無大臣之節舉朝震肅壼裁斷切直幹實當官以褒貶為己任勤於吏事然性不𢎞恪才不副意故為諸名士所少而無卓爾優譽肅宗深噐之於諸大臣而最任職阮孚嘗謂曰卿恒無閒泰常如含瓦石不亦勞乎壼曰諸君以道德恢𢎞風流相尚鄙恡者非壼而誰時貴遊子弟慕王澄謝鯤為達壼厲色於朝曰悖禮傷教罪莫斯甚中朝傾覆實由於此欲奏推之王導庾亮不從乃止然而聞者莫不折節時王導以勲德輔政成帝毎幸其宅嘗拜導婦曹氏侍中孔恒宻表不宜拜導聞之曰王茂𢎞駑痾耳若卞望之之巖巖刁𤣥亮之察察戴若思之峰岠當敢爾邪及蘇峻作逆詔以壼為都督加領軍將軍峻自鍾山破王師進攻青溪柵壼與諸軍拒之苦戰死之時年四十八二子眕盰見父沒相隨赴賊同時見害眕盰母裴氏撫二子屍哭曰父為忠臣爾為孝子夫何恨乎徴士翟湯聞而歎曰父死於君子死於父忠孝之道萃於一門羊曼字祖延太傅祜兄孫也少知名中宗鎮江左辟為丞相主簿歴晉陵太守王敦平後代阮孚為丹陽尹蘇峻作亂加前將軍率文武守雲龍門峻既破六軍與卞壼周導陶瞻等同見害案晉書曼性任達與温嶠阮放等同志友善並為中興名士時州里稱陳留阮放為宏伯高平郗鑒為方伯太山胡母輔之為達伯濟陰卞壼為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為委伯而曼為䵬伯凡八人號兖州八伯期古之八俊時朝士過江初拜官相飾供饌曼拜丹陽尹客來早得佳設日晏而漸罄不復及精隨客早晩而不問貴賤時莘固為臨海太守竟日皆美雖晩至者猶獲盛饌今論者以固之豐腆不如曼之真率也是月峻又追敗庾亮於宣陽門内亮擕子弟與郭默趙𦙍上奔潯陽臨去謂侍中鍾雅曰以後事相委雅曰棟折榱傾誰之責與亮曰今日之事不容復言卿當思効匡復雅曰想足下不愧荀林父耳雅遂與司徒王導擁帝於太極殿崧翼等侍左右峻兵麾戈接於帝座叱左右下侍中禇翼曰蘇冠軍來覲至尊軍人豈得侵逼兵人遂㪚下殿突入太后後宫逼辱妃后及左右侍人羣臣奔竄百姓號泣震響京師丁巳峻矯詔大赦天下惟不免庾亮兄弟以祖約為侍中太尉尚書令峻自為録尚書事驃騎大將軍以許柳為丹陽尹三月丙子皇太后庾氏崩壬申葬明穆太后于武平陵后諱文君潁川鄢陵人也性仁惠美姿儀元帝聞之娉為太子妃以德見重肅宗即位為皇后帝即位尊為太后羣臣奏天子㓜沖宜依漢和熹皇后故事臨朝后辭讓數四不得已而臨朝攝萬機后兄中書令亮管詔命公卿奏事稱皇太后陛下既而京都傾覆后見逼辱遂以憂崩時年三十二夏五月乙未峻逼帝遷于石頭城帝哀泣升車羣臣歩從峻以倉屋為宫分遣管商張瑾等東冦錢塘吳縣案荀崧傳成帝時崧子羡年七嵗隨崧在石頭峻甚憐之嘗置羡於膝上羡歸謂其母曰請與兒一利刀子足以殺賊母遽掩其口丙午征西大將軍陶侃江州刺史驃騎將軍温嶠庾亮等帥舟師四萬旗鼓百里次于蔡洲六月諸軍盡㑹石頭城西北賊盛未即决戰議於查浦築壘監軍李根固爭曰查浦地下又在水南惟白石峻固修之滅賊之術也侃等許之曰若壘不立卿當腰斬根引兵夜修曉訖賊衆見壘大驚壬辰進軍白石九月戊申司徒王導奔於白石庚午陶侃率温嶠庾亮等陣於白石侃使將軍楊謙以軍攻於石頭峻輕騎出戰謙詐北奔白石壘峻逼之纔交鋒峻墜馬侃督護竟陵太守李陽臨陣斬峻於白石陂岸至今呼此陂為蘇峻湖今在縣西北十二里石頭城正北白石壘即在陂東岸庾亮命臠峻肉焚其骨峻弟逸乃發亮父母墓斵棺焚屍初峻歴陽外營將軍鼓自鳴如人弄槌峻手自破之曰我鄉土時有此即城空矣俄而為亂夷滅此聽不聰之罰也案晉書紀蘇峻初營鍾山前祈鍾山之神許畫朱鬚紫蹄馬碧盖朱絡車後郗鑒入援又祈鍾山神謂鑒曰蘇峻為逆人神所憤當與蔣子文共談鋤之且峻亦祈我豈可助之為虐今以䟽相示及案收而䟽見峻字子高長廣掖人少為書生年十八舉孝亷永嘉䘮亂所在屯聚峻亦糾合徒衆結壘於本縣撫弱埋朽逺近感恩歸者日盛皆推峻為主遂羣聚射獵於海邉青山中時曽嶷領青州刺史惡其得衆將討之峻懼不敵泛海南渡既至廣陵朝廷嘉其遠到累拜蘭陵相同討王敦逆以功進使持節冠軍將軍歴陽内史加㪚騎常侍封邵陵公以江外之任寄之峻既有功於國威望漸著頗有異圖時肅宗崩帝㓜委政宰輔䕶軍庾亮恐其兵彊難制下優詔徴之峻素疑亮欲害己不應命朝廷使諷諭之峻曰臺下云我欲反豈得活耶我寧山頭望廷尉不能廷尉望山頭乃結祖約為亂以討庾亮為名遂舉兵渡江破王師入宫城縱兵侵掠窮兇極暴殘酷無道光禄勲王彬等皆被捶撻逼令負擔登蔣山裸剝士女哀號之聲響振内外為陶侃温嶠等所破殺之峻司馬任讓復立峻弟逸為帥收兵保石頭十二月石勒破劉曜於洛陽擒之關中大亂四年春正月帝在石頭侍中鍾雅右衛將軍劉超等謀奉帝出就陶侃營事覺遂使任讓將兵入收超雅帝持抱超等悲泣曰還我侍中右衛讓不受詔殺雅等及峻平陶侃得任讓不殺帝曰任讓是殺我侍中右衛者不可宥乃殺之雅字彦胄潁川人超字世瑜瑯琊人少有志尚中興初為中書舍人累拜中書侍郎穆后臨朝遷為射聲校尉時軍校無兵伍義興人多隨超超因統其衆以宿衞為君子營帝即位與鍾雅俱為侍中帝遷幸石頭大雨超與雅歩衞左右賊給馬惡而不騎丁卯賊將匡術以苑城歸順百官赴之戊辰峻子碩引軍又攻宫城焚燒堂殿祕閤皆盡城内大飢米斗萬錢庚午冠軍將軍趙𦙍大破祖約於歴陽約奔石勒二月戊戌諸軍攻石頭李陽滕含大破蘇逸於查浦含等奉帝幸温嶠舟乘輿反正羣臣頓首號泣請罪甲午蘇逸以萬餘人東走延陵湖將入吳興將軍王允之追擒於溧陽初太寧中有童謡云大馬死小馬餓高山崩石自破高山謂峻也石即峻小名也時自正月雨至二月五十日及滅蘇峻黨後淫雨乃霽兵火之後宫闕荒殘帝居止蘭臺甚卑陋欲宫建平園温嶠議遷都豫章朝士及三吳之豪議都㑹稽司徒王導獨曰建康古之秣陵帝皇所居孫仲謀劉𤣥德皆云王者之宅不可改遂定議焉三月壬子論平賊功行賞以陶侃為太尉封長沙公郗鑒為司空封南昌公温嶠為驃騎將軍開府儀同三司封始安公追贈死王事者贈卞壼左光禄大夫餘各有差尚書郎𢎞納上議訟壼子父三人同死國難詔改贈驃騎將軍諡忠貞夏四月乙未驃騎將軍開府儀同三司江州刺史始安公温嶠薨嶠字太真司徒羡弟憺之子性聰敏有識量博學少以孝悌稱起家為司𨽻都官從事奏彈無所避京師震肅平北大將軍劉琨請為叅軍為琨謀主琨所憑恃焉及二都傾覆元帝初鎮江左琨誠繫王室謂嶠曰昔班彪識劉氏之復興馬援知漢光之可輔今晉祚雖衰天命未改吾欲立功河朔使卿延譽江南乃以嶠為左長史檄告華夷使嶠奉表勸進嶠至引見帝具陳琨忠誠因說社稷無主天人係望辭㫖慷慨舉朝屬目王導周顗等並與親善時江左草創綱維未舉嶠殊以為憂及見王導共談世務歡然曰江左自有管夷吾復何慮因屢求反命不許除㪚騎侍郎累遷太子中庶子太子深重之與為布衣之交肅宗即位拜侍中叅綜機宻尋轉中書令帝倚為棟梁之任王敦忌之請為左司馬嶠謬為誠敬深結錢鳳詐立聲譽毎曰錢世儀精神滿腹鳳悅之丹陽尹缺敦表以嶠為丹陽尹因餞㑹嶠自起行酒至鳳未及飲嶠偽為醉以手板撃鳳幘墜作色曰錢鳳何人温太真行酒而敢不飲敦以為醉故兩釋之及去即路鳳入說敦曰嶠於朝廷甚宻未可信也敦曰太真昨醉小加聲色豈得以此便為䜛貳由是鳳謀不行而嶠還都遂陳敦之逆狀請為之備敦聞與王導書曰太真别來幾曰作如此事因舉兵表誅姦臣以嶠為首敦平後封建寧縣公帝即位與王導郗鑒庾亮陸曄卞壼等同受顧命輔㓜主時蘇峻藏禍歴陽陶侃威重荆楚朝廷以西夏為虞故使嶠為形援出為江州刺史鎮武昌下車親祭徐孺子之墓收名賢在鎮見王敦畫像曰豈有天子之賊而圖形於都下令削去之及蘇峻作逆京師不守嶠慟哭使督䕶王愆期要陶侃下討峻推侃為盟主鉦皷連于百里直指石頭侃屯蔡洲沙浦嶠屯沙門浦義軍屢戰失利又食盡陶侃怒欲西歸嶠固止侃曰要一戰决之乃平峻進録尚書讓不受固辭還藩因行至牛渚水深不可測嶠乃燒犀角而照之湏臾見水族竒恠異狀或乘車馬著赤衣者其夜夢人謂曰與君幽㝠道别何苦相照嶠甚惡之先有齒疾因㧞之中風至鎮卒時年四十二江州士庶莫不相顧而泣初葬豫章朝廷追思之乃為造大墓迎還葬元明二陵北幕府山之陽二子放之式之秋七月詔復遭賊郡縣租稅三年九月石勒將石季龍盡屠上邽滅劉氏大小黨族三千餘人冬十月廬山崩是嵗天裂西北有聲如雷徴西中郎將郭默為右將軍默過江州刺史劉𦙍不禮送豚一頭酒五斗默怒投于江遂矯詔入城殺𦙍表送首京師五年春正月己亥朔大赦除諸將任子案吳書時諸將屯戍並留任其子為立一館名任子館地在宋樂遊苑西對今棲𤣥寺門平澤内晉有江左其制不改至此年除之庚子司徒王導以黙驍勇專殺方州懼其為亂表黙為豫州刺史使鎮武昌太尉陶侃聞默害劉𦙍曰此必詐也即督西陽太守鄧伯山水陸討之與導書曰郭默殺方州即用為方州有人殺宰相即用為宰相乎遂屠默斬其父子案晉書郭默妻兄陸嘉取官米餉妹默以為違法欲殺嘉嘉懼奔趙默遂殺妻以明無私黙河内淮人二月己巳㑹稽太守王舒表獻銅漏刻詔置端門西塾之西夏五月石勒將劉徴冦南沙害都尉許儒儒字思行高陽人祖勛吳御史中丞父延河間相儒㓜而立行清素忠烈有曽閔之性早丁母艱在殯遇兇賊放火儒抱柩悲號賊為救火保䕶之所居一里頼全起復為郡功曹元帝宅江左澄洗九流妙於選舉為司徒叅軍出為南沙都尉縣為石勒所冦遇害六月詔初稅田畆三升秋八月石勒僣即皇帝位於襄國使其將郭敬冦襄陽中州流人悉降于勒九月作新宫始繕苑城修六門案苑城即建康宫城六門案地輿志都城周二十里一十九歩本吳舊址晉江左所築但有宣陽門至成帝作新宫始修城開陵陽等五門與宣陽為六今謂六門也南靣三門最西曰陵陽門後改名為廣陽門門内有古尚方世謂之尚方門次正中宣陽門本吳所開對苑城門世謂之白門晉為宣陽門門三道上起重樓懸楣上刻木為龍虎相對皆繡栭藻井南對朱雀門相去五里餘名為御道開御溝植槐柳次最東開陽門東靣最南清明門門三道對今湘宫寺巷門東出清溪港橋正東靣建春門後改為建陽門門三道尚書官舍在此門内直東今興業寺後東度清溪菰首橋唐景雲年中江寧縣令陸彦恭於縣東門金華坊東通清溪乃廢菰首橋路而於興業寺門前開大道造金華橋清溪通潤州驛正西南西明門門三道東對建春門即宫城大司馬門前横街也正北靣用宫城無别門苑城即吳之後苑也一名建平園都城雖經五代而門墻則互有修改事具下卷冬十月駕幸司徒王導宅置酒大㑹下車入門先拜十一月平西將軍庾亮表獻嘉橘一蔕十二實是嵗無麥禾天下大饑凉州刺史西平公張駿稱臣於石勒六年春正月戊午以運漕不繼發王公以下千餘丁各運米六斛二月丙子追贈故南沙都尉許儒高涼太守諡曰貞侯三月壬戌日有蝕之癸未詔舉賢良直言之士夏六月錢唐民豭豕産兩子皆人靣狀如人其身猶豕異之甚也是嵗江州刺史應詹卒詹字思遠汝南南頓人也魏侍中璩之孫詹㓜孤以孝聞家富於財年又稚弱請族人共居委其資産世賢焉及長質素司徒何劭見之曰君子哉若人初辟公府掾累遷南平太守時王澄為荆州刺史洛陽傾覆詹流涕勸澄赴援馳檄四方辭義壯烈見者慷慨而澄竟不從及武陵溪蠻反澄假詹天門武陵軍事詹巡撫諸蠻召問酋長所欲蠻感德義數郡無虞後與陶侃破杜弢於長沙賊多金寳詹一無所取惟收圖書王敦表為益州刺史移鎮巴東士庶攀車號泣而送俄遷後將軍徴拜光禄勲及王敦作逆明帝問詹計以詹為都督前鋒軍事賊平遷江州刺史封觀陽縣侯在州疾篤與陶侃申情好勸勵力朝廷以報㓜主卒時年五十三諡為烈案晉書詹初與京兆韋泓為友詹卒泓製朋友之服哭之宿草追趙武祀程嬰公孫杵臼之義祭詹終身也七年秋七月詔諸養禽獸之屬損費者多一切除之太尉陶侃遣子平西叅軍斌與南中郎將桓宣攻石勒將郭敬破之克樊城竟陵太守李陽㧞新野襄陽因而戍之冬十一月壬子朔進陶侃為大將軍詔舉賢良方正直言是月新宫成署曰建康宫亦名顯陽宫開五門南靣二門東西北各一門案圖經即今之所謂臺城也今在縣城東北五里周八里有兩重墻案修宫苑記建康宫五門南靣正中大司門世所謂章門拜章者伏於此門待報南對宣陽門相去二里夾道開御溝植槐柳世或名為闕門南靣近東閶闔門後改為南掖門門三道世謂之天門南直蘭宫西大路出都城門陽門正東靣東掖門正南平昌門門上有爵絡世謂之冠爵門南對南掖門第三重宫墻南靣端門夾門兩大鼓在兩塾之南並三丈八尺圍用開閉城門日中晡時及曉並擊以為節夜又擊之持更其一者本在會稽雷門相傳云洛陽舊物打之聲應洛陽城孫恩之亂軍人斬破有䨇鶴飛去爾後不復鳴義熈中始取還置於北門其東西門不見名其宫城西南角外本有池名清遊池通城中有樂賢堂並肅宗為太子時所作蘇峻之亂宫室皆焚毁惟此堂獨存其西掖門外南偏突出一丈許長數十丈地時百度多闕但用茆苫議以除官身各出錢二千充修宫城用自晉自陳遂廢十二月帝遷于新宫八年春正月辛亥朔朝萬國於新宫四夷列次帝詔曰昔長虵縱暴宫室焚蕩元惡雖剪未暇營築有司屢陳朝㑹逼狹遂作斯宫子來之勞不日而成之既獲臨御大饗羣后九賓充庭百官象物知君子勤禮小人盡力矣思蠲宻網咸同斯惠其大赦天下五嵗刑以下令諸郡舉力人能負千五百斤已上者丙子石勒使致賂詔焚之是月改苑倉為太倉案吳時苑城内有倉名苑倉亦名倉城至此治苑為宫惟倉不改在西掖門内是年改名焉四月以束帛禮髙士郭文舉處士翟湯湯字道深尋陽人篤行亷潔不屑世事永嘉末冦害相仍湯隠於尋陽南山盗不犯境始安太守干寳與湯通家遣船米餉湯勅吏云翟公亷讓卿致書訖便委船歸使者依㫖湯得船米乃貨易取絹遂附還寳寳益愧焉庾亮表之徴為國子博士不就年七十三卒於家晉書髙士傳郭文字文舉河内軹人也少好山水尚嘉遁常遊名山歴華隂觀石室洛陽陷入吳興餘杭大辟山中倚木于樹苫覆其上而居焉時猛獸為暴文獨宿十餘年竟無所害恒著鹿裘葛巾採竹葉木實買鹽米以自供人或賤價取之亦即與之遇有猛獸殺鹿於文庵側文以語人人賣得錢分文文曰若取自取何以相語聞者歎服又有一獸向文張口文為㧞去其鯁骨而去明旦致一鹿於室前毎有寄宿者文為之汲水無勌色餘杭縣令顧颺與葛洪造之颺使致韋袴褶文不納颺使置室中乃至爛於户内竟不服用王導為相使迎至京師於西園築臺置之今廢冶城中平墩見在朝士咸共觀之文頽然箕踞傍若無人温嶠嘗問曰人皆有六親相娯先生棄之何也文曰遭世亂耳人問飢而思食壯而思室自然之性先生獨無情乎文曰情由憶生不憶則無情又曰先生獨處窮山若疾遭命不為烏鳥食乎文曰埋藏者亦為螻蟻所食又曰猛獸害人先生獨不畏乎文曰人無害獸之心獸豈有害人之意乎又曰茍時有不寧身不得安今將用先生以濟時若何文曰山草之人安能佐時永昌中大疫文亦病王導遺藥文曰命不在藥夭夀時也居冶城七年一旦忽求還山導不聽乃逃歸臨安及蘇峻作逆而臨安獨全人以為知幾自此不復語但舉手指麾及病篤臨安令萬寵候之問先生可得幾日文三舉手果十五日而終既葬於座中有木數片反覆書之上曰金雄記下曰金雌詩詩著地爛皆毁不識金雄之記言將來事多有驗也夏五月有星隕于肥鄉數一麒麟騶虞見于遼東秋七月石勒死子𢎞嗣立是嵗作北郊於覆舟山之陽制度一如南郊案地志今縣東八里湖溝後東近青溪其西即藥園地義熈中盧循反劉裕築藥園壘即此更西即吳時任子館也九年春正月隕石於凉州數二二月丁卯加張駿為大將軍夏六月蜀李雄死其兄子班嗣偽位乙卯使持節侍中太尉都督荆江等八州軍事荆江二州刺史長沙郡公陶侃薨於樊谿侃字士行本鄱陽人吳平徙家廬江之尋陽少孤貧為縣吏鄱陽孝亷范逵嘗過侃時倉卒無以待賔其母乃截髪易酒撤薦飯馬逵重之言於廬江太守張䕫夔召為督郵遷主簿復察孝亷至洛陽除郎中後㑹荆州刺史劉𢎞之官辟侃信用累至江夏太守時陳敏據揚州令弟恢率軍西上侃拒之以運船為戰艦或言不可侃曰用官物討官賊何為不可遂破恢等後以母憂去職嘗有二客來弔不哭而退化為䨇鶴冲天而去及中宗即位江左加龍驤將軍武昌太守時益州刺史杜弢舉兵反破荆州刺史周顗失據侃率衆救之謂衆將曰此賊必更歩向武昌吾宜還城卿等誰能忍饑鬪邪部將吳寄曰要欲十日忍饑晝當擊賊夜分捕魚可足以相濟侃曰卿健將也賊果來攻侃擊破之遣叅軍王貢告㨗於王敦敦以荆州多難用王貢說表侃為荆州刺史鎮沔江尋為杜曽所破坐免以白衣領職佐史爭上䟽理之復官率周訪等進討杜曽初王貢以矯命恐獲罪遂投杜曽至是賊衆離阻貢將出挑戰侃遥謂曰杜弢為益州吏盗用庫錢父死不奔䘮卿本佳人何為隨之天下寧有白頭賊乎貢初横脚馬上聞侃言改容下脚辭色甚順侃截髪為信貢遂來降弢曽等大敗王敦忌侃功左轉為廣州刺史時温邵作梗嶺外諸將請討之侃笑曰吾威名已著何事遣兵但一函紙自足耳於是下書諭之邵懼而走追獲於始興以功封柴桑侯侃在州無事輙朝運百甕於齋外暮運入於齋内人或問之答曰吾方致力中原過爾優逸恐不堪事及王敦反詔侃領江州刺史敦平進都督荆雍梁益州諸軍事荆州刺史荆郢士女莫不相慶侃性聰敏勤於吏職終日危坐事有萬端曽不遺漏遠近書䟽皆手自答筆翰如流未嘗壅滯引接䟱遠門無停賓常語人曰大禹聖者乃惜寸陰至於衆人當惜分陰豈可遊逸生無益於時死無聞於後是自棄也諸叅佐或以談戱廢事者乃命取其酒噐及蒱博之具悉投之於江中曰樗蒱者牧猪奴戲耳老莊浮華非先王之法言不可行也君子當正其衣冠攝其威儀何有亂頭蓬首自謂宏達有奉饋者皆問其所由若力作所致雖㣲必嘉慰賜三倍若非理者則切厲還饋辱之嘗出行見人持一把未熟稻侃問用此何為人云道傍所見聊取之耳侃怒曰汝既不佃而戲盗人稻執而鞭之百姓於是勤農家給人足暨蘇峻作逆京都不守平南將軍温嶠要侃同赴朝廷侃恨肅宗崩不在顧命之列言形於色謂嶠曰吾疆場外將不敢越局嶠固請之推為盟主侃便戎服既平峻於石頭庾亮用温嶠謀詣侃拜謝侃遽止之曰庾元規乃拜陶士行耶王導入石頭城令取故節侃笑曰蘇武節似不如是導有慚色以平峻功進侍中太尉改封長沙郡公加都督交廣寧七州軍事移鎮巴陵後平襄陽拜大將軍劒履上殿入朝不趨讃拜不名上表固讓薨時年七十六贈大司馬侃在軍四十一年雄毅明斷自南陵至於白帝數千里道不拾遺侃性纎宻頗類趙廣漢在武昌時課諸營種柳都尉夏施盗植於已門侃行駐車問曰此武昌官柳何因在此施惶怖謝罪時殷浩庾翼等皆為佐吏武昌號為多士侃飲酒毎有定限嘗㑹歡有餘而限已竭浩等勸更少進終不許時梅陶與親人曹識書曰陶公機神明鑒似魏武忠慎勤勞似孔明陸抗諸人不能及謝安石毎云陶公用法恒得法外意侃少時漁於雷澤得一織梭以挂于壁有頃雷雨自化為龍而去又嘗夢身生八翼飛而上天見天門九重已入其八唯一門不開閽者以杖撃之折其左翼及寤左腋猶痛又如厠見一人朱衣介幘斂板曰以君長者故相報君後當為公位至八州都督及統八州握强兵據上流潜有窺窬之志每思折翼之祥自抑而止子十七人惟洪瞻夏琦旗斌稱範岱見於史餘不見録時大旱詔太官徹膳省刑恤孤寡貶費節用冬十一月石季龍殺石勒太子𢎞而自立為天王于鄴十二月侍中顧和議奏舊冕有十二旒皆用玉珠今用雜珠等非禮若不能用玉可用白璇帝納之十年春正月庚午朔帝加元服大赦改元為咸康元年増文武位一等大酺三日賜鰥寡孤獨不能自存者米五斛甲戌詔太常改冕旒飾用玉珠案江表記自晉中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等至此顧和始奏帝詔太常改之二月甲子帝親臨釋奠夏四月石季龍冦歴陽詔加司徒王導大司馬假黄鉞都督征討諸軍事以禦之癸丑帝親觀兵於廣陽門令諸將分戍案晉書成帝紀觀兵於廣莫門案宮苑記晉時未有廣莫門據此成帝觀兵是廣陽門本史誤耳至宋永初中始改宫城北平昌門為廣莫門廣陽門在今縣城東一里半都城南靣西門也其時石季龍既冦歴陽兵亦不歴北門出也秋七月白虹貫日八月乙丑荆州長沙武陵龍陽等三縣大水漂屋室殺人損秋稼時帝幼沖權在下之罰也十月乙未朔日有食之是嵗大旱㑹稽餘姚尤甚米一斗五百價人相賣二年春正月彗星見於奎二月算軍用稅米空懸五十餘萬碩尚書謝褒已下免官辛亥立皇后杜氏大赦増文武位一等三月㪚騎常侍干寶卒寶字令升新蔡人少勤學中宗即位以領國史累遷㪚騎常侍修晉紀上自宣帝迄于建興凡五十三年成二十卷辭簡理要直而能婉世稱良史初父亡有所幸婢母忌之乃殉葬後十餘年母䘮開冡合葬殉婢仍活取嫁之因問幽㝠考校吉凶悉驗遂著搜神記三十卷將示劉惔惔曰卿可謂鬼之董狐也案三十國春秋是年天台令蘇韶卒卒後韶弟節見韶乘馬晝日而行著黒介幘黄綵單衣節問曰兄何由來韶曰欲改葬節因問幽㝠之事韶曰死者為鬼俱行天地之中在人間而不與生者接顔回卜商今見為修文郎死之與生畧無有異死虚生實此有異耳節曰死者何故不復歸其尸乎對曰譬若㫁兄一臂以投地就剝削之於兄有患否死者屍骸亦如此也節曰厚葬爽塏死者樂乎韶曰何樂之有節曰若然兄何故改葬韶曰述生時事耳言終而不見夏四月皇后見於太廟秋七月詔賓禮三恪立周漢之後冬十月更作朱雀門新立朱雀浮航航在縣城東南四里對朱雀門南度淮水亦名朱雀橋案地志本吳南津大吳橋也王敦作亂温嶠燒絶之遂權以浮航徃來至是始議用杜預河橋法作之長九十歩廣六丈冬夏隨水高下也是嵗徐州刺史刁彜上書訟父協功德朝廷議詔贈本官祭以太牢協字𤣥亮渤海饒安人也少好經籍博聞彊記釋褐濮陽王文學永嘉初累遷河南尹未拜避難渡江元帝鎮江左用之為鎮東軍諮祭酒中興初拜尚書左僕射于時朝廷草創憲章未立以協乆在中朝諳練舊事凡所制度儀注皆禀於協焉太興初進位尚書令協為人性剛悍與物多忤毎崇上抑下故為王氏所疾又好使酒放肆侵毁公卿見者莫不側目然悉力盡心志在匡救元帝甚信任之以奴為兵取將吏客使轉運皆協所建衆庶怨望及王敦構逆上表罪協帝使督六軍出拒王敦王師敗績協與劉隗俱見帝於太極東除帝執協隗手流涕嗚咽勸令避禍乃給協等人馬使自為計協年老不堪乘騎又素無恩於下從者皆委之行至江乘縣東為人所殺送首於王敦中宗痛之宻捕送首者誅之敦平後以協出奔不在贈例而貶本官至是子彜上書訟之執事庾冰下議追贈本官三年春正月辛卯詔立太學於淮水南在今縣城東南七里丹陽城東南今地猶名故學夏六月旱地生毛冬十月丁卯慕容皝自立為燕王四年夏四月蜀將李壽殺李期僣即偽位國號漢六月改司徒為丞相以太傅王導領之秋八月丙午分寧州置安州五年秋七月使持節侍中丞相領揚州刺史始興公王導薨導字茂𢎞瑯琊臨沂人祖覽父裁導少有風鑒識量清遠陳留高士張公見而竒之謂其從兄敦曰此兒容貌志氣將相才也㓜與元帝尤善在洛陽常勸帝歸藩見天下將亂遂推心奉戴有興復之志及徙鎮建鄴吳人不附居月餘士庶莫有至者導患之㑹敦來朝導謂敦曰瑯琊王仁德雖厚而名論猶輕兄威風已振宜有以匡濟者㑹三月上已帝親觀禊乘肩轝具威儀敦導及諸名賢皆騎從之吳人紀贍顧榮賀循皆江南之望竊覘之見其如此咸驚懼乃相率拜於道左導因進計帝乃使導躬造循榮等由是吳㑹風靡百姓歸心自此之後漸相崇奉君臣之禮始定導為政務在清浄匡主寧邦尤見委託情好日隆朝野傾心號為仲父帝常從容謂導曰卿吾之蕭何也初桓彜過江見朝廷㣲弱謂周顗曰我以中州多故來此欲求全活而衰弱如此將何以濟憂懼不樂徃見導極談世事退謂顗曰向見管夷吾無復憂矣時渡江人士毎至暇日相要出新亭歡宴周顗中坐而歎江山之異相對而泣導愀然變色曰當共戮力王室尅復神州何至作楚囚而相對泣邪衆收淚謝之及中宗即晉王位累遷都督中外諸軍事領中書監録尚書事帝登尊位進侍中司空尋代賀循領太子太傅時中興草創未置史官因祖約舉王隱導始啟立典籍頗具時議欲立石闕於宫門未定後導隨駕出宣陽門乃遥指牛頭峯為天闕中宗從之案地記至今此山名天闕山自朱雀南出治御道四十里到此山天寳初改名為仙窟山山南有芙蓉峯峯北有大石如卧鼓其石中空可坐數十人其高九尺上下有小石子吳之時人呼為石鼓其山西峯中有石窟不測深淺古老相傳云辟支佛出所梁武帝於窟穴下置寺名曰仙窟寺窟有一石鉢盂莫知所由來形狀甚古唐神龍初鄭克俊取將入長安及開善寺誌公屐也及劉隗用事導漸見䟽遠肅宗即位平王敦後進封始興郡公位太保司徒如故劒履上殿入朝不趨賛拜不名受顧託之重帝即位給班劒鼓吹羽葆蓋及石勒侵阜陵又石季龍掠騎至歴陽俱加大司馬假黄鉞出討之賊退解大司馬轉中外大都督位太傅又拜丞相依漢制罷司徒官以并之導善於因事雖無日用之益而嵗計有餘時帑藏空竭庫中惟有練數千匹賣之不售而國用不足導患之與朝賢俱制練布單衣於是士庶翕然競服之練遂踊貴端至一金帝既㓜沖見導每拜又嘗與導書手詔則云惶恐言中書作詔則曰敬問導妻曹氏性妬導令别修館以安衆妾曹氏知將徃焉導恐妾被辱遽令命駕將恐遲之以所執塵尾柄驅牛而進司徒蔡謨聞之戲導曰朝廷欲加公九錫導不之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒及庾亮出鎮於外以帝舅故執朝權而趨向者多歸之導不能平嘗遇西風塵起輙舉扇自蔽徐曰元規塵汚人自漢魏已來羣臣不出拜山陵導以元帝睠同布衣毎一崇進皆就拜不勝悲涕由是詔百官拜陵自導始也薨時年六十四子悅嗣案晉書導有六子悅怡協洽劭薈悅位中書侍郎性儉素帳下有甘果爛敗導令棄之謂婢曰無使大郎知也悅嘗與導奕碁争道導笑曰相與有𤓰葛郍得為爾耶初王敦構逆導憂覆族使郭璞筮之曰吉無不利淮水絶王氏滅後子孫繁衍竟如璞言淮即秦淮也八月壬午復改丞相為司徒司空庾亮領之辛酉以䕶軍將軍何充録尚書事辛酉侍中太尉南昌公郗鑒薨鑒字道徽高平金鄉人漢御史大夫慮之𤣥孫鑒少孤貧博覽經籍躬耕壠畆吟咏不倦以儒雅著名惠帝累拜中書侍郎以世亂辭鄉里將親屬避難於魯之嶧山中宗鎮江左承制假龍驤將軍兖州刺史鎮鄒山太寧初王敦專制内外危逼謀仗鑒為外援拜安西將軍都督揚州江西諸軍事假節鎮合肥王敦忌之表為尚書令及敦使錢鳳王含入逼京都衆議以苑城小不固勸大駕自出距戰鑒不許敦平後奏免錢鳳母年八十不坐帝即位與王導等同受顧命挾輔少主咸和初領徐州刺史蘇峻反進位司空與郭默還丹徒立大業曲阿庱亭三壘拒賊東入之兵峻平遷太尉將拜謂所親曰平生意不及此值世紛紜遂至今日尋以疾上䟽遜位薨時年七十一子愔曇案晉書初鑒屬永嘉䘮亂在鄉里甚窮餒鄉人以鑒名德共飴之時兄子邁外孫周翼並小常携之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有所存鑒已後獨徃食食訖以飰著兩頰邉還吐與二兒後並獲存鑒之薨也翼時為剡縣令翼追撫養之恩乃棄官歸席苫心䘮三年也是時始用磚壘宫城而創構樓觀六年春正月庚戌以庾翼為安西將軍都督江荆司雍梁益六州諸軍事荆州刺史將發獻玉柄毛扇帝疑其故物侍中劉劭進曰柏梁雲構匠石先居其下管絃繁奏鍾䕫先聽其音稚恭之進扇以好不以新帝大悅二月燕王慕容皝大破石季龍將石成於遼西獻㨗于京師秋七月乙卯初依中興故事朔望聽政于東堂是月征西將軍都督江荆豫益梁雍六州諸軍事司徒永昌公庾亮薨亮字元規明穆皇后兄父琛字子美以建威將軍過江為㑹稽太守卒於丞相軍諮祭酒亮美姿容善談論性好莊老風格峻整動由禮節閨門之内不肅而成時人或以為夏侯太初陳長文之倫也年十六東海王越辟為掾不就隨父在㑹稽嶷然自守時人皆憚其方嚴莫敢造之元帝鎮江左聞其名辟為西曹掾及引見風情都雅過於所望甚器重之由是娉其妹為太子妃中興初拜中書郎領著作侍講東宫累遷給事中黄門侍郎㪚騎常侍時王敦在蕪湖帝使亮詣敦籌事敦與亮談論不覺改席而前退而歎曰庾元規賢於裴頠遠矣肅宗即位進中書監亮上䟽讓曰臣凡庸固陋偷榮昧進臣領中書則示天下以私矣悠悠六合皆私其姻人皆有私則天下無公矣是以前後二漢咸以抑后黨安進婚族危向使西京七族東京六姓皆非姻族各以平進縱不悉全决不盡敗今之盡敗更由姻妮臣歴觀外戚或居權寵四海側目事有不允罪不容誅身既招殃國為之弊其故何耶由姻媾之私羣情之所不能免是以䟱附則信姻進則疑疑積於百姓之心則禍成於重閨之内矣此皆徃代成鑒可為寒心夫萬物之所不通聖賢因而不奪冒親以求一寸之用未若防嫌以明至公今恭命則愈違命則苦臣雖不達幸察愚心帝納其言而止時王敦有異心亮憂懼以疾去官尋代王導為中書監敦平後與王導受遺詔輔㓜主復進中書令太后臨朝政事一决於亮時陶侃祖約以不在先帝遺詔内疑亮刪除並有怨言亮懼亂出温嶠為江州刺史仍修石頭以偹之㑹南頓王宗謀廢執政亮殺宗而廢宗兄羕宗帝室近屬羕國族元老又先帝保傅天下咸以亮翦削宗室瑯琊人卞咸宗之黨也與宗俱誅咸兄闡亡奔蘇峻亮符峻送闡而峻保匿之峻多納亡命專用威刑亮知峻必亂徴為大司農舉朝謂之不可亮不從及峻舉兵反至于京都亮携其三弟懌條翼等南奔温嶠與嶠共推陶侃為盟主侃素有憾于亮下至尋陽議者咸謂侃欲誅執政以謝天下亮甚懼及見侃引咎自責風止可觀侃不覺釋然乃謂亮曰君侯修石頭以擬老子今日反見求耶便談宴終日亮噉薤因留白侃問曰安用此為亮云故可以種侃尤相稱歎曰非惟風流兼有為政之實及至石頭又為峻將張曜所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宜數爾峻平後亮進見帝泥首謝罪乞骸骨逃竄山海帝勞之曰此社稷之難非舅之責也亮乃求出外鎮自効假節豫州刺史領宣城内史鎮蕪湖陶侃薨後拜都督江荆豫益梁雍六州諸軍事領江荆豫三州刺史遷鎮武昌時王導輔政㑹石勒新死亮有開復中原之謀乃以毛寳為豫州刺史與西陽太守樊峻俱戍邾城又使陶稱為南中郎將入沔中弟翼為南蠻校尉鎮江陵以陳囂為輔國將軍趣子午亮率大衆自進石頭城為諸軍聲援乃上䟽朝廷議之㑹冦䧟邾城毛寶等赴水死亮以處置失度陳謝自貶詔不許進拜司空固讓不拜及導薨徴為司徒薨時年五十二將葬何充㑹之歎曰埋玉樹于土中使人情何能已三子彬羲龢案晉書初亮所乘馬的顱殷浩以為不利于主勸亮賣之亮曰曷有已之不安而移之于人浩慙而止冬十月林邑獻馴象十一月復瑯琊比漢豐沛七年春二月甲子朔日有食之己卯慕容皝遣使求假燕王章璽許之三月戊戌皇后杜氏崩夏四月丁巳葬恭皇后于興平陵后諱陵陽京兆人也鎮南將軍預之曽孫祖錫父乂母裴氏名穆太傅主簿遐女孝武帝立封裴氏為廣德君初穆渡江立第于南掖門外時以裴氏壽考故呼為杜姥宅在今縣東北三里東宫城南路西后少有姿色及長猶無齒帝將納采之日夜齒生在位七年年二十一崩無子先是三吳女子相與簮白花望之如素奈傳言天公織女死為之著服至是后崩案外戚傳乂字𢎞理性純和美姿容有盛名于江左王羲之目之曰膚若凝脂眼如㸃漆此神仙人也桓彜亦曰衛玠神清杜乂形清襲封當陽侯辟公府掾為丹陽丞卒咸康初追贈金紫光禄大夫司徒蔡謨嘗言於朝日恨諸君不見杜𢎞理也是月詔實編户王公已下皆正土斷白籍分江乘縣西界置臨沂縣屬琅琊郡案臨沂縣廢城在東江獨石山西臨大江在今縣北四十里也秋八月引見群臣射宴於延賢堂九月罷太僕官冬十二月除樂府雜伎罷安州癸酉侍中司空興平伯陸玩薨玩字士瑶吳郡吳人也父英兄曄曄與玩少有雅望從兄機毎稱之曰我家世不乏公矣曄位尚書玩器量淹雅元帝引為丞相叅軍時王導初過江左思結人情求婚于玩玩對曰培塿無松栢薰蕕不同器玩雖不才義不能為亂倫之始導乃止玩嘗詣導食酪因而得疾與導牋曰僕雖吳人幾為傖鬼其輕易權貴如此明帝即位累遷進位侍中以疾辭後進吏部尚書又讓不拜轉尚書左僕射蘇峻反玩潜說匡術以苑城歸順賊平以功封興平伯除尚書令玩自辭讓詔優答不許尋而王導郗鑒庾亮相繼而薨朝野咸以為三良既沒邦國殄瘁以玩有德望乃遷侍中司空玩既不得已受拜退謂賓客曰國家以我為三公是天下無人也談者以為知言玩友人詣玩索酒盃酒㵼置梁柱間呪曰當今乏材以爾為柱石莫傾人梁棟邪玩笑曰戢卿良箴玩雖登公輔謙讓不辟掾屬成帝勸之玩不得已而所辟皆寒素有行之士性通雅不以名位格物誘納後進謙若布衣縉紳之徒皆廕其德後疾篤上表乞骸骨薨時年六十四詔給兵千人守冢七十家子始嗣案晉書玩次子納字祖言累遷位至尚書令見會稽道子少年專政委任羣小乃望宫門而歎曰好家居纎兒欲撞壊之邪朝士咸服其忠純如是也是月東陽太守張虞表稱郡民許孜純孝詔旌表門閭蠲復其子孫孜字季義東陽吳寧人遭父母䘮建墓於縣之東山廬於墓自負土成墳鄉人或愍孜羸憊助其負土晝則不逆夜並除之遣妻還本家一身自處鳥獸遊之時有鹿犯其松栢孜悲嘆曰鹿獨不念我乎明日虎殺其鹿於松所孜見鹿死復惆悵取而埋之虎復出於孜前自撲而死孜益歎息之又埋其虎自後無犯纎介白鹿野雉嘗就馴宿年八十餘卒邑人號所居為孝順里八年春正月己未朔日有食之乙丑大赦天下二月豫州刺史庾懌送酒與江州刺史王允之允之疑其有毒與犬犬斃允之懼表帝帝怒曰大舅已亂天下小舅復欲爾邪懌聞服藥而死三月以武悼楊皇后配饗武帝廟庭夏五月有馬色赤如血入於殿前盤旋走出莫知其處六月庚寅帝不豫詔以瑯琊王岳為嗣曰瑯琊王岳親則母弟體則仁長君人之風允塞時望肆爾王公卿士其輔之以祗奉祖宗明祀壬辰引武陵王晞㑹稽王昱中書監庾冰中書令何充並受遺顧命癸巳帝崩于西堂秋十月丙辰葬興平陵在縣北七里鷄籠山陽與元帝同處案帝年五嵗即位立十八年年二十二諡曰成皇帝廟號顯宗帝少聰敏有成人之量初南頓王宗之誅也帝不時知及蘇峻平後問庾亮曰白頭翁何在亮曰謀反伏誅帝泣謂亮曰舅言人作賊便殺之人言舅作賊復若何亮懼變色然少為舅氏所制不親庶政及長頗留心於萬機務在簡約嘗欲於後園作射堂計用四十金以為勞費乃止雄武之度雖愧於前王恭儉之德足追踨於徃烈矣建康實録卷七
