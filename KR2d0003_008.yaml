body:
  text: 建康實録卷八唐許嵩撰晉康皇帝康皇帝諱嶽字世同成帝母弟也咸和元年封吳王二年徙封琅琊王咸康五年領司徒八年夏六月庚寅顯宗不豫時庾冰以舅氏當朝權侔人主慮易世之後戚屬疏逺將為他人所制乃謀説顯宗曰國有強敵宜立長君顯宗信而從之遺詔以琅琊王為嗣甲午即皇帝位大赦諸屯戍文武及二千石官長皆不得輒離所局而來奔赴己亥封成帝子丕為琅琊王奕為東海王時帝在諒隂委政中書監庾冰等秋七月葬成帝于興平陵帝親奠于西階既發引徒行至閶闔門升素輿至陵所九月詔琅琊國及府吏進位各有差冬十二月壬子立皇后禇氏增文武位二等建元元年春正月大赦改元振恤鰥寡孤獨不能自存者夏五月旱六月壬午束帛徵處士南陽翟湯會稽虞喜秋七月慕容皓大破石季龍石季龍將戴開率衆來降詔曰慕容皓摧殄羯寇斬獲八千餘人將是其天亡之始也中原之事冝加籌量以安西將軍庾翼為征討大都督遷鎮襄陽以輔國將軍琅琊內史桓溫為前鋒假節率衆入臨淮八月蜀李夀死子勢嗣偽位冬十月辛巳以驃騎將軍何充為中書監都督揚豫二州諸軍事揚州刺史録尚書輔政十一月己巳大赦天下高句麗遣使朝獻二年秋八月罷絶倒懸橦之伎九月丙申立皇子聃為皇太子戊戍帝崩于式乾殿冬十月乙丑葬崇平陵在今縣城東北十五里鍾山之陽不起墳案帝年二十一即位立三年年二十三諡曰康皇帝初庾冰權政當朝制度年號再興中朝因改元曰建元或謂冰曰郭璞讖云立始之際丘山傾立者建也始者元也丘山諱也君侯忘郭生之言耶冰瞿然既而嘆曰如有吉凶豈改易所能救乎至是果驗案寺記帝時置兩寺禇皇后立延興寺在今縣東南二里運溝西岸中書令何充立建福寺今廢也孝宗穆皇帝穆宗諱聃字彭子康帝長子建元二年九月丙申立為皇太子時年二嵗己亥即皇帝位大赦尊皇后禇氏為皇太后臨朝攝政冬十一月庚辰車騎將軍庾冰卒冰字季堅時兄亮以名德流訓冰與諸弟動必合禮為世所重亮嘗目冰為庾氏之寶起家纍遷吳國內史與王舒擊破蘇峻將張健峻平後以功封侯不受纍遷中書監都督揚豫兖三州諸軍事時王導新薨人情恇然冰兄亮既固辭不入而冰乃當重任經綸時務不捨夙夜賔禮朝賢升擢後進由是朝野注心咸稱賢相初導輔政每從寬惠而冰頗任威刑殷融諌之冰曰前相之賢猶不堪其𢎞况吾者哉范汪謂冰曰頃天文錯度足下冝盡消禦之道冰曰玄象豈吾所測正當勤盡人事爾及顯宗疾篤時有妄為尚書符敕宫門宰相不得前左右皆失色冰神氣自若曰必是虛妄推問果詐衆心乃定康帝即位進車騎將軍冰懼權盛乃求外出會弟翼將伐石季龍遂出都督江荆寧益梁交廣七州都軍事領江州刺史鎮武昌帝即位獻后臨朝乃徵冰輔政冰辭以疾篤尋卒于鎮冰天性清慎及卒無絹為衾又室無媵妾有七子後以罪並為桓溫所誅初冰令郭璞筮卦成曰子孫必有大禍唯用三陽可以有後故以長子希鎮山陽第三子友為東陽遂挈家于暨陽及後坐族誅唯友獲全永和元年春正月甲戍朔皇太后設白紗帷于太極殿抱帝臨軒聽政大赦改元夏四月壬戌詔會稽王昱録尚書六條事是月石季龍將路永屯于夀陽秋七月方士戴洋卒洋字國流吳興長城人也年十二遇病死五日而蘇言死時天使其為酒藏吏授符録給吏從幡麾將往蓬萊崑崙積石太室等諸山既而遣歸及長善風角好道術妙解占候吳末為臺吏時童謠歌曰猗童蔣山流渡江洋知吳必亡遂託病還鄉里懷帝末堂邑令孫混欲迎家纍洋曰此地當敗得臘不得正豈可移家于賊中乎混便止嵗末陳敏作逆使弟昶攻破堂邑都水馬武見洋有道術召將赴洛洋夢神人曰洛中當敗人盡南渡揚州後五年當有天子洋信之遂不去時王敦出鎮荆州洋謂吳興陳瑾曰王敦南上半路而住當還作賊及敦在武昌後南方有雲如牛北向洋語華談曰此王敦舉兵之應也初祖約鎮譙請洋為中典軍約府內地忽赤如丹洋曰地赤如丹血丸丸當有下反上者約問洋曰吾還東何如留夀陽留夀陽何如入胡洋曰東入失半入胡滅門留夀陽尚可尋而牽騰等叛約約率衆將家屬奔于石勒勒果盡誅約後庾亮代陶侃鎮武昌引洋問氣候洋曰天有白氣喪必東行後近城東家夜半望見城內有數炬火從城上出如大車狀白布幔覆與火俱出城東北行至江乃滅洋聞嘆曰此與前白氣同時亮欲移鎮石城或問洋當不洋曰不當洋言于亮曰武昌土地有山無林政可圖始不可居終山作八字數不及九昔吳用壬寅來上創立宫城至于己酉還下秣陵其見陶公亦涉八年土地盛衰有數人心去就有期不可移也公冝更擇吉處武昌不可久住五年亮令毛寶屯邾城九月洋言于亮曰毛豫州合今年受死問昨朝大霧晏風當有怨賊報仇後賊果陷邾城而去亮曰天何以利賊而病我也洋言今石季龍亦當受死且不憂賊但憂公病耳亮曰如何洋曰荆州受兵江州受災公若去此二州即可亮竟不能解二州遂至大困洋曰昔蘇峻時公于白石祠中祈福許賽其牛至今未解故為此鬼所考亮曰有之君神人也或問曰庾公可得幾時洋曰見明年時亮已不識人咸以為妄果經正月一日而薨庚午使持節都督江荆司梁雍益寧七州諸軍事江州刺史征西將軍都亭侯庾翼卒翼字稚恭司徒亮之少子風儀整峻當世莫儔善草𨽻書子弟皆效之後王羲之書盛內外官重翼甚不平在荆州寄書于家曰兒子輩憎家雞好野雉常見殷浩杜乂曰此輩宜束之髙閣俟天下太平然後議用所任耳九月丙申皇太后詔曰今百姓勞弊其共思詳所以賑恤之是嵗鎮東將軍會稽內史孔愈卒愈字敬康會稽山隂人也其先世居梁國曾祖潛漢末避地會稽因家焉愈年十三而孤飬祖母以孝聞與同郡張茂字偉康丁潭字世康齊名時人號會稽三康吳平愈遷于洛惠帝末歸鄉里行至江淮間遇石冰封雲為亂逼為參軍不從徑東還入新安山中改姓孫氏以稼穡讀書為務信著鄰里後忽捨去皆謂為神人而為之立祠永嘉末中宗辟為參軍尋求去莫知所在建興初始出應召為丞相掾以討華軼功封餘不亭侯愈曾行經餘不亭見籠龜于路者買而放之溪龜中流左顧者數四及是鑄侯印而左顧三鑄如初印工以告愈愈悟乃佩焉建武拜中書郎出為司徒左長史肅宗即位纍進位侍中太常卿及蘇峻反愈朝服守宗廟賊平遷左僕射後王導將以趙胤為護軍愈謂導曰中興已來處此官者周伯仁應思逺耳今誠乏才豈冝以趙胤居之耶導不從尋省左右僕射以愈為尚書僕射愈年及懸車纍乞骸骨詔不許拜護軍將軍會稽內史時句章縣有漢舊陂毁廢數百年愈自巡行修復故堰溉田二百餘頃皆成良業在郡三年乃營山隂湖南侯山下數畝地為宅草堂數間便棄官居之送資數百萬悉無所受病篤遺令斂以時服卒時年七十五子誾嗣位侍中案晉書愈有三子中子注孝武時位侍中少子安國孝武時亦至侍中帝崩服縗絰涕泗因形體羸瘦見者以為真孝官至尚書右僕射愈弟羣字敬林嗜酒王導謂曰卿恆飲酒豈不見酒家覆巾乎日月久即麋爛羣答曰公不見肉用糟淹更堅嘗與親故書曰今年田得七百石秫米不足了麯蘖事位至侍中卒二年春正月丙寅大赦己卯使持節侍中都督揚州諸軍事揚州刺史録尚書事都鄉侯何充卒充字次道廬江灊人吳光祿大夫禎之曾孫幼而好學風韻淹雅以文義見稱初辟大將軍王敦府掾時敦兄含為廬江太守貪汙敦嘗于坐中稱曰家兄在郡佳政廬江人士咸稱之充正色曰充即廬江人所聞異于此敦默然由是忤意左遷東海王文學敦敗纍位中書侍郎少與王導善嘗詣導導以麈尾指牀呼充共坐曰此君坐也顯宗即位拜黃門侍郎平蘇峻出為會稽內史在郡尋徵侍中辭不拜轉丹陽尹時王導庾亮並言于帝曰何充器局方槩有萬夫之望必能總録朝端為老臣之副臣死之日願引充內侍則社稷無虞矣詔加吏部尚書王導薨後與中書監庾冰參録尚書事進尚書令加領軍充以內外統任難處上疏固辭許之徙中書令時顯宗寢疾庾冰兄弟以舅氏當朝謀立康帝為嗣充建議以父子相傳先王舊典不冝改易冰等不從既而康帝臨軒冰充侍坐帝曰朕嗣鴻業二君之力充對曰陛下龍飛臣冰之力若如臣議不覩升平之日帝有慙色建元初庾冰出鎮江州以充為揚州刺史先是庾翼悉發江荆二州編户奴為兵士庶嗷然充復欲發揚州奴以均其謗議不成俄而帝疾篤庾冰等意在簡文充議立皇太子奏可帝既立獻后臨朝詔加中書監録尚書事庾冰卒後專輔幼主以桓溫為征西將軍領荆州刺史每曰桓溫禇裒為方伯殷浩居門下我無勞矣充為宰相雖無澄正改革之能而有器局臨朝正色以社稷為己任凡所選用皆以功臣為先不以私恩樹親戚談者以此重之性好釋典崇修佛寺供給沙門以至貧乏乃獲譏于世阮裕嘗戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚未能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟準崇信釋氏謝石譏之云二何佞于佛二郗諂于道充能飲酒雅為劉惔所貴每云見次道飲令人欲傾家釀言其能溫克也卒時年五十五二月癸丑以左光祿大夫蔡謨領司徒録尚書六條事與會稽王昱輔政夏五月西平公張駿薨子重華嗣立冬十月以桓溫為安西將軍荆州刺史溫表羅含為别駕問于衆曰此何如人或答曰可謂荆楚之杞梓溫曰此江海之琳琅豈惟荆楚而已含字君章桂陽人少孤叔母朱氏所飬好學晝卧夢五色鳥飛入口意怪之朱氏曰夢吞五色此文章也汝後當善文自長沙相致仕白雀棲堂十一月辛未安西將軍桓溫伐蜀拜表輒行十二月枉矢自東南流于西北其長半天三年春三月乙卯桓溫克成都蜀主降益州平以周撫為益州刺史鎮彭模是月林邑范文攻陷日南害太守夏侯覽以尸祭天夏四月地震丁巳桓溫俘蜀主李勢歸于京師封勢歸義侯七月范文立范賁為帝冬十二月以侍中劉惔為丹陽尹惔字真長沛國相人少清雅標竒桓溫嘗造之因問惔會稽王道子談論進耶惔曰極進然故第三流耳溫曰第一復誰惔曰故在我輩後溫乘雪欲獵過惔惔見其急裝問曰老賊欲持此何作溫曰我若不為此卿輩何得坐談惔與許詢至友及詢出郡惔九日七日詣之謂詢曰卿為不去使我成薄德二千石時惔為尹詢宿其室室甚麗詢曰若此保全處殊勝東山惔曰卿若知吉凶由人吾安得保此詢字玄度髙陽人父歸以琅琊太守隨中宗過江遷會稽內史因家于山隂詢幼沖靈好泉石清風朗月舉酒詠懷中宗聞而徵為議郎辭不受職遂託迹居永興肅宗連徵司徒掾不就乃䇿杖披裘隱于永興西山憑樹構堂蕭然自致至今此地名為蕭山遂捨永興山隂二宅為寺家財珍異悉皆是給既成啓奏孝宗詔曰山隂舊宅為祇洹寺永興新居為崇化寺詢乃于崇化寺造四層塔物産既整猶欠露盤相輪一朝風雨相輪等自備時所訪問乃是剡縣飛來既而移臯屯之巖常與沙門支遁及謝安石王羲之等同遊往來至今臯屯呼為許玄度巖也案許玄度集遁字道林常隱剡東山不涉人事好養鷹馬而不乘放人或譏之遁曰貧道愛其神駿卒後戴安道嘗經其墓嘆曰德音未逺而拱木已積冀神理綿綿不與氣運俱盡爾四年秋八月進安西大將軍桓溫為征西大將軍九月丙申慕容皓死子雋嗣偽位冬十二月豫章人黃韜自號孝神皇帝聚衆數千寇臨川太守庾條討平之五年春正月辛巳朔大赦庾寅石季龍僣皇帝位于鄴夏四月益州刺史周撫使朱燾破范賁獲之偽趙石季龍死五月假慕容雋大將軍幽平二州牧大單于燕王冬十一月甘露降崇平陵玄宫前殿十二月征北大將軍都鄉侯禇裒薨裒字季野康獻皇后父也祖䂮父洽裒少有簡貴之風謝安嘗云裒雖不言而四時之氣亦備始為郗鑒參軍平蘇峻後纍遷將軍領中書令帝即位皇后臨朝裒以后父進録尚書事嘗自以近戚懼獲譏嫌固辭請居藩出為徐兖二州刺史征北大將軍開府儀同三司鎮京口薨時年四十七墓在丹徒縣南七里初裒總角時曽詣庾亮亮使郭璞筮之卦成璞駭然亮曰有不祥乎璞曰此非人臣卦不知此少年何以乃爾二十年外吾言方驗及此二十九年而康獻皇太后臨朝有司以裒皇太后父議加不臣之禮歆嗣位至祕書監六年春正月帝臨朝以裒喪故懸而不樂閠月趙冉閔殺石鑒僣天王位國號魏鑒弟祗僭稱皇帝于襄國丁丑彗星見于亢己丑氐帥苻洪遣使來降以為氐王封廣川郡公秋八月苻洪子健率衆入關遣參軍杜伯獻捷京師冬十二月司徒蔡謨廢為庶人謨字道明陳留人以孝亷隨中宗過江纍遷位至司空太尉成帝元會將作樂宿懸于殿所司奏非祭祀燕饗則無設樂之制謨上議臨軒冝有金石之樂遂從謨議臨軒作樂自此始也及拜侍中司徒謨稱疾數召不至為有司奏至是免官初謨渡江見彭蜞大喜曰蟹有八足加以二螯令烹之既食委蝢方知非蟹詣謝尚説之謝曰卿讀爾雅不熟幾為勸學死案晉書謨廢後數年詔為光祿大夫辭不受陳病篤乞骸骨就賜几杖時又有荀道明諸葛道明皆有名時人語曰京師三明諸葛道明名恢父靚吳亡入洛值亂又奔江東為臨沂令王導戲爭族姓曰人言王葛不言葛王恢曰時言驢馬不言馬驢豈驢勝馬也七年春正月辛丑苻健僣稱秦王赦關中秋七月甲辰濤水入石頭溺死者數百人九月峻陽太陽二陵崩帝素服臨于太極殿三日遣兼太常趙拔修復山陵冬十一月石祗將姚弋仲來降以為大單于封髙陵公弋仲子襄為平北將軍平鄉公八年春正月辛卯日有蝕之壬辰苻健僣帝號于長安乙巳雨木冰二月遣殿中都尉王惠如洛陽修衛五陵夏四月冉閔為慕容雋所滅雋僭帝號于中山國號燕八月冉閔子智以鄴來降安西將軍謝尚使建武將軍濮陽太守戴施應之進據枋頭會冉智行人劉猗至施乃止猗使求傳國璽猗歸以告智智猶豫不許施因遣參軍何融率壯士七百人入鄴登三臺助戍譎之曰今且可出璽付我凶寇在外道路梗澀亦未敢即送當遣單使馳白天子天子聞璽已在吾遙知卿等至誠必發重兵相救冉智與蔣軒謀信之乃出璽付融融詣施施使融齎璽馳還夀春謝尚使振武將軍胡彬率騎三百衛送京師告太廟百寮畢賀案璽傳秦始皇造也方四寸以玉為之上蟠蛟螭其文曰受天之命皇帝夀昌自秦傳漢入魏魏入西晉晉永嘉末洛京不守璽為劉聰所得及石勒滅劉氏璽又屬偽趙冉閔誅石鑒而璽入冉閔自永嘉末洎永和八年凡四十二年而璽始歸于晉也九月中軍將軍殷浩率衆北伐九年春正月乙卯朔大赦丙寅皇太后與帝同拜建平陵三月交州刺史阮數討林邑范佛于日南破其五十餘壘秋七月丁酉地震有聲如雷八月遣兼太尉河間王欽往洛陽修復五陵十年春正月己酉朔帝臨朝以五陵未復懸而不樂前涼張祚僣帝號于姑臧二月己丑太尉桓溫伐關中三月廢殷浩為庶人以前會稽內史王述為揚州刺史夏四月己亥桓溫大破前秦苻健子萇于藍田六月王師敗于白鹿原溫引還是嵗二麥不登十一年春三月辛亥石軍將軍會稽內史王羲之稱疾去官歸誠告誓于父母墓啖羲之字逸少司徒導之從子也父曠淮南太守元帝過江曠首創其議羲之幼訥于言人未竒之年十三嘗謁周顗顗察而異之時重牛心炙坐客未噉顗先割啖羲之由是知名及長尤善𨽻書為古今之冠論者稱其筆勢飄若遊雲矯若驚龍深為從伯敦導所重嘗謂曰汝是吾家佳子弟也陳留阮裕為王敦主簿有重名敦以羲之不減主簿裕亦目羲之及承悅為王氏三少時太尉郗鑒使人求女壻于導門令就東廂遍觀子弟使者歸謂鑒曰王氏諸少年並佳然聞信至咸自矜持唯一人在東牀坦腹食獨若不聞鑒曰此正佳壻訪之乃逸少也遂以女妻之起家為祕書郎纍遷侍中吏部尚書皆不就尋拜右將軍會稽內史時揚州刺史殷浩與桓溫不協羲之為書與浩言國家安危在于內外和不和又為書止浩北伐浩並不從遂為箋與會稽王陳浩不宜北伐言古聖人外寧猶有內憂今外不寧而內憂已深勸諸軍守合肥廣陵許昌譙郡梁彭城須立根勢然後舉謀未晚皆不從羲之雅好服食飬性及為會稽初渡浙江便有終焉之志時髙士許詢孫綽李充支遁築室東土羲之嘗與同志宴會集于會稽山隂之蘭亭羲之自為序以申其志時人以潘嶽詩序方其文羲之比于石崇聞之甚喜性愛鵝聞會稽有孤居姥飬一鵝善鳴求市未能得遂携親友命駕就觀姥聞羲之來烹鵝以待之羲之嘆惜彌日又山隂有道士飬鵝羲之往觀焉意悅因求之道士曰為寫道德經當舉羣相贈羲之欣然寫畢籠鵝而歸深以為樂又嘗往門生家見棐几滑淨因書之真草相半後為其父誤刮去之門生驚懊纍日常居蕺山見一老姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰無苦但言是王右軍書以求百錢耶姥如其言人競買之後姥復將數扇來請書羲之笑而不答每自稱我書比鍾繇當抗行比張芝草猶鴈行初羲之書不勝庾翼郗愔及暮年方妙嘗以章草答庾亮而翼深嘆伏因與羲之書云吾昔有伯英章草十紙過江顛狽亡失常歎妙迹永絶忽見足下答家兄書煥若神明頓還舊觀時驃騎將軍王述少與羲之齊名而羲之甚輕之情好不協述先為會稽以母喪居郡境羲之代述止一吊遂不重詣述深為恨後朝廷徵述為揚州刺史羲之耻為麾下遣使詣朝廷求分會稽為越州行人失辭大為時賢所笑既而內懷愧歎謂諸子吾不減懷祖而位遇懸邈當由汝等不及坦之故耶乃稱疾罷郡于父母墓前自誓去榮祿畢志林泉遂任性弋釣與許邁等共修服食之事遊名山不逺千里邁字叔玄一名映丹陽人也家世士族祖上侍中散騎常侍父副祕書監封西域侯生七子邁與穆皆得道天降玉板署上清真人羲之每造未嘗不彌日忘歸相與為世外之交邁遺羲之書云自山隂南至臨安皆有金堂玉室仙人芝草左元放之徒漢末得道者皆在焉羲之自為傳述靈異之迹十卷邁因逺遊名山不歸改名為玄字逺遊與妻孫氏書告别令改醮有答書在婦人集中羲之有七子五子知名玄之早亡次凝之亦工草𨽻徽之字子猷性卓犖不羈為大司馬桓溫參軍蓬首散髮不綜府事又為車騎桓沖兵曹參軍沖嘗問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之因下馬排入車中謂沖曰公豈得獨擅一車時吳中有一家種好竹徽之便出造竹下諷嘯不顧主人將出主人乃閉門徽之以此賞之盡歡而去嘗寄空宅中便令種竹指竹曰何可一日無此君耶時在山隂夜雪初霽月色清朗四望皓然獨酌酒詠左思招隱詩忽憶戴逵逵時在剡即命小船詣之經宿方至造門不前而返人問其故徽之曰本乘興而來興盡而返何必見安道邪嘗與弟獻之共讀髙士傳獻之賞井丹髙潔徽之曰未若長卿慢世時人皆欽其才而穢其行自黃門侍郎棄官東歸與獻之俱病篤時術人云人命應終而有生人樂代者則死者可生矣徽之謂術人曰吾才位不如弟請以餘年代之術人曰代死者以己年有餘得以足亡者爾今君與弟算俱盡何可代也未幾獻之卒徽之不哭直上靈牀坐取獻之遺琴彈之久而不調歎曰嗚呼子敬人琴俱喪因頓絶遂卧疾月餘亦卒子楨之字公幹歷位侍中時桓玄為太尉朝臣畢集闕而收涕告訴舉止有異常童嶠甚竒之及長善音樂博綜衆藝司徒王導深器之比于王戎常呼為小安豐辟司徒掾始到府通謁導以其有勝會謂曰聞君能作鴝鵒舞一坐傾想寧有此理否尚便著衣幘而舞導令坐者撫掌擊節尚俯仰在中傍若無人纍位至江夏義陽隨三郡太守時安西將軍庾翼鎮武昌尚數詣翼咨謀軍事翼呼共射曰卿若破的當以鼓吹相賞尚應聲中之即以副鼓吹給之尚性清簡至官悉壞布帳分軍士作襦袴尋轉為安西將軍豫州刺史鎮夀春進討苻健將張遇于許昌為遇所敗後以獲璽功遷尚書僕射鎮西將軍在夀春採拾樂人并制石罄以備太樂江表有金石之樂自尚始案塔寺記今興嚴寺即謝尚宅也南直竹格巷臨秦準在今縣城東南一里二百步尚嘗夢其父告之曰西南有氣至衝人必死竹當其鋒家無一至汝宜修福建塔寺可禳之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼來辰造塔寺遂刻小塔施杖頭恆著左右後果有異黑氣遙見西南從天而下始如車輪漸彌大直衝尚家以杖頭指之氣便回散闔門獲全氣所經處數里無復孑遺遂于永和四年捨宅造寺名莊嚴寺宋大明中路太后于宣陽門外太社西藥園造莊嚴寺改此為謝鎮西寺至陳太建元年寺為延火所燒至五年豫州刺史程文秀更加修復孝宣帝降敕改名興嚴寺至今也六月前秦苻堅殺苻生而自立為帝秋七月苻堅將張平以并州來降拜并州刺史八月丁未立皇后何氏大赦天下賜酺三日鰥寡孤獨孝義力田米各有差逋租宿債一切放免冬十月皇后見于太廟二年春正月司徒會稽王昱歸政事三月佽飛督王饒獻鴆鳥帝怒鞭饒二百使焚于四達之衢夏五月大水有星孛于天船六月慕容俊盡陷河北之地秋八月安西將軍謝奕卒奕字無奕鯤之次子纍位桓溫府司馬溫尚南康公主主忌溫甚憚之動經年不入其室奕每以酒逼溫溫逃酒入主門奕遂升溫廳事更命酒引一直兵共飲謂之曰失一老兵得一老兵亦何怪也公主謂溫曰君若無狂司馬我何由得相見案三十國春秋云謝鯤為桓溫司馬升平二年七月卒所逼桓溫入主門即是鯤案謝尚奕並是鯤子尚年十嵗遭父憂年五十卒升平元年五月尚死七月奕亡無容此嵗謝鯤始卒鯤歷職又不為桓溫司馬曽為王敦司馬永昌元年王敦舉兵破京師鎮石頭不朝而去鯤諫令入朝敦不從見晉史甚明蕭方等記事何至于誤哉十一月雷地震三年春二月涼州城東泥中有火此火沴水之妖也三月甲辰詔以比年出軍糧運不繼王公已下十三户借一人一年助運是嵗詔復輔國將軍豫州刺史州陵侯毛寶本封寶字敬真滎陽陽武人王敦用為臨湘令後蘇峻作逆溫嶠以兵千人屬之使為前鋒次于茄子浦時峻送米萬斛饋祖約于江西寶率所領登岸破之悉獲其米嶠嘉之表為廬江太守時祖約黨桓宣背約屯于馬頭約使祖煥桓撫攻之寶懸軍救宣大為煥所破箭中寶髀徹鞍革使人踏鞍拔箭血流滿鞾夜奔船所行到先哭戰亡將士洗瘡訖夜還救宣至營煥等引退寶因進破祖約于合淝尋召還討蘇峻于石頭峻死匡術以苑城降陶侃侃使寶守苑城賊遣韓晃攻之寶登城射殺十數人晃問寶曰君是毛廬江耶寶曰是晃曰君名壯勇何不出鬬寶曰君若健將何不入鬬晃笑而退賊平以功封州陵侯庾亮西鎮上明請為輔國將軍謀北伐上表進寶豫州刺史守邾城石季龍遣其子鑒與將軍夔安李莬等來攻邾城寶求救于亮亮懼不時遣軍城遂陷左右突圍赴江死者六七千人寶亦溺死詔以寶之傾敗不加追贈至是始議復之案毛寶傳初寶在武昌軍人有于市買得一白龜長四五寸養之漸大放諸江中邾城之敗養龜人披鎧持刀自投于水如覺墜一石上視之乃先所養白龜長五六尺送至東岸遂免寶二子穆之安之穆之子珍球璩璠瑾瑗等六人璩最知名四年春二月鳯將九雛再見于豐城衆鳥隨之夏四月姑臧澤中有火此火亦沴水之妖明年涼王張天錫殺執政張雍秋七月以軍役繁省用徹膳八月辛丑朔日有蝕之冬十月天狗流于西南十一月封太尉桓溫為南郡公弟沖為豐城公子濟為臨賀公五年春正月戊戌大赦天下賜鰥寡孤獨米人五斛二月南掖門馬足陷地得銅鐘一有二四字案南掖門是建康宫南靣東門陳朝改為端門南出都城開陽門即宣陽東門也夏四月大水桓溫使弟豁取許昌鳯皇見于沔北五月帝不豫丁巳崩于顯陽殿秋七月戊午葬永平陵在今縣城北十九里幕府山之陽周四十步髙一丈六尺案晉十一帝有十陵元明成哀四陵在雞籠山之陽隂葬不起墳康簡文武安恭五陵在鍾山之陽亦不起墳唯孝宗一陵在幕府山起墳也帝年二嵗即位立十七年年十九崩諡穆皇帝廟號孝宗案帝時置僧尼寺三所何皇后寺在縣東一里南臨大道彭城敬王造彭城寺在今縣東南三里西大門臨古御街鎮西將軍謝尚造謝寺今改名興嚴寺即延興寺東隔運溝東岸也哀皇帝哀皇帝諱丕字千齡成帝長子咸康八年封為琅琊王升平三年除驃騎大將軍五年五月丁巳穆帝崩皇太后令曰帝奄不救疾胤嗣未建琅琊王丕中興正統合當儲二往以幼沖未堪國難故顯宗髙讓今義望情地莫與為比于是百官備法駕迎琅琊王庚申即皇帝位大赦天下改封弟東海王奕為琅琊王秋八月己卯夜天裂廣數丈有聲如雷九月戊申立皇后王氏以章穆何皇后居永安宫案宫本東海王弟修以為宫在今縣城東北七里近宫東北角桓玄修南州折其林木移入西宫以地為𨽻射宫也冬十二月加涼州刺史張玄靚為大都督隴右諸軍事平西公隆和元年春正月壬子朔大赦天下減田稅畝收二斗二月丙子尊所生妃周氏為皇太后三月丙寅朔日有蝕之夏四月旱詔出輕繫振困乏丁丑涼州地震浩亹山崩案五行志前涼滅亡之兆前燕將吕護寇洛陽五月丁巳北中郎將庾希鄧邈等舟師救洛口破吕護護退走小平津秋七月西中郎將袁真進次汝南運米五萬斛以饋洛陽前中軍將軍都督揚豫徐兖青五州諸軍事揚州刺史殷浩卒于東陽之信安浩字深源陳郡長平人也父羡字洪喬將為豫章太守都下人士因其致書百餘函羡行次板橋浦皆投之江水中曰沉者自沉浮者自浮殷洪喬不為致書郵也其資性介立如此終于光祿勳浩識度清逺弱冠有美名尤善玄言與叔父融俱好老易融與浩談則辭屈著篇則融勝由是浩為風流談論者所宗或問浩曰將蒞官而夢棺將得財而夢糞何也浩曰官本臭腐故將官而夢尸錢本糞土故將得財而夢穢時人以為名言起家纍遷司徒左長史除待中安西軍司並稱疾不起遂屏居墓所十年于時擬之管葛王濛謝尚伺其出處以卜江左興亡因相與省之知浩有確然之志既反相謂曰深源不起當如蒼生何康帝建元末庾氷何充相繼卒簡文始綜萬機衛將軍禇裒乃薦浩為揚州刺史浩上疏陳讓固請自三月至七月乃受拜焉時桓溫既滅蜀威勢轉振朝廷憚之故簡文引浩為心膂于是與溫頗相疑二浩既參朝權擢㯋川荀羡為義興太守時王羲之與浩情洽密説浩羡令與溫和同浩不從及石季龍死賊中大亂朝廷欲遂蕩平關河進浩為中軍將軍都督揚豫徐兖青五州諸軍事浩既受命以中原為己任上疏北征許洛將發墜馬時咸惡之既而以兖州刺史秦裔等為前鋒師次壽春會秦苻健殺大臣關中不和浩請進屯洛陽修園陵又求解揚州專鎮洛陽詔不許既而姚襄反浩懼逼棄輜重退士卒為襄所掠士多亡散而浩又遣王彬等擊襄為襄軍所殺諸軍敗績桓溫素惡浩及聞其敗因上疏罪浩浩竟坐廢為庶人徙東陽郡之信安縣浩少與溫齊名而每心競溫嘗問浩君何如我浩曰我與君周旋久寧作我也溫既雄豪自許每輕浩及權事專征深忌之至是乘釁謀廢浩溫因語人曰少時吾與浩共騎竹馬我棄浩輒取之故當出我下也又謂郗超曰浩有德有言向使作令僕足以儀刑百揆朝廷用違其才爾浩雖放黜口無怨言怡神委命談詠不輟家人亦不見其流放之戚但終日書空作咄咄怪事四字浩甥韓康伯隨至徙所經歲還都浩送至渚側詠曹顔逺詩云冨貴他人合貧賤親戚離因而泣下後溫將以浩為尚書令遣告之浩欣然許之將答書慮有謬誤開閉數十竟達空函大忤溫意由是絶之尋卒遷所子涓嗣十二月戊午朔日有蝕之詔曰戎旅路次未得輕簡賦役玄象失度亢旱為患豈政事未洽將有版築渭濱之士邪其搜揚隱滯蠲除苛碎時童謡云升平不滿斗隆和安得久帝聞惡之大赦改明年為興寧元年元年春三月壬寅皇太妃薨于琅琊第帝奔喪詔司徒會稽王昱總內外衆務夏四月揚州地震湖瀆溢五月加征西將軍桓溫侍中大司馬都督中外諸軍事録尚書事假黃鉞秋七月張天錫殺張玄靚自稱大將軍西平公丁酉葬皇太妃妃姓周氏汝南人選入成帝宫有寵生帝及海西公拜為貴人帝即位詔崇為皇太妃儀服同于太后而葬不祔陵廟八月有星孛于角亢入于天市九月壬戌大司馬桓溫北伐癸亥皇太子生大赦冬十月甲申立陳留王世子恢為陳留王二年春二月改左將軍為遊擊將軍罷右軍前軍後軍五校三將官發卯帝親耕藉田三月庚戍朔大閲户人嚴法禁稱為庚戍制帝幼好黃老斷穀服長生藥過分不豫辛未崇德太后臨朝攝政案晉書哀帝服長生藥過度中毒不識萬機太后臨朝攝政夏四月前燕將李洪侵許昌王師敗于懸瓠桓溫使中郎袁真鑿陽儀道以通運率舟師北伐五月以桓溫為揚州刺史録尚書事詔徵溫入相溫辭不從秋七月丁卯復徵入朝八月溫至赭圻遂城而居之是嵗詔移陶官于淮水北遂以南岸窰處之地施僧慧力造瓦官寺三年春正月庚申皇后王氏崩后諱穆之太原晉陽人也司徒左長史濛之女初為琅琊王妃王即帝位立為皇后三年崩諡曰靖后無子濛字仲祖安西司馬納之子少放縱不為鄉曲所齒晚節克已勵行有風流美譽善𨽻書美姿容嘗覽鏡自照稱其父字曰王文開生如此兒耶居貧帽敗自入肆買之嫗説其貌爭遺新帽與劉惔齊名時人以惔方荀奉倩以濛比袁曜卿凡稱風流者舉濛惔為宗焉簡文為會稽王時嘗與孫綽商略諸風流人綽言曰劉惔清蔚簡令王濛溫潤恬和桓溫髙爽邁世謝尚清易令達而濛性和暢與劉惔為簡文入室之賓纍遷位司徒左長史晚求為東陽不許及濛病乃恨不用之濛聞之曰人言會稽王癡竟癡也疾漸篤于燈下轉麈尾歎曰如此人曽不得四十也年三十九卒臨殯劉惔以犀柄麈尾置棺中因慟哭久之謝安亦稱美之曰王長史語甚不多可謂有令音也二子修藴修字敬仁明秀有美稱起家為著作郎遷中軍司馬未拜而卒年二十四臨終嘆曰無愧古人年與之齊矣二月甲午疾篤丙申帝崩于西堂三月葬安平陵在縣北九里雞籠山之陽元帝同處帝年二十二即位立四年年二十五諡哀帝帝雖即尊位而政不由己軍事權于桓溫機務在于會稽天子不得自由故興寧童謡云雖復寧轉復無聊生案帝時置一寺興寧二年僧慧力造瓦官寺在今縣東南三里半井岡東偏也廢皇帝廢帝諱奕字延齡哀帝之母弟咸康八年封東海王穆帝升平四年拜車騎將軍五年改封琅琊王興寧三年二月哀帝崩無嗣皇太后詔曰琅琊王明德茂親屬當儲副于是百官奉迎于第丁酉即皇帝位大赦天下三月前燕慕容恪攻陷洛陽秋七月己酉改封會稽王昱為琅琊王以昱子昌明為會稽王壬子立皇后庾氏冬十月梁州刺史司馬勳反自稱成都王桓溫使江夏相朱序討平之十二月大赦改明年為太和元年夏四月旱五月戊寅皇后庾氏崩七月癸酉葬孝皇后于敬平陵后諱道憐車騎將軍冰之女初為東海王妃及即位立為皇后無子九月曲赦梁益三州是歲涼州楊樹生松戒曰不改柯易葉楊者柔脆之木今松生其上非永久之葉將集危亡之地案五行志此張天錫滅亡之徴二年春正月北中郎將庾希有罪亡入海冬十月以琅琊王昱為丞相是歲尚書令王述卒述字懷祖太原人祖湛少有識度身長七尺八寸龍顙大鼻有隱德人謂之癡父承早卒少孤事母以孝聞安貧守約不求聞達性沉靜每坐客馳辨異端競起而述處之恬如也年三十尚未知名人或謂之癡司徒王導始辟為中軍參軍既見無他言惟問以在東米價述但張目不答導曰王掾不癡人何言癡也嘗見導每發言一坐莫不贊美述正色曰人非堯舜何得每事盡善導改容謝之纍遷會稽內史以母憂去官服闋代殷浩為揚州刺史初至主簿請諱報曰亡祖先君名播海內逺近所知內諱不出門餘無所諱加中書監固讓經年不拜遷尚書令述每受職不為虛讓至是子坦之諌以為故事應讓述曰汝為我不堪邪坦之曰非也但克讓自美事耳述曰既云堪何復為讓人言汝勝我定不及也後坦之為桓溫長史溫欲為子求婚于坦之坦之還家省父而述愛坦之雖長大猶抱置于膝上坦之因言溫意述大怒遽排下曰汝竟癡邪詎可畏溫而以女妻兵也及坦之見溫乃辭他故溫曰此尊君不肯爾遂止初述家貧求試宛陵令頗受贈遺而修家具為州司所檢有一千三百條王導使人謂曰名父之子不患無祿屈臨小縣甚不冝爾述答曰足自當止時人未之達也及居州郡清潔絶倫祿賜皆散之親故始為當時所嘆但性急為纍嘗食雞子以箸刺之不得便怒擲于地雞子圓轉不止便下以屐齒踏之不得嗔甚掇內口中嚼而吐之及升重位每以柔克為用謝奕性粗嘗忽述極言罵之述無所應靣壁而已居半日奕去始復坐人以此稱之是年以老上疏乞骸骨歸邱園詔不許述竟不起卒時年六十六初桓溫平洛陽議欲遷都朝廷憂懼將遣侍中止之述曰溫欲虛聲威朝廷非事實也但從之自無所至事果不行子坦之嗣三年春三月丁巳朔日有蝕之癸亥大赦夏四月癸巳雨雹大風折木冬十二月有神降于鄴自稱湘女聲與人接不見其形四年夏四月庚戍大司馬桓溫伐前燕秋九月大赦大破燕將傅末波于林渚戊子溫進至枋頭為燕將慕容軍設伏所破而還辛丑慕容垂又追敗後軍于襄邑冬十月大星西流有聲如雷是月豫州刺史袁真以壽陽叛十一月桓溫自山陽與琅琊王昱會于途中將謀後舉十二月城廣陵而居之五年春二月袁真死陳郡太守朱輔立真子瑾嗣事三月桓溫征瑾屠壽陽裊袁瑾等首因謂參軍郗超曰足以雪枋頭之恥乎超答曰此未厭有識之情也公六十之年敗于大舉不建不世之勳未足以鎮愜民望其唯廢立之事溫懷信焉秋七月癸酉朔日有蝕之九月益州妖賊李金根反立李𢎞為聖王梓潼太守周彪討平之冬十一月苻堅王猛伐慕容暐尅鄴遂有燕地六年夏四月大赦賜鰥寡狐獨米人五斛六月京師及丹陽晉陵吳郡吳興臨海並大水冬十一月癸卯桓溫自廣陵屯于白石用郗超謀將詣闕以圖廢立丁巳諷奏崇德太后己酉太后下令廢帝為東海王還第供衛一如漢昌邑故事于是百官入太極前殿即日溫使散騎侍郎劉享收帝璽紱帝著白祫單衣步下西堂乘犢車出神虎門羣臣拜辭莫不歔欷帝初即位有野雉集于相風時又有童謡云青青御路楊白馬紫縷韁汝非皇太子那得甘露漿帝聞惡之又見桓溫專恣平生為慮乃召術人扈謙筮之卦成答曰晉室有盤石之固陛下有出宫之象竟如其言有三子並馬韁縊殺之葬于黃門署北至簡文咸安二年正月又降為海西縣公徙居吳縣西七里追貶庾氏為夫人帝安于屈辱以保天年烈宗太元十一年十一月崩于吳時年四十五帝年二十八即位立六年見廢居吳十二年初桓溫有不臣之志欲先立功河朔以收時望及枋頭之敗雄名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宫闈重閟牀笫易誣乃言帝在藩時夙有痿疾嬖人朱靈寶等參侍內寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因具事奏諷康獻太后后時方在佛堂讀經內侍啓云外有急奏太后乃出倚户前視奏數行乃曰我本自疑此至半便止索筆答云未亡人罹此百憂感念存沒心焉如割社稷大計義不獲已臨紙悲塞如何可言初溫始呈奏慮太后意異竦動汗流見于顔色及詔令出大喜遂行廢辱奕出居吳敕吳國內史刁彛防衛又使御史顔允監察之是年十一月妖賊盧悚遣弟子殿中監許龍晨到門詐稱太后密詔奉迎奕初欲從之納保母諌而止龍曰大事將捷奈何用兒女子言乎奕曰我得罪于此幸蒙寬宥豈敢妄動且太后有詔便應官屬來何獨使汝也因叱左右縛之龍懼而走奕知天命不可再深慮橫禍遂杜塞聰明安于屈辱去思慮有子不育庶保天年時人憐之為作歌焉案帝之時侍中中書令王坦之造臨秦安樂二寺在今縣南二里半南門臨秦淮水也太宗簡文皇帝簡文帝諱昱字道萬元帝之少子幼而岐嶷郭璞見之謂人曰興晉祚者必此人也及長清虛少欲善玄言永昌元年封琅琊王食邑會稽宣城咸和初又徙會稽王廢帝即位又改封琅琊領丞相録尚書事前後輔穆哀廢三帝及太和末桓溫諷太后廢海西公十一月己酉溫率百官具法駕乘輿迎帝立于朝堂變服著平巾幘單衣東靣拜受璽紱即日即皇帝位改元咸安元年庚戌使兼太尉周頥告于太廟桓溫出次中堂分兵屯衛案宗室傳太宗初即位未解嚴桓溫屯中堂夜警御史中丞敬王恬奏劾溫大不敬請理溫罪溫見嘆曰此兒乃敢彈我真可畏也辛亥溫使弟祕誣逼新蔡王晃與武陵王晞謀反晞字道升元帝中子出繼武陵王哲之後太興元年嗣封武陵王穆帝初遷太宰晞無學術而有武幹為桓溫所忌及帝即位溫乃表晞包藏亡命事連袁真詔免晞官以王歸藩既而溫尋又謀新蔡王晃反與晞連結殷浩及太宰長史庾籍等同謀收付廷尉奏請誅二王帝對之泣不許溫固執之帝手詔答溫曰若晉祚靈長公便冝奉行前詔如其大運去矣請避賢路溫覽之流汗變色不復敢言帝先歷宰三世溫素敬憚及帝即位溫欲上事自陳帝引見對之悲泣溫懼無色及行武陵王等誅不果深恐帝知而安慰之尋大赦天下以溫為丞相溫不受辛酉溫旋白石因上鎮姑熟十二月戊子詔京師有經年之儲權停一年之運辛卯熒惑逆行入太微經明年三月不退尚書右丞顧悅之上表請詔復殷浩本官悅之字君叔晉陵無錫人與帝同嵗而頭早白帝問其故對曰松柏之姿經霜益茂蒲柳常質望秋先零帝悅抗表訟浩詔追復浩本官悅之位尚書右右丞卒子凱之字長康以文知于時兼善丹青妙絶古今嘗好食甘蔗每食自尾至本或問其故曰漸入嘉境曽為殷仲堪鎮南府參軍將下都給布帆至破冡遇風船破遺仲堪書曰地名破冡真從破冡中出行人平安布帆無恙為人好隱桓玄嘗以栁葉遺之曰此蟬所翳葉也取以自蔽人不見已凱之深信及玄造之將葉鄣身玄就溺之凱之大喜以玄實不見已也故俗傳凱之有三絶畫絶文絶癡絶案謝赫畫品論江左畫人吳曹弗興晉顧長康宋陸探微等上品餘皆中下品凱之能連五十匹絹畫一像使心運手須臾成頭靣手足胸臆肩背無遺失尺度此其難也吳弗興晉長康又曽于瓦官寺初置北殿畫一維摩畫訖光曜一月餘日案京師寺記興寧中瓦官寺初置僧衆設會請朝賢鳴剎注疏其時士大夫莫有過十萬者既至長康且注疏一百萬長康素貧時以為大言僧後寺成請勾疏長康曰冝備一壁遂閉户往來一百餘日所畫維摩一軀工畢將欲點眸子謂寺僧曰第一日開見者責施十萬第二日可五萬三日可任例責施及開户光明照寺施者填咽俄而果百萬錢也是嵗散騎常侍領著作孫綽卒綽字興公太原郡人也馮翊太守楚之子永嘉喪亂幼與兄統相擕渡江博學善屬文與髙陽許詢俱有髙尚之志居于會稽遊放山水十有餘年乃作遂初賦以致其意常鄙山濤而謂人曰山濤吾所不解吏非吏隱非隱若以元禮門為龍津則當點額暴鱗矣所居齋前種一株松常自守護鄰人謂之曰樹子非不楚楚可憐但恐永無棟梁日爾綽答曰楓栁雖復合抱亦何所施邪綽與詢一時名流或愛詢髙邁則鄙于綽或愛綽才而不取詢沙門支遁試問綽君何如許答曰高情逺致弟子早已伏膺然一咏一吟許將北靣矣絶重張衡左思之賦每云三都二京五經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云鄉試擲地當作金石聲也榮期云恐此金石非中宫商然每至佳句輒云應是我輩語除著作佐郎性通率好機調嘗與習鑿齒同行綽在前習鑿齒曰簸之揚之粳粃在前綽曰澄之汰之砂磔在後纍遷散騎常侍時大司馬桓溫欲經緯中原以河南粗平將移都洛陽朝廷畏溫不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諌孫綽乃疏諌溫溫見綽書不悅曰致意興公何不尋君遂初賦而強知人家國事耶綽少以文才稱于時文士以綽為冠卒時年五十八案孫綽傳京師每嵗除日行儺令所謂逐除也結黨連羣通夜達曉家至門到責其送迎孫興公嘗著戲為儺至桓宣武家宣武覺其應對不凡推問之乃興公案禮儺逐癘鬼也論語云鄉人儺朝服立于阼階注云儺驅逐疫鬼也亦呼為野雩戲今俗謂儺為野胡並訛言耳二年春正月辛丑百濟林邑使貢方物己酉嵗星犯鎮在須女三月丁酉詔非軍國戎祀之要華飾煩費之用皆省之重詔內外百司各勤所職使善無不逹惡無不聞癸丑遣使詣大司馬并問方伯逮于邊戍宣詔大饗求其所安籌量賜給悉令周普夏四月騶虞見南昌六月遣使拜百濟王餘句為鎮東將軍領樂浪太守戊子護軍將軍庾希舉兵反于江北自海陵入居京口桓溫使周少孫破之擒希斬于建康市夷三族六月太白晝見秋七月帝不豫壬辰疾甚手詔大司馬丞相桓溫曰少子可輔即輔之如不可君自取侍中王坦之毁詔進曰天下者宣元之天下非陛下之天下陛下何得私與人帝默然乙未立會稽王昌明為太子以道子為琅琊王六月帝崩于東堂遺詔以桓溫輔政依諸葛亮王導故事冬十月丁卯葬髙平陵在今縣城東北十五里鍾山之陽不起墳帝年五十二即位立一年年五十三諡曰簡文皇帝廟號太宗帝少善容止留心墳籍不以居處為意凝塵滿席湛如也嘗與桓溫及武陵王晞同載遊于板橋溫遽令鳴鼓吹角車馳卒奔欲觀其所為晞大恐求下車帝安然無懼色溫由此憚服及溫仗文武之任而立帝代海西公帝雖處尊位常憂廢黜先是熒惑守太微尋而海西廢及帝登阼熒惑又守太微帝甚惡之時中書郎郗超在直帝乃引入問曰命之修短本所不計故當無復近日事耶超曰大司馬臣溫方內固社稷外恢經略非常之事臣以百口保之及超請省其父帝曰致意尊公國家遂至于此由吾不能以道匡衛愧嘆之深言何能喻因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下沾襟然帝雖神識恬暢而無濟世大略謝安石稱為惠帝之流支遁常言曰會稽有逺體而無逺神謝靈運迹其行事亦以為赧獻之輩也案簡文即位自立僧寺一波提寺今廢建康實録卷八
