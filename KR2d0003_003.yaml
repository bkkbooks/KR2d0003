body:
  text: 建康實録卷三唐許嵩撰吳廢帝廢帝亮字子明大帝少子母潘皇后赤烏七年生於内殿十三年年七歳冬十一月立為皇太子神鳳元年夏四月乙未大帝崩丁未太子即皇帝位以太傅諸葛恪輔政太常滕𦙍副焉進羣臣爵有差秋九月桃李花開此舒緩之應也初大帝黄龍二年築東興堤以遏湖水後征淮南敗由是廢至此冬十月諸葛恪率諸軍㑹於東興作大堤左右結山俠築兩城各留千人使全端留畧守之引軍而歸十二月丙申大風雷雹魏恥吳入境築城乃遣大將胡遵諸葛誕等率衆七萬来攻東興堤恪舉衆四萬往救之遵等勅諸軍為浮橋渡陣於堤上分攻兩城城所在髙峻不可卒㧞恪遣將軍留賛吕據唐咨丁奉等為前部恪自繼之時天寒雪魏軍㑹飲見賛等兵少又不持戈㦸但兠鍪刀楯倮身縁堤大笑不即嚴兵賛等得上便鼔噪亂斬魏軍擾亂散走爭渡浮橋橋壊自投於水更相蹈藉没死者數萬擒故叛將韓綜斬之走諸葛誕獲車馬驢騾各數千器械資糧山積振旅而歸加恪都督中外諸軍事荆揚二州牧丞相陽都侯恪有遷都意更起武昌宫是月武昌端門災改作端門建興元年春正月大赦改元立皇后全尚女太祖魯班公主譛廢太子和而勸太祖立亮以尚女為妃及即位立為后尚字子真吳郡錢塘人以后父故累遷右衛將軍録尚書事封永平侯時全氏為侯者五人並典兵馬其為侍郎都尉左右宿衛甚衆自吳興己来外戚之盛莫過也三月諸葛恪伐魏使司馬李衡往蜀說姜維令同舉兵曰古人有言聖人不能違時時至亦不可失今敵國政在私門上下猜隔兵挫於外民怨於内今若大舉伐之吳攻其東蜀入其西彼救西則東虚重東則西輕以練實之軍乗輕虚之敵破之必矣維然之恪遂大舉郡邑二十萬衆渡江圍魏新城乆不㧞民疲士卒多流亡乃引軍還住江濱欲起屯潯陽朝廷數詔徵還使者相屬秋八月恪至京師陳兵入府召中書孫嘿責之曰卿何敢妄數作詔嘿懼因病還家恪愈作威嚴多所罪責小大吁怨九月又治兵向青徐左右切諫軍旅不宜數動恪不受諫冬十月大饗公卿因㑹乃殺恪於殿内以葦席裹屍篾束其腰投於石子岡時年五十一先有童謡云諸葛恪何弱弱蘆單衣蔑鈎絡何處求城子閣城子閣反語石子崗也謡言果驗恪字元遜瑾之長子有才名少鬚眉折頞大口髙聲發藻岐嶷辯論機捷應答無方時人莫與為對太祖竒之謂瑾曰藍田出玉真不虚也自中庶子為太子賓友左輔都尉嘗従太祖㑹羣臣歡甚以恪父面長似驢取驢署曰諸葛瑾示恪恪借太祖筆書之驢二字太祖大笑以驢賜恪他日又従容問曰卿父與叔父孰賢曰臣父為優帝問何故曰臣父知所事叔父不知是以為優初置節度典軍糧特令恪代徐祥領之尋為撫越將軍丹陽太守父瑾聞之以丹陽山險民多果勁蜂至鳥竄難以覉統恪陳必安之計時年三十二授武騎威儀鼔吹道引到府移書丹陽吳郡㑹稽新都夀陽等四郡屬城長吏令各保疆立部伍其從化人悉令屯居而使諸將羅兵阻險莫與交鋒候禾稼熟則縱兵芟刈使無遺種舊榖既盡新田不收在山之民饑困自出者輒不得拘執任其來往慰撫之山越大治人皆安堵累遷威北將軍屯柴桑初與陸遜不和嘗善譽遜遜薨代為大將軍荆州牧假節鎮武昌太元末受顧命帝即位獨擅内外事百官摠己以聴於恪恪始為政罷視聴息校官原逋債除關稅崇恩澤逺近懽恱每一出入百姓延頸思見其面既而北伐衆殆人勞侍中武衛將軍孫峻等因人不堪宻與帝謀誅之其夜恪精爽不安及明盥嗽聞水及衣裳血腥將升車犬又頻頻引其衣恪還坐曰犬不欲吾行乎少間又出犬復銜衣牽之恪乃逐犬登車至宫門散騎常侍張約朱思等宻書報恪恪謂滕𦙍曰孫峻小子何能為也遂入坐定酒數行峻起如厠解長衣持刀曰有詔收諸葛恪恪驚起㧞劔未出而峻刀交下張約従旁斫峻傷左手峻應手斫斷右臂武衛皆㧞刃欲上殿峻告曰所殺惟恪一人今已死悉令復刃使收其家家人不知恪侍婢忽然於中堂脚自離地頂上柱屋梁作聲云公為孫峻所殺内外驚擾中子長水校尉竦與弟步兵校尉建車載母建渡江竦至白都峻遣將軍劉永追斬竦又逐建於江西數里夷三族大赦天下以峻為丞相大將軍封富春侯初恪征淮南時有孝子杖縗絰入閣中侍者白恪恪詰問之孝子曰向不知所入中外守備亦不見之及出行後㕔棟中折在新城往来白虹見其舡又遶其車果是遇害案地圖宅在城東二里𤣥風觀前横路南十一月有五大鳥見于春申改明年為五鳳元年元年春正月以大將軍左司馬李衡為丹陽太守自蕪湖又徙治宛陵秋九月魏相司馬師廢其主芳為齊王十二月星孛于牛斗交阯稗草化為稻此草妖也昔三苗亡而五榖變二年春正月驃騎將軍吕據襲夀春魏將文欽降淮南餘衆數萬来奔秋七月孫儀林恂等謀殺大將軍峻事覺伏誅陽羨黒山石自立曰當有庶人為帝之祥案京房易傳曰石自立於山則同姓平地則異姓于寳以為孫皓承廢得立或云孫休見立之應大旱使衛尉馮朝城廣陵以將軍吳穰為廣陵太守三年春正月新作太廟遷太祖神主大赦改太平元年二月用魏將文欽計大舉兵伐魏八月遣欽為先鋒以吕據朱異劉纂唐咨等自江都引衆軍入淮泗以繼之諸軍將發孫峻餞於石頭因入吕據營見軍御整齊惡之乃稱心痛而歸遂夢諸葛恪撃之因痛甚表弟偏將軍綝輔政九月丁亥峻薨峻字子逺武烈帝弟静之曽孫父恭位散騎常侍峻少便弓馬精果膽決累遷侍中武衛將軍受遺與諸葛恪輔少帝既誅恪督中外諸軍事滕𦙍以恪子竦妻父辭位峻曰鯀禹罪不相及滕侯何為封𦙍為髙宻侯峻性驕矜多所刑殺姧亂宫人與公主魯班私通而因孫儀事用讒害魯育公主薨時年三十八戊子以孫綝為侍中輔政壬辰太白犯南斗吕據等至江北聞綝代峻大恐乃表薦衛將軍滕𦙍為丞相綝不聴癸卯以𦙍為大司馬據又宻使使與滕𦙍謀自廣陵引軍還討孫綝與𦙍㑹蒼龍門是夜風急據不至綝使華容勒兵攻𦙍殺之𦙍字承嗣父胄能屬文太祖待以賓禮軍國書疏常令損益潤色之早録其功封𦙍為都亭侯𦙍為人厲行有威儀容止可觀每正朔朝㑹大臣見之皆歎重之年三十起家中郎累遷丹陽太守尋轉㑹稽太守毎斷獄訟察言觀色務盡人情理有窮厄悲苦之言對之流涕太元末與諸葛恪受遺輔少主恪毎出征𦙍常居守統留後事𦙍白日接客夜省文書連夜不臥孫峻輔政封髙宻侯至是遇害己酉遣將軍施寛劉承等將兵逆吕據左右皆勸據入魏據曰恥為叛臣遂殺於新洲夷三族據字世議大司馬範次子冬十一月綝為大將軍封永寧侯十二月帝使五官中郎將刁𤣥告亂于蜀二年春正月乙卯詔分長沙東部為湘東郡西部為衡陽郡㑹稽東部為臨海郡豫章東部為臨川郡夏四月帝始臨正殿大赦境内親政事時孫綝有所表奏皆難問之又選子弟十八已下十五已上得三千人以大將軍子弟有勇者為之將帥詔曰朕立此軍欲與之俱長日於苑中習焉自後常出中書省視先帝故事詰問左右曰先帝數有特詔今大將軍關事但令我書可耶左右懼無以答五月魏征東大將軍諸葛誕舉兵保夀春叛魏使將軍朱成詣闕上表稱臣兼子靚與長史吳綱及諸牙門子弟為質請援秋七月詔使大都督朱異將軍唐咨丁奉全端等精甲五萬據夀春大將軍孫綝自率衆繼之為魏將司馬昭所破將軍全端錢塘侯全澤等與諸葛宗親十餘人皆降於魏九月綝自淮南歸還軍甲申赦淮南戰死者加爵賞為舉哀三年秋七月封齊王奮為章安侯詔州郡伐宫材自八月沈隂不雨四十餘日帝以綝専恣自固嫌忌之九月詔黄門侍郎全紀宻令與父太常全尚將軍劉承謀誅綝全紀母綝之従姊也其夜知謀以告綝綝懼戊午夜以兵襲宫取全尚遣弟恩殺劉承於蒼龍門綝將廢帝乃召公卿大臣㑹宫門議曰少帝長病昬亂不可以當大位使光禄勲孟宗告宗廟廢之以狀赴近逺尚書桓彛正色不肯署名綝怒遂殺彛彛字公長臨湘人也魏尚書令階之弟也累遷尚書以正直見殺案吳志晉平吳薛瑩入晉晉武帝問吳之名臣答曰桓彜有忠貞之節庚申使中郎李崇奪帝璽綬為㑹稽王帝九歳即位立七年遣將軍孫躭送帝之國徙全尚家於零陵遷公主魯班於豫章帝年十六永安三年見殺崩于候官道上晉太康中吳故少府卿丹陽戴顯上表迎屍歸葬頼鄉帝㓜而聰悟有成人之鑒年七歳為皇太子見傅相具師資之禮大臣重之及即位政雖非己出而口不戯言諸葛恪之誅也衛將軍孫峻收恪帝大言曰非我所為及孫綝秉政有奏多所問難綝懼稱疾不朝又曽暑月遊西苑方食青梅使黄門至中藏取蜜黄門先恨藏吏乃取䑕糞投蜜中言藏吏不謹帝即敕吏吏持蜜瓶入帝問曰既葢之且有掩覆無縁有此黄門非有恨於爾耶吏叩頭曰彼嘗従臣求官席席有數臣不與帝曰必此也黄門不伏侍中刁𤣥張邠等收黄門與藏吏付獄帝曰易知耳令破䑕糞糞中猶燥帝大笑謂𤣥邠曰若先在蜜中中外俱濕今乃燥是黄門所為也黄門懼即自首伏法左右莫不驚竦矣景皇帝景皇帝休字子烈母王夫人年十七太元二年封為瑯琊王居虎林廢帝即位大將軍諸葛恪不欲令諸王處江濱兵馬之地徙帝於丹陽郡郡守李衡數以事侵帝帝上書求他郡詔徙於㑹稽曽夢乗龍上天顧不見後心異之太平三年九月戊午孫綝廢少帝而遣宗正孫揩中書郎董朝往㑹稽迎帝帝初不信揩答具啟本意帝遂行未至而孫綝悔欲入宫將圖不軌召百官㑹議於相府皆惶懼失色常侍虞汜進曰明公為國伊周處將相之位擅廢立之權上安宗廟下惠兆民小大踴躍以為伊霍復見迎王未至而欲入宫如是則羣下揺動衆聴疑惑非所以永終忠孝揚名後世也綝不恱冬十月帝至曲阿有老翁干帝曰事乆變生天下喁喁願大王速行帝善之即日進布塞亭武衛將軍孫恩行丞相事率百官以乗輿法駕迎於永昌亭立行宫以武帳為便殿設御座己卯帝至望便殿止羣臣三請再拜陞殿謙不即座户曹尚書前即堦下讃奏丞相奉璽綬帝三讓羣臣三請帝曰諸侯將相咸推寡人寡人敢不承命乃受璽綬即帝位百官以次奉引帝就乗輿羣臣陪位孫綝迎於土山之半野拜於道左帝下車答拜即日入宫御正殿大赦改元為永安元年冬十月壬午詔以綝為丞相大將軍荆州牧食五縣以弟恩為御史大夫弟幹弟闓皆封侯餘功臣行賞有差綝乃詣闕上書乞上印綬節鉞退還田里帝不許丹陽太守李衡以前嫌自拘有司表列罪失帝曰夫射鈎斬袪在君為君乃使還郡封威逺將軍領丹陽太守衡字叔平襄陽兵家子漢末入吳為武昌渡長聞羊衜有知人之鑒往干之衜曰多事之世尚書郎才也時校事郎吕壹操弄權柄人臣畏之莫有敢言者衜曰此非李衡無以困壹遂共薦為郎太祖引見喜之衡乃口陳吕壹姧短數千言太祖有媿色後數月壹事發坐誅衡大見顯用累遷諸葛恪司馬幹恪府事恪誅守丹陽太守時帝為瑯琊王在郡人家淫放衡數以法繩之妻習氏常諫不可衡不従尋而帝立衡憂懼謂妻曰不用卿言至此今奔魏何如妻曰不可君本庶人先帝賞㧞過量既作無禮而復逆自猜嫌逃叛求活北歸復何面目見士大夫乎且瑯琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣君可自囚詣獄表陳前失請罪如此必當逆見優饒非但求活而已衡従其言衡欲子孫儲業妻輒不聴曰財聚則禍生衡遂不言後宻使人於江陵龍陽洲上作宅種甘橘千樹臨死勅兒曰汝母每惡吾治家故窮如此然吾州里有千頭木奴不責汝衣食歳上絹壹疋當足用耳衡亡後兒以白母母曰此當是種甘橘也汝父每欲積財吾常以為患不許七八年来失十户客不言所之當是汝父有此故也恒見汝父稱太史公言江陵千樹橘亦可比封侯吾答云人患無徳不患不富貴若貴而能貧方好耳用此何為今無乃是耶子訪得之案吳志吳末李衡橘園成歳得絹千疋家道殷足至晉咸康中宅上猶有故枯橘樹存焉己丑封故太子和子皓為烏程侯弟徳為錢塘侯弟謙為永安侯庚寅羣臣奏靖立后及太子帝讓不受十一月甲午有風四轉五復䝉霧連日時孫綝既擅廢立權傾人主一門五侯並典禁兵有所陳述帝敬而不違自吳朝未之有也壬子詔吏家為役有三人五人者並免父兄一人永昌亭陪位者加爵一級十二月綝日益横遂持牛酒進奉於帝帝不受齎詣左將軍張布酒酣怨言曰初廢少主人多勸吾自取之吾以帝賢故迎之帝非吾不立今上禮見拒是與凡臣無異當須改圖耳布以言聞於帝帝銜之恐即有變優詔加賞賜有告綝反者帝付綝綝殺之而心愈懼因孟宗求出武昌帝許之詔給武庫精甲萬人右軍將軍魏邈言於帝曰綝不可使居外居外必生變帝不答丙寅武衛將軍施朔等宻表云綝反狀已露帝省表與左將軍張布郗鄉侯丁奉宻謀因戊辰臘㑹使公卿執綝將入疑内有變表辭疾帝使彊起之綝不得已令外整兵於府待吾入後起火因是可得速出及赴㑹百寮陞殿而府中火起綝遽求出㸔火帝止之曰外兵自多何勞丞相綝起離席帝目丁奉張布等命左右縳綝綝叩頭求徙交州帝怒曰何不徙滕𦙍吕據叱送斬之其同謀者皆赦放杖者五千人追殺綝弟幹闓於中江發孫峻塜而剖其棺斲其屍收其印綬大赦天下一切亡官遷徙皆放還詔諸葛恪滕𦙍吕據等並無罪見害並宜改葬追贈其家復其田宅羣臣有乞為恪立碑以銘勲徳博士盛冲以為不合帝曰盛夏出軍士卒傷損無赤寸之功不可謂能受託孤之任死於竪子之手不可謂智冲議是矣遂寢之帝恥與綝等同族勅除屬籍曰故峻故綝云綝字子通與峻同祖即武烈皇帝弟静之子暠之子也暠生二子恭綽恭生峻綽生綝綝輔少主奏請多見推詰懼不自安及救諸葛誕歸便稱疾不朝築室朱雀橋南分遣諸弟入宿衛欲樹諸黨專朝自固少主嫌之因推孫峻殺朱主事將欲誅綝綝乃廢少主迎帝遂乃肆意侮慢人神燒大航及伍胥廟毁壊浮圖塔寺斬道人是月詔初置五經博士一人助教三人二年春正月諸葛恪故吏臨淮臧均上表論諸葛恪三世有大功請收其屍改葬帝許之二月備九卿官下詔勸廣農事進用忠賢以紀亮為尚書令亮子陟為中書令每朝列坐帝以雲母屏風隔之三年春使五官中郎將薛珝聘蜀求馬還帝問蜀政得失珝對曰蜀主暗而不知其過臣下容身以求免罪入朝不聞正言經野民皆菜色臣聞燕雀處堂母子相樂自以為安也突決棟焚而燕雀恬然不知禍之將至是其謂乎帝聞之慄然二月西陵言赤烏見秋使都尉嚴宻作浦里塘開丹陽湖田衛將軍濮陽興率兵㑹成之時㑹稽謡言王亮當還為天子而宫人告亮使巫禱祠有司以聞帝詔黜亮為候官侯使之國道上令鴆殺之分㑹稽南部為建安郡是年得大鼎於建徳縣告太廟作寳鼎歌四年夏五月大雨水泉溢滿是月魏相國司馬昭弑其君髦八月使周弈石偉行風俗宣慰將吏問民勞苦為黜陟之詔九月白龍見布山吳人陳焦死埋六日更生穿土而出五年春二月白虎門北樓災秋七月黄龍見始興八月壬午大風震雷甲午有司奏請立皇后帝乃尊所生王夫人諡為敬懐皇后改葬敬陵乙酉立皇后朱氏戊子立子雨單為皇太子大赦詔自立四子雨單􅀢壾􅨟等名字欲令後世易避冬十月以衛將軍濮陽興為丞相丁宻孟宗為左右御史大夫宗字子恭江夏人性至孝㓜従南陽李肅學其母為作厚褥大被人問其故母曰小兒無徳致客客多貧故為廣被庶可得氣類相接宗讀書夙夜不懈肅竒之曰卿將相器也及長為驃騎朱據軍吏將母在營既不得志遇夜雨屋漏因泣以謝母母曰但當勉之何當泣也據後稍知之除鹽池司馬能自結網捕魚作鮓寄母母使送還曰汝為魚官而以鮓寄母非避嫌也尋遷吳縣令時不得將家之官宗在官毎得新物未寄母不先食之又母亡時禁長吏不得奔喪宗犯禁奔喪既而詣武昌請拘大將軍陸遜表陳孝行請於帝帝降罪母性嗜笋冬節將至宗乃入竹林泣笋為之生得以供祭後累遷位至光禄勲御史大夫後主即位宗避後主諱改名仁以張布為中軍督委萬機於布委軍國於濮陽興詔中書郎領博士韋昭依劉向故事校定衆書而帝恱意典籍唯春夏二時出射雉暫廢耳是年遣察戰往交阯調孔雀大猪案吳録察戰是吳時官號舊陽都有察戰巷在今縣城南二里禪衆寺門或云晉庾亮拒蘇峻七戰於此巷亦名七戰巷也詔召祭酒韋昭博士盛冲二人入侍講論時張布既典宫省知二人切直恐發隂失帝讓之布等叩頭謝而昭竟不入六年春長沙言青龍見慈湖言白鷰見豫章言赤雀見秋七月魏使鄧艾鍾㑹伐蜀九月蜀以魏見伐来告詔大將軍丁奉督征西將軍留平將軍丁封施績等諸軍分向夀陽南郡沔中救蜀帝召羣臣於前殿議曰司馬氏得政已来大難屢作智力雖豐而百姓未服竭其資力逺征巴蜀兵勞民疲而不恤敗於不暇何以能濟昔夫差伐齊非不克勝所以危亡者不憂其本况彼之事地乎軍師將軍張悌對曰以臣愚料則不然曹操雖功葢天下威震四海崇詐仗術征伐無己民畏其威不懐其徳丕叡承之繼以躁虐内興宫室外拒雄豪東西馳騁無歳獲安彼之失人為日且乆司馬懿父子自握其柄累有大功除其煩苛而示平惠為之謀主以救其疾民歸之亦已乆矣故淮南三叛而腹心不擾曹髦之死而四方不動摧堅敵如折枯蕩異國如反掌任賢使能各盡其心非智勇兼人孰能如此威武張矣本根固矣羣臣伏矣奸計立矣今蜀閹宦專朝國無政令而玩戎黷武民勞本弊競於外利不修守備彼强弱不同智筭亦勝因危而伐殆其必克乎若不克不過無功終無奔北之憂覆軍之慮也何為不可哉昔楚劒利而秦昭懼孟明用而晉人憂彼之得志我之大患也左右皆嗤之而未信冬十月大將軍陸抗上表言成都不守蜀主劉禪降帝聞深憶張悌之言不樂詔丁奉等還軍癸未災石頭小城西南一百八十丈是月詔分武陵為天門郡七年秋七月海賊破海鹽殺司鹽校尉駱秀使中書郎劉川發廬江兵討之復分交州置廣州八月癸未帝遇疾口不能言手書呼丞相濮陽興入令太子雨單出拜丞相帝把興臂指雨單託之丙戌帝崩于内殿十二月葬定陵年二十四即位在位七年年三十一諡曰景皇帝建康實録卷三
