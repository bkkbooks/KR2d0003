body:
  text: 建康實録卷十一唐許嵩撰宋高祖武皇帝高祖武皇帝姓劉名裕字德輿小名寄奴彭城綏里人漢楚元王交之後曽祖混始過江居丹徒京口里卒而葬焉秦史所謂曲阿丹徒間有天子氣者也時有孔子恭者善占墓帝嘗與經墓問之曰此墓何如子恭曰非常地也帝由是益自負行止時見兩小龍附翼之樵漁山澤同侣亦或覩焉困於貧賤不修廉隅小節時人莫能識唯琅琊王謐獨深敬重之帝嘗負刁逵社錢三萬經時無以還之遂被逵執謐密以已錢代償以此得釋嘗於下邳舍逆旅㑹一沙門謂帝曰江表方亂能安之者其在君乎既而忽失僧所在帝驚而異之晉隆安三年冬十一月妖賊孫恩冦㑹稽殺內史王凝之三吳亦應賊所在蜂起遣衛將軍謝琰前將軍劉牢之東討請帝為參軍事自丹徒往盡平定郡縣四年春牢之還鎮丹徒以謝琰鎮山陰五月恩又入山隂琰戰死冬十一月牢之又東討帝衆嚴肅百姓賴之五年春孫恩又冦海鹽帝翼之而進築壘於海鹽故治與賊相拒城內兵少戎備不足帝選敢死士百人去介胄持短兵突賊兵賊棄甲走收其器仗皆以給兵士戰雖連勝終慮賊衆我寡乃一夜偃旗卧鼓若已宵遁旦使一童子開門賊問主將安在曰已走矣信之無備帝㑹將士出其不意大破之恩乃去攻扈瀆高祖追之海鹽令鮑陋遣子嗣之以吳兵一隊為前驅帝曰吳人不習戰今賊方盛若前軍失利必喪我師翌日將戰帝夜設伏兵四處皆立旗鳴鼓賊疑四面有兵一時走散嗣之追奔深入為賊所敗帝且戰且退死傷略盡懼不免至初戰地令左右解死人衣但示閒暇賊疑有伏兵以誘我乃不敢進帝乃得徐歸夏六月恩浮海入江至京口鋭卒十萬舟船千餘自丹徒至於建業百姓荷擔而至時劉牢之尚在山陰帝與四百人晨夜兼行與賊俱㑹京口恩率大衆登山帝至逆擊破之投山巘赴水者不可勝數恩以棚筏自輿僅得免猶恃其衆欲掩京師進及白石聞牢之還京口遂退散歸秋八月以帝為建威將軍下邳太守冬十一月又追破孫恩於扈瀆恩走臨海元興元年春荆州刺史桓𤣥舉兵東下掦州刺史司馬元顯南討以劉牢之為前鋒次溧洲帝以參軍從事屢諌牢之令擊𤣥牢之不從使其子敬宣詣𤣥請和入京師𤣥既得志奪其兵移㑹稽內史牢之竟自縊於新洲𤣥以從兄修為撫軍大將軍鎮京口帝為中軍參軍太守如故孫恩投水死餘衆推恩妹夫盧循為主元興二年春正月𤣥使帝討孫恩餘黨帝大破盧循於東陽追之永嘉循逸於海六月進帝彭城內史冬十二月桓𤣥篡位司徒王謐為丹陽尹卞範之為鎮軍將軍謝混為侍中遷天子於尋陽明年春帝隨桓修入朝𤣥妻劉氏謂𤣥曰昨見劉德輿龍行虎步視瞻不凡恐非人下者也宜早為其所𤣥曰方欲北清中原非劉裕莫足使若關隴平定徐思其宜三年二月丁酉帝還丹徒潜謀匡復乙卯帝因遊獵㑹何無忌魏詠之檀慿之劉毅毅弟藩檀韶韶弟祗孟昶昶弟懷玉劉道規諸葛長民同謀者二十七人願從者百餘人丙辰平旦城門開馳入稱有詔遂擒桓修斬之以徇修弟𢎞青州刺史鎮廣陵道規為𢎞中兵參軍孟昶為主簿昶勸𢎞其日出獵未明開門昶道規毅等率壯士五六十人直入𢎞正噉粥稱有詔晉帝已復正斬桓𤣥首訖遂斬𢎞收其衆濟江義軍將克京城初王元德及扈興等亦預參義謀是日陰據石頭毅兄邁有寵於桓𤣥𤣥以為襄陽太守尚在建業帝使陳留人周安穆告之使為內應云天文已著而土木之工不息此而不乘宜復何待邁甚懼安穆慮事發馳歸是夜𤣥與邁書曰北府人情云何卿近見劉裕何所道邁將謂𤣥已知其謀晨起白之𤣥驚封邁為重安侯又以不執安穆故殺之乃誅元德等召羣臣廷論衛將軍揚州刺史桓謙請北拒𤣥曰不然北兵輕狷皆出萬死若我偏師失利則更成其氣今不如屯兵覆舟山使其空行二百里地無所措手卒遇大衆莫不震懾我按甲堅陳勿與爭鋒彼請戰不得勢將自走此謂不戰而屈人之兵者也謙固請不已乃遣其將吳甫之皇甫敷等相繼拒義軍先是帝造游擊將軍何淡之左右見帝光耀滿室以告淡之淡之以告𤣥𤣥不以為意及聞義兵起方懼或曰裕等甚弱陛下何慮之深𤣥曰劉裕足為一世之雄劉毅家無儋石之儲摴蒱一擲百萬何無忌劉牢之外甥酷似其舅共舉大事何謂無成時推帝總徐州府事孟昶為長史居守檀慿之為司馬劉穆之為府主簿帝率二州之衆一千七百人進及竹里移檄京師三月戊午逆破皇甫敷等於羅落橋進敗桓謙將於覆舟山𤣥出自西掖門䇿馬石頭城輕舟南逸王謐率百辟推高祖領掦州帝固讓以王謐為揚州刺史帝立留臺百官各奉職王謐與衆共推帝為使持節都督掦徐兖豫青冀幽并八州諸軍事鎮軍將軍徐州刺史鎮石頭劉毅冠軍將軍青州刺史廣陵相何無忌輔國將軍琅琊內史魏詠之建威將軍豫州刺史鎮歷陽孟昶建武將軍丹陽尹劉道規振武將軍先率兵千人追躡桓𤣥裴子野曰桓敬道有文武竒才志雪餘恥校動離亂之中掩天下而不血創既而嘯命六合規謀凌取未及踰年坐盜社稷自以名高漢祖事捷魏晉思專其侈而莫已知王謐以民望鎮領王綏謝混以後進光輝諸從兄弟方州連郡民駭其速而服其强無異矣高祖是時殊方一匹夫也無千百之衆紏合同盟雷擊三州曽未及旬蕩清京邑號令羣后長驅江漢推亡楚於己拔拯衰晉於己顚自羲軒已來用兵之速未始有也自非雄略蓋世天命至止焉能若此者乎於是民知攸暨而王迹興刁逵為桓𤣥西中郎將鎮歷陽𤣥敗逵歸請罪初逵與高祖故數窘高祖王謐嘗救脫之既而族滅刁氏裴子野曰刁逵𤣥之爪牙王謐楚之上相論逆則王重定罪則逵輕稚逺以舊德録萬機長民以宿憾夷七族以為晉政偏頗甚矣且神龍伏於罟網漁者安知其靈化霸王匿於人庶庸夫何以悟其英雄茍在不悟則驕之者衆可勝怨乎是知宋高祖之非宏量也同盟多二宜乎哉丁卯帝遷鎮南府焚桓溫神主於宣陽門作晉主於太廟命劉穆之斟酌憲章旬日而典禮畢舉既威令嚴簡又躬自儉素貴賤莫敢犯者夏四月戊子帝推晉武陵王遵為大將軍承制居東宫百司致敬大赦天下庚寅帝以孔靖為㑹稽太守帝東征盧循與季恭議欲往㑹稽收其兵討桓𤣥靖以千里之外難應急未若畿內動可集事帝然之𤣥至江陵復置羣官增法峻刑遣何淡之庾順助郭詮屯湓口壬辰以劉毅為西討都督統何無忌等四千人發京師庚戌大破淡之於桑落洲是月劉敬宣自鮮卑來歸五月桓歆據歷陽魏詠之破之追敗於芍陂歆走渡淮癸酉劉毅等追及桓𤣥戰於崢嶸洲破之𤣥走己卯桓𤣥自江陵逃漢中荆州别駕王康産南郡相王騰之奉天子入南郡時益州刺史毛璩遣從孫佑之與費恬送弟喪州下有衆二百璩弟子修之時為𤣥校尉引入蜀至枚回洲益州督護馮遷斬𤣥於貊盤洲傳首京師𤣥從弟謙走羌中桓振逃於華容尋而振又襲陷江陵追諡𤣥為武悼皇帝送璽紱於天子稱楚祚不終百姓之心復歸於晉丙午劉毅何無忌追及桓振毅等敗績六月丁未退屯尋陽使𢎞愆請罪於是免毅青州刺史無忌琅琊太守裴子野曰善乎宋高之能法也不先崢嶸之賞遽議靈溪之罰使擾攘之時無茍免之志恩不及私黨法不屈勳民使知攸憲示之以整不亦可乎故能使功著而費不煩威伸而將不拔終靖四方用此道也十一月桓振遣馮該守夏口桓仙客守偃月壘孟山圖守魯山連艦夾江以待劉毅十二月壬戌毅攻魯城進克巴陵是冬盧循盜據廣州以其將徐道覆守始興郡義熙元年正月己丑毅次於馬頭桓振挾天子出營江津癸巳衆軍進次中夏大破桓謙等振走狷川謙逃長安天子反正戊戌劉毅言於天子令大赦天下可改元是為義熙元年二月甲子天子發自江陵何無忌翊衛劉毅停夏口是月益州民譙縱殺刺史毛璩於成都三月桓振又襲荆州襄陽太守劉懷肅討之大破振於沙橋臨陳斬振振勇冠三軍每一合戰瞋目橫矛衆不敢逼時醉中流矢乃擒之甲午天子至自江陵庚午詔進帝侍中車騎將軍都督中外諸軍事録尚書帝固讓抗表辭歸藩是月旋鎮京口夏六月宥桓𦙍於新安𦙍祖沖有功於晉故也秋九月戊戌以征北將軍魏詠之為荆州刺史昔時殷仲堪為荆州刺史詠之為其客不出十年踐其位談者偉之十月以劉藩為輔國將軍青州刺史鎮廣陵義熙三年二月帝入朝乙卯旋鎮丹徒秋七月加孟昶吏部尚書八月遣冠軍將軍劉敬宣毛循之率衆五千伐蜀國子博士周祗上書諌於帝曰自義旗之建所征必克可謂天人交助和順之徵也今大難既夷君臣俱泰此誠漸無事宜大寧治民然蜀賊宜平六合宜一非不然也古人有言天時不如地利地利不如人和今往伐蜀萬有餘里泝流天險動經時歲來往艱阻雨雪連降驅三州三吳之人而投三巴三蜀之土其中疾病死亡豈可稱計且泝萬里所在無儲若連兵不解運漕不繼雖韓白之將何以成功今言可征者皆云彼親離衆叛愚謂不然以一介之匹夫而能致今日之事若衆力離散亦何以至此官所遣兵皆烏合應募之人必無千人一心有前無退者矣夫言治國先理其內而治其外先安其近而懷其逺頃狂狡不息誅戮相繼未可謂人和也天險如彼未可謂地利也帝不從明年敬宣至黃武果無功而還中流接得毛璩喪及其家口歸之冬十二月戊子司徒王謐薨孟昶使尚書右丞皮况言於帝以謝混為掦州刺史劉穆之說帝曰古有挾天子而令諸侯今其時也如公勳德豈可為守藩將者乎劉孟諸人與公俱起布衣以取富貴位有先後一時相推非有屈體心服宿昔定分也掦州治本豈可假人大事草創用王謐為神州王綏為分陕以安當時之心耳豈是經逺大計理盡於此哉一失權柄雖悔無及今必云在我措辭亦難宜報昶云須入朝量之大㫖可見帝納焉四年春正月詔高祖入輔申前命且為掦州刺史録尚書事解兖州以劉藩為刺史四月丙寅進孟昶為尚書左僕射五年春正月乙未夫人臧氏薨二月僞燕主慕容超大掠淮北孟昶曰師往必克公其行四月己巳帝抗表北伐舟師發自京師從淮入泗次於下邳捨舟步進燕將公孫五樓說慕容超曰吳兵輕鋭難與爭鋒請斷大峴使不得入上䇿也堅壁清野芟夷穀麥中䇿也據城待戰下䇿也超曰引使過峴我出鐡騎躪之成擒耳何遽清野自取蹙弱初謀是役諌者曰賊若不出嚴守大峴不則堅壁廣固守而不出軍無資何能自返帝曰不然鮮卑性貪略不及逺既幸其勝且愛其榖謂我孤軍將不能久必將引我且出輕戰師一入峴吾何患焉及師踰峴虜軍未出帝喜曰天贊我也衆曰未見克敵公何悅焉帝曰師既過險士有必死之志餘糧栖畝無遺乏之憂虜墮吾計勝可必矣六月燕主令賀賴盧等據臨朐去城四十里先據巨蔑水超曰晋軍得水即難敗也高祖遣先鋒孟符龍爭先據之大軍有車四千兩分兩翼方軌徐行車悉張幔御者執矟輕騎為游軍軍令嚴肅相戒以整未及臨朐賊至遂大戰超自往臨朐留寡弱居守悉令士卒前拒官軍大戰日向昃戰猶酣帝命參軍檀韶胡蕃等曰虜之精兵悉於是矣必留寡弱居守子以潛軍而翕其後往必克城多易旗幟此乃韓信所以克趙也且吾云兵由海道往必聲之韶等鼓行而登曰海軍至超棄城走軍聞城陷陳恐而動帝親鼓擊之臨陳斬大將段暉獲超豹尾玊璽等歸於京師超等奔廣固衆軍逼之克其大城超嬰小城於是設長圍守之館穀於青土停江淮轉輸撫納降附隨才任使華夷嚮悅牛酒日至秋七月加帝北青冀二州刺史或薦北海王鎮惡召入與語悅因留宿旦日辟為青州從事初超使尚書郎張綱乞師於姚興綱歸太山守申宣獲之送帝帝知綱有巧思令造攻具超黨初未知乘城曰汝非張綱無能為也及知綱為軍所獲超大懼求割大峴獻馬千匹稱藩以和帝不許姚興既不能救使使來言曰今率步騎十萬屯於洛陽晉人若不退將涉淮左帝謂曰爾為我報姚興我定青州將過函谷虜能自送今其時也參軍劉穆之遽入曰此言不足威敵正能怒彼若鮮卑未拔西羌又至公何以待之帝曰此兵機也非子所及羌若來救不有先聲今逆詐言是自彊也晉師不出日久矣羌見伐齊始將內懼自保不暇何能救人九月進帝太尉十月張綱治攻具成飛樓懸梯大幔板屋冠以牛皮火石不能為害攻城之士得肆力焉時劉毅遣上黨太守趙恢千餘人來援帝夜潛遣軍益㑹之明旦恢衆五千方道而至每晉使將到輒復如之去者數十來者數千虜謂我師方益愈恐六年春二月夜有鳥如蒼鵝飛入帝帳坐者咸愕胡蕃獨賀曰蒼者羌也鵝者我也虜將歸我之徵也既旦悉衆攻城城陷慕容超踰堞走追騎獲焉送京師斬於建康市徐道覆以帝北伐也自往番禺說盧循令襲京師是月盧循舉兵過嶺寇諸郡何無忌起尋陽之師南救諸鎮鎮南將軍殷閭進說無忌曰盧循有大志所經必不傷人其三吳舊賊百戰餘勇始興溪子拳捷善鬭未易輕也將軍且留屯豫章徵兵城守分軍石頭彼若圍城攻守者百倍於我而又畏吾躡其背比爾相持己數十日荆豫兵可以大至而合戰亦未晚也若以此軍輕進獨剋殆難濟乎無忌不聽戰敗握節而死之贈侍中司空諡忠肅公帝發自廣固將鎮下邳以經營司雍盧循寇逼朝廷徵還次山陽聞無忌敗卷甲兼行與數十人造江上問行人知賊未到喜濟於京口夏四月癸未至京師解嚴息甲劉毅表南征帝止之毅不從果敗於桑落洲衆皆沒毅登岸走免盧循聞帝之歸欲以重兵守尋陽西取荆雍道覆請乘勝遂下賊衆十餘萬舳艫且千里樓船百餘隻敗軍歸尤言其盛丙辰尚書僕射孟昶以賊內逼曰臣之罪也是夜飲藥自殺裴子野曰諸葛北伐先求南征非有料於勝敗大懼已威之不立古人度德而居相時而動故能舉無悔吝定霸取威若毅為之不量力也競則已甚何以能振夫左道佐民幻術誑誕足以動衆不足以濟功何哉國之將亡必隆妖孽不有悖主則有亂臣若天欲蕩震斯疾使之不殄盡亂極凶然後王者興焉故其始也若夜火之集飛蟲雖死不悔及其末也如朝陽之照積雪一旦消除故有彊若盧循猛如徐道覆基於邪蠱何以從彥逺之議遷都為不知矣從之以死婦人哉昔有懼弱而自沉昶之徒也丙寅劉毅歸自桑落洲者十三人詔還節鉞降為後將軍戊午帝移屯石頭城乙丑賊大至帝籌之曰賊若新亭直上且將避之若回泊蔡洲成擒耳六月進帝太尉中書監加授黃鉞餘如故辭秋七月諸軍大破盧循循自蔡洲退奔尋陽遣王仲德追之帝歸東府治水軍使建威將軍孫處率衆三千自海路襲番禺戒之曰我十二月必破妖寇卿亦足至番禺先傾其巢窟使奔散之日無所歸初盧循既下使荀林寇江陵桓謙譙道福率蜀兵為應謙及枝江荆人皆謙舊也並懷二心刺史劉道規㑹衆夜開城門衆莫有去者冬十月高祖率劉蕃檀韶等舟師南伐盧循留别將范崇戍南陵王仲德破之十一月孫處至番禺攻陷其城循父嘏奔始興處撫其人以守十二月己卯朔大軍次大雷築壘循掦聲不攻雷池中流而進帝分步騎登西岸率水軍與戰參軍庾樂生乘艦在後斬以厲衆士卒乃爭破賊賊泊西岸步騎飛炬焚其舟水軍乘流逼之賊退走豫栅左里甲申大軍至左里將戰帝麾之麾竿折幡沉於水衆咸懼帝笑曰昔覆舟之役亦如此今勝必矣乃大破循軍士卒皆降盧循單舸走徐道覆留始興帝自左里旋師天子遣侍中黃門勞師於行所七年春正月己未振旅而歸京師進大將軍掦州牧給班劍二十人三月循走番禺既無所止乃走愛州徐道覆自始興鴆其妻子而後自殺歎曰我不信英雄主為盧公所誤夏五月交州刺史杜慧度斬盧循於龍編及父子函七首於京師梟於大航八年四月以劉毅為衛軍將軍開府儀同三司荆州刺史毅改易官守請丹陽尹郤僧施為南蠻校尉將有異志稱疾甚表請劉藩省疾高祖知之自收其黨謝混獄死而表西伐藩妻毅之姨也帝將圖毅而收之以諸葛長民為豫州刺史留監府事劉穆之居東府長史貽書劉敬宣曰盤龍狼戾專恣自取夷滅世路剋清異端將盡富貴之事相與共之敬宣懼以箋示帝盤龍劉毅也元興中敬宣曽言盤龍自伐一旦遭遇必凌上取禍故長民見伐毅以敬宣言感動宣欲與謀高祖乃引為喻也故敬宣以示帝甲申大軍次南州以參軍王鎮惡為前鋒冬十月鎮惡及豫章口拒江陵二十里捨舟步進誡守船者江津遇衛軍朱顯之乃戰船人嚴鼓大發大破城內其夜毅自北門走出自縊死十一月乙邜大軍至江陵下書勞百姓曰夫𢎞奬拯民必存閔恕捨網循綱去煩易理九年春以西陵太守朱齡石為益州刺史帥寧朔將臧燾及下邳太守劉鍾等衆二萬自江陵伐蜀初謀元帥難其人齡石資名素淺帝違衆拔之授麾下之半臧燾夫人弟也位在其上亦𨽻焉誡石曰劉敬宣往至黃武無功而退今者師出應道青衣賊判由其不意復從內水如是涪城之戍必有重兵若道黃武正墮其計令軍自外水取成都疑兵向黃武此制敵之䇿也書函署曰到白帝發之諸將雖行未知所趨乙丑帝至自江陵初諸葛長民貪淫驕橫帝每優容之劉毅既誅長民謂所親曰昔年醢彭越今年殺韓信禍其至矣欲謀為亂又常謂人曰貧賤常思富貴富貴之後身履危機今日欲為丹陽布衣不可得也及帝西歸甚慮之輔國將軍王誕求先下帝曰長民似有疑心卿詎宜便去誕曰長民䝉公垂眄今輕身單下必當無慮乃可少安其意高祖笑曰卿勇過賁育矣於是先還帝乃至期剋日奄至東府而誅長民兄弟等是時民多逺本僑雜者衆帝上疏曰臣聞先王制治九土攸序分疆畫境各安其居在昔盛世民無遷業故有井田之制三代以降秦革斯政漢遂不改富强兼并於是為弊然九服不擾所託咸舊在漢西京大遷田景之族以實關中即以三輔為鄉閭不復係之於齊楚自永嘉播越爰托淮海朝有匡復之算民無思本之心經略之圖日不暇給是寧民綏治猶有未遑及大司馬桓溫以民為政本傷治為深故庚戌土斷以一其業於時財阜民豐實由於此自茲迄今彌歷年載畫一之制漸用頽弛離居流寓閭伍不修王化所以未純民瘼所以猶在臣負荷重任恥責實深自非改調解張無以濟治夫人情滯常難與慮始所謂父母之邦為桑梓者誠以生焉終焉愛敬所託今所居纍世墳隴成行敬恭之誠豈不與事而至請舉庚戌土斷之科庶于本所𢎞稍與事著然後率之以仁義鼓之以威風超大江而跨黃河撫九州而復舊土則戀本之志乃速由於當年於是依界土斷從之上又令豪彊不得因其湖澤稅民為利是月朱齡石次白帝乃發書書言衆軍悉由外出臧燾自中水取廣漢使羸弱乘高艦十餘造廣武譙縱果遣道福董兵守涪城六月癸未朱齡石次平模距成都二百里譙縱遣大將侯暉僕射譙詵等至平模夾岸連城層樓重栅衆未能攻朱齡石謂鍾曰天方暑熱賊今固險攻之難拔只困我師吾欲蓄鋭息兵伺隙而進卿謂何如鍾曰不然前揚聲言衆軍由內水故譙道福不敢捨涪出其不意侯暉之徒已破膽矣暉之阻兵非堅壘也因其懼而攻之其勢必克克平模則鼓行而前成都不能守必矣若緩兵相持虛實將見涪兵復來難為敵也若進不能戰退無所資二萬人同為蜀子虜耳石從之攻皆克斬侯暉進次成都秋七月戊辰譙縱將家出奔其尚書馬耽封倉庫以待王師壬申朱齡石入成都縱之走也如其墓乃自縊死齡石戮其尸傳首京師十年夏五月乙酉夜河間王司馬國璠帥百餘人踰廣陵城登㕔事太守檀社驚出箭及其股社語士衆曰賊以暗來非多也行五鼓必散矣賊聞鼓果遽而走於是悉降社是歲城東府築府舍十一年春正月盜殺左將軍北青州刺史劉敬宣初敬宣夜飲之夕有芒屩長三尺墮其食盤須臾難作初謝混負地矜才罕所容好雖劉穆之不能下也遇敬宣而盡歡或以譏混混曰孔文舉禮太史子義夫豈有非之耶平西録事韓延之司馬休之故吏也帝招以位延之報書曰司馬公體國忠貞欵誠待物今得罪宰相加之以討能無辭乎席上無欵懷之士閫外無自信諸侯良可恥也伐人之君啖人以利五尺童子孰不知君之心請以臧洪游於地下耳帝省書顧左右曰事人當如此初雍州刺史魯宗之負力好亂懼不容於時嘗為䜟曰魚登日輔帝室司馬休之聞乃引焉是月荆州刺史司馬休之雍州刺吏魯宗之舉兵內向以討劉裕為名庚午大赦帝白衣西討三月軍次江津司馬休之阻岸置陳帝欲自登謝晦抱止帝帝抽劍擬晦晦曰天下可無晦不可無公此曹洪所以濟魏武也乃止疾召胡藩入未至將斬以勵衆藩謂使者曰正欲擊賊不得奉命因以刀頭穿岸傍劣容腳指乃騰而上岸衆從之大破賊五月雍州刺史趙倫之破魯軌於石城休之來援不戰而走裴子野曰書曰慮善以動動惟厥時若司馬休之動非其時也天方厭晉罔敢知吉已雖欲得無乃違天乎五運無不亡之國殷為廢姓朝賢若三仁且猶顚沛而况豪俠哉昔中原殄寇道盡於時四海爭走豈徒繫晉得實存乎大義故能遂荒南土其興也勃然至義熙不異於是矣而宋家支離未忘前事波逆越逸禍將日尋豈戡黎之伐祖伊將咎周之徒孔熾興廢何其歘歟進帝太傅掦州牧劍履上殿入朝不趨贊拜不名加前後部羽葆鼓吹置左右長史從事中郎四人論平蜀功以朱齡石為豐城公秋八月甲子以中書侍郎劉穆之為尚書左僕射領吏部尚書十二年春正月以帝領兖州刺史加平北將軍增都督南秦二十二州諸軍事三月僞秦姚興死子泓新立兄弟相殺關中擾亂乃言於天子戒嚴北伐夏五月廬江霍山崩獲六鐘癸巳詔帝受雍州刺史前後部羽葆鼓吹班劍為四十人秋八月乙巳大軍進發奉帝弟琅琊王德文以行劉義符為中軍將軍監留府事鎮石頭以劉穆之為領監軍中軍二府軍司入居東府總攝內外光祿大夫孔季恭先告老居家室於是願從以為軍謀祭酒寧州刺史獻帝琥珀枕命搗碎付征士療金瘡九月軍次彭城以冠軍檀道濟龍驤王鎮惡及龍驤王敬為前驅造許洛寧朔劉遵考中兵沈田子舟師通石門寧朔朱超石寧朔參軍胡藩趨半城龍驤朱才寧逺竺秀寧逺嚴綱開巨野皆受督於王仲德北方屯戍緣道降伏十月衆軍㑹洛陽圍金墉姚洸請降執歸京師洛陽平命修五陵置守衛十一月癸巳天子使册帝曰朕以寡昧仰纘洪基賊臣乘釁蕩覆王室越在南鄙遷於九江宗祀絶饗人臣無位提挈羣凶寄命江浦則我祖宗之業奄墮於地七百之祚剪焉傾覆若涉淵海罔知攸濟天未絶晉誕育英輔振厥弛維再造區宇興亡繼絶俾昏作明元勳至德朕實攸倚今將授公典䇿其敬聽朕命乃者桓𤣥肆僭滔天泯夏拔本塞源顛蹶六位庶寮俯首四方莫恤公精貫日月氣凌雲漢奮其靈武大殱羣慝克復王室奉歆神祗此公之大節始於勤王者也授律羣后順流長騖薄伐崢嶸獻捷南郢大憝折首羣逆畢夷三光旋彩舊物反正此又公之功也出藩入輔𢎞茲保弼阜財利用繁殖生民編户歲滋疆宇日啓𨗳德明刑四海有截此又公之功也鮮卑負衆僭盜三齊狼噬冀青虎視沂岱介恃遐阻屢為邊毒公搜乘秣馬敻入逺疆衝櫓四臨萬雉俱潰竊號之虜顯戮司寇拓土千里申威隴漢此又公之功也盧循妖凶伺隙五嶺乘虛肆逆侵覆江豫旌拂寰內矢及王城朝野喪沮莫有固志家獻從卜之計國議遷都之規公乘轅南濟義形於色嶷然內湛視險如夷妙略竒軍淵謀不世狡寇窮窘喪旗遁跡俾我畿甸拯於將墜此又公之功也劉毅叛渙負釁西夏凌上罔主肆志姦暴附麗協黨扇蕩王畿公禦軌以刑消之不日大軍電掃神兵風拂罪人斯得荆衡晏清此又公之功也追奔逐北掦旍江濆偏旅浮海指日遄至番禺之功涉血萬頃左里之捷魚潰鳥散元凶逺迸傳首萬里南海肅清荒服來洎此又公之功也譙縱恃亂寇竊一隅王化沮閡三巴淪溺公指命偏師授以良圖陵波慿湍致届井絡僭豎伏鑕梁岷草偃此又公之功也永嘉不競四夷擅威五都傾蕩園陵幽辱祖宗懷沒世之憤遺氓有匪風之思公逺齊伊宰納隍之仁近同小白滅亡之恥鞠旅陳師赫然大號分命羣帥北徇司雍許鄭風靡鞏洛載清僞牧逆藩交臂請罪百年榛穢一朝掃滌此又公之功也公有康宇宙之勳重之以明德爰初發跡則竒謀冠古電擊强妖則鋒無前對聿寧東畿大造黔首若乃草昧經綸化洽於歲計扶危靖亂道固於苞桑辨方正位納之軌道蠲削煩苛較茲畫一淳風美化盈塞區宇是以絶域獻琛遐夷納貢王略所亘九服率從雖文命之東漸西被咎繇之邁子種德何以尚茲朕聞先王之宰世也庸勳尊賢建侯胙土褒以寵章崇其徽物所以協輔王室永隆藩屏故曲阜光啓遂荒徐宅營丘表海四履有聞其在襄王亦賴匡霸又命晉文備物光錫惟公道冠前賢勳高振古而殊典未飾朕甚忸焉今進授相國以徐州之彭城沛郡之蘭陵下邳淮陽山陽廣陵兖州之高平魯國之泰山十郡封公為宋公錫茲𤣥土苴以白茅爰定爾居用建冡社昔晉鄭啓藩入作卿士周召保傅出總二南內外之任公實兼之今命使持節兼太尉尚書左僕射晉寧縣五等男湛授相國印綬宋公璽紱使持節兼司空散騎常侍尚書陽遂鄉侯泰授宋公茅土金虎符第一至第五左竹使符第一至第十左相國位無不總禮絶朝班居常之名冝與事革其以相國總百揆去録尚書之號上送所假節侍中貂蟬中外都督太傅大尉印綬豫章公印䇿進掦州刺史為牧領征西將軍司豫北徐雍四州刺史如故公綱紀禮度萬國是式乘介蹈方罔有遷志是用錫公大輅戎輅各一𤣥牡二駟公抑末敦本務農重稼采蘩實殷稼穡惟阜是用錫公衮冕之服赤舄副焉公間邪納正移風改俗陶鈞品物如樂之和是用錫公軒縣之樂六佾之舞公宣美王化𨗳掦休烈華夷企踵逺人胥萃是用錫公朱户以居公官方任能網羅幽滯九臯辭野髦士盈朝是用錫公納陛以登公當軸處中率下以義式遏寇讐清除苛慝是用錫公虎賁之士三百人公明罰恤刑庶獄詳允放命干紀罔有攸縱是用錫公鈇鉞各一公龍驤鳳矯咫尺八紘括囊四海折衝無外是用錫公彤弓一彤矢百玈弓十玈矢千公溫恭孝思致䖍禋祀忠肅之志儀刑四方是用錫公秬鬯一卣圭瓚副焉宋國丞相以下一遵舊儀欽哉其祗服往命茂對天休簡恤庶邦敬敷顯德以終我高祖之嘉命加宋公逺遊冠相國緑紱位在諸侯之上十三年春正月追贈帝祖靖太常父翹特進左光祿大夫紱綬軍次陳留城經張良廟下令曰夫盛德不泯義存典禮微管之歎撫事彌深張子房道亞黃中照鄰殆庶風雲𤣥感蔚為帝師可改構棟宇修飾丹青蘋藻行潦以時致薦以紓懷古之情用存不刋之烈王鎮惡軍次潼關檀道濟逼蒲坂羌并州刺史尹昭據險道濟攻之未能下沈田子謂濟曰蒲城堅卒未可下攻之傷衆守之引日王鎮惡孤軍無依勢危力少潼關天險必爭之地若姚紹據之則難圖也不如棄蒲坂并力潼關潼關若捷尹昭不攻自服矣濟從之二月甲戌沈田子檀道濟王敬等大破姚紹於潼關紹之長史姚伯子屯九原將慿河津以絶糧道道濟爭赴之斬伯子虜其卒或謂濟曰宜梟之以築京觀濟曰不可師入敵境於我觀義懼之以威力則人自為守且固及伐其人何罪食而遣之於是周秦保壁襁負而至朱齡石率丁􅀈等為却月陳大破拓拔圭等數軍於河北五月戊午帝次洛陽七月癸未步軍入關八月衆軍破姚泓於青泥走灞上辛丑大軍次關頭丁未王鎮惡舟師泝河入渭食畢登岸斥舟誓衆大破姚平等橫門王敬自平朔門入泓與數百騎奔石橋明日將妻子詣壘門降泓子年上謂泓曰晉人將逞其欲不如早自引泓不答其子登橋自投而死於是君臣面縛以詣壘門王鎮惡執泓屬諸吏長安六萬餘户宫殿壯麗財寶盈積王師號令嚴整士民悅服相附日滋九月甲子大軍次灞上王鎮惡道迎帝勞之曰成吾霸業者卿也鎮惡拜曰明公之力鎮惡何功之有帝笑曰卿欲效馮異耶是日帝入長安收其彛器渾天儀玊圭指南車記里鼓秦漢大鐘魏銅蟠螭等獻於天子其餘珍寶頒賜將帥拜漢長陵大㑹文武於未央殿執姚泓歸詣京師斬於建康市遷姚宗於江東天子使使勞師於咸陽冬十月進帝爵為王增國十郡帝讓不受以桂陽公義真行安西將軍雍州刺史鎮京兆以王循為長史王鎮惡為司馬留兵萬人以傅𢎞之領之將班師長安父老謂帝曰殘民不見王師百年於茲矣始覩衣冠人人相賀長安十陵是公家墳壟千門萬户是公家府殿舍此欲安歸乎帝為之憫然鎮惡五月五日生故名鎮惡嘗客於澠池澠池人李方厚遇之後入關拔方為澠池令初謂方曰吾忽值英雄主取萬户封侯當厚報卿十一月丁亥尚書左僕射丹陽尹中軍西華子劉穆之卒贈衛將軍開府儀同三司以左司馬徐羡之領丹陽尹帝聞穆之卒哭之慟上疏於天子曰臣聞崇賢旌善王教所先念功簡勞義深追逺故司勳秉䇿在勤必書德之休明沒而彌著故尚書左僕射臣穆之忠規逺畫潛慮密謀造膝詭辭莫見其際於是重贈侍中司徒南昌侯封一千五百户諡文宣公穆之既貴食必方丈嘗白帝曰穆之本貧賤贍生多闕比來所資殊為豐泰自此之外無一毫負公帝亦推心委賴如左右手爾穆之外所知聞無不畢白雖同閭里戲謔道途細事皆具聞帝多識情僞穆之之由也及居東府副上相帝任內則穆之外則謝晦然二人素不相叶及穆之卒謝晦喜形於色自是朝廷大政皆咨受帝小事則決之於徐羡之十二月旋長安自洛入河開汴河以歸十四年正月師次彭城解嚴息甲後沈田子自與王鎮惡爭功且王猛之相苻堅也北人以比諸葛亮入關之功又鎮惡為首於時論者深憚焉故田子因衆懼襲殺鎮惡於傅𢎞之壘𢎞之告義真義真率王智王修被甲俄而田子言鎮惡反修乃執田子專戮斬之自是胡馬慿凌咸陽危矣二月嵩山獲玉璧三十二黃金一餅漢中成故縣水崖崩獲鐘十二枚鞏縣民宗曜獲嘉禾九穗同穎獻諸天子詔歸於帝帝固辭以中軍將軍劉義符為荆州刺史中軍議郎張節諌曰儲二至重四海所繫古來冡子在外未有為國福者乃止夏六月庚寅始詔受相國九錫之命引晉使陳備物於庭帝顧僚佐曰孤本布衣始願不及此衆人斂袵將軍王𢎞率爾而言曰此之謂神物求闕十二月戊寅天子崩琅琊王德文即位改號元熙元年春正月甲子詔徵帝入輔又申前命進爵為王以徐州之海陵北東海北譙北梁豫州之新蔡兖州之北陳留司州之陳郡汝南潁川滎陽十郡以增宋國庚申葬安帝於休平陵秋八月丁巳遷都壽陽始受王爵赦國內五歲刑以傅亮為中書令九月帝解揚州牧冬十月以義真為揚州刺史十二月天子命帝冕十有二旒建天子旌旗出警入蹕乘金根駕六馬備五時副車置旄頭雲罕樂舞八佾設鐘簴宫懸進王太妃為太后王妃為王后世子為太子王子王孫爵命之號一如舊儀二年正月帝表讓殊禮是月竟陵郡江濵自開出古銅禮器十餘枚帝獻之天子讓不受歸諸瑞物藏於相府二年夏四月又徵入輔五月己亥發自壽陽六月壬辰舟輿泊於石頭津渚恭帝詔曰夫天造草昧樹之司牧所以陶鈞三極統天成化故大道之行選賢與能隆替無常期禪代非一族貫之百王其來尚矣晉道凌遲仍屬多故安皇播越宗嗣墜泯則我宣元之祚永墜於地顧瞻區宇剪焉已傾相國宋王天縱聖德靈武秀出一匡頽運再造區夏固已興亡繼絶舟航淪溺矣故四靈效瑞川嶽啓圖𤣥象表革命之期華裔注樂推之願代德之符著於幽顯瞻烏爰止爰集明哲夫豈延康有歸咸熙告謝而已哉昔漢德既衰魏祖繼其緒黃運不競三后肆其勤故天之厯數定有攸在朕雖庸暗昧於大道永鑒廢興為日已久念四代之高蹤稽天人之至望豫其遜位别宫敬禪於宋草詔既成請帝書之帝欣然操筆謂左右曰桓𤣥之時天命已改重為劉公所延二十載今日之事本所甘心甲子遣使奉䇿曰咨爾宋王夫𤣥古權輿悠哉邈矣其詳靡得而聞爰自書契降逮三五莫不以上聖君四海以止戈定大業然則帝王者宰物之通器君道者天下之至公在昔上葉深鍳茲道是以天祿既終唐虞不得傳其嗣符命來格舜禹不得全其謙所以經緯三才澄序彛化作範振古埀風萬葉莫尚於茲昔我宗祖欽明辰居其極而明晦代序盈虧有期翦商兆禍非惟一世惟王體上聖之姿包二儀之德明齊日月道合四時豈伊博施於民濟茲黔庶固已化洽四海道備八荒圖緯之文既明人神之望已改百工歌於朝庶民誦於野億兆忭蹈傾佇維新自非百姓樂推天命攸集豈伊在豫所得獨專是用仰應皇靈俯順羣議敬禪神器授帝位於爾躬天祚告窮天祿永終於戲王其允執其中敬遵典訓副率土之嘉願恢洪業於無窮時膺休祐以答三靈之眷命是日使持節兼太保散騎常侍光祿大夫謝淡兼太尉尚書劉宣範奉皇帝璽紱受終之禮一如唐虞漢魏故事帝奉表陳讓晉帝已遜於琅琊王第百辟拜辭祕書監徐廣獨流涕歔欷謝晦止之廣曰君為宋朝佐命吾乃晉室遺老憂喜之事固不同時抗表陳讓表不獲通羣臣上疏勸進不許太史令駱達奏曰自晉義熙元年至元熙元年太白晝見經天凡七占曰太白經天民更主異姓興焉義熙七年五虹見於東方占曰五虹見天子黜聖人出十三年鎮星入太微有立王徙主之兆元熙元年冬有黑龍四登於天易傳曰冬龍見天子亡社稷大人受命冀州道人釋法稱告其弟子曰嵩神言江東有劉將軍漢家苖裔當受天命吾以璧三十二鎮金一餅與之劉氏卜世之數也後漢建武至建安末一百九十六年而禪魏魏自黃初至咸熙末四十六年而禪晉晉自太始至今百五十六年三代揖讓咸窮於六於是羣公卿士固請乃從之初漢光武立社於南陽漢末而其樹死劉備有蜀乃應之而興及晉末年舊根復萌至是而茂盛乃受法駕於南郊壇柴燎祭於上帝禮畢嚴駕還宫御太極殿大赦改元永初元年封晉帝為零陵王食邑一郡載天子旌旗乘五時副車行晉正朔郊祀天地禮樂皆用晉典上書不言表答表不稱詔宫於秣陵封道憐及義慶等五王二年以義真為司徒以僕射徐羡之為尚書令聽訟華林園禁淫祀九月晉零陵王殂車駕率百寮臨於朝堂三日葬以晉禮以涼州帥大沮渠䝉遜為鎮軍大將軍涼州刺史尚書令司空以太子詹事傅亮為僕射上不豫以道憐徐羡之傅亮檀道濟入侍醫藥羣臣請祈禱上不許以義真為侍中豫州刺史上瘳封仇池公楊盛為武都王三年五月上疾甚召太子誡之曰檀道濟雖有幹略而無逺志非如兄韶有禦難之氣徐羡之傅亮當無異圖謝晦數從征伐頗識機變若有異必此人也又為手詔朝廷不須復有别府大臣中亦宜有爪牙以備不祥後起若有少主朝事一委宰相母后不煩臨朝癸亥上崩於西殿時年六十七葬丹陽建康縣蔣山初寧陵在縣東北二十里周回三十五步高一丈四尺諡曰武皇帝廟號高祖上清簡寡欲嚴整有法度未嘗視珠玉輿馬之飾後庭無紈綺絲竹之音初朝廷未備音樂殷仲文言之帝曰日不暇給且所不解仲文曰屢聽自然解之帝曰政以解則好之故不習耳寧州嘗獻琥珀枕光色甚麗價盈百金時將北征或曰療金瘡上大悅命碎之分賜諸將平關中得姚興從女有盛寵以之廢事謝晦諌之即時遣出財帛皆在外府內無私藏宋臺諌有司奏東西堂施局腳牀銀塗釘上不許用直腳牀釘用鐡廣州常獻入筒布一端上惡其精麗勞人即付所司彈太守以布還之帝素有熱疾並病金瘡末年尤劇坐卧常須冷物後有人獻石牀寢之極以為佳乃歎曰木牀且費而况石乎即令毁之制諸主出適不過二十萬無錦繡金玉性尤簡易嘗著連齒木屐好出神武門逍遙左右從者不過數十人時徐羡之住西州嘗思羡之便步出西掖門羽儀絡繹追之已出西明門外矣諸子旦問起居入閣脫公服止著裙帽如家人之禮焉帝微時躬於丹徒業農及受命後耨耜之具頗有存者皆命藏之留於後及文帝幸舊宫見而問焉左右以實對帝有慙色有近侍進曰大舜躬耕歷山伯禹親事土木陛下不睹列聖之遺物何以知稼穡之艱難何以知先帝之至德乎及孝武大明中壞上所居治室於其處起玊燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻繩拂侍中袁顗稱上儉素之德武帝不答獨言曰田舍翁得此己過矣故能光有天下克成大業盛矣哉廢帝滎陽王廢帝諱義符小字車兵武帝長子也晉元熙元年進為宋王太子武帝受禪立為皇太子永初三年五月癸亥武帝崩是日太子即皇帝位大赦制服三年六月壬申以尚書僕射𫝊亮為中書監尚書令司空徐羡之領軍將軍謝晦及亮輔政以永初四年春正月己亥朔大赦改元為景平元年文武各賜位二等乙巳敵將達奚印破金墉進圍虎牢毛德祖於城內掘地深七尺旁穿二道出城外又分為大道出賊後募敢死士數百人隨參軍范通基出自圍外鼓噪斬敵敵陳擾亂斬首數百級燔其攻具敵雖暫退衆還復合拓跋圭又遣平安公涉歸寇青州己未詔徵豫章太守蔡廓為吏部尚書廓至謂尚書傅隆曰選皆出我乎隆言執政徐羡之云黃門以下專以委蔡以上衆干也廓曰我不能為徐干木署紙尾遂不就二月丁丑太皇太后崩遺令曰先皇棄世五十載古不封樹漢亦異陵今將外營别壙亦無不可葬興寧陵沮渠䝉遜吐谷渾阿豺遣使貢獻庚辰爵䝉遜為河西王以阿豺為安西將軍封澆河公辛未富陽人孫法光宗親反自號冠軍大將軍寇山隂山隂令陸劭拒之戰柯亭賊敗走甲子豫州刺史劉粹遣將軍襲許昌殺西潁川太守庾龍乙丑虜騎掠高平初虜自河北次臨朐虜焚攻具去青州孫琳為御史中丞以事忤徐羡之羡之遣琳弟璩自釋琳曰我觸忤宰相罪止一身差不及爾無忙懼遂劾免羡之雖不獲命朝廷憚之己未虎牢城陷虜執司州刺史毛德祖歸初虎牢圍急城內無水士馬皆渴皮膚黑爆人皆患瘡至死無血城潰左右扶德祖使逃德祖曰義不使城亡而身存與衆俱執七月癸酉尊帝所生張夫人曰皇太后宫曰永樂丁丑以旱故詔赦五歲刑已下罪人冬十月己未有星孛於氐指尾貫攝提向大角仲月在尾季月掃天倉而後滅帝既即位多不率禮范泰上封事深言其不道及多言曰王言如絲其出如綸下觀而化疾於影響臣䝉先朝厚遇思竭狂瞽陛下若能留心覽察則臣無恨九泉輔國將軍交州刺史龍編侯杜惠之卒贈左將軍惠之為刺史也布衣疏食治國如家歲荒民飢以私祿賦給城門夜不閉道不拾遺海表大治十二月丙寅省寧州之江陽犍為安上三郡合為宋昌郡是嵗魏主拓跋嗣死子燾代立二年春正月癸巳朔日有蝕之徐羡之傅亮謝晦奏曰先朝不豫已至大漸車騎將軍義真酣酒日夜不輟兼惡言訕主謗朝并輒匿甲卒請遵武陵王故事廢為庶人流於新安郡前吉陽令魏郡張約之上疏諌曰臣雖草芥備充黔首少不自量髙殉義之風伏惟高祖武皇帝誕兹神武撫運龍躍仰清天步則齊德有虞俯廓地基則侔功大夏故䖍順天人享有萬國雖靈祚攸長而聖躬不永陛下繼明紹統遐邇一心藩王義真天姿夙茂素有卓然之美宜在容養掩瑕宥過訓以義方伏思大宋之興雖叶應符緯而開基造次根條未豐宜廣藩屏使兄弟盛比姬氏伏願上考前代興亡之由中存武皇締構之業下顧蒼生顒顒之望時開曲宥謹冒死詣闕惟願丹誠一經天聽退就斧鑊無愧地下執政徙約之梁州道追殺之初高祖既締構而副二未育帝始義熙二年生於京口及封王恣其志欲膂力絶人解音律善騎射於是羣小左右多進異端義真好文愛士而性又浮躁謝晦嘗言於高祖曰陛下春秋既高宜思存萬世神器至重不可使負荷非才高祖曰廬陵何如晦曰臣請視之晦造義真義真盛欲與談晦不甚答遂言德輕於才非人主也由是出居於外及羡之等專政王愈不悅與前太子左衛率謝靈運散騎常侍顔延之昵狎過甚故吏范晏戒之義真曰靈運空踈延之隘薄魏文帝云鮮能以名節自立者但情性所得未能忘言於悟賞故與之遊耳及廢立謀定故先黜義真乙未以皇弟義恭為冠軍將軍南徐刺史丁未大風天有五色雲占曰天錦有兵高麗國使貢獻發使誅皇弟義真於新安夏五月江州刺史王𢎞南兖州刺史檀道濟來朝執政諷之乙酉皇太后令曰王室不造天禍未悔先帝創業不永棄世登遐義符長副屬當大位窮荒極悖一至於此大行在殯幸災肆於悖辭嘉容表於在戚至三召樂府鳩集伶官倡優管絃靡不備發珍羞甘膳有加平日採擇媵妾産子就宫靦然無怍醜聲四逺臣子痛心及懿后崩背重加天罰親與左右執紼歌呼手推梓宫撫掌笑謔殿省備聞加復日夜媟狎羣下慢戲興造萬計費用萬端帑藏空虛人力殫盡刑罰苛酷幽囚日增居帝王之位好皂𨽻之役處萬乘之尊悅厮養之事親執鞭朴歐擊無辜穿池築觀朝成暮毁徵發工匠疲極兆民逺邇嘆嗟人怨神怒社稷將墜豈可嗣守洪業君臨萬邦可廢為滎陽王一依漢昌邑晉海西故事鎮西將軍宜都王仁明尤篤孝弟自幼及長德業冲粹識心明允宜纂承皇統光臨億兆主者詳行舊典以時奉迎未亡人嬰此百罹雖存若隕永悼往事撫心崩塞徐傅等將廢帝諷王𢎞檀道濟求赴國許𢎞等來朝謝晦移家出鎮軍府將治府舍而實伏甲士出於外屋以謀告中書舍人邢安泰潘盛等為內應夜邀道濟謝晦領兵居前羡之等隨後因東掖門開入自雲龍門盛等先戒宿衛莫有禦者時帝於華林園為列肆親自沽賣又開瀆聚土以象破岡埭與左右引船唱呼以為歡樂夕逰天淵池即龍舟而寢其朝未興兵士進殺二侍人於帝側帝傷指扶出東閣就收璽紱羣臣拜送辭於東宫遂幽於吳郡是日赦死罪已下檀道濟入守朝堂六月傅亮率臺迎宜都王於江陵徐羡之使邢安泰殺滎陽王於金昌亭王有勇力不即受制突走出昌門追者以門關踣之致殞乃加刑時年十九南郡太守江夷臨哭盡哀裴子野曰昔漢武為衛武太子置博望園延異能之士而長安闕下竟有流血之釁高祖寵樹滎陽恣其嗜欲羣小競進亦有金昌之禍茍不納於義方必異世而同失古者人君養子能言而師授之辭能行而傅相之禮其衣服飲食則保節其身三師並輔其志進退俯仰如值繩準驕奢淫佚無自入矣故以儀刑四海君臨萬國奕世休嘉不隕令問宋失教誨則異於斯居中則任僕妾處外則近趨走太子皇子有師傅二職者皆臺𨽻也制其行止授其禮法則𨗳達臧否罔弗由之言不及於禮義識無近於今古謹敕者既訓之以嗇陋愚戇者又誘之以凶慝興置太子太傅而無師保其他職掌率由舊章諸王無相置師一人多耆大夫領之王臨州則長史行宣通教令又師傅之流甚有專恣獨擅威權由是而言君子勿用老成碩德多見嚴踈是以本枝雖茂而端莖實寡嗣君幼主淫縱奸回雖性由于天賦然習則生常其來逺矣夫木擊折軸水戻破舟不以水木而過工匠者何本其所以然也降及太宗舉天下而棄之亦昵比之為力宋以此終焉嗚呼有國有家其鑑之矣先是有龍見西方中天騰上上䕃五色彩雲太史奏西方有天子氣秋七月丙寅法駕自江陵至行宫傅亮率百官奉璽紱詣臺門上疏伏惟陛下君臨自然聖明在御孝悌著於邦家風猷宣於藩牧宗廟神靈乃眷西顧臣奉荷朝列再覩太平行臺至止瞻望城闕不勝喜悅鳬藻之情謹詣閣門拜表以聞王答書使召見傅亮哭甚哀既而問二王薨故悲感嗚咽左右掩泣莫能仰視亮流汗不能答既出布腹心於鎮西司馬王華南蠻校尉劉彥之於時權臣用命人懷疑懼議者謂有異圖王華進說曰先帝有大功於天下四海所服雖嗣主不綱而人望未改徐羡之中才寒士傅亮布衣諸生非有晉宣王敦之心明矣畏廬陵嚴斷將來必不見容陛下寬恩仁慈衆所知也是以越次奉迎冀以見聽悠悠之論必不然矣羡之亮晦王𢎞道濟五人同功孰肯相讓就懷不允勢必不爾殿下但是驅六轡以副天人之心耳王曰君復為吾宋昌也留王華以守甲寅舟輿發自江陵中流有黑龍躍負王舟左右失色王顧長史王曇首曰此大禹所以受天命也吾何德以堪之八月丙申舟輿入於京師丁酉謁初寧陵進入中堂百辟奉璽紱勸進至三乃許之建康實録卷十一
