body:
  text: 建康實録卷四唐許嵩撰吳後主後主諱晧字元宗大帝孫廢太子和之長子一名彭祖字晧宗景帝永安九年封烏程侯七年七月景帝崩時蜀新亡而交趾數叛國内震懼議立長君而左典軍萬彧昔為烏程令與晧相善稱晧才識明斷是長沙桓王之儔又加之好學屢言之於丞相濮陽興與張布遂言於朱太后欲以後主為嗣后曰我寡婦人安知社稷之慮茍吳國無殞宗廟有頼則可矣遂定議迎後主庚寅即皇帝位改元元興元年以濮陽興為侍中丞相領青州牧上大將軍施績為左大司馬丁奉為右大司馬張布為驃騎將軍加侍中諸各増班秩秋九月貶太后為景皇后稱安定宫追諡父和為文皇帝改葬明陵置園邑二百家祖母王氏為大懿皇后母何氏為文皇后立夫人滕氏為皇后后諱芳蘭太常滕𦙍族女父牧五官中郎將帝為烏程侯時納為妃及此拜后封高宻侯後寵衰何太后保䕶常供養昇平宫天紀四年隨帝北遷薨於洛陽冬十月封景帝子雨單為豫章王次子􅀢為汝南王次子壾為梁王次子􅨟為陳王以禮葬魯育公主主宇小虎大帝次女歩后所生適朱據初全主譛王夫人并廢太子和欲立魯肅王霸為嗣朱主不聽全主恨之及少帝即位孫儀謀殺孫峻事覺伏誅全主因譛朱主埋於石子岡案搜神記後主欲改葬主塚瘞相亞不可識别而宫人頗有識主亡時衣服乃使兩巫各住一處以伺其靈使察戰監之不得相近久之二巫各見一女年三十餘上著青錦束頭紫白袷裳丹綈絲屨從石子岡上半岡而以手抑膝長息小住湏臾進一塚上便止徘徊奄然不見二巫不謀而言同遂開棺衣服與所言同爾後主初即位儉素發優詔恤民開倉振窮乏料出宫女以配無妻者禽獸擾於苑者皆放之當時翕然稱為明主及得志遂麄暴驕恣多忌諱好酒愛殺小大失望丞相濮陽興侍中張布等竊悔立之尚書萬彧聞之而構於帝帝潜怒使收興布等下獄十一月詔徙興交州布廣州並追道殺之夷三族興字子元陳留人父逸漢末避亂江東興少有士名太祖時為上虞令遷尚書左曹五官中郎將使蜀還拜㑹稽太守瑯琊王之在郡興深相結及王即位徴為太常衞將軍封外黄侯時嚴宻建丹陽湖田作浦里塘公卿議不定興以為便就之遷丞相與中軍督張布為表裏布小女時為美人及布誅後帝從容問美人曰父何在美人答曰為賊所殺帝怒又殺美人後思之問左右左右答美人有姊適衞尉馮朝子純即布長女也後主奪之入宫拜為左夫人極寵廢朝事十二月司馬昭為魏相國遣使徐紹齎書來陳事勢利害元興二年春正月分吳郡丹陽等九縣為吳興郡治烏程二月使光禄大夫紀陟五官中郎將𢎞璆随紹彧報魏書兩頭言白不著姓司馬昭銜之陟之奉使也入境問諱入國問俗至魏魏將王布示之馬射而問陟曰吳之君子亦能此否陟答曰此軍人騎卒之肄業也非士君子之所宜為也布大慙陟等既至魏司馬昭問來時吳主如何對曰來時皇帝臨軒百官陪位昭饗陟百寮畢㑹問陟曰彼戍備幾何答曰自西陵至江都五千七百里昭曰道里甚遠難為堅固答曰疆界雖遠而其險惡必争之地不過數四猶人雖有八尺之體靡不受患至於防䕶風寒亦數處耳昭善之厚禮而還夏四月甘露降蔣陵五月大赦改甘露元年秋七月逼殺景皇后朱氏於苑中小屋治䘮内外知其非疾皆痛之又遷其四子於吳道追殺雨單􅀢二人后太祖女魯育公主生父據赤烏末太祖納為瑯琊妃案吳書初孫峻既用全主䜛殺朱主后隨王在郡王懼遣后還建業執手泣别及至峻遣后就王太平中少帝知朱主為全主譛害鞫問朱主死意全主懼答皆據二子熊損所白帝遂殺熊損損妻峻妹也孫綝益忌遂謀廢帝立瑯琊王王即位永安五年立為皇后七年景帝崩群臣上尊號為皇太后後主即位貶為景帝后是年見殺合葬定陵九月西陵督歩闡上表請徙都武昌後主納之鎮西將軍陸凱見揚土百姓泝流供給為患又時政多謬黎元窮匱乃進表諌帝言武昌土地危險墝埆非王都安國養民故先帝嫌之遷都於此且童謡云寧歸建業死不就武昌居童謡之言以安居而比死足明民之所苦也不聽即日大駕將發留御史大夫丁固右將軍諸葛靚鎮建業冬十月使大鴻臚張儼五官中郎將丁忠於魏弔祭司馬文王後主謂儼曰今南北通好以卿有出境之才故相屈行儼對曰皇皇者華臣䝉其榮懼無古人延譽之美謹厲鋒鍔思不辱命既至晉賈充裴秀皆不能屈羊祜等與結縞帶之好十一月後主至武昌大赦分零陵南部為始安郡分桂陽南部為始興郡十二月晉受魏禪甘露二年春正月張儼丁忠等使晉還儼道遇病卒而忠獨歸言北方無戰備且弋陽可襲而取後主大悅信之因置酒㑹公卿大飲令左右相嘲為樂常侍王蕃嘲尚書萬彧曰魚潜於泉出水吹沫何則物有夲性不可横處非分彧出自溪谷羊質虎皮彧答曰唐虞之朝無謬舉之才造父之側無駑蹇之乘由是銜之蕃既沉醉後主輿出因請還蕃為人有威儀行動自若後主不悅時萬彧陳聲等承顔争毁之後主大怒叱左右收殿下斬之太常滕牧征西劉平等苦請不得蕃字永元廬江人博學多聞自尚書郎去官歸讀書景帝即位與賀劭入為常侍性切直處朝蹇諤陸凱重之時年三十九案江表傳後主將徙武昌問蕃射不主皮蕃不時答後主怒之即於殿上斬蕃出登來山令親近將跳蕃頭作虎狼争咋頭皆碎以示威使無敢犯者與吳録不同二月後主既得丁忠定議欲北伐右司馬丁奉言忠不可信師出必無功後主大怒不納大將軍陸凱等固諌不可乃止於是自絶於晉秋八月因得大鼎改元為寶鼎元年大赦以鎮西將軍陸凱為左丞相常侍萬彧為右丞相冬十月永安山賊施但等反劫後主弟永安侯謙為主出烏程取故太子和陵上鼓吹曲葢比至建業衆萬餘人丁固諸葛靚等逆討於九里汀之牛屯獲謙酖殺之謙字公遜太祖孫故太子和次子景帝封永安侯永安今在湖州武康縣案吳録施但等見後主上武昌遂謀反劫謙至秣陵欲立為帝擇日使召留後丁固諸葛靚乃與丁固等拒破之初望氣者云荆州有天子氣破揚州而建業宫不利故後主上武昌仍使掘破荆州界大臣名塜斷其山崗而但等果反後主自以為得計聞但平後乃使百餘精甲鼓譟入建業殺謙妻子號曰天子使荆州兵來破揚州賊以厭前氣分㑹稽為東陽郡分吳丹陽為吳興郡以零陵部為邵陵郡十一月將欲還建業左丞相大將軍陸凱諫曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡夫民國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年已來君威傷於桀紂君明暗於姦雄君惠閉於羣孽無災而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖公卿媚上以求愛困民以求饒導君於不義敗政滛俗臣竊為痛心今隣國交好四邉無事當務息役養士實其廪庫以待天時而更遷徙傾動搔擾百姓民吏不安大小呼嗟此非保國養民之術也後主大怒發凱前後諫表使近臣趙欽以口詔報凱曰卿徃表言朕不遵先帝有何不平君諫非也但建業宫不利故避之而西宫衰耗可不得徙乎凱因重上疏言後主不遵先帝二十事曰臣竊見陛下親政已來陰陽不調五星失晷職司不忠奸黨相扶是陛下不遵先帝之所致夫王者之興受之於天脩之由德豈在宫乎而陛下盛意驅馳六軍流弊縱陛下一身安奈百姓愁苦何此不遵先帝一也臣聞有國以賢為夲夏殺龍逢殷獲伊摯斯前代之明効今日之師表也常侍王蕃黄中通理處朝忠謇斯社稷之重鎮大吳之龍逢而陛下忿其苦詞惡其直對梟之殿堂屍骸暴棄邦内傷心有職悲悼咸以吳國夫差復存以先帝親賢陛下反棄之是不遵先帝二也臣聞宰相國之柱也不可不彊是故漢有蕭曹之佐先帝有顧歩之相而萬彧瑣才凡庸之質昔從家𨽻超歩紫闥於彧已豐於器已溢陛下愛其細介不訪大趣榮以尊輔越尚舊臣賢良憤慨智士赫咤是不遵先帝三也先帝愛民過於嬰孩民無妻者以女妻之見單衣者以帛給之枯骨不收取而埋之陛下反之是不遵先帝四也昔桀紂滅由妖婦幽厲亂由嬖妾先帝鑒之以為身戒故左右不置淫邪之色後房無曠積之女今中宫數萬不備嬪嬙外多鰥夫女吟於内風雨逆度正由此起是不遵先帝五也先帝憂勞萬機猶懼有失陛下臨阼已來遊戲後宫眩惑婦女乃令庶事多曠下吏容奸是不遵先帝六也先帝篤尚樸素服不純麗宫無高臺物無雕飾故國富民充奸盗不作而陛下徴調州郡竭其財力土被𤣥黄宫有朱紫是不遵先帝七也先帝外仗顧陸朱張内近胡綜薛綜是以庶績雍熈邦内清肅今者外非其任内非其人陳聲曹輔斗筲小吏先帝所棄陛下幸之是不遵先帝八也先帝毎宴羣臣抑損醇醴臣下終日無失慢之色百寮庶尹並展所陳而陛下拘以瞻視之敬懼以不盡之酒夫酒以成禮過則敗德此無異商辛長夜之飲是不遵先帝九也昔漢桓靈親近宦竪大失民心今高通詹亷羊度黄門小人而陛下賞以重爵權以戰兵若江渚有難烽燧卒起則度等之武不能禦侮明矣是不遵先帝十也今宫女曠積而黄門復走州郡條牒民女有錢則捨無錢則取怨吁道路母子死訣是不遵先帝十一也先帝時養諸王太子若取乳母其夫復役賜與錢財給其資糧時遣歸來視其弱息今則夫婦生離夫故作役兒從後死家唯空户是不遵先帝十二也先帝嘆曰國以民為夲以食為天衣其次之三者朕存之於心今則農桑並廢是不遵先帝十三也先帝簡士不拘卑賤任之鄉閭効之於事舉者不虚受者不妄今則浮華者登朋黨者進是不遵先帝十四也先帝戰士不給他役使春惟知農秋惟收稻江渚有事責其死効今之戰士供給衆役廪賜不贍是不遵先帝十五也夫賞以勸功罰以禁邪賞罰不明則士民㪚今江邉將士死不見哀勞不見賞是不遵先帝十六也今所在監司已為煩猥兼有内使擾亂其中一民十吏何以堪命昔景帝時交阯之亂實由兹起是為遵景帝之闕不遵先帝十七也夫校事之吏民之仇讎先帝末年雖有吕壹錢欽尋皆誅夷以謝百姓今復張立校曹縱吏言事是不遵先帝十八也先帝時居官者咸久於位然後考績黜陟今莅政無幾便即徴召遷轉迎新送故紛紜道路傷財害民於是為甚是不遵先帝十九也先帝每察寛解之奏常留心推按是以獄無寃囚死者吞聲今則違之是不遵先帝二十也若臣言可録藏之盟府如其虚妄治臣之罪願陛下留意焉後主大怒為其重臣難以法繩忍之十二月還自武昌留衞將軍滕牧鎮武昌二年夏六月起新宫於太初之東制度尤廣二千石已下皆自入山督攝伐木又攘諸營地大開苑囿起土山作樓觀加飾珠玉制以竒石左彎碕右臨硎又開城北渠引後湖水激流入宫内巡遶堂殿窮極伎巧功費萬倍案輿地志太祖鑿城北溝北接𤣥武湖後主所引湖内水並解在前卷晉左太冲作吳都賦曰東西膠葛南北峥嶸房櫳對榥連閣相經閽闥譎詭異出竒名左稱彎碕右號臨硎雕欒鏤粢青瑣丹楹圖以雲氣畫以仙靈又曰高門冇閱洞門方軌朱闕䨇立馳道如砥樹以青槐亘以渌水𤣥䕃耽耽清流亹亹列寺七里夾棟陽路屯營櫛比廨署棊布横塘查下邑屋隆夸長于延屬飛舛互案宫城記吳時自宫門南出夾苑路至朱雀門七八里府寺相屬横塘今在淮水南近陶家渚俗謂回軍毋洑古來縁江築長堤謂之横塘淮在北接柵塘在今秦淮逕口吳時夾淮立柵自石頭南上十里至查浦查浦南上十里至新亭新亭南上二十里至孫林孫林南上二十里至板橋板橋上三十里至烈洲洲有小河可止商旅以避烈風故名烈洲又洲上有小山形如栗亦謂之栗洲吳時烈洲長封洲一百二十歩長干已注解在前卷時大將軍陸凱徐陵亭侯華覈上書諫曰敵國彊大西蜀傾覆深可為憂臣以為安撫修德在急而功作無益於時後主不納覈為兼東觀令領右國史累陳讓表後主使人謂曰東觀儒林之府非名學碩儒無以任其職以卿研精墳典與班張楊蔡為儔故授何乃謙光而自菲薄秋七月使大匠卿薛珝營寢堂號曰清廟冬十月遣守丞相孟仁太常姚信等備官寮中軍歩騎二千人以靈輿法駕東迎神於明陵引見仁等親拜送於庭十二月仁奉靈輿法駕至後主遣中使日夜相繼奉問神靈起居動止巫言見文帝被服顔色如平生後主悲泣悉詔公卿詣闕賜各有差使丞相陸凱奉三牲祭於近郊後主於金城門外露宿明日望拜於東閤翌日拜廟薦祭欷歔悲感比至七日三祭倡伎晝夜娛樂有司奏夫祭不欲數數則凟宜以禮斷情乃止十二月新宫成周五百丈署曰昭明宫開臨硎彎碕之門正殿曰赤烏殿後主移居之是嵗分豫章廬陵長沙為安成郡是嵗左夫人張氏薨後主哀念過甚留葬苑内臨哭數月不出聽事民間訛言後主已死章安侯奮當立時奮母仲姬墓在豫章豫章太守張俊疑其或然掃除墳塋後主聞之車裂俊夷三族誅章安侯及其五子奮字子陽魯王霸母弟太元二年封齊王居武昌少帝即位大將軍諸葛恪執政不欲令諸王處江濱兵馬地徙於豫章奮不從命恪為書與奮奮奔南昌逸遊無度恪誅後徑下至蕪湖欲入建業觀變殺傅相坐廢為庶人徙章安太平中又封章安侯至是以訛言見殺三年春後主大舉將家西上初廢帝太平元年冬刁𤣥使蜀還得司馬徽與劉廙論運命厯數事遂詐増其文以誑國人曰黄旗紫蓋見於東南終有天下者荆揚之君乎又得魏人言壽春下童謡曰吳天子當西上是年後主聞之大喜曰此天命也遂載太后已下六宫嬪妾千餘人濟自牛渚陸道西上呼云青蓋入洛陽以從天命行至華里遇大雪途壞兵士皆被甲持仗百人共引一車寒凍欲死妃后菜色兵人不堪曰若遇敵當便倒戈耳左右進諫皆不納東觀令華覈固争後主乃遂追前出軍伐晉無功事大司馬丁奉斬之奉字承淵廬江安豐人少驍勇常從征伐斬將搴旗曽不避敵累以功遷冠軍將軍封都亭侯廢帝即位隨諸葛恪拒魏軍於東興為前鋒將三千銳卒先據要害便令兵人解甲著胄魏軍大笑之不為備奉乃縱兵撃之大破魏軍進㓕冦將軍改封都鄉侯又從孫峻征淮南跨馬提戈突入其陣取文欽而歸景帝立謀與張布等因獵㑹殺孫綝遷大將軍領徐州牧後主立進右大司馬至是見䜛追過斬之徙家於臨川冬十月蒼梧太守陶璜與監軍虞汜大破晉交阯太守楊稷稷降因定日南九真大赦分交阯為新昌郡破扶嚴置武平郡十一月鳳皇集西苑大赦改明年為鳳皇元年秋八月左丞相萬彧以泄禁中語因㑹飲毒不死自殺是月西陵督歩闡反降晉闡字仲思丞相隲次子以功封西陵亭侯繼業督西陵至是後主徴入為繞帳督闡以累世在西陵卒見徴命自以為失職懼䜛乃不應召據城降晉使兄子璿徃洛陽為質後主遣大將軍陸抗討擒之夷三族二年春宫人至市劫百姓財物司市中郎陳聲收宫人繩以法後主聞之忿以他事燒鋸斷聲頭棄其屍於四望山下三年春臨海太守奚熈以疑舉兵斷海路為其部曲所殺傳首建業夷三族案江表傳後主左夫人死思念之於苑中作大冢葬之使工刻桐人於冡内以為兵衞多送珍玩之物不可勝計葬後治喪於内半年不出國人見墓大奢皆謂主已崩而今立者何氏子也時後主舅子何都兒貎似後主是以百姓有此言或云章安侯奮當立故奚熈信訛言欲還建業至是年乃舉兵反三月司徒丁固卒固字子賤㑹稽山陰人㓜孤在襁褓中闞澤見而異之少居貧色養與宗族同寒煖虞翻深敬異之累著位廷尉景帝時為右御史大夫曽夢松生腹上懼問左右或占之曰松字十八公後十八年當為公至是果然秋九月尚書僕射高陵侯韋昭以嫌收下獄獄中因吏上書陳所著洞紀自包羲已下至秦漢為三卷又作官訓一卷辯釋名一卷冀以此求免後主覽書恠其垢汙大怒昭懼因叩頭五百下兩手自摶右國史華覈率公卿連上表救之流涕進言曰昭學業幽邃國之良臣年過七十乞赦其餘年以成大吳之備典後主益怒曰欲書朕過耶竟誅之徙家於零陵昭字𢎞嗣吳郡雲陽人少好學善屬文舉孝亷累遷尚書郎太子中庶子侍太子和講在東宫時賔客蔡頴好博奕太子以為無益命昭著論言得失言詞清妙當世重之及和廢轉黄門侍郎少帝立為太史修撰吳書與華覈薛瑩等叅同其事景帝立進中書侍郎領國子祭酒帝好學詔令依劉向故事校定衆書延入侍講後主立封高陵亭侯遷尚書僕射兼中常侍領左國史時有屢言瑞應後主問昭昭曰此人家筐篋中物耳後主銜之及欲為父和作夲紀昭執不登帝位宜為傳後主怨由是漸見嫌責昭恐上表自陳衰老去職以成所造之書後主不聽昭懼成疾因侍宴後主每宴無不竟日酒率以七升為限昭素飲酒不過三升初見禮時常為裁減或賜茶代之及寵衰更見逼彊且酒後又令侍臣折難公卿嘲弄私短為歡昭以為外相毁傷内長尤恨故但示難問經義言論後主以為不承用詔命又嫌前答筐篋之言積前後事遂收下獄死時年七十三秋七月遣使者二十五人分至州郡料出亡叛户口大司馬荆州牧陸抗薨抗字㓜節丞相遜嗣子桓王外孫年二十襲封江陵侯累遷立節中郎將赤烏中自完城與諸葛恪換屯屯柴桑抗臨去皆更繕完城圍葺其牆屋桑果不得妄伐恪入屯儼然若新而恪柴桑故屯頗有毁壊深以為慙後屢以征伐功拜領軍大將軍益州牧尋遷西陵樂鄉公安諸軍事因陳時宜於後主一十七條而切言何定弄權閹宦專政之事鳳皇初歩闡以西陵降晉抗率諸將大破晉軍而梟闡首修理城圍東還樂鄉貎無矜色故得將士歡心時晉以羊祜為荆州刺史與抗隣境抗祜推僑札之交抗嘗遺祜酒飲之不疑抗有疾祜饋之藥抗亦推誠服之于時以為華元子反復見於今矣尋加都督大司馬荆州牧鳳皇二年就拜之明年夏病上表勸益兵西陵西陵國之西蕃若有不守非但失一郡則荆州非吳有也如其有虞當傾國争之至秋遂薨時年五十一晏嗣案吳志抗生四子長晏次景次機次雲十二月詔分鬱林為桂林郡十一月侍中太尉范慎薨慎字孝敬廣陵人性多純直竭忠知己之君纒綿三益之友時人貴之自侍中出為武昌左部督治軍整齊後主將遷都甚憚之拜太尉慎恨久為將老耄請還軍士戀之隕涕而别案范氏家傳慎著書二十篇號曰矯非是嵗大疫四年春吳郡上言掘地得銀長一尺廣二分上有年月字因赦改元天冊元年吳郡臨平湖自漢末草穢壅塞長老相傳云此湖塞天下亂此湖開天下静至是湖忽開通或云當太平青蓋入洛後主以問奉禁都尉陳訓訓曰臣能望氣不能達湖之開塞退而謂人曰青蓋入洛將有輿襯銜璧之事非吉祥也又於湖邉得石函函中有小石青白色長四寸廣二寸刻上作皇帝字於是又改元為天璽元年立石刻於巖山紀吳功德案吳録其文東觀華覈作其字大篆未知誰書或傳是皇象恐非在今縣南四十里龍山下其石折為三段時人呼為段石岡也秋旱㑹稽太守車浚以民饑表出倉賑貸後主怒以浚樹恩私遣人就斬之時東湖太守張詠以不出算緡亦遣就斬之同梟首以徇諸郡中書令賀劭見後主兇暴驕矜信惑羣邪政事日弊乃上表極言而諌後主深恨以為謗毁國政嫌之既而劭忽中惡風口不能言求去職後主疑其託疾收付酒藏考掠千所劭無一言後主大怒燒鋸以截其頭家屬徙於臨海劭字興伯會稽山陰人以奉公貞正親近所憚乃共譛惡於後主而與樓𤣥同見殺時年四十九八月京下督孫楷降晉時鄱陽歴陽縣有石山臨水高一百丈其上四十丈有土穿軿羅穿中色黄赤不與夲體相似俗謂之石印相傳云石印封發天下當太平下有祠堂巫言石印神有三郎歴陽縣長表言石印文發後主遣使以太牢祭歴山巫言石印三郎言天下方太平使者作高梯上省其印文詐以朱書二十字云楚九州渚吳九州都揚州士作天子四世治太平始遂還以奏後主大喜曰吾當為九州都渚乎從太皇逮朕四世太平主非朕復誰遣使以印綬拜石印三郎為王又刻石銘褒詠靈德以答休祥又吳興陽羡山有石室長十餘丈在所表為大瑞後主乃遣兼司徒董朝太常周處等徃陽羡縣封禪國山大赦改元天紀元年以協石文二年夏五月右國史徐陵亭侯華覈卒覈字永光吳郡武進人起家為上虞尉以文學召入祕府數以便宜利害事進諫愛民省役後主不納累遷東觀令領右國史卒時年六十秋七月立成紀宣威等十一王王給兵三千人三年夏四月合浦部曲將郭馬反殺廣州刺史自稱交廣二州刺史安南將軍初有䜟云吳之敗兵起南裔亡吳者公孫也後主聞之自文武職位有姓公孫者皆徙廣州不令停江濱案後主大帝孫亡國之應也聞馬反大懼此天亡也秋七月以張悌為丞相領軍師將軍率牛渚督何構滕循等總戎自東道縁海向廣州以循為鎮南將軍假節領廣州牧又使徐陵督陶濬等將兵七千㑹陶璜自西道向廣州東西俱進共討郭馬案吳志馬夲合浦太守修允部曲督允死後部曲兵馬當分給馬等累世舊軍不樂别離遂與何典王族吳述殷興等謀反以據廣州興攻蒼梧族破始興也八月建業有鬼目草生工人黄狗家依縁棗樹長丈餘莖廣四寸厚三分又有買菜生工人吳平家高四尺厚三分如枇杷形上圓徑一尺八寸下莖廣五寸兩邉生葉綠色東觀案圖名鬼目草為芝草買菜為平慮草遂以為瑞封狗為侍芝郎平為平慮郎皆銀印青綬案干實傳黄狗者吳之土運承漢後故初有黄龍之瑞及其末年而有鬼目之妖託黄狗之家黄稱不改而貴賤懸殊即其天道精㣲之應也冬十月晉軍來伐大將軍司馬伷侵涂中安東將軍王渾揚州刺史周浚逼牛渚建威將軍王戎入武昌平南將軍胡奮入夏口鎮南將軍杜預過江陵龍驤將軍益州刺史王濬廣武將軍唐彬等浮江東下陶濬等討郭馬至武昌聞北軍大舉止而不進時後主不專政事躭荒無度上流征鎮告變曽未為心日集公卿内外淫宴皆令沉醉使黄門郎十人不預酒侍立為司過之吏客罷各奏其失酒後之愆罔有不舉並加威刑采宫女少有不合意者輙剉殺之又料取大臣將吏子女十五六者具名揀閱揀閱不中乃許出嫁或生剝人面皮鑿人之目性酷虐多猜忌而任幸岑昬憸諛屠害無日尚書郎熊睦因諷㫖㣲有所諫便使人以刀鐶撞殺之身無完膚侍中張友俊才辯㨗以應答高致惡其有能以他事誅之左右側目衆情所苦上下離㪚晉軍已至無不土崩瓦解者四年春正月杜預等破荆州晉軍並進殿中親近數百人皆叩頭請曰今賊將至兵不起刃衆並離心願坐岑昬以謝天下後主始惶懼許之左右遂争起收昬殺之尋遣追己不及戊辰陶濬自武昌奔歸見後主陳晉之蜀船小今得二萬精甲乘大艦拒之自足破賊晧授節鉞其夜衆逃㪚不能禁是月晉王渾周浚攻陷江西屯戍後主使丞相軍師將軍張悌右將軍副軍師諸葛靚等督丹陽太守沈瑩䕶軍將軍孫震帥衆三萬渡江逆之至牛渚沈瑩謂悌曰晉治水軍於蜀久矣今傾國大舉萬里齊力如悉益州之衆沿江而下我上流諸軍無有戎備名將皆死幼騃當任恐邉江諸城盡莫能禦晉之水軍必至於此宜蓄衆力待來一戰若勝之日江西自清上方雖壊可還取也今渡江逆戰勝不可保若或摧喪則大事去矣悌曰吳之將亡賢愚所知非今日也吾恐蜀兵來此衆心駭懼不能復整今宜及可用决戰力争若其敗喪同死社稷無所復恨若其尅勝則北敵奔走兵勢萬倍便當乗威南上逆之中道不憂不勝也若如子計恐行散盡相與坐待敵到君臣俱降無復一人死難者不亦辱乎遂渡江戰吳軍大敗靚牽悌俱去悌不肯為晉軍所殺二月王渾周浚等進屯横江後主聞悌軍沒甚懼自選羽林精甲以配沈瑩孫震等屯于板橋乙未乃自為書與舅何構責己曰昔大帝以神武之畧奮三千士卒割據江南席卷交廣開拓洪基欲祚之萬代至朕末徳嗣守成緒不能安懐黎元多為咎釁以違天命災暗之變反謂之祥致使南蠻逆亂征討未尅聞晉大衆逺來臨江庶其勞瘁比晨摧退而張悌不返喪師過半朕甚惆悵于今無聊得陶濬表云武昌以西並復不守不守者非糧不足非城不固乃兵將背戰耳兵之背戰豈怨兵耶朕之罪也天文𤣥變於上萬民憤歎於下觀此事勢危同累卵吳祚終訖何其局哉天匪亡吳朕所招也瞑目黄壤當復何顔見四帝乎公其朂勉竒謀飛筆以聞構一名植丹陽句容人文皇太后弟也后幼為太子和妃生後主及和賜死嫡妃張氏亦自殺后曰若皆從死誰當養孤遂撫後主及三弟後主即位尊為昭獻皇后尋改為文皇太后稱昇平宫己未晉龍驤將軍王濬總蜀兵沿流直指建業瑯琊王司馬伷帥六軍濟自三山遣周浚張喬等破吳軍於板橋瑩等皆遇害後主聞軍相次而敗惶迫乃用光禄勲薛瑩中書令胡冲等計使太常張䕫奉牋并進璽綬於伷曰昔漢氏失統九州分裂先人因時際㑹略有江南遂分阻山川與晉乖隔今大晉龍興徳覆四海暗劣偷安未喻天命至於今者猥煩六軍衡盖道路逺臨江渚舉國震惶假息漏刻敢縁天朝含𢎞光大謹遣張䕫奉所佩印璽委質請命惟垂信納惠濟元元三月辛未後主遺羣臣書曰朕以不徳忝繼先軌處位積年政教凶悖遂令百姓久困塗炭至使一朝社稷傾覆宗廟無主沒有餘罪孤負諸君事已難圖覆水不可收也壬申王濬舟師先至石頭後主以草縳銜璧舁櫬見濬於軍門濬解縛焚櫬以禮相見癸亥晉瑯琊王伷㑹諸軍入自都城屯太初宫收其圖籍府庫總領州郡户口人吏兵糧舟檝音樂采妓乙亥置酒大㑹安東將軍王渾酒酣謂吳人曰諸君亡國之餘得無戚乎無難督周處曰漢末分崩三國鼎峙魏㓕於前吳亡於後亡國之戚豈惟一人渾有慙色處字子隱義興陽羡人父魴鄱陽太守處少孤未弱冠膂力絶人好馳騎田獵不修細行縱情肆欲州里患焉處聞之慨然有改勵之志謂父老曰今時和嵗豐何苦不樂父老曰三害未除何以為樂處問之答曰南山白額獸長橋下蛟并子為三害處曰若此吾能除之乃入山射殺猛獸又投水摶蛟蛟或浮或沉行數十里處與之俱三日三夜人謂己死相賀處殺蛟而返聞鄉相慶始知人患已甚乃入吳尋二陸學問時機不在見雲具以情告欲自修改而年已蹉跎恐將無及雲曰古人貴朝聞夕改君前途尚遠耳且患志之不立何憂名之不彰遂勵志有文思心存義烈言必思信剋已朞年州府交辟仕為東觀令累遷太常出督無難案晉書吳平後處入洛遷廣陵太守郡多滯訟有經三十年不决者處一朝决遣之轉楚内史俄拜㪚騎常侍處曰古人辭大不辭小乃先之楚而郡新經䘮亂新舊雜居風俗未一乃敦以教義又斂骸骨無主者收葬之然後就徴遠近稱歎遷御史中丞副梁王彤征齊萬年於關西戰沒死撰語黙三十篇及風土記集吳書未成卒三子玘靖禮皆事東晉也是嵗建平太守吳彦聞晧不守以郡降晉彦字士則吳郡人出自寒㣲有文才身長八尺手格猛獸膂力絶羣初為通江吏時平南將軍薛珝仗節南征軍甚盛彦觀之慨然而歎有善相者劉札謂之曰以君相貎後當至此不足慕少起家為小將大司馬陸抗竒其勇略㧞用之患衆情不允乃㑹諸將宻使狂人挾刀跳躍而坐上諸將懼而奔走唯彦不動舉几禦之衆服其勇累遷建平太守案吳録王濬將伐吳造船於蜀彦覺之表請増兵為備晧不從彦乃析為鐡鎖斷江路及晉師臨壤沿江諸城望風降附或見攻㧞彦守攻之上下晉軍退舍禮之及晧亡歸晉武帝拜為金城太守帝嘗從容問薛瑩孫晧所亡瑩曰晧為君昵近小人刑罰妄加大臣大將無所親信人人愁恐各不自安敗凶之釁由此而作帝復問彦答曰吳王英俊宰輔賢明帝笑曰何為亡彦曰天禄永終厯數有屬所以為陛下擒此葢天時豈人事也張華在坐謂彦曰始為名將積有嵗年蔑爾無聞竊所惑矣彦曰陛下知我而卿不聞帝甚嘉之位至長秋卿卒於官夏四月遣使送後主於洛陽舉家西遷以武帝太康元年五月丁亥集於洛陽甲午晉帝使詔慰勞封為歸命侯給衣服車乘田三十頃嵗給粟五千斛錢五十萬絹五百匹綿五百斤拜太子為中郎將諸子為王者並拜郎中毎朝㑹召後主預之常指殿謂曰朕為此殿以待公久矣皓曰臣於江南亦作此座以相待案三十國春秋晉王濟嘗與武帝碁時濟伸脚在局下因問晧曰聞君生剝人面皮何也晧曰人臣無禮於其君者則剝之武子大慙遽縮脚或侍宴武帝曰聞君善歌令唱汝歌皓應聲曰昔與汝為隣今為汝作臣勸汝一盃酒願汝壽千春後五年薨於洛陽塟河南芒山滕后自為哀筞文甚酸楚案後主年二十二即位十六年年三十八為晉所㓕入晉為侯五年薨年四十二子孫相承三代四帝起壬寅終于庚子凡五十九年七年在武昌五十二年都建業太初宫初大帝黄武年中魏軍大舉文帝自至廣陵臨江朝廷危懼乃召術人趙達筮之達布筭曰吳衰在庚子今賊無能為帝問庚子遠近曰後五十八年帝笑曰朕憂當身不及子孫也案吳志達夲河南人少好異用思精宻知東南有王氣可以避難遂脫身渡江治九宫一筭之術究其㣲㫖是以應機立成對問若神計飛蝗射隱伏無不中効謂太史丞公孫滕曰吾先人得此術欲圖為帝王師至予三世不過太史郎滕求其法達曰今已亡及太祖即位令達筭在位幾年達曰漢高建元十二年陛下倍之帝大喜後果如其言常謂知星者曰我不出户牖以知天道足下晝夜暴露望氣不亦勞乎帝毎問其法終不言及死間有書發棺求之竟無所得是時吳有皇象字休明善書中國不及嚴武子字子卿善圍棋時莫與對宋壽能占夢十不失一曹不興善畫妙動神明與太祖盡屏風誤落筆㸃因以為蠅帝以生蠅舉手彈之菰城鄭嫗能相人知吉凶吴範占風氣劉惇明天官太一此八人世謂之八絶也晧在位天紀末有窺上國之心使太卜尚廣筮并天下得同人之頥對曰吉庚子嵗青葢入洛故晧以克平西北為事不備其亡時嵗實庚子也永安二年三月有異童子年可六七嵗著青衣來從羣兒戲諸兒畏問之答曰我熒惑星將有告爾曰三公鉏司馬如言訖昇天去漸遠若疋練自後五年蜀亡六年晉興至是吳為司馬如㓕之案吳大帝即王位黄武元年壬寅至唐至德元年丙申合五百三十五年矣建康實録卷四
