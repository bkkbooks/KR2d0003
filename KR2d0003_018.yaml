body:
  text: 建康實録卷十八唐許嵩撰梁后妃傳略太祖獻皇后張氏諱尚柔范陽方城人祖惠宋濮陽太守母蕭氏即文帝從姑宋元嘉中嬪於太祖生長沙宣武王懿永陽昭王敷次生高祖初后嘗於室中忽見庭前菖蒲花開光采照灼非世所有后驚問左右左右不見后曰嘗聞見者富貴因取吞之是月生高祖將産夜后見庭中衣冠陪列焉次生衡陽宣王暢義興昭長公主令嫕宋明帝太始七年殂於秣陵同夏里合葬晉陵武晉縣東山天監元年五月追尊號為獻皇后父穆之字思靖晉司空華六世孫官止交址太守高祖德皇后郗氏諱徽高平金鄉人祖紹宋祭酒父燁太子舍人初后之母宋文帝女尋陽公主方孕夢人告云當生貴子及生后有赤光照室后幼聰明善𨽻書讀史傳女工之事無不間習高祖娉焉生永興公主玉珧永世公主玉瓘永樂公主玉環高祖在雍州后殂於襄陽官舍年三十二高祖即位追為德皇后后性妬忌及終化為龍入後宫井中通夢於帝或見形光彩照灼帝體不安龍輒激水騰湧於是井上設衣服百味祠之故帝竟不立后案東京記皇城西南洛水北有分穀渠至隋朝有龍天王祠俗傳梁武帝郗后性妬忌武帝初立未册命因忿懟乃投殿庭井中衆赴井救之已化毒龍煙焰衝天人莫敢近帝悲歎久之乃册為龍天王使井上立祠朱粉塗飾加以雜寶每有所御必厚祭之巡直灑掃自梁歷陳享祀不絶陳滅乃遷其祠於京城道德寺大業初又移於此地置祠祠內有星辰日月閻羅司命五嶽四瀆大龍神象蔣州沙門法濟嘗住祠中以事龍天王神濟有二豎子一善吹笙一善方響每日以朝暮作樂濟為神所感著衣鼓舞而不自覺今向北即上陽宫也太宗簡皇后王氏諱靈賓琅琊臨沂人祖儉后幼而柔明叔父􅌔見曰吾家女師也天監十一年拜晉安王妃生哀太子大器南郡王大連長沙公主妙䂮大通三年拜太子妃太清三年二月薨於永福省年四十五其年太宗即位追尊為后葬莊陵父褰字思叔高祖受禪遷中書令高祖造愛敬寺褰莊在寺側有田八十頃晉王導賜田也從求不得遂估市評田價以還直終吳興太守高祖丁貴妃諱令光本譙國人居襄陽妃生於樊城有神光之異紫氣滿室故以光為名高祖臨襄州丁氏因人聞高祖納焉時年十四貴妃生有赤志在左臂治之不滅至是無何忽失所在嘗於供養經案側髣佛若見有神人心異之高祖起義初生昭明太子貴妃與太子留在雍州京邑平乃還京師天監元年為貴妃位在三夫人上居顯陽殿太子定位奏備典章言則稱令貴妃性不好華飾仁恕接下皆得歡心普通七年薨年四十二太宗即位追尊穆太后父仲遷官至兖州刺史高祖阮修容諱令嬴本姓石會稽餘姚人初齊始安王遙光納之敗後始入東昏宫高祖平定京師納為婇女天監七年八月生元帝尋拜修容大同六年六月薨于江州年六十七元帝追尊文宣皇后孝元徐妃諱昭佩東江剡人祖孝嗣太尉文忠公父混侍中初為湘東王妃生世子方矩益昌公主含貞徐妃無容質帝三二年一入房妃怨之又以帝眇一目後每帝至必為半面粧帝大怒出妃而譴死之太子諸王傳略昭明太子諱統字德施小字維摩高祖長子母丁貴嬪以齊中興元年生于襄陽天監元年十一月立為太子生而聰惠三嵗受孝經論語五嵗遍讀諸經了義二年五月始出居東宫恆不樂高祖知之每五日一朝多便留永福省八年於夀安殿自講孝經十四年正月朔旦高祖臨軒冠太子於太極殿舊制太子著逺遊冠金蟬翠緌纓至是詔加金博太子美姿容善舉止讀書數行俱下能屬文下筆不加點崇信三寶遍覽衆經於宫中立惠義殿專為注習之所召名僧自立三諦法義及貴妃薨水漿不入口哭不輟聲高祖使顧協宣旨戒之體素偉壯腰帶十圍至是減削過半自加元服高祖便使省萬機內外百司奏事太子精於聽斷纎髮必曉法多全宥天下稱仁接引才學討論墳籍于時東宫有書三萬餘卷文學之盛宋以來未有之也性好山水於玄圃穿渠築植更立池亭與朝士名賢遊樂其中畨禺侯盛軌言此中宜奏女樂太子不答徐詠左思招隱詩曰何必絲與竹山水有清音軌慙而止在東宫二十九年不蓄聲樂每雨雪使親信周行閭巷貧困之家皆有賑賕後忽疾恐帝憂常自勉力及困篤不許左右啓聞四月辛巳薨時年三十一高祖幸東宫臨哭盡哀諡曰昭明五月庚辰葬安寧陵案梁書太子仁德素著及薨朝廷驚惋男女奔走宫門號泣滿路嶽陽王即位追尊昭明皇帝陵在建康縣北三十五里所著文集二十卷古今典誥文言為正序十卷五言詩之美者為英華集二十卷又集文選三十卷行于世哀太子大器字仁宗太宗嫡長子也普通四年五月丁酉生大通三年封宣城王太宗即位六月立為皇太子大寶二年八月逆賊侯景廢太宗并害太子時年二十八太子性寬和神骨端嶷在於賊手每不屈意賊以太子有器度憚之故見害元帝追諡為哀太子愍懷太子方矩字德規元帝第四子也元帝承制拜為太子改名元良承聖元年為皇太子魏師陷江陵太子與元帝同被害敬帝追諡愍懷陳吏部尚書姚察曰孟軻有言雞鳴而起孳孳為善者舜之徒也若乃布衣韋帶之士在於隴畝之間終日為之其利亦已博矣况乎處重明之位居正體之尊克念無怠蒸蒸以孝大舜之德其何逺之功臣王茂字休逺太原祁人父天生宋末為將軍剋司徒袁粲拜為梓桐巴西二郡太守茂年數嵗大父深見之曰此吾家千里駒也成門户者必此兒也及長身長八尺美容質宋升明末起家奉朝請拜襄陽太守高祖起義私於張𢎞策請立和帝高祖義師起每以茂為前驅建康平拜領軍將軍進司空加驍騎開府儀同三司江州刺史薨年六十諡忠烈子貞秀嗣曹景宗字子震新野人父欣之宋征虜將軍徐州刺史善騎射好讀史書每讀穰苴樂毅傳輒放卷歎息曰大丈夫當如此齊建武中為遊擊將軍高祖起義景宗使杜思仲勸高祖迎立南康王寶融於襄陽為高祖前鋒纍破諸城次江寧鼓噪而進至皂莢橋築壘及建康平拜右將軍天監元年進平西將軍封竟陵侯大破魏軍於鍾離封竟陵公拜侍中給鼓吹一部景宗為人自恃性躁不能沉默出行嘗欲褰車帷幔左右輒諫以位望重人所具瞻不宜如此景宗謂所親曰我昔在鄉里騎快馬如龍與少年輩數十騎馳騁拓弓作霹靂怒發箭如餓鴟呌平澤中逐麞鹿射之渴飲血飢食肉覺耳後風生鼻頭火出此樂使人忘死不知老之將至今來揚州作貴人動靜不得路行欲開車幔小人輒言不可閉置車中如三日新婦悒悒使人無氣也七年遷安南將軍江州刺史赴任卒於道諡壯子皎嗣柳慶逺字文和河東解人伯父元景宋太尉慶逺纍仕至齊初為魏興太守左轉襄陽令高祖臨雍州以綱紀辟為别駕從事慶逺謂所親曰方今天下將亂英雄必起庇人定霸其吾君乎因盡心協贊及義兵起居帷幄為謀主從軍東下身先士卒建康平入為侍中高祖受禪封雲安侯征虜將軍雍州刺史上餞之新亭高祖謂曰卿當衣錦還鄉朕亦無西顧之憂矣卒於官子津嗣初從父兄衛將軍世隆謂慶逺曰吾夢太尉以褥席見賜吾亞台司適又夢吾以褥席與汝汝必光我門族至是慶逺亦繼世隆焉蕭頴達蘭陵人齊光祿大夫赤斧第五子少好勇為西中郎外兵參軍高祖起義立和帝於江陵以頴達為冠軍隨高祖東下高祖受禪為前將軍册陽尹九年遷衛將軍卒年三十四詔給東園祕器夏侯詳字叔業譙國人年十六喪父廬於墓側嘗有三足雀來集廬户間服闋太守殷琰召補主簿宋明帝太始初琰以兵叛明帝使劉勔兵圍之詳為琰出説劉勔勔退舍琰遂出降纍遷至西中郎司馬新興太守高祖起義西臺建以詳為中領軍凡國大事多決於詳高祖圍郢城未下詳獻策略曰量我衆力度賊餱糧窺彼人情觀之形勢若使賊衆食少故宜計月討之若食多力寬宜悉衆攻之若使糧力俱足非國守所屈便宜散金寶縱反間使彼智者不用愚者日進此魏武所以定大業也天監元年高祖徴為侍中封豐城縣公尋進湘州刺史尚書僕射金紫光祿大夫卒年七十四先是荆州城局參軍吉士瞻因浚萬人仗庫防火池得金革鈎隱起文曰錫汝金鈎既公且侯士瞻妻詳之兄女乃竊與詳詳喜佩之及是革命詳果封侯而士瞻不錫茅土蔡道恭字懷儉南陽冠軍人父彬宋益州刺史道恭纍戰功為南康王中兵參軍義兵起和帝即位遷右衛將軍天監初論功臣封漢夀侯司州刺史魏攻圍之相持百日內外相拒道恭疾篤以後事付兄子野其年五月卒魏攻陷之後詔購其喪葬襄陽子淡嗣楊公則字君翼冀州天水人父仲懷豫州刺史公則為宋義熙太守氐賊攻陷白馬城公則單馬逃歸為西中郎參軍蕭穎胄協同義舉以公則為輔國將軍率衆東下初荆州諸軍皆取其節度與高祖會平建康高祖立進號平南將軍封寧都縣侯假節北討至夀春疾篤卒年六十一諡曰烈侯子㬓嗣鄧元起字仲居南郡當陽人少有膽氣膂力過人性任俠好施鄉里多附之以軍功遷武寧太守大破魏軍於義陽高祖起義率衆與高祖會夏口纍進破城邑至京師築壘於建陽門外及建康平封當陽侯進號左將軍益州刺史入蜀平成都送益州刺史劉季連歸京師高祖大悅進元起平西將軍元起臨軍並稱善政口不論財色性能飲酒至一斛不亂及是蜀土大治翕然稱之二年以母老乞歸徴為右衛軍以西昌侯蕭深藻代之後深藻表其逗留以不憂軍事下獄自縊死子鏗嗣張𢎞策字真簡范陽方城人文獻皇后之從弟𢎞策幼以母憂三年不食鹽菜兄弟友愛雖各有家室皆常同卧起不歸私室時稱為薑肱兄弟常從高祖入其室覺有煙雲之氣體輒肅然𢎞策由此特加敬異建武中𢎞策因問家國吉凶高祖曰明年都邑亂死人如麻齊之厯數自兹已矣梁楚鄧荆漢有英雄起焉𢎞策曰聖人何在為己富貴為在草澤中高祖笑曰光武有言安知非僕𢎞策起曰是天意也及高祖代曹武監雍州事𢎞策心喜曰昔夜之言今將驗矣高祖笑曰舅勿多言乃從之雍五年齊明帝崩初詔高祖為雍州刺史乃表𢎞策為録事參軍襄陽令高祖密為儲備謀猷唯𢎞策而已義師起以𢎞策為輔國將軍主領萬人督後部事建康平高祖使與吕僧珍入清宫掖封府庫遷衛尉卿洮陽縣侯東昏餘黨因運荻炬束仗得入南北掖門至夜作亂燒神獸門總章觀入衛尉府而害𢎞策年四十七高祖慟哭贈車騎將軍子緬嗣庾域字司大新野人為梁州録事參軍華陽太守魏攻南鄭州有空倉數十間域手自封題指目將士曰此中粟皆滿可支二年衆心乃安虜退高祖起義兵書招域為西臺領行選從高祖東下而和帝加高祖黃鉞天監初為巴西梓潼二郡守封廣收縣子卒於郡鄭紹叔字仲明滎陽開封人少結高祖為心腹高祖起兵為冠軍將軍從東下平江州留紹叔督糧運無闕天監初入為衛尉卿封東興縣侯初義陽為魏所陷司州移鎮南鄭以紹叔為司州刺史至郡創立城郭修兵器開田畝百姓安之入為左衛將軍司豫大中正疾篤詔還家卒贈東園祕器子真嗣吕僧珍字元瑜東平范人世居廣陵起自寒賤幼人相之曰此兒有竒聲封侯之相及長身長七尺七寸容貌甚偉事梁太祖為門下書佐及高祖臨雍州命為中兵參軍委之心膂乃隂養死士歸者甚衆高祖按行起造多伐竹木以茅覆之若山焉僧珍獨悟之私具櫓數千張義兵起召僧珍及張𢎞策定議明旦發兵用為步兵校尉出入卧內宣通意旨及進每為前鋒平京邑高祖受禪拜冠軍將軍封平固縣侯入直中書省總知宿衛天監四年高祖欲賞之使為本州持節平北將軍南兖州刺史在任不私親戚從父兄子光以販蔥為業而欲求官僧珍曰吾荷國重恩無以報效汝等自有常分豈可妄求叨越但當速返蔥肆姊適王氏住在市西小屋臨路僧珍常導從鹵簿到其處不以為恥在州百日徴為領軍十年病卒柳惔字文通河東解人也父世隆齊司空惔仕齊為西戎校尉梁秦二州刺史高祖起義舉漢中應之高祖遷右僕射湘州刺史曲江侯卒子照嗣韋睿字懷文京兆杜陵人漢丞相賢之後世為三輔著姓祖玄隱長安南山袁顗為雍州刺史引為主簿纍遷上庸太守高祖起義督率郡人伐竹為筏倍道來赴有衆二千馬二百匹高祖見之喜曰他日見君面今日見君心吾事就矣及至郢城顧睿曰棄騏驥而不乘焉遑遑而更索即日拜江夏太守行郢州事及即位遷輔國將軍豫州刺史封梁都子天監五年魏中山王元英圍北徐州吕義之於鍾離高祖召睿與曹景宗救之睿乘素木輿執白角如意以麾軍遂大破魏兵元英脫身走軍人投水死者十餘萬所獲軍資牛馬不可勝數以功封平北將軍宣武校尉雍州刺史睿初起義鄉里客隂俊光泣以止睿睿還為本州俊光於道左祇候睿笑謂俊光曰若從公言今乞食於路矣餉牛十頭徴入為散騎常侍入直殿省居朝廷恂恂未嘗忤視高祖甚禮敬之除護軍居家俸賜悉分親戚卒於家子放嗣范雲字彥龍南都舞隂人善屬文能尺牘下筆成文父抗為郢府參軍雲起家為郢州西曹書佐齊竟陵王為丹陽尹用為主簿與高祖同遇於竟陵西邸及高祖起義定京邑東昏誅雲在城內銜命出高祖留之參帷幄拜黃門侍郎與沈約同心輔贊後遷侍中柴燎南郊還雲參乘高祖升輦謂雲曰朕之所謂凛乎若朽索之馭六馬雲曰亦願陛下日慎一日高祖善之是日遷常侍吏部尚書以佐命功封霄城縣侯以舊恩見拔初高祖常與雲同宿顧嵩舍嵩妻産有鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心高祖高祖定東昏納其妃余氏頗廢政事雲與王茂切諫之曰昔漢祖居山東貪財好色及入關定秦財帛不取子女不幸范增以為其志大故也今明公始定天下海內想風望聲奈何襲昏亂之迹以女德為纍王茂因起拜曰范雲之言是望明公以天下為念高祖默然雲便疏請以余氏賚王茂高祖意許之後遷左僕射任寄隆重書牘盈案賔客滿門雲皆應對如流無所擁滯官曹文墨發摘如神及卒高祖臨之有集三十卷子孝才嗣江淹字文通濟陽考城人少孤而好學沉靜少交遊善屬文起家宋南徐州從事宋建平王景素好士淹隨在南兖州廣陵令郭彥文犯罪下獄辭連淹言受金繫之淹自獄中上書曰昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者也下官聞仁不可恃善不可依始謂徒語今乃知之伏願大王暫停左右少加矜察下官本蓬户桑樞之人布衣韋帶之士退不飾詩書以驚俗進不買名聲於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賓備鳴盜淺術之餘預三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黃金之賜竊感豫讓國士之分矣常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身陷幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沉隂左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於簾肆之間卧於巖石之下次則結綬金馬之庭高議雲臺之上次則虜南越之君係單于之頸俱啓丹册並圖青史寧爭分寸之末競錐刀之利哉下官聞積毁銷金積讒糜骨逺則直生取疑於盜金近則伯魚被名於不義彼之二才猶或如是况在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯竒節之人燕趙悲歌之士乎方今聖厯欽明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義照景飲醴而下官抱痛圓門含憤獄户一物之微有足悲者仰惟大王少垂明白則梧邱之魂不愧於沉首鵠亭之鬼無恨於灰骨景素得書即日出之尋舉南徐州秀才對策高第少帝即位多失德景素專據上流衆咸勸因此舉事淹每陳流言納禍二叔所以同亡抵局銜怨七國於焉俱斃景素不納後高祖輔政聞其才名召為駕部郎中時荆州刺史沈攸之作亂兵強帝憂悶謂淹曰天下紛紛若是君謂何如淹對曰昔項強而劉弱袁衆而曹寡羽令諸侯卒受一劍之辱紹跨四州竟為奔北之虜此謂在德不在鼎公何疑焉且公雄武竒略一勝寬容仁恕二勝賢能畢力三勝民望所歸四勝奉天子而伐叛逆五勝彼且志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也縉紳不懷四敗也懸兵數千里而同惡相濟五敗也雖豺狼十萬而終為我獲焉帝笑曰君談過矣高帝相國建為記室參軍而掌詔册表記典國史少帝即位為御史中丞多所糾彈內外肅然明帝輔政謂淹曰自宋世已來不復有嚴明中丞今日可謂獨步矣明帝即位遷祕書監及高祖義軍入淹微服來奔高祖遷吏部尚書天監元年為左將軍封臨沮縣伯謂弟子曰吾平生言止足之事亦已備矣功名既立只欲歸身草莽其年疾遷金紫光祿大夫卒淹以文章名顯晚年才思稍退時人謂之才盡所著述百餘篇自撰為前後集并齊史十志並行於世淹嘗為宣城守罷歸泊禪靈寺渚夜夢一人稱張景陽謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰郍得割截都盡顧見邱遲謂曰餘此數尺既無用乞君淹自此文章躓矣又嘗宿冶亭夢一人自稱郭璞曰吾有筆在卿處可相還淹探懷得五色筆以授之爾後為文不復麗美矣後梁中宗宣皇帝中宗宣皇帝諱察字理孫武帝之孫昭明太子統第三子幼好學善屬文尤長佛義特為武帝所賞封嶽陽郡王知石頭戍事昭明薨武帝捨察兄弟而立簡文帝綱內常愧之後以會稽人物繁富一郡之會遂以察為東揚州刺史用慰其心察以昆季不得為嗣常懷不平又以武帝衰老朝多粃政有敗亡之漸遂蓄聚貨財門通賔客招募輕俠折節下士有勇敢者故多歸焉中大同元年除都督雍梁五州軍事校尉察以襄陽形勢之地又武帝創基之所時平足以樹根本戰伐可以圖霸功遂尅已勵節樹恩於百姓務修刑政志在綏養於是境內稱治太清二年武帝以察兄河東王譽為湘州刺史而張纘為雍州以代察纘恃其才望志氣輕驕輕察少年州府迎候有闕察銜之及至鎮乃託疾不與纘相見後聞侯景作亂頗凌蹙纘纘懼為所擒乃輕舟夜遁將之雍部復慮察拒之元帝時鎮江陵與譽各率所部領入援京師至江口屬侯景請和詔止援軍譽自江口將旋湘鎮纘時在江陵貽梁元帝書曰河東今戴檣上水欲襲江陵嶽陽在雍共謀不逞元帝甚懼乃鑿船沉米斬纜而歸令其子方等與王僧辨相繼攻譽譽告急詣察察大怒纘將述職至州察遷延不授替乃以西城居之軍民之政猶歸於察察以構其兄弟事始於纘將密圖之其將杜岸招纘出奔纘乃服婦人衣乘青布輿與親信十人出杜岸馳報察察遣兵討擒之乃率衆兵二萬騎千匹伐江陵以赴之元帝大懼乃遣參軍庾奐謂察曰正德以亂天下崩離汝復效尤將欲謂何吾家先宫遺愛故以汝兄弟見囑今以姪伐叔道復安在察謂奐曰家兄無罪屢見攻圍同氣之情豈可坐觀成敗叔父若顧先宫豈應若是如能追兵湘水吾便旋斾襄陽察攻江陵柵不尅其將杜岸懼察不振以其屬降於江陵察衆大駭其夜遣歸襄陽察既與江陵構隙恐不能自固時西魏恭帝二年乃遣人稱藩於西魏請為附庸魏相周國公宇文泰會於丞相府東閣祭酒榮權使焉元帝使柳仲禮率衆圍襄陽察懼乃遣其妻王氏世子寮為質請救周公遣關麻楊忠等率兵援之楊忠擒柳仲禮於漴頭察乃獲安周公使察表嗣位察以未有璽命辭不敢周公令常侍鄭穆及榮權持節册命察於襄陽升壇受拜置百官承制恭帝三年三月察留蔡大寶居守乃自襄陽朝西魏魏相周公宇文泰薨子覺嗣十二月晦日魏恭帝禪位周王宇文覺稱後周號元年都長安稱大周天王正月謂梁王來此欲相見乎遂召見因説周王伐江陵周乃使太尉長孫儉萬紐于謹征江陵戕元帝乃立祭為梁王居江陵東城資以一州之地其襄陽之地統歸之於周察稱皇帝即位於江陵改年號大定元年稱後梁追尊父統為昭明皇帝廟號高宗統妃蔡氏為昭明皇后又尊其所生龔氏為皇太后立妻王氏為皇后巋為皇太子上疏於周明帝育頻年稱臣用其正朔爵命服色自依梁典周明帝乃使梁王立統嗣居於東城號曰助防初平江陵察將尹德毅説察請周太尉長孫儉將軍萬紐于謹等為歡宴彼無我虞因伏武士執之於是分命德毅掩其營壘斬馘逋周俾無遺類惟江陵百姓撫而安之王僧辨之徒折簡可致然後朝服濟江入踐皇極此萬世一朝也晷刻之間大功可立察不從之曰卿之此策非不善也然周待我甚厚未可背約若如卿計則鄧祁侯所謂人不食吾餘也既而闔城長幼被虜入關反失襄陽之地察乃追悔深恨不用尹德毅之言以至於此又見邑居毁壞干戈日用恥其威略不振常懷憂憤乃著改恥賦以見意察在位八年年四十四當後周武帝保定四年薨羣臣葬於平陵諡曰宣帝廟號中宗察少有大志不拘小節雖名猜忌而知人善任撫下將士有恩能得其死力性不飲酒安於儉素又惡見婦人雖相去之數尺遙聞其臭經御婦人之衣不復更著又惡見人毛髮所幸者必方便以避之著文集十五卷內典華嚴般若法華金光明義疏四十六卷並行於世疆土既狹居常怏怏每誦老馬伏櫪志在千里列士暮年壯心不己未嘗不盱衡扼腕歎吒者久之遂以憂憤發背疽而薨世宗孝明皇帝世宗孝明皇帝諱巋字仁逺中宗第三子大定元年立為太子八年宣帝崩太子即位號天保元年春正月尊祖母龔氏為皇太后所生曹貴妃為皇太妃至五年春正月陳湘州刺史華皎巴州刺史戴僧朔來附乃請伐陳巋乃求周師勢援大為陳將吳明徹所破徹進逼江陵引江水灌城明帝出頓紀南王操合周軍共以擊之明徹遂退明帝乃復入江陵六年即陳光太二年陳文帝弟安城王頊廢少帝伯宗為臨海王自立為宣帝七年八月陳又遣司空章昭達來冦明帝與周將陸騰同破之以華皎為司空以僧朔為車騎將軍九年十年使華皎入周周以基平鄀等數州歸於梁是嵗周誅宇文護周改元建德十一年十二年周武廢佛道二教著短穿衣十三十四十五年周高祖武帝平北齊封齊天子高緯為溫國公傳國璽入周明帝入周賀平鄴周武帝厚加禮送十六年周武帝崩十七年周宣帝贇禪位於太子衍衍立是為靜帝十八年十九年周靜帝禪位於隋公楊堅堅封周帝為介國公二十年是嵗隋開皇二年隋朝營新都於隴首川是嵗陳宣帝頊崩太子叔寶立隋文帝遣使以禮聘明帝女為晉王廣妃又以明帝子尚隋蘭陵公主遂通好焉後使隋隋加禮相待特使謂梁主久滯荆楚未復舊都故鄉之念良軫懷抱朕當振旅長江相送旋斾耳二十一年陳之至德元年二十二年二十三年五月帝崩在位二十三年年四十四葬顯陵諡曰孝明皇帝廟號世宗帝性機辨有文學撫御能得其下歡心孝悌仁慈有仁君之量四季祭享未嘗不悲慕流涕尤儉約御下既有方境內共言其治邦國無事所著文集及孝經周易義記及小大乘幽微並行於世莒公諱琮字溫文性倜儻不羈博學有文義立為皇太子天保二十三年五月帝崩即帝位改號廣運元年二年率其臣下二百餘人朝隋隋文帝留之使武鄉公崔𢎞度將兵攻江陵江陵不守帝叔父巖及弟瓛等舉居人奔於陳隋拜琮為柱國將軍封莒國公自宣帝察即位大定元年乙亥至琮廣運二年丁未凡三十三年察子嶚巖岌岑俱為王巋子瓛瑑璟珣瑒瑀並皆為王自後梁之興蔡大寶為股肱王操為心腹魏益德尹正薛暉許孝敬薛宣為爪牙甄元成劉盈岑善方傅淮褚圭蔡大業典衆務張綰以舊齒歷顯位沈重以論學蒙厚禮自餘多所奬拔咸盡其器任及明帝纂業親賢並用為將相故保其疆土安於民人後梁功臣蔡大寶字敬位濟陽考城人父點梁尚書儀曹郎大寶少孤而篤學不倦能屬文察初出第徐勉之薦為侍讀兼管記室察蒞襄陽遷咨議參軍及元帝伐湘東王譽使大寶於江陵元帝悅之使注所製玄覽賦三日而畢元帝大竒之及察為梁王拜吏部尚書軍國之事咸委決焉及宣帝即位拜太子少傅明帝嗣位册司空卒性嚴整文學詞贍內外誥令皆掌之人云宣帝有大寶猶蜀先主之孔明著文集三十卷撰尚書義訓王操字子高其先太原晉陽人宣帝龔太后之外弟父景休臨川內史操性敦厚有籌略博涉經史初為帝外曹參軍及即位遷大將軍郢州刺史明帝即位授尚書僕射及陳將吳明徹為冦帝出頓南紀操巡撫將士莫不用命江陵獲全操之力也及卒明帝舉哀流涕曰天不使吾平蕩江表邪何奪吾相之速也宋如周南陽人有才學容止詳雅為度支尚書如周面狹長宣帝嘗戲之曰卿何謂謗法華經如周踧踖自陳不謗帝又言之如周不悟而出言告蔡大寶大寶知其旨笑謂之曰君當不謗餘經止應不信法華法華云聞經隨喜面不狹長如周乃悟如周素寬雅有才子希顔最知名袁敞陳郡人祖粲宋司空父士俊安城內史敞少有器量博涉經史以吏部尚書使於周初主者以敞班在陳使之下敞固不從命曰昔陳之祖父乃梁朝諸侯之下吏棄忠與義盜有江東今之朝宗萬國以禮若使梁之行人在陳使者之後恐彞倫失序非使臣之所望焉周武帝乃謂敞與陳使人異日而進使還稱旨遷侍中後隨琮入隋授譙州刺史岑善方字思逺南陽人漢征南將軍舞隂侯彭之後祖惠甫齊南彭城太守父昶梁散騎常侍善方少立志操雅重名節為當世所許拜嶽陽王記室參軍及宣帝即位纍遷中書舍人與蔡大寶分典機務帝常推心焉拜吏部尚書數使於周稱旨拜驃騎大將軍儀同三司封長寧公卒有子六人元之象之利之仕隋邯鄲令文本最知名建康實録卷十八
