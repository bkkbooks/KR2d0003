body:
  text: 建康實録卷十六唐許嵩撰齊列傳王琨琅琊人祖薈父懌以侍婢生初琨名崑崙懌後娶南陽樂元女無子故名琨立為嗣少謹篤為從伯父司徒謐愛重官至尚書初為吏部郎不受私囑出為建威將軍平越中郎將廣州刺史宋順帝即位進右光祿大夫順帝遜位百僚陪列琨攀畫輪豹尾慟泣曰人以夀為歡老臣以夀為戚既不能先驅螻蟻頻見此事嗚噎不自勝百官人人雨淚齊高帝即位領武陵王師加侍中時王儉為宰相屬琨用東海郡迎吏琨使謂曰語郎三臺五省皆是郎用人外方小郡當乞寒賤省官何容復奪之遂不過其事尋解王師及高帝崩琨聞國諱牛不在宅去臺數里遂步行入宫朝士皆謂曰故冝待車有損國望琨曰今日奔赴皆自應爾遂得病卒贈左光祿大夫年八十四琨謙恭謹慎老而不渝朝會必早起簡閲衣裳料數冠幘如此數四或為輕薄所笑何戢字惠景廬江潛人祖尚之宋司空父偃金紫光祿大夫戢尚宋孝武山隂公主主就帝求褚淵內侍淵乃與戢同居歲餘終不從主意由是厚申情好纍至吏部尚書戢美容儀動止與褚淵相慕時人呼為小褚公初孝武賜戢蟬雀扇善畫人顧景秀所畫時吳郡陸探微顧彥先皆能畫嘆其巧絶戢因王晏獻之上令晏厚酬其意卒年三十六王延之字希季琅琊人父升之宋都官尚書延之出繼伯父粲之從少靜默不交人事舉秀才纍至吳郡守入為左僕射宋祚衰太祖輔政朝野之間人懷彼此獨延之與王僧虔中立無所去就世人語曰二公治平不送不迎太祖善之出為安南將軍江州刺史與阮韜俱是宋領軍劉湛外甥並有才譽湛愛之曰韜後當為第一延之次焉延之甚不平遷中書令轉特進卒子綸之位至侍中阮韜字長明陳留人也晉散騎常侍金紫光祿大夫裕玄孫也初宋孝武選侍中四人須有風貌王彧謝莊為一雙韜與何偃為一雙常充兼假領始興王師永明二年卒張緒字思曼吳郡人祖茂度會稽太守父寅太子中舍人緒少知名叔父鏡謂人曰此兒今世樂廣也舉秀才袁粲言於明帝曰臣觀思曼有正始之遺風冝為宫職拜侍中中書齊建元元年轉中書令王儉嘗謂人曰北士中覔張緒過江未有也不知陳仲弓黃叔度能過之否劉悛之為益州刺史獻蜀栁數株枝條甚長狀若絲縷帝命植於太昌靈和殿前因宴玩賞咨嗟曰此栁風流可愛甚似思曼少年以緒為太常卿國子祭酒用王延之代緒為侍中中書令世人以此選得人比晉朝用王子敬代王季琰也世祖位為吏部尚書初緒每朝見太祖目送之謂王儉曰緒以位尊我我以德貴緒緒口不言利家不蓄財不受私囑若清談端坐或竟日不食卒年六十八遺命作蘆葭轜車靈床置杯水香火從弟融敬重事之如親兄置酒於靈前酌酒慟哭曰阿兄風流頓盡子克嗣虞玩之字茂瑶會稽人祖宗晉庫部郎父玫通直常侍玩之少間刀筆涉書史官至左丞上表陳府庫錢帛器械用度慮不支嵗月太祖輔政鎮東府朝廷致敬玩之猶躡屐造席太祖取屐視之訛黑斜鋭蒵斷以芒接之問曰卿此屐已幾載玩之曰三十一年矣初拜征北行佐所買貧士竟未辦易太祖善之因賜新屐不受曰著精日久弊不可捐所以不當殊賜纍位驍騎將軍黃門侍郎世俗多巧偽玩之請置校籍官以防之年老有疾請退表曰四十仕進七十懸車壯即驅馳老冝休息知足不辱臣知足矣授命於道消之辰效節於百揆之日忠之效也慶隆於文明之初荷澤於龍飛之運命之偶也不謀巧宦而位至九卿德慚李陵而忝居門下堯舜無窮民臣亦通矣年過六十不為天矣榮期之三樂東平之一善臣俱盡之矣上省表許之東歸王儉不出送朝廷無祖餞者歸鄉造大宅數年後卒貟外郎孔瑄就儉求會稽王官儉方盥潄投皂莢於地曰卿鄉俗惡虞玩之至死煩人劉休字引明沛郡人父超九真太守休初為宋明帝東國常侍轉征北參軍帝頗有好尚尤嗜飲食休多藝能爰至鼎味問無不解遂見親賞長直殿內帝素肥痿不能御內諸王妓妾懷孕者密使獻之入宫生子乃幽其母順帝是桂陽王休範子蒼梧王亦非帝子乃陳太妃先為李道兒妾故後蒼梧王微行每自稱曰李將軍帝憎婦人妬忌朝官妻有妬者必為鞭捶休妻王氏亦妬帝使人就宅鞭二十後令開小店使王氏賣掃帚皂莢以辱之休卒豫章太守謝超宗陳郡陽夏人祖靈運父鳳宋元嘉中因事徙廣州超宗元嘉末方還好學有文章與惠休道人往來孝武出䇿秀孝格五問並得為上作殷淑儀誄孝武見歎曰超宗殊有鳳毛恐靈運再出為太祖長史坐公事免自詣東府門通謝其日風寒慘厲太祖謂四坐曰此客至使人不衣自暖矣超宗即坐飲酒數甌辭氣橫出太祖對之甚歡太祖即位轉黃門侍郎在直省常醉上忽召見語及北方事超宗曰虜動來二十年佛出亦無奈何以失儀出為南郡王司馬後以怨望免官十年禁錮後司徒禇淵送湘州刺史王僧虔閣道壞墜水僕射王儉失驚跣下車超宗撫掌笑曰落水三公墜車僕射前後言誚布在朝野及淵出水沾濕超宗又笑曰有天道焉天所不容地所不受投畀河伯河伯不用淵大怒曰寒士不遜超宗曰不能賣袁粲焉得免寒士以張敬兒女為子妻帝甚疑之及收下廷尉一宿髮盡白詔徙越州自盡劉祥字顯徵東莞莒人父敳太宰從事祥為宋巴陵王參軍少好學性剛疏輕言肆行不避高下建元中司徒禇淵入朝以腰扇鄣日祥從側過曰作如是舉止羞面見人扇障何益撰宋書譏斥之為臨川王驃騎從事初王奂為僕射與奐子融同載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆可為令僕矣著連珠詞十五首以寄懷云希世之寶違世必賤偉俗之器無聖則淪是以明璧黜於楚岫章甫窮於越人上令御史任遐奏付廷尉徙廣州不得意縱酒而卒虞琮字景豫會稽餘姚人父秀之黃門侍郎琮有謹行初世祖始為從事家甚貧薄琮推國士之眷數相分與行必呼帝同載上甚德之升明中為世祖中兵咨議家冨奴婢無遊手者雖在南土而會稽滋味無不畢至及明帝即位琮乃辭疾不陪位帝使尚書令王晏齎廢立事示琮以琮舊德引參佐命琮謂晏曰主上聖明公卿戮力寧假朽老臣贊惟新乎不敢聞命徐孝嗣曰此亦古之遺直也衆議乃止稱疾篤求東歸轉光祿大夫卒蕭赤斧南蘭陵人太祖從祖弟父始之冠軍參軍赤斧歷官謹慎為太祖所知太祖輔政順帝遜位于丹陽故所立宫上令赤斧監送至薨乃還遷雍州刺史在公勤奉公事封南豐伯永明三年卒家貧無絹為衾上聞之轉賻錢五萬材一具布百匹子頴胄字雲長𢎞厚有父風起家太子舍人從太祖登石頭烽火樓賦詩稱旨和帝出荆州以頴胄為冠軍將軍行荆州事初雍州刺史梁王起義書與頴胄勸同舉兵頴胄未決而朝廷使巴西太守劉山陽領兵三千上荆州就頴胄謀襲雍州梁王又使王天虎等楊聲云劉山陽西上并襲荆雍遂與梁王定謀斬天虎首送山陽發兵及百姓車牛往襄州山陽上就頴胄頴胄使岷山太守劉孝慶伏兵斬山陽首送梁王梁王發兵留頴胄知後事檄告京師永元三年正月立和帝於荆州初荆州大風雨龍入柏齋中柱壁上有爪足處刺史蕭遙欣恐不敢居至是南康王寶融立為和帝遂以為嘉瑞殿中興元年三月遷頴胄為中書令領吏部監八州軍事荆州刺史八月魯休烈蕭璝破汶陽至上明荆土尚振頴胄遣軍主蔡道恭假節屯上明拒璝十二月頴胄憂慮發氣卒和帝密詔梁王報頴胄凶祕不發喪年始四十及城平定識者聞之知天命之有在矣梁天監元年追封巴東郡公劉瓛字子圭沛國相人晉丹陽尹惔六世孫父惠治書御史瓛初舉秀才丹陽尹袁粲坐在後堂指庭前栁樹謂曰人謂此是劉尹時樹每想髙風今復見卿清德可謂世不衰矣薦為祕書郎太祖即位纍至總明觀祭酒會稽郡丞從學者數百人瓛姿狀纎小而名冠當朝京師士子莫不下席受業瓛性謙下不以高名自處居住檀橋有屋數間上皆穿漏學徒不敢指斥呼為清溪焉竟陵王子良親往謁之表世祖為立館以楊烈橋故主第給之生徒皆賀瓛曰室美豈為人哉華宇豈吾宅也未徙居遇疾卒年五十六瓛有至性年四十未有婚對後娶王氏尋又出之梁天監中武帝為立碑諡曰貞簡先生弟璡字子敬性方軌正直初為武陵王煜參軍煜與寮佐飲自割鵝炙璡曰殿下親執鑾刀下官未敢安席因起請退嘗與友人孔徹同舟徹留目觀岸上女子璡舉席自隔不與同坐兄瓛嘗夜隔壁呼之璡初不應答方下牀著衣行及簾外然後應之瓛怪其久璡曰向者束帶未竟恐乖禮也卒射聲校尉陸澄字彥淵吳郡人祖劭臨海太守澄少好學行坐眠卧手不釋卷起家太學博士以評議經典遷祕書監初竟陵王子良得古器小口方腹而底平可容七八升以問澄澄曰此名服匿昔單于以與蘇武子良後細視器底有字髣佛可識如澄所説以老疾轉光祿大夫卒年七十世稱碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書厨也張融字思光吳郡人父暢宋會稽太守融年弱冠同郡道士陸修靜以白鷺羽麈尾扇遺融曰此既異物以奉異人仕宋為封溪令被獠賊執將欲殺之融神色不動方作洛生詠賊異之而不害嘗泛海至交州於海中遇風終無懼色方詠曰乾魚自可還其本鄉肉脯復何為者哉又作海賦還示顧愷之愷之曰此賦實超元虛但恨不道鹽耳融立取筆注之曰漉沙構白熬波出素積雪中春飛霜暑路此四句後足也融嘗與王僧虔書曰融天地之逸民也進不辨貴退不知賤兀然造化忽若草木每自歎曰不恨我不見古人恨古人不見我善草𨽻書自號其能太祖尤善之見融常笑曰此人不可無一不可有二與何戢善常往詣戢為從者誤通尚書劉澄宅融入門乃曰非是至戶外望澄又曰非是既造席熟視澄良久曰都不是乃出其為異如此遷司徒從事中郎假東出世祖問所住止曰臣陸居無屋舟居無水上問融從兄緒緒曰融近東出未有居處權牽小船於岸上住上大笑北虜聞融名上使融往對北使李道固曰張融是宋彭城長史張暢子否融嚬蹙久之曰先君不幸名播六夷豫章王大會賔寮融食炙始畢行人便去融欲求鹽蒜口終不言方搖食指半日乃息出入朝廷皆拭目觀之性孝義母忌月三旬皆不聽音樂司馬竺超民嘗救其父暢之難後超民有孫微冬月遭母喪家貧融往弔之悉脫身上衣以賻之披牛衣而還建武四年卒周顒字彥倫汝南安城人晉光祿大夫顗七世孫祖虎頭貟外散騎常侍父恂顒少為族祖朗所知府臺立為殿中郎音辭雅麗出言不窮尤長佛理著三宗論嘗於鍾山西立隱舍休沐則歸之清貧寡欲終日長蔬雖有妻子獨處山舍甚機辨衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘轉國子博士兼著作太學諸生慕其風爭事華辨始著四聲切韻行於時後卒於官蕭坦之南蘭陵人也父欣有功於世祖至武進令坦之與蕭諶同族初為殿中參軍以文惠見用纍位侍中領軍髙宗崩東昏立而始興王遙光謀反坦之自淮南岸夜踰墻科頭著裩走歸宫城假節督衆軍討遙光屯湘宫寺事平遷尚書左僕射丹陽尹進封公二十餘日帝使延明主帥黃文濟領兵圍其宅誅之坦之肥黑無鬚語聲嘶時人號蕭啞剛狼專執羣小畏而憎之謝草瀹字義潔陽夏人祖宏微宋太常父莊金紫光祿大夫草瀹七嵗王彧見而異之言於宋孝武禇淵以女妻之初兄朏為吳興郡草瀹送别朏指草瀹口曰此唯冝飲酒故建武朝專以長酣為務方得夀終草瀹拜車騎參軍以明帝廢鬱林即位宴羣臣尚書令王晏等與席草瀹獨不起曰陛下受命應天從人王晏以為已力獻觴遂不見報上大笑解之及王晏初得班劒草瀹謂之曰身家太傅裁得六人君亦何事一朝至此晏甚憚之謂江祐曰彼上人者難為酬對帝起禪靈寺敕草瀹為碑文永泰元年卒徐孝嗣字始昌東海郯人祖湛之父聿之並為宋元凶所殺初孝嗣在孕母年少欲更嫁不願有子自牀投地及服藥令胎墜而更堅及生小字遺奴而挺立風儀端簡年八嵗襲爵枝江縣侯尚孝武樂康公主除著作郎太祖建元初兼侍中王儉目之為宰相才轉御史中丞纍至吏部尚書臺閣事悉以委之王儉卒後為五兵尚書明帝謀廢鬱林孝嗣奉旨即還家草太后令戎服隨入殿庭於袖中出太后令明帝大恱即位後加中軍大將軍定䇿元勳進爵為公孝嗣性好學器量宏雅不以權勢自居建元之世恭已自保朝野稱之孝嗣初在率府晝卧齋北壁下夢兩童子遽云移公牀驚起走數步壁尋崩壓牀建武四年加開府儀同三司明帝崩受遺託輔幼主東昏即位多失德孝嗣不敢諫之江祐見誅內懷憂懼進拜司空初虎賁中郎將許準有膽力領軍𨽻孝嗣陳説事機勸行廢立孝嗣弗能決羣小反憎惡遂勸帝除之其冬被召之華林省遣茹法珍賜藥酒孝嗣容色不變少能飲酒飲藥至斗餘卒年四十七長子尚世祖女永康公主第三子尚明帝女山隂公主並同見殺中興元年和帝詔贈孝嗣太尉子緄緄子君蒨仕梁湘東王嘗出軍有人將婦從役王曰才愧李陵未能先誅女子將慙孫武遂欲驅戰婦人君蒨應聲曰項籍壯士猶有虞兮之歌紀信成功乃資姬人之力竟卒於官沈文季字仲達吳興武康人父慶之宋司空孝建二年文季起家州主簿景和之難兵人圍宅文季揮刀馳馬而去收者不敢逼遂得免明帝立遷黃門侍郎文季飲酒至五斗妻王錫女亦飲三斗對飲竟日而視事不廢風彩稜岸善於進止升明元年沈攸之反文季為冠軍將軍督錢塘軍事文季殺攸之弟及宗族盡滅之銜景和之害也齊建元初為太子右衛率封南豐侯世祖即位轉太子詹事世祖謂文季曰南土無僕射多歷年所文季對曰南風不競非復一日尤善應對能博簺及彈碁簺用五子也遷中護軍以家為府延興元年遷左僕射明帝加尚書令東昏即位多行殺戮方知世亂乃辭以老病後與徐孝嗣見害於華林省年五十八朝野寃之和帝中興追贈司空兄子昭略至冠軍將軍與文季同召入省例賜藥酒昭略罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日即以甌投其面曰使作破靣鬼死時言笑自若年四十餘弟昭光亦見殺王慈字伯寶琅琊人司空僧虔子年八嵗外祖宋江夏王義恭於內齊施寶物恣任所取慈乃取素琴古硯義恭善之纍位侍中以腳疾齊武帝敕聽乘車在仗後自江左以來少此例也子觀尚世祖女吳縣長公主慈至冠軍將軍東海太守有女為江夏王鍏妃謝鳯子超宗嘗候僧虔仍往東齋詣慈慈正學書超宗曰卿書何如虔公慈曰我不及有如雞之比鳯超宗狼狽而退永明九年卒贈太常陸惠曉字叔明吳郡吳人晉太尉玩之玄孫也自玩至惠曉祖萬載世為侍中皆有名行惠曉伯父仲元又為侍中時人方之金張二族父子真仕宋為海陵太守惠曉清介正直不雜交遊張緒常曰此江東裴秀樂廣舉秀才歷諸府參軍世祖輔政除尚書殿中郎鄰族來賀惠曉舉酒曰陸惠曉年踰三十婦父領選始作尚書郎卿等以為慶耶自太傅祭酒出為武陵王征虜將軍與劉璡行至吳璡謂人曰吾聞張融與惠曉並宅其間有水必應異味遂命駕往酌而飲之曰飲此水則鄙吝之萌盡矣惠曉後遷竟陵王長史或謂曰長史貴重不宜妄自謙退答曰我性惡人無禮不欲以無禮處人又曰貴人不可卿而賤者乃可卿人生何用立輕重於懷抱終身常呼人官位以吏部為輔國南交州刺史何點常云陸惠曉心如照鏡遇形觸物無不朗然王思逺恆如懷氷暑月亦有霜氣世人謂之實録初欲用惠曉為侍中以形短小乃止有三子僚任倕各有美名王融字元長琅邪人祖僧達父道琰廬陵內史融少而神明警慧博涉有文才舉秀才自晉安王參軍遷祕書監中書郎永明末世祖欲北伐使毛惠秀畫漢武北伐圖融因此上疏并張北侵之議圖成上置琅邪城射堂壁上遊幸觀焉初世祖宴芳林圖禊飲令融為曲水詩序舉世稱之後遷中書郎嘗撫心歎曰為爾寂寂鄧禹笑殺人及北虜動竟陵王子良拔融平朔將軍以文藻捷速子良特相友善融躁於名位自恃人地三十內望為公輔嘗詣王僧祐遇沈昭略素未相識昭略顧眄謂主人曰是何年少融殊不平謂曰余出於扶桑入於濛谷照耀天下何人不知而卿有此問昭略曰不知許事且食蛤蜊融曰方以類聚物以羣分君長東隅居然應嗜此族其髙自標置如此世祖疾篤子良侍醫藥在殿內太孫未入融乃戎服坐省閣口斷東宫仗不得進欲矯詔立子良上既蘇召太孫入殿朝事委髙宗融乃去戎服坐省中歎曰公誤我鬱林即位十數日使中丞孔稚圭奏收下廷尉誅之年二十七文集行於世謝朓字元暉陳郡陽夏人祖述吳興太守父緯散騎常侍朓有美名文章絶世起家豫章王東閣祭酒纍至吏部郎善草𨽻長於五言詩沈約常云二百年來無此作也敬皇后遷袝山陵朓撰哀策文齊世莫有及者後江祐與弟祀及劉渢劉晏同候朓朓曰可謂帶二江之雙流以嘲弄之祐轉不堪至是構而害之詔暴其過惡收付廷尉又使御史中丞范岫奏收朓下獄死時年三十六孔稚圭字德璋會稽山隂人祖道隆位侍中父靈産晉安太守罷歸奉道於禹井山中立館明解星文太祖問沈攸之事言其必敗遷為光祿大夫餉白羽扇素隱几曰君性好古故遺古物稚圭少好學有美譽起家太祖記室與江淹對掌辭筆初江左用晉世張杜律二十卷稚圭刪注修改與竟陵王議務在從輕曰仲尼有言古之聽獄者求所以生之今之聽獄者求所以殺之與殺不辜寧失有罪則斷獄之職古所難矣圭表上律文二十卷國學置律助教依五經例策試上髙第便擢用之稚圭風韻踈清不樂世務居宅營小山慿几獨酌多飲七八斗旁無雜事門庭之內草萊不剪而多蛙鳴人問之曰欲為陳蕃乎稚圭笑曰我以此當兩部鼓吹何必效蕃王晏嘗鳴鼓吹候之聞羣蛙鳴曰此殊聒人耳圭曰我聽鼓吹殆不及此晏甚有慚色永元二年起為都倉尚書圭疾東昏屏除以牀輿走乃疾甚而卒崔惠景字君山清河東武城人也父系之司州别駕惠景為國子生仕宋至寧朔將軍齊受禪封樂安侯世祖即位進冠軍將軍東昏立遷輔國將軍初徐世標專權惠景備員而已及東昏誅舊臣宿將不得自安明年裴叔業以壽春降魏即授惠景平西將軍往壽陽軍頓白下將發帝長圍屏除出琅琊城送之帝戎服坐城樓上召景惠景單騎進圍內才交數言拜辭而去既出至廣陵北數十里召會諸軍頓軍廣陵停二日便濟江將衆襲京口江夏王寶元內應之合二鎮兵力奉寶元向京師軍到查硎竹塘人萬副兒善射能捕虎投説惠景曰今平路皆為臺軍所斷宜從蔣山龍尾上出其不意惠景從之遣人自西巖夜下鼓呌中臺軍驚散帝遣將軍左興盛率軍拒北籬門便退走惠景引軍入樂遊苑突進北掖門長圍逼內東府而石頭白下新亭皆奔惠景使擒興盛於淮渚荻舫中殺之燒蘭臺府署為戰場稱宣德太后令廢帝為吳王帝密召豫州刺史蕭懿軍主胡松李居士數千人自採石濟岸過頓越城舉火臺城中鼓吹稱慶惠景使子覺將兵渡南岸合戰覺軍大敗赴淮死覺單馬退皆詣城降惠景乃與腹心人潛至蟹浦為漁人所斬以頭內鰌籃中擔送京師年六十三先是東陽女子婁逞變服詐稱丈夫粗知圍棊解文義遍遊公卿門仕至揚州議曹從事事方泄明帝令東還始作婦人服歎曰有如此伎還為老姥豈不惜哉此人妖也隂而欲為陽事不果故泄敬則遙光顯達惠景之應也丘靈鞠吳興烏程人祖系祕書監靈鞠少好學善屬文舉上計為東州辟從事纍至東觀祭酒參軍掌國史靈鞠曰人居官願遷使我終身為祭酒不恨也永明二年為驃騎不樂武辨改為常侍性好酒及臧否人物在沈淵坐見王儉詩淵曰王令文章大進靈鞠曰何如我未進時也靈鞠宋時文名甚盛入齊拜車騎長史卒又著江左文章録序起元興訖元熙文集行於世檀超字悅祖髙平金鄉人祖宏宋琅琊太守超少好文學放誕任氣解褐為西州曹掾纍至國子博士自比晉郗超言髙平有二超又謂人曰猶覺我為優也建元二年初置史官以超為驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表立十志律厯禮樂天文五行郊祀刑法藝文依班固朝會輿服依蔡雍司馬彪州郡依徐爰百官依范曄合州郡班固五星載天文曰蝕載五行改日蝕入天文志以建元為始帝女體自皇宗立傳以備甥舅之重又立處士烈女等傳超史功未就而卒官江淹成之撰猶不備也時豫章熊襄著齊典上起十世其序曰尚書堯典謂之古書則附所述通謂之齊書名為河洛金匱衡陽元王道度太祖長兄與太祖同受業於雷次宗宣帝問二兒優劣次宗曰其兄外朗其弟內明皆良璞也為安定太守卒於宋世祖即位追封無子以太祖第十一子鈞為後鈞字宣禮好學常手細字書五經一部為一卷置之巾箱中侍讀賀玠問曰殿下家有墳索何須比蠅頭細書别藏巾箱答曰巾箱五經檢閲且易一更手書則永不忘諸王聞而爭效之為巾箱五經巾箱五經自此始也始安貞王道生太祖次兄宋奉朝請太祖即位追封為王建武元年追封為景皇妃江氏為景皇后立寢廟於御道西陵曰修安子鳯鸞鸞即明帝鳯字景慈宋正直郎卒追諡始安靖王改華林鳯莊門為望賢門子遙光嗣遙光字元暉生有躄足高宗崩遺詔輔東昏為侍中中書令明於吏事見東昏虐害乃與江祐兄弟謀自樹立弟遙欣擁兵上流死荆州還喪停東府遙光見江祐遇害憂懼遂收集二州部曲於東府門召丹陽尹告以討劉瑄為名破東冶出囚上方取器仗闕謂之尸解仙化焉還葬舊墓連理生其側世祖語歡諸子撰歡文義三十卷佛道二家立教無異而學者互相非毁歡著夷夏論又著三教論注王弼易二繫及孝經老子等臧榮緒東莞莒人也父庸國子助教緒幼孤躬自灌園以供祭祀純篤好學括東西二晉為一書紀録志傳一百一十卷隱居京口著五經序論常以宣尼生於庚子日其日陳五經以拜之自號被褐先生初與關康之俱隱京口四十年不出門世號京口二隱宗測字敬微南陽人宗徵士少文之孫少靜退家甚貧豫章王嶷徵為參軍不起測答府云何為謬傷海鳥橫斤山木母喪身貧負土植松柏嶷復遣書請之辟為參軍測答曰性同鱗羽愛止山壑眷戀松雲輕迷人路縱宕巗流有若狂者忽不知老至而今鬢已白豈容課虛責有限魚鳥慕哉永明三年詔徵太子舍人不就欲遊名山乃寫祖少文所作尚子平圗於壁上測長子賔宦在都知父此旨便求祿還為南郡丞付以家事刺史安陸王子敬長史劉寅以下皆贈送之測無所受齎老子莊子二書自隨子孫拜辭悲泣測長嘯不視遂往廬山止祖少文舊宅建武二年徵為司徒主簿不就卒吳苞亦隱士常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路臘燭一挺以照七尺之尸遂亡杜京産字景齊吳郡錢塘人杜子恭玄孫父道鞠州從事京産好恬靜專學黃老以潔淨為心廉虛成性通和發于天挺敏達表于自然隱太平山徵為貟外散騎常侍京産曰莊叟持釣豈為白璧所回辭疾不就年六十四卒徐伯珍東陽人少孤貧學書無紙常以竹葉及以鐡釘畫地學書兼明道術宅南九里有髙山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚柳柏望之五彩世人呼為婦人巖伯珍居之兄弟四人皆白首世呼作四皓俱年八九十卒武陵邵榮興八世同居建武三年明帝表其門閭義興吳達之嫂亡無以葬自賣為力夫以營棺塜建元三年詔表門閭樂頥之字文德南陽人世居南郡少性至孝飬母甘厚湘州刺史王僧虔引為主簿聞僚佐非人棄官而去初吏部郎庾杲之常候頥之為設食唯枯魚菜葅杲之曰我不能食此母聞之自出常膳魚羮數種杲之曰卿過於茅季偉我非郭林宗仕至郢州中從事江泌字士清濟陽考城人父亮之貟外郎江泌少貧晝日則斫屧為業夜乃讀書隨月光光斜則握卷升屋性行仁義衣弊虱多以綿裏置壁上恐虱飢死乃復置衣中食菜不食心以其有生意也為國子助教牽車至染烏頭見一老翁步行下車載之自徒步而歸建武中卒紀僧真丹陽建康人因蕭慧開之言故請事太祖太祖用為冠軍參軍僧真夢蒿艾生滿江驚覺以白太祖太祖曰詩人採蕭蕭艾也蕭生斷流卿勿言也其見親如此太祖初在淮隂治城得一錫趺長數尺下有篆文莫能識之僧真曰何須更辨文字久逺之物九錫之徵也太祖在淮隂令僧真視上手迹學署之至是報答書疏皆付僧真上觀之笑曰我亦不能辨太祖拜中書舍人封新陽縣男上臨崩令典詔敕為人有儒雅之風世祖常目送之笑曰人生何必計門户紀僧真堂堂貴人所不能及於諸權要最得顧眄母葬開基得兩頭蛇五色明帝即位以僧真歷朝驅使出為廣陵內史卒茹法亮吳興武康人宋大明中出身為小吏齊太祖用為冠軍府參軍世祖即位為中書通事舍人與呂文顯並以姦佞諂事武帝東昏立出法亮為大司農中書勢利之職法亮不樂去固辭不受既而代人已到法亮垂涕而去卒官呂文顯臨海人與茹法亮等迭出入為舍人並見親幸建元永光之世至尚書右丞少府卒北魏元魏丐奴種也姓拓拔氏披髮左袵亦呼之為索頭虜魏自什翼主始治平城猶逐水草無城郭未始土著立居處至佛狸破涼州黃龍徙其居民大築郭邑截平城四角起樓女墻不施屋城又無塹南門外立二土闕闕內立廟四門各隨方色凡五廟一世一間瓦屋其西立土社佛狸所居雲母等殿又立重屋居其上太子宫在城東亦開四門妃妾住土屋婢使千餘人織綾錦販賣逐利太官八十餘窖窖貯四五千斛城郭繞宫悉築為坊大者四五百家城西有祠天壇立四十九木人長丈許白幘練裙嘗以四月四日殺牛馬祭於城西三里刻石寫五經及國記也佛狸置三公太宰尚書令僕射侍中與太子決國事諸曹軍府悉署官貟皆使通知胡漢語以為傳譯蘭臺置中丞御史知城內事泰始五年萬民禪位子宏自稱太上皇宏立號延興元年至六年萬民死諡獻文皇帝改號承明元年即宋元徽四年也丁巳嵗改號太和元年宏聞齊太祖受禪其冬使丹陽王劉昶為太師來冦司州齊遣車僧朗使北虜虜問僧朗曰齊輔宋日淺何故便登天位僧朗曰虞夏登庸親當革禪魏晉匡輔貽厥子孫豈二聖促促于天位兩賢謙謙以獨善事冝各異寧得一揆茍曰事冝故屈已應物虜又問曰齊王有何功業僧朗曰主上聖性寬仁天識𢎞逺大定凶黨戮力佐朝三十餘年經綸夷險十五六載此功可謂極矣世祖即位虜使李道固報聘世祖於玄武湖水步軍講武登龍舟引見之自此嵗使來往疆場無事自佛狸已來稍漸華典平城南五十里有索干水定襄界世號為索干都土氣寒凝六月雨雪遂都洛仍使蔣少遊窺京師宫殿楷式而去九年將議遷都十年世祖使司徒參軍范雲蕭琛北使宏在西郊祠天壇處以繩相交結絡紐木枝棖覆以青繒形製平圎下容百人坐謂之為繖一云百子帳於此下宴飲朝臣及齊使宏皆自應接甚重齊人宏謂左右曰江南多好臣宏侍中李元凱對曰江南多好臣數嵗一易主江北無好臣百年不易主宏大慙十一年宏遣露布并遺世祖書稱南入世祖廣召募會世祖崩宏聞乃退師太和十七年八月使持節安南大將軍行尚書符騰詔皇師電擊旌旗南指誓清江祲志廓衡靄會行人審知彼有人故以春秋之義聞哀寢伐爰敕有司輟鑾止輅故以往示并遣使弔齊問諱隆昌元年齊遣使劉勃等聘宏宏是嵗徙都洛陽改姓元氏宏聞齊髙宗立非正嗣乃自率大衆分冦司徐梁豫等四州齊建武二年春也齊遣王廣之等禦之宏率衆至夀陽軍中有黑氈行殿容二十人坐輦邊皆三郎曷刺真槊多白真眊鐵騎為羣前後相接出軍皆烏漆楯槊綴以黑蝦蟆幡牛車驢駱駝等不攻城登八公山賦詩而去宏納馮太后兄昌黎王馮莎二女大者為昭儀小者為皇后生太子詢詢意不樂思歸桑乾私置馬三千匹于河隂皇后召而執之告宏宏怒徙洵於無鼻城河橋北二十里尋殺之以庶人禮葬遂立大馮為皇后立恪為太子是嵗太和二十年也四年宏大舉向南陽將破雍州以三十六軍前後相繼衆號百萬其諸王軍朱色鼓公侯緑色鼓伯子男黑色鼓並有輦角吹沸天地使咸陽王禧圍南陽自新野皆陷之宏縳新野太守劉思忌問曰何不早降忌曰寧為南鬼不作北臣乃殺之尋破崔惠景於鄧進樊城臨水而去宏疾崩諡孝文皇帝是年王肅在虜為制官品百司一如中國凡有九品各有二肅初為道人奔虜自説家被誅戮宏為流涕乃以第六妹妻之即彭城公主也封肅平原公為起宅舍宏太子恪立號景明元年即齊永明二年也初佛狸之朝討反胡於長安有道人射殺虜三郎將斛浴真佛狸大怒悉毁浮圗殺道人將盡及元嘉南冦獲道人以鐡籠盛之後乃感惡疾自是敬畏乃立塔寺及宏大興佛事蠻諸蠻種類繁多言語不一咸依山谷布在荆湘雍郢司等五州界宋世封西陽蠻梅蟲生為髙山侯田治山為威山侯梅加羊為扞山侯齊太祖即位數為冦皆討平之收其部落使戍汶陽汶陽本臨淄西界二百里中水陸迂狹魚貫而行水白田肥桓元割為都謹案此書各本俱云桓元割為都考南齊書作桓溫時割以為郡元疑當作溫南接巴巫太祖置巴州以威靜之蠻俗衣布徒跣或堆髙髻或剪髮兵仗以金銀為飾使弩射東南夷東夷髙麗國與魏虜接界太祖建元元年進封號以髙麗王璉為驃騎大將軍樂浪公如故三年使貢方物璉年百餘嵗乃卒隆昌元年髙雲立為髙麗王樂浪公征東大將軍其官位有長史司馬參軍之屬拜則申一腳坐則跪行則走以為恭敬國有銀山採為貨并人參貂皮重中國綵纈丈夫衣之亦重虎皮百濟辨辰之國起晉世受蕃爵自置百濟郡在髙麗東北齊建元二年其王辨都使貢方物永明二年魏虜征之大破百濟王辨都新羅國三韓種也倭國在帶方東南大海中島上漢末以女人立為王林邑國在交州南海行三千里北連九德郡秦朝故臨邑縣也漢末稱王晉太康五年使人貢獻宋太初元年林邑王范陽邁母初生夢天人以金席藉之光色竒異夷人謂金之精者為楊邁若中國云紫磨者故以名之王服天冠如佛冠身披香纓絡國人凶粗善鬪吹海螺為角人皆倮形有靈鷲鳥知人將死集其舍食死人肉盡飛去乃以火焚其骨粉於水中謂之水葬其大姓號婆羅門嫁娶必用八月女先求男賤男而貴女以婆羅門引壻握手相付呪曰吉利吉利為成禮色黑為上扶南國在日南郡之南大海西灣中廣三千餘里有江向西流入海先有女人為王名栁葉後為激國人混填所破降為妻而遂治其國子孫相傳晉末始通職貢其後王姓僑陳如名闍耶跋摩晉惠帝永明二年闍耶始因天竺道人郍伽仙而遣使於中國奉表獻金鏤龍王座像一軀白檀像一軀牙像一軀牙塔二軀古貝二雙琉璃蘇鉝二口玳瑁柈一枚詔回紫絳地黃碧緑綾各百匹扶南人黠慧智巧居重閣以木柵為城出大蒻葉長八九尺編此葉以蓋作屋人民亦為閣居或為大船長八九丈廣六七尺頭尾似魚國王行乘象婦人亦然好鬪雞狗為戲無牢獄有爭訟者以金指鐶投沸湯中令交取之土出芭蕉甘蔗石榴檳榔等物蠕蠕蠕蠕國虜塞外雜胡也編髮左袵晉世什翼圭入塞後蠕蠕逐水草居胸奴威伏西域土氣早寒所居穹廬氊帳刻木記事無文字宋世嘗言南方姓名齊者當為天子宋順帝升明二年太祖輔政遣王洪範使剋期共伐魏虜其相國刑基祗羅回表言京房讖云卯金十六草肅應王建元二年八月蠕蠕發四十萬南侵去平城七百里於燕然山縱獵而出後二年三年頻獻獅皮永明元年王洪範始還京師經途三萬餘里後十年為丁零胡所攻蠕蠕南徙河南氐羌河南國丐奴種也漢建武中丐奴奴婢亡匿在涼州界雜種數千人虜名奴婢為資一謂之資虜鮮卑慕容廆庶兄吐谷渾與廆分爭子孫領其部落以吐渾為氏在益州西北亘數千里其南界龍涸城去成都千餘里犬戎有四一在青水一在赤水一在澆河一在吐屈真川皆子弟所治其王治慕駕川初遂水草後稍為宫室初始受爵命河南吐谷渾拾寅為持節車騎大將軍秦河二州刺史齊太祖建元元年進號驃騎大將軍卒子易度侯為河南王卒世子休留茂為河南王齊使邱冠先至河南拜授為休留茂推墜深谷殺之丘冠先字元通吳興人晉吏部郎傑六世孫也氐楊氐興苻氐同出略陽漢世居仇池建安中有百頃氐王晉代有楊茂搜宋令裴方明代氐剋仇池王楊文德加武都王兼仇池公太祖即阼又封之宕昌羌種各有酋豪領部落在汧隴間宋末宕昌王梁彌機為河涼二州刺史隴西公建元元年太祖進號鎮西將軍卒子孫為宕昌王使求雜書帝以五經集論等賜之俗重虎皮以之送死國中以為賀建康實録卷十六
